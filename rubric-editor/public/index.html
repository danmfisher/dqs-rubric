<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[DRAFT] Danielle's Technology Rubric - Editing Proof of Concept</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8fc;
      --sidebar-bg: #1e2235;
      --sidebar-hover: #2c3150;
      --sidebar-active: #3a4172;
      --sidebar-text: #c8ccde;
      --sidebar-muted: #6b7194;
      --primary: #4f6af5;
      --primary-hover: #3d58e0;
      --success: #28a745;
      --warning: #e8a020;
      --danger: #dc3545;
      --border: #e2e6f0;
      --text: #1a1d2e;
      --muted: #6b7194;
      --card-bg: #ffffff;
      --tag-dim: #eef0fb;
      --tag-comp: #fef4e8;
      --tag-cap: #edfaf2;
    }

    html {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* React mounts into #root, which sits between body (the flex container)
       and the actual content. Without this, #root has height: auto and
       overflows the viewport silently — overflow-y: auto on .main never
       gets a constrained box to scroll within. */
    #root {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Top bar ───────────────────────────── */
    .topbar {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar-logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; color: var(--text); }
    .topbar-spacer { flex: 1; }

    /* ── Track selector dropdown ───────────── */
    .track-selector { position: relative; }
    .track-selector-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--text);
      padding: 5px 10px 5px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .track-selector-btn:hover { border-color: var(--primary); background: #fff; }
    .track-selector-btn.open { border-color: var(--primary); background: #fff; }
    .track-chevron {
      font-size: 10px; color: var(--muted);
      transition: transform 0.15s;
    }
    .track-selector-btn.open .track-chevron { transform: rotate(180deg); }
    .track-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0;
      min-width: 240px; z-index: 200;
      background: #fff; border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      overflow: hidden;
    }
    .track-dropdown-header {
      padding: 8px 14px 6px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .track-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; font-size: 13px; gap: 8px;
      transition: background 0.12s;
    }
    .track-option.active {
      color: var(--primary); font-weight: 600;
      background: #f4f6ff; cursor: default;
    }
    .track-option.available:not(.active) {
      cursor: pointer; color: var(--text);
    }
    .track-option.available:not(.active):hover { background: var(--bg); }
    .track-option.unavailable {
      color: #bbb; cursor: not-allowed;
    }
    .track-check { font-size: 11px; color: var(--primary); flex-shrink: 0; }
    .track-soon {
      font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
      padding: 2px 7px; border-radius: 10px;
      background: #f0f0f0; color: #aaa; flex-shrink: 0;
    }
    .save-status { font-size: 12px; color: var(--muted); }
    .save-status.saved { color: var(--success); }
    .save-status.unsaved { color: var(--warning); }
    .save-status.saving { color: var(--primary); }
    .save-status.error { color: var(--danger); }

    /* ── Nav tabs ──────────────────────────── */
    .navtabs {
      display: flex; gap: 2px; background: var(--bg);
      padding: 0 24px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .navtab {
      padding: 10px 18px; font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .navtab:hover { color: var(--text); }
    .navtab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .navtab.locked { opacity: 0.65; }
    .tab-lock {
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: 6px;
      width: 18px; height: 18px; border-radius: 4px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
      color: var(--muted); flex-shrink: 0;
    }
    .tab-lock:hover { background: var(--border); color: var(--text); }
    .navtab.active .tab-lock { color: var(--primary); }
    .navtab.active .tab-lock:hover { background: #eef0fb; }
    .readonly-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
      color: var(--muted); background: var(--bg);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 3px 10px; margin-bottom: 18px;
    }

    /* ── Main layout ───────────────────────── */
    .layout {
      display: flex; flex: 1; overflow: hidden;
      min-height: 0; /* prevents flex children from overflowing their container */
    }

    /* ── Sidebar ───────────────────────────── */
    .sidebar {
      width: 280px; flex-shrink: 0;
      background: var(--sidebar-bg);
      overflow-y: auto; padding: 12px 0;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #3a4172; border-radius: 2px; }

    .sidebar-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      color: var(--sidebar-muted); text-transform: uppercase;
      padding: 16px 16px 6px;
    }

    .tree-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; cursor: pointer;
      color: var(--sidebar-text); font-size: 13px;
      transition: background 0.12s;
      border-left: 3px solid transparent;
    }
    .tree-item:hover { background: var(--sidebar-hover); }
    .tree-item.active {
      background: var(--sidebar-active);
      border-left-color: var(--primary);
      color: #fff;
    }
    .tree-item .indent { flex-shrink: 0; }
    .tree-item .label { flex: 1; line-height: 1.3; }
    .tree-item .chevron {
      font-size: 10px; color: var(--sidebar-muted);
      transition: transform 0.15s;
    }
    .tree-item.open .chevron { transform: rotate(90deg); }
    .tree-badge {
      font-size: 10px; font-weight: 600;
      padding: 1px 5px; border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: var(--sidebar-text);
    }

    /* ── Main content ──────────────────────── */
    .main {
      flex: 1; min-height: 0; /* must be 0 to allow overflow-y to engage */
      overflow-y: auto; overflow-x: hidden;
      padding: 28px 32px;
    }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Philosophy flip cards ─────────────── */
    .phil-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 14px;
      margin-top: 8px;
    }
    .phil-scene {
      perspective: 900px;
      cursor: pointer;
      height: 186px;
      user-select: none;
    }
    .phil-flipper {
      position: relative;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.52s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .phil-flipper.is-flipped { transform: rotateY(180deg); }
    .phil-face {
      position: absolute; inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .phil-back {
      transform: rotateY(180deg);
      overflow-y: auto;
    }
    .phil-front-header {
      padding: 12px 16px 10px;
      border-radius: 10px 10px 0 0;
      flex-shrink: 0;
    }
    .phil-front-num {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      color: rgba(255,255,255,0.65); text-transform: uppercase;
    }
    .phil-front-title {
      font-size: 14px; font-weight: 700; color: #fff;
      margin-top: 2px; line-height: 1.3;
    }
    .phil-front-body {
      padding: 12px 16px; flex: 1;
      display: flex; flex-direction: column; justify-content: space-between;
      background: var(--card-bg);
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 10px 10px;
    }
    .phil-front-punchy {
      font-size: 12.5px; color: var(--text); line-height: 1.55;
    }
    .phil-front-hint {
      font-size: 10px; color: var(--muted); margin-top: 8px;
      display: flex; align-items: center; gap: 4px;
    }
    .phil-back-header {
      padding: 10px 14px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .phil-back-title {
      font-size: 12px; font-weight: 700;
    }
    .phil-back-content {
      padding: 10px 14px;
      font-size: 11.5px; line-height: 1.6; color: var(--text);
    }
    .phil-back-content p { margin: 0 0 8px; }
    .phil-back-content p:last-child { margin-bottom: 0; }
    .phil-back-content ul { padding-left: 16px; margin: 4px 0 8px; }
    .phil-back-content li { margin-bottom: 3px; }

    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); margin-bottom: 20px;
    }
    .breadcrumb-sep { color: var(--border); }
    .breadcrumb-current { color: var(--text); font-weight: 600; }

    .node-type-badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      padding: 3px 9px; border-radius: 12px; margin-bottom: 10px;
    }
    .badge-dimension { background: var(--tag-dim); color: #3a4172; }
    .badge-competency { background: var(--tag-comp); color: #7a4f00; }
    .badge-capability { background: var(--tag-cap); color: #0a5e2a; }

    .node-title {
      font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px;
    }
    .node-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.7px;
      margin-bottom: 16px;
    }

    /* ── Level grid ────────────────────────── */
    .level-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 1100px) {
      .level-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .level-cell { display: flex; flex-direction: column; gap: 6px; }
    .level-cell label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 6px;
    }
    .level-cell label .level-name {
      font-weight: 400; text-transform: none; letter-spacing: 0;
      color: var(--muted); font-size: 11px;
    }
    .level-cell textarea {
      width: 100%; min-height: 110px;
      font-size: 13px; line-height: 1.55;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      resize: vertical;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
    }
    .level-cell textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }
    .level-cell textarea.placeholder-text {
      color: #aaa; font-style: italic;
    }

    /* ── Child summary cards ───────────────── */
    .child-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .child-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
      cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .child-card:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(79,106,245,0.12);
    }
    .child-card-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
    }
    .child-card-name { font-size: 14px; font-weight: 600; }
    .child-card-count { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Dimension flip cards ──────────────── */
    .dim-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .dim-card-scene {
      perspective: 900px;
      height: 190px;
      cursor: pointer;
    }
    .dim-flipper {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    }
    .dim-flipper.is-flipped { transform: rotateY(180deg); }
    .dim-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 16px;
      display: flex; flex-direction: column;
    }
    .dim-front { background: var(--card-bg); }
    .dim-front:hover { border-color: var(--primary); box-shadow: 0 2px 10px rgba(79,106,245,0.10); }
    .dim-back { background: var(--bg); transform: rotateY(180deg); overflow-y: auto; }
    .dim-front-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .dim-front-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .dim-front-count { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .dim-front-intent {
      font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; flex: 1;
    }
    .dim-front-hint { font-size: 10px; color: var(--muted); margin-top: 8px; opacity: 0.5; text-align: right; }
    .dim-back-title { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 10px; letter-spacing: 0.3px; }
    .dim-back-comp { margin-bottom: 9px; }
    .dim-back-comp-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .dim-back-comp-intent { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

    /* ── Level flip cards ───────────────────── */
    .lvl-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
    }
    .lvl-card-scene { perspective: 800px; height: 160px; cursor: pointer; }
    .lvl-flipper {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    }
    .lvl-flipper.is-flipped { transform: rotateY(180deg); }
    .lvl-face {
      position: absolute; inset: 0;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 10px; border: 1px solid var(--border);
      padding: 14px 16px; display: flex; flex-direction: column; justify-content: center;
    }
    .lvl-front { background: var(--card-bg); align-items: flex-start; }
    .lvl-front:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(79,106,245,0.10); }
    .lvl-back { background: var(--bg); transform: rotateY(180deg); justify-content: flex-start; align-items: flex-start; overflow-y: auto; }
    .lvl-code { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--primary); margin-bottom: 4px; }
    .lvl-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .lvl-hint { font-size: 10px; color: var(--muted); margin-top: 8px; opacity: 0.5; }
    .lvl-back-content { font-size: 11.5px; color: var(--muted); line-height: 1.55; }

    /* ── Notes banner ───────────────────────── */
    .notes-banner {
      background: #fffbeb; border: 1px solid #fde68a;
      border-left: 4px solid #f59e0b; border-radius: 10px;
      padding: 16px 20px; margin-bottom: 20px;
      font-size: 13px; color: #78350f; line-height: 1.65;
    }
    .notes-banner-title {
      font-weight: 700; font-size: 11px; letter-spacing: 0.8px;
      text-transform: uppercase; color: #b45309; margin-bottom: 6px;
    }

    /* ── Action bar ────────────────────────── */
    .action-bar {
      display: flex; align-items: center; gap: 12px; margin-top: 8px;
    }
    .btn {
      padding: 9px 20px; border-radius: 7px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
      transition: background 0.15s, transform 0.05s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #228a3b; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Level View ────────────────────────── */
    .level-view-toolbar {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .level-select-group {
      display: flex; gap: 6px;
    }
    .level-pill {
      padding: 7px 16px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--card-bg); color: var(--muted);
      transition: all 0.12s;
    }
    .level-pill:hover { border-color: var(--primary); color: var(--primary); }
    .level-pill.active {
      background: var(--primary); border-color: var(--primary); color: #fff;
    }

    .rubric-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .rubric-table th {
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.7px;
      padding: 12px 16px;
      text-align: left;
    }
    .rubric-table td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.5;
    }
    .rubric-table tr:last-child td { border-bottom: none; }
    .rubric-table tr:hover td { background: #f9faff; }
    .td-dim { font-weight: 700; color: var(--text); white-space: nowrap; }
    .td-comp { color: var(--text); white-space: nowrap; }
    .td-cap { color: var(--muted); font-style: italic; }
    .td-desc { color: var(--text); max-width: 480px; }

    .dim-separator td {
      background: var(--tag-dim) !important;
      padding: 5px 16px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: #3a4172;
    }

    /* ── Empty / loading states ────────────── */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; text-align: center;
      color: var(--muted);
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; max-width: 340px; }

    .spinner {
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      width: 32px; height: 32px;
      animation: spin 0.7s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Inline edit (name) ────────────────── */
    .name-display {
      display: flex; align-items: center; gap: 8px;
    }
    .name-input {
      font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
      border: none; border-bottom: 2px solid var(--primary);
      background: transparent; color: var(--text);
      outline: none; width: 100%; padding-bottom: 2px;
      font-family: inherit;
    }

    /* ── Toast ─────────────────────────────── */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 1000;
    }
    .toast {
      padding: 12px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      animation: slideIn 0.2s ease;
    }
    .toast-success { background: #1a3d25; color: #6dd98a; }
    .toast-error { background: #3d1a1a; color: #f08080; }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── Meta panel ────────────────────────── */
    .meta-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .meta-field { display: flex; flex-direction: column; gap: 4px; }
    .meta-field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .meta-field .meta-value { font-size: 14px; color: var(--text); }
    .meta-field .meta-status {
      display: inline-flex; align-items: center;
      font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      background: var(--tag-comp); color: var(--warning);
    }

    /* ── Evaluation Wizard ───────────────────── */
    .wizard-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Setup */
    .wizard-setup { max-width: 460px; margin: 56px auto; padding: 0 24px; }
    .wizard-setup h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .wizard-setup .wiz-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .setup-fields { display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px; }
    .setup-field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .setup-field input, .setup-field select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fff; color: var(--text); outline: none; font-family: inherit; }
    .setup-field input:focus, .setup-field select:focus { border-color: var(--primary); }
    .wiz-start-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .wiz-start-btn:hover { background: var(--primary-hover); }

    /* Card exercise */
    .card-exercise { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 32px 24px; gap: 20px; overflow-y: auto; }
    .card-scene { display: flex; align-items: center; gap: 16px; width: 100%; max-width: 680px; }
    .card-nav-btn { flex-shrink: 0; width: 38px; height: 38px; border: 1px solid var(--border); border-radius: 50%; background: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: border-color 0.15s, color 0.15s; }
    .card-nav-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .card-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .eval-card { flex: 1; background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 36px 40px; min-height: 120px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: relative; }
    .eval-card-text { font-size: 16px; line-height: 1.7; text-align: center; color: var(--text); }
    .eval-card-badge { position: absolute; top: 12px; right: 14px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px; }
    .badge-easy { background: #dcfce7; color: #166534; }
    .badge-comfortable { background: #dbeafe; color: #1e40af; }
    .badge-stretch { background: #fef3c7; color: #92400e; }
    .badge-skip { background: #f1f5f9; color: var(--muted); }
    .rating-buttons { display: flex; gap: 10px; width: 100%; max-width: 680px; }
    .rating-btn { flex: 1; padding: 13px 8px; border-radius: 10px; border: 2px solid transparent; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.12s; }
    .rating-btn.easy { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .rating-btn.easy:hover, .rating-btn.easy.active { background: #dcfce7; border-color: #4ade80; }
    .rating-btn.comfortable { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
    .rating-btn.comfortable:hover, .rating-btn.comfortable.active { background: #dbeafe; border-color: #60a5fa; }
    .rating-btn.stretch { background: #fffbeb; color: #92400e; border-color: #fde68a; }
    .rating-btn.stretch:hover, .rating-btn.stretch.active { background: #fef3c7; border-color: #fbbf24; }
    .rating-btn.skip-btn { flex: none; padding: 13px 16px; background: #f8fafc; color: var(--muted); border-color: var(--border); font-weight: 400; font-size: 13px; }
    .rating-btn.skip-btn:hover { background: #f1f5f9; }
    .exercise-done-banner { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 14px; padding: 20px 28px; text-align: center; max-width: 500px; }
    .exercise-done-banner h3 { font-size: 17px; font-weight: 700; color: #166534; margin-bottom: 6px; }
    .exercise-done-banner p { font-size: 13px; color: #166534; margin-bottom: 16px; }
    .wiz-results-btn { padding: 12px 28px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .wiz-results-btn:hover { background: var(--primary-hover); }

    /* Results */
    .results-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .dim-nav-strip { display: flex; gap: 10px; padding: 14px 28px; background: #fff; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .dim-nav-chip { flex: 1; padding: 12px 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); cursor: pointer; text-align: center; transition: background 0.12s; border-bottom: 3px solid transparent; }
    .dim-nav-chip.active { background: #fff; border-color: var(--border); border-bottom-color: var(--primary); }
    .dim-nav-chip:hover:not(.active) { background: #f4f5fb; }
    .dim-chip-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); line-height: 1.3; }
    .dim-chip-level { font-size: 20px; font-weight: 800; color: var(--primary); margin: 3px 0; }
    .dim-chip-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
    .dim-chip-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s; }
    .results-body { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .results-dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .results-dim-title { font-size: 18px; font-weight: 700; }
    .results-dim-arrows { display: flex; gap: 8px; }
    .dim-arrow-btn { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 50%; background: #fff; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: border-color 0.12s, color 0.12s; }
    .dim-arrow-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .dim-arrow-btn:disabled { opacity: 0.3; cursor: default; }
    .results-intro { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; margin-bottom: 24px; font-size: 13px; color: var(--muted); line-height: 1.6; }
    .results-intro strong { color: var(--text); }
    .comp-result-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .comp-result-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; cursor: pointer; user-select: none; }
    .comp-result-header:hover { background: var(--bg); }
    .comp-collapse-arrow { font-size: 11px; color: var(--muted); margin-left: auto; flex-shrink: 0; transition: transform 0.15s; }
    .comp-collapse-arrow.open { transform: rotate(90deg); }
    .comp-result-body { padding: 0 20px 20px; }
    .comp-result-top { display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .comp-result-name { font-size: 15px; font-weight: 700; }
    .comp-inferred-level { font-size: 30px; font-weight: 800; color: var(--primary); line-height: 1; }
    .comp-inferred-name { font-size: 12px; color: var(--muted); margin-left: -8px; }
    .comp-level-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .comp-level-row label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); }
    .comp-level-select { padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fff; color: var(--text); }
    .comp-confirm-btn { padding: 5px 12px; border: 1px solid var(--primary); border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--primary); background: #fff; cursor: pointer; transition: all 0.12s; }
    .comp-confirm-btn:hover { background: var(--primary); color: #fff; }
    .comp-confirmed-badge { font-size: 12px; font-weight: 600; color: #166534; }
    .comp-caps-section { margin-bottom: 18px; }
    .comp-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
    .comp-cap-item { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--bg); }
    .comp-cap-item:last-child { border-bottom: none; }
    .comp-cap-dot { color: var(--muted); flex-shrink: 0; margin-top: 1px; }
    .comp-cap-name { font-size: 13px; font-weight: 600; }
    .comp-cap-intent { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .card-columns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    .card-col { display: flex; flex-direction: column; }
    .card-col-hdr { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; padding: 5px 10px; border-radius: 6px; text-align: center; margin-bottom: 8px; }
    .card-col-hdr.easy { background: #dcfce7; color: #166534; }
    .card-col-hdr.comfortable { background: #dbeafe; color: #1e40af; }
    .card-col-hdr.stretch { background: #fef3c7; color: #92400e; }
    .card-col-hdr.skipped { background: #f1f5f9; color: var(--muted); }
    .card-chip { font-size: 12px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; margin-bottom: 6px; line-height: 1.45; }
    .card-col-empty { font-size: 12px; color: var(--muted); font-style: italic; padding: 6px 10px; }
    .card-col-count { display: block; font-size: 10px; font-weight: 500; opacity: 0.75; margin-top: 1px; text-transform: none; letter-spacing: 0; }
    .cards-section-toggle { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); cursor: pointer; user-select: none; margin-bottom: 10px; }
    .cards-section-toggle:hover { color: var(--text); }
    .cards-section-arrow { font-size: 9px; transition: transform 0.15s; display: inline-block; }
    .cards-section-arrow.open { transform: rotate(90deg); }
    .setup-summary-bar { display: flex; align-items: center; gap: 10px; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; margin-bottom: 16px; flex-wrap: wrap; }
    .setup-summary-bar .ss-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .setup-summary-bar .ss-val { font-size: 13px; font-weight: 600; color: var(--text); }
    .setup-summary-bar .ss-sep { color: var(--border); font-size: 14px; }
    .setup-summary-bar .ss-declared { display: inline-flex; align-items: center; gap: 4px; background: var(--primary); color: #fff; border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 700; }
    .comp-evidence label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); display: block; margin-bottom: 6px; }
    .comp-evidence textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; resize: vertical; min-height: 70px; font-family: inherit; color: var(--text); background: #fff; }
    .comp-evidence textarea:focus { outline: none; border-color: var(--primary); }
    .results-footer { padding: 14px 32px; border-top: 1px solid var(--border); background: #fff; display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; }
    .export-csv-btn { padding: 9px 18px; background: var(--text); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .export-csv-btn:hover { opacity: 0.85; }
    .wiz-restart-btn { padding: 9px 18px; background: #fff; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; }
    .wiz-restart-btn:hover { border-color: var(--muted); color: var(--text); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ──────────────────────────────────────────────────────────
// Utility helpers
// ──────────────────────────────────────────────────────────
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function findNode(rubric, dimId, compId, capId) {
  const dim = rubric.dimensions.find(d => d.id === dimId);
  if (!dim) return null;
  if (!compId) return { type: 'dimension', node: dim, dim };
  const comp = dim.competencies.find(c => c.id === compId);
  if (!comp) return null;
  if (!capId) return { type: 'competency', node: comp, dim, comp };
  const cap = comp.capabilities.find(c => c.id === capId);
  if (!cap) return null;
  return { type: 'capability', node: cap, dim, comp, cap };
}

// ──────────────────────────────────────────────────────────
// Toast
// ──────────────────────────────────────────────────────────
function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`}>{t.message}</div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((message, type = 'success') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  return { toasts, show };
}

// ──────────────────────────────────────────────────────────
// Sidebar Tree
// ──────────────────────────────────────────────────────────
function SidebarTree({ rubric, selection, onSelect }) {
  const [openDims, setOpenDims] = useState(() => {
    const s = {};
    (rubric?.dimensions || []).forEach(d => { s[d.id] = true; });
    return s;
  });
  const [openComps, setOpenComps] = useState({});

  const toggleDim = (id) => setOpenDims(p => ({ ...p, [id]: !p[id] }));
  const toggleComp = (dimId, compId) =>
    setOpenComps(p => ({ ...p, [`${dimId}:${compId}`]: !p[`${dimId}:${compId}`] }));

  if (!rubric) return null;

  return (
    <div className="sidebar">
      <div className="sidebar-section-label">Rubric Structure</div>
      {rubric.dimensions.map(dim => (
        <React.Fragment key={dim.id}>
          <div
            className={`tree-item ${openDims[dim.id] ? 'open' : ''} ${
              selection.dimId === dim.id && !selection.compId ? 'active' : ''
            }`}
            onClick={() => { onSelect({ dimId: dim.id }); toggleDim(dim.id); }}
          >
            <span className="indent" style={{ width: 0 }} />
            <span className="chevron">▶</span>
            <span className="label">{dim.name}</span>
            <span className="tree-badge">{dim.competencies.length}</span>
          </div>

          {openDims[dim.id] && dim.competencies.map(comp => (
            <React.Fragment key={comp.id}>
              <div
                className={`tree-item ${openComps[`${dim.id}:${comp.id}`] ? 'open' : ''} ${
                  selection.dimId === dim.id && selection.compId === comp.id && !selection.capId ? 'active' : ''
                }`}
                onClick={() => { onSelect({ dimId: dim.id, compId: comp.id }); toggleComp(dim.id, comp.id); }}
              >
                <span className="indent" style={{ width: 14 }} />
                <span className="chevron">▶</span>
                <span className="label">{comp.name}</span>
                <span className="tree-badge">{comp.capabilities.length}</span>
              </div>

              {openComps[`${dim.id}:${comp.id}`] && comp.capabilities.map(cap => (
                <div
                  key={cap.id}
                  className={`tree-item ${
                    selection.dimId === dim.id && selection.compId === comp.id && selection.capId === cap.id ? 'active' : ''
                  }`}
                  onClick={() => onSelect({ dimId: dim.id, compId: comp.id, capId: cap.id })}
                >
                  <span className="indent" style={{ width: 28 }} />
                  <span className="label">{cap.name}</span>
                </div>
              ))}
            </React.Fragment>
          ))}
        </React.Fragment>
      ))}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Level descriptions editor
// ──────────────────────────────────────────────────────────
function DescriptionsEditor({ levels, levelNames, descriptions, onChange, readOnly }) {
  return (
    <div className="level-grid">
      {levels.map(level => {
        const val = descriptions[level] || '';
        const isPlaceholder = val.startsWith('[') && val.endsWith(']');
        return (
          <div className="level-cell" key={level}>
            <label>
              {level}
              <span className="level-name">— {levelNames[level]}</span>
            </label>
            <textarea
              className={isPlaceholder ? 'placeholder-text' : ''}
              value={val}
              onChange={readOnly ? undefined : e => onChange(level, e.target.value)}
              readOnly={readOnly}
              placeholder={`Describe ${level} behavior here…`}
              style={readOnly ? { cursor: 'default', background: 'var(--bg)' } : undefined}
            />
          </div>
        );
      })}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Node Editor (Dimension / Competency / Capability)
// ──────────────────────────────────────────────────────────
function NodeEditor({ rubric, selection, onSave, readOnly }) {
  const found = selection.dimId ? findNode(rubric, selection.dimId, selection.compId, selection.capId) : null;
  const [localNode, setLocalNode] = useState(null);
  const [dirty, setDirty] = useState(false);

  useEffect(() => {
    if (found) {
      setLocalNode(deepClone(found.node));
      setDirty(false);
    }
  }, [selection, found?.node]);

  if (!selection.dimId) {
    return (
      <div className="main">
        <div className="empty-state">
          <div className="empty-state-icon">🗂</div>
          <h3>{readOnly ? 'Select a node to view' : 'Select a node to edit'}</h3>
          <p>Choose a Dimension, Competency, or Capability from the sidebar to {readOnly ? 'view' : 'view and edit'} its level descriptions.</p>
        </div>
      </div>
    );
  }

  if (!found || !localNode) return <div className="main"><div className="spinner" /></div>;

  const { type, dim, comp } = found;
  const typeLabel = { dimension: 'Dimension', competency: 'Competency', capability: 'Capability' }[type];
  const typeBadge = `badge-${type}`;

  const handleDescChange = (level, val) => {
    setLocalNode(prev => ({ ...prev, descriptions: { ...prev.descriptions, [level]: val } }));
    setDirty(true);
  };

  const handleNameChange = (val) => {
    setLocalNode(prev => ({ ...prev, name: val }));
    setDirty(true);
  };

  const handleSave = () => {
    onSave(type, { dimId: dim.id, compId: comp?.id, capId: found.cap?.id }, localNode);
    setDirty(false);
  };

  const children = type === 'dimension'
    ? dim.competencies.map(c => ({ id: c.id, name: c.name, count: c.capabilities.length, label: 'Competency', countLabel: 'capabilities' }))
    : type === 'competency'
    ? comp.capabilities.map(c => ({ id: c.id, name: c.name, count: null, label: 'Capability' }))
    : [];

  return (
    <div className="main">
      {/* Breadcrumb */}
      <div className="breadcrumb">
        <span>{dim.name}</span>
        {comp && <><span className="breadcrumb-sep">›</span><span>{comp.name}</span></>}
        {found.cap && <><span className="breadcrumb-sep">›</span><span className="breadcrumb-current">{localNode.name}</span></>}
        {!found.cap && <><span className="breadcrumb-sep">›</span><span className="breadcrumb-current">{localNode.name}</span></>}
      </div>

      {/* Lock state banner — swaps based on editing mode */}
      {readOnly ? (
        <div className="readonly-badge">
          <LockedIcon /> View only — click the lock icon in the tab to enable editing
        </div>
      ) : (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          fontSize: 12, fontWeight: 500,
          color: '#92400e',
          background: '#fffbeb',
          border: '1px solid #fcd34d',
          borderRadius: 8, padding: '8px 14px',
          marginBottom: 18,
        }}>
          <UnlockedIcon />
          <span>Editing enabled — changes are saved directly to the rubric. Click the lock icon in the tab to lock.</span>
        </div>
      )}

      {/* Node header */}
      <span className={`node-type-badge ${typeBadge}`}>{typeLabel}</span>
      <div className="name-display">
        <input
          className="name-input"
          value={localNode.name}
          onChange={readOnly ? undefined : e => handleNameChange(e.target.value)}
          readOnly={readOnly}
          style={readOnly ? { cursor: 'default', background: 'var(--bg)' } : undefined}
        />
      </div>
      {localNode.intent && (
        <div style={{ fontStyle: 'italic', color: 'var(--muted)', fontSize: 13, marginTop: 8, marginBottom: 2 }}>
          {localNode.intent}
        </div>
      )}
      <div className="node-subtitle" style={{ marginTop: 6 }}>
        {type === 'dimension' && `${dim.competencies.length} competencies · ${dim.competencies.reduce((a,c) => a + c.capabilities.length, 0)} capabilities`}
        {type === 'competency' && `${comp.capabilities.length} capabilities · within ${dim.name}`}
        {type === 'capability' && `Leaf node · ${dim.name} › ${comp.name}`}
      </div>

      {/* Level descriptions */}
      <div className="card">
        <div className="card-title">Level Descriptions</div>
        <DescriptionsEditor
          levels={rubric.meta.levels}
          levelNames={rubric.meta.level_names}
          descriptions={localNode.descriptions}
          onChange={handleDescChange}
          readOnly={readOnly}
        />
      </div>

      {/* Save — hidden in read-only mode */}
      {!readOnly && (
        <div className="action-bar">
          <button
            className="btn btn-primary"
            disabled={!dirty}
            onClick={handleSave}
          >
            {dirty ? 'Save Changes' : 'Saved'}
          </button>
          {dirty && (
            <button
              className="btn btn-ghost"
              onClick={() => { setLocalNode(deepClone(found.node)); setDirty(false); }}
            >
              Discard
            </button>
          )}
          {dirty && <span style={{ fontSize: 12, color: 'var(--warning)' }}>Unsaved changes</span>}
        </div>
      )}

      {/* Children */}
      {children.length > 0 && (
        <div className="card" style={{ marginTop: 24 }}>
          <div className="card-title">{type === 'dimension' ? 'Competencies' : 'Capabilities'}</div>
          <div className="child-grid">
            {children.map(child => (
              <div key={child.id} className="child-card"
                onClick={() => {/* no-op; navigate via sidebar */}}
              >
                <div className="child-card-label">{child.label}</div>
                <div className="child-card-name">{child.name}</div>
                {child.count != null && (
                  <div className="child-card-count">{child.count} {child.countLabel}</div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Level View
// ──────────────────────────────────────────────────────────
function LevelView({ rubric, selectedTrack }) {
  const [selectedLevel, setSelectedLevel] = useState(rubric?.meta.levels[2] || 'L3');
  const [compareDown, setCompareDown] = useState(false);
  const [compareUp,   setCompareUp]   = useState(false);

  const [expandedDims, setExpandedDims] = useState(() => new Set());
  const [expandedComps, setExpandedComps] = useState(() => new Set());

  if (!rubric) return <div className="main"><div className="spinner" /></div>;

  // Adjacent levels
  const levels    = rubric.meta.levels;
  const levelIdx  = levels.indexOf(selectedLevel);
  const prevLevel = levelIdx > 0               ? levels[levelIdx - 1] : null;
  const nextLevel = levelIdx < levels.length-1 ? levels[levelIdx + 1] : null;

  const ln = (l) => rubric.meta.level_names[l] || l;
  const totalCaps = rubric.dimensions.reduce((a, d) =>
    a + d.competencies.reduce((b, c) => b + c.capabilities.length, 0), 0);

  const toggleDim = (id) =>
    setExpandedDims(prev => { const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s; });
  const toggleComp = (dId, cId) => {
    const k = `${dId}:${cId}`;
    setExpandedComps(prev => { const s = new Set(prev); s.has(k) ? s.delete(k) : s.add(k); return s; });
  };
  const expandAll = () => {
    setExpandedDims(new Set(rubric.dimensions.map(d => d.id)));
    setExpandedComps(new Set(rubric.dimensions.flatMap(d => d.competencies.map(c => `${d.id}:${c.id}`))));
  };
  const collapseAll = () => { setExpandedDims(new Set()); setExpandedComps(new Set()); };

  // When the baseline level changes, keep compare toggles but clamp to valid edges
  const handleLevelChange = (l) => {
    setSelectedLevel(l);
    const idx = levels.indexOf(l);
    if (idx === 0)            setCompareDown(false);
    if (idx === levels.length-1) setCompareUp(false);
  };

  // ── Visual theme for each column role ────────────────────
  const COL = {
    prev: {
      headerBg:    '#4a5080',
      headerColor: '#c8cce8',
      cellBg:      '#f1f3fb',
      textColor:   '#7880aa',
      borderLeft:  '1px solid #d0d4ec',
      label:       `◀ ${prevLevel} — ${ln(prevLevel)}`,
      italic:      true,
    },
    base: {
      headerBg:    'var(--sidebar-bg)',
      headerColor: '#ffffff',
      cellBg:      '#ffffff',
      textColor:   'var(--text)',
      borderLeft:  '3px solid var(--primary)',
      label:       `${selectedLevel} — ${ln(selectedLevel)}`,
      italic:      false,
    },
    next: {
      headerBg:    '#5a4a30',
      headerColor: '#d4c4a0',
      cellBg:      '#fdf9f2',
      textColor:   '#9a8050',
      borderLeft:  '1px solid #e8dfc4',
      label:       `${nextLevel} — ${ln(nextLevel)} ▶`,
      italic:      true,
    },
  };

  // Which description columns are active, in order
  const activeCols = [
    ...(compareDown && prevLevel ? ['prev'] : []),
    'base',
    ...(compareUp && nextLevel   ? ['next'] : []),
  ];
  const numDescCols = activeCols.length;

  // Helper: get description for a node's descriptions object
  const getDesc = (descriptions, level) => descriptions?.[level] || '';
  const isPlaceholder = (s) => s.startsWith('[') && s.endsWith(']');

  // Render the description cell(s) for a given node at each active column
  const descCells = (descriptions, rowBgOverride) => activeCols.map(role => {
    const col   = COL[role];
    const level = role === 'prev' ? prevLevel : role === 'next' ? nextLevel : selectedLevel;
    const desc  = getDesc(descriptions, level);
    const ph    = isPlaceholder(desc);
    return (
      <td key={role} style={{
        verticalAlign: 'top',
        background:    rowBgOverride || col.cellBg,
        borderLeft:    col.borderLeft,
        color:         ph ? '#bbb' : col.textColor,
        fontStyle:     (ph || col.italic) ? 'italic' : 'normal',
        fontSize:      role === 'base' ? 13 : 12,
        padding:       '11px 14px',
        lineHeight:    1.55,
      }}>
        {desc || <span style={{ color: '#ccc' }}>—</span>}
      </td>
    );
  });

  // Chevron for tree toggle
  const chevron = (open) => (
    <span style={{
      display: 'inline-block', fontSize: 9, color: 'var(--muted)',
      transition: 'transform 0.15s', flexShrink: 0,
      transform: open ? 'rotate(90deg)' : 'none',
    }}>▶</span>
  );

  const rowToggleStyle = {
    cursor: 'pointer', userSelect: 'none',
    display: 'inline-flex', alignItems: 'center', gap: 8, width: '100%',
  };

  // Compare toggle button
  const CompareToggle = ({ role, active, disabled, onToggle }) => {
    const col = COL[role];
    return (
      <button
        disabled={disabled}
        onClick={onToggle}
        style={{
          padding: '6px 14px', borderRadius: 20, fontSize: 12, fontWeight: 600,
          cursor: disabled ? 'not-allowed' : 'pointer',
          border: active ? `1.5px solid ${col.headerBg}` : '1.5px solid var(--border)',
          background: active ? col.headerBg : 'transparent',
          color: active ? col.headerColor : disabled ? '#ccc' : 'var(--muted)',
          opacity: disabled ? 0.4 : 1,
          transition: 'all 0.15s',
          display: 'flex', alignItems: 'center', gap: 6,
        }}
      >
        {role === 'prev'
          ? <>{active ? '✓ ' : ''}◀ {prevLevel ? `${prevLevel} ${ln(prevLevel)}` : 'N/A'}</>
          : <>{active ? '✓ ' : ''}{nextLevel ? `${nextLevel} ${ln(nextLevel)}` : 'N/A'} ▶</>
        }
      </button>
    );
  };

  // Client-side CSV export — replicates server's build_csv()
  const exportRubricCSV = () => {
    const level = selectedLevel.toUpperCase();
    const levelName = rubric.meta.level_names[level] || level;
    const rows = [['"Dimension"', '"Competency"', '"Capability"', `"${level} — ${levelName}"`]];
    rubric.dimensions.forEach(dim => {
      dim.competencies.forEach(comp => {
        comp.capabilities.forEach(cap => {
          const desc = (cap.descriptions || {})[level] || '';
          rows.push([dim.name, comp.name, cap.name, desc].map(v => `"${String(v).replace(/"/g, '""')}"`));
        });
      });
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safeTrack = (selectedTrack || 'swe-ic').replace(/\//g, '-');
    a.href = url; a.download = `Rubric_${safeTrack}_${level}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="main">
      {/* ── Toolbar ─────────────────────────────────── */}
      <div className="level-view-toolbar">
        <div className="level-select-group">
          {levels.map(l => (
            <button key={l}
              className={`level-pill ${l === selectedLevel ? 'active' : ''}`}
              onClick={() => handleLevelChange(l)}>
              {l} — {ln(l)}
            </button>
          ))}
        </div>
      </div>

      {/* Second toolbar row: compare toggles + collapse controls */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16, flexWrap: 'wrap' }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.6px', marginRight: 2 }}>
          Compare
        </span>
        <CompareToggle role="prev" active={compareDown} disabled={!prevLevel}
          onToggle={() => setCompareDown(v => !v)} />
        <CompareToggle role="next" active={compareUp}   disabled={!nextLevel}
          onToggle={() => setCompareUp(v => !v)} />
        <div style={{ width: 1, height: 20, background: 'var(--border)', margin: '0 6px' }} />
        <button className="btn btn-ghost" style={{ padding: '6px 12px', fontSize: 12 }} onClick={expandAll}>Expand all</button>
        <button className="btn btn-ghost" style={{ padding: '6px 12px', fontSize: 12 }} onClick={collapseAll}>Collapse all</button>
        <div style={{ flex: 1 }} />
        <button className="btn btn-success"
          style={{ fontSize: 12, padding: '7px 16px' }}
          onClick={exportRubricCSV}>
          ⬇ Export CSV ({selectedLevel})
        </button>
      </div>

      {/* ── Table ────────────────────────────────────── */}
      <table className="rubric-table" style={{ tableLayout: 'fixed' }}>
        <colgroup>
          <col style={{ width: numDescCols === 3 ? '12%' : numDescCols === 2 ? '14%' : '15%' }} />
          <col style={{ width: numDescCols === 3 ? '14%' : numDescCols === 2 ? '16%' : '18%' }} />
          <col style={{ width: numDescCols === 3 ? '14%' : numDescCols === 2 ? '16%' : '18%' }} />
          {activeCols.map(role => <col key={role} />)}
        </colgroup>
        <thead>
          <tr>
            <th>Dimension</th>
            <th>Competency</th>
            <th>Capability</th>
            {activeCols.map(role => {
              const col = COL[role];
              return (
                <th key={role} style={{
                  background: col.headerBg, color: col.headerColor,
                  borderLeft: col.borderLeft,
                  fontStyle: col.italic ? 'italic' : 'normal',
                  fontWeight: role === 'base' ? 700 : 500,
                  fontSize: role === 'base' ? 11 : 10,
                }}>
                  {col.label}
                </th>
              );
            })}
          </tr>
        </thead>
        <tbody>
          {rubric.dimensions.map(dim => {
            const dimOpen = expandedDims.has(dim.id);

            return (
              <React.Fragment key={dim.id}>

                {/* ── Dimension row ─────────────────────── */}
                <tr>
                  {dimOpen ? (
                    <>
                      <td style={{ fontWeight: 700, verticalAlign: 'top', paddingTop: 12, background: '#e8ebf7' }}>
                        <span style={rowToggleStyle} onClick={() => toggleDim(dim.id)}>
                          {chevron(true)}{dim.name}
                        </span>
                      </td>
                      <td colSpan={2} style={{ background: '#e8ebf7', borderBottom: '1px solid var(--border)' }} />
                    </>
                  ) : (
                    <td colSpan={3} style={{ fontWeight: 700, verticalAlign: 'top', paddingTop: 12, background: '#e8ebf7' }}>
                      <span style={rowToggleStyle} onClick={() => toggleDim(dim.id)}>
                        {chevron(false)}{dim.name}
                      </span>
                    </td>
                  )}
                  {descCells(dim.descriptions, '#eaedfa')}
                </tr>

                {dimOpen && dim.competencies.map(comp => {
                  const compKey  = `${dim.id}:${comp.id}`;
                  const compOpen = expandedComps.has(compKey);

                  return (
                    <React.Fragment key={comp.id}>

                      {/* ── Competency row ─────────────── */}
                      <tr>
                        <td style={{ background: '#f7f8fc', borderBottom: '1px solid var(--border)' }} />
                        {compOpen ? (
                          <>
                            <td style={{ fontWeight: 600, verticalAlign: 'top', paddingTop: 10, background: '#f7f8fc' }}>
                              <span style={rowToggleStyle} onClick={() => toggleComp(dim.id, comp.id)}>
                                {chevron(true)}{comp.name}
                              </span>
                              {comp.intent && <div style={{ fontWeight: 400, fontStyle: 'italic', fontSize: 11, color: 'var(--muted)', marginTop: 2, paddingLeft: 18 }}>{comp.intent}</div>}
                            </td>
                            <td style={{ background: '#f7f8fc', borderBottom: '1px solid var(--border)' }} />
                          </>
                        ) : (
                          <td colSpan={2} style={{ fontWeight: 600, verticalAlign: 'top', paddingTop: 10, background: '#f7f8fc' }}>
                            <span style={rowToggleStyle} onClick={() => toggleComp(dim.id, comp.id)}>
                              {chevron(false)}{comp.name}
                            </span>
                            {comp.intent && <div style={{ fontWeight: 400, fontStyle: 'italic', fontSize: 11, color: 'var(--muted)', marginTop: 2, paddingLeft: 18 }}>{comp.intent}</div>}
                          </td>
                        )}
                        {descCells(comp.descriptions, null)}
                      </tr>

                      {/* ── Capability rows ─────────────── */}
                      {compOpen && comp.capabilities.map(cap => (
                        <tr key={cap.id}>
                          <td style={{ borderBottom: '1px solid var(--border)' }} />
                          <td style={{ borderBottom: '1px solid var(--border)' }} />
                          <td style={{ verticalAlign: 'top', paddingLeft: 20 }}>
                            <div style={{ color: 'var(--muted)', fontStyle: 'italic' }}>{cap.name}</div>
                            {cap.intent && <div style={{ fontSize: 11, color: 'var(--muted)', opacity: 0.75, marginTop: 2 }}>{cap.intent}</div>}
                          </td>
                          {descCells(cap.descriptions, null)}
                        </tr>
                      ))}

                    </React.Fragment>
                  );
                })}

              </React.Fragment>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// Lightweight markdown → JSX (handles bold, bullets, tables)
function renderMd(text) {
  const inline = (str) => {
    const parts = str.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g);
    return parts.map((p, i) => {
      if (p.startsWith('**') && p.endsWith('**')) return <strong key={i}>{p.slice(2,-2)}</strong>;
      if (p.startsWith('*')  && p.endsWith('*'))  return <em key={i}>{p.slice(1,-1)}</em>;
      return p;
    });
  };
  const parseTableLine = (line) =>
    line.split('|').slice(1, -1).map(cell => cell.trim());

  const blocks = text.split(/\n\n+/);
  return blocks.map((block, bi) => {
    const lines = block.trim().split('\n');
    // markdown table
    if (lines.some(l => l.startsWith('|'))) {
      const tableLines = lines.filter(l => l.startsWith('|'));
      const isSeparator = (l) => /^\|[-| :]+\|$/.test(l.trim());
      const headerLine = tableLines[0];
      const bodyLines = tableLines.slice(2).filter(l => !isSeparator(l));
      const headers = parseTableLine(headerLine);
      return (
        <table key={bi} style={{
          borderCollapse: 'collapse', width: '100%',
          fontSize: 12, margin: '8px 0', lineHeight: 1.4,
        }}>
          <thead>
            <tr>
              {headers.map((h, i) => (
                <th key={i} style={{
                  textAlign: 'left', padding: '5px 8px',
                  borderBottom: '2px solid #d1d5db',
                  fontWeight: 600, color: '#374151',
                  whiteSpace: i === 0 ? 'nowrap' : 'normal',
                }}>
                  {inline(h)}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {bodyLines.map((row, ri) => (
              <tr key={ri} style={{ borderBottom: '1px solid #e5e7eb' }}>
                {parseTableLine(row).map((cell, ci) => (
                  <td key={ci} style={{
                    padding: '5px 8px', verticalAlign: 'top',
                    fontStyle: ci > 0 ? 'italic' : 'normal',
                    color: ci === 0 ? '#374151' : '#6b7280',
                  }}>
                    {inline(cell)}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      );
    }
    // bullet list
    if (lines.every(l => l.trimStart().startsWith('- '))) {
      return (
        <ul key={bi}>
          {lines.map((l,i) => <li key={i}>{inline(l.replace(/^\s*-\s+/,''))}</li>)}
        </ul>
      );
    }
    // numbered list
    if (lines.every(l => /^\d+\./.test(l.trim()))) {
      return (
        <ol key={bi} style={{ paddingLeft: 16, margin: '4px 0 8px' }}>
          {lines.map((l,i) => <li key={i}>{inline(l.replace(/^\d+\.\s+/,''))}</li>)}
        </ol>
      );
    }
    return <p key={bi}>{inline(block.trim())}</p>;
  }).filter(Boolean);
}

function PhilosophyCard({ section, groupColor }) {
  const [flipped, setFlipped] = useState(false);
  const color = groupColor;
  const punchy = PHIL_PUNCHY[section.number] || '';

  return (

        {/* ── Front ── */}
        <div className="phil-face">
          <div className="phil-front-header" style={{ background: color }}>

            <div className="phil-front-title">{section.title}</div>
          </div>
          <div className="phil-front-body">
            <div className="phil-front-punchy">{punchy}</div>

          </div>
        </div>

        {/* ── Back ── */}
        <div className="phil-face phil-back"
          style={{ background: '#fafbff', border: `1px solid ${color}50` }}>

            </div>
          </div>

          </div>
        </div>

      </div>
    </div>
  );
}

function PhilosophyCards({ sections }) {
  if (!sections || sections.length === 0) return null;

  // Build ordered group list, preserving first-seen order from the .md file
  const groupOrder = [];
  const grouped = {};
  sections.forEach(s => {
    if (!grouped[s.group]) {
      grouped[s.group] = [];
      groupOrder.push(s.group);
    }
    grouped[s.group].push(s);
  });

  // Client-side .md download — reconstructs from parsed sections (no server needed)
  const downloadPhilosophy = () => {
    let md = '# FlexGen Rubric Design Philosophy\n\n';
    let currentGroup = '';
    sections.forEach(sec => {
      if (sec.group !== currentGroup) {
        currentGroup = sec.group;
        md += `<!-- group: ${currentGroup} -->\n\n`;
      }
      md += `## ${sec.number}. ${sec.title}\n\n${sec.content}\n\n`;
    });
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'FlexGen_Rubric_Philosophy.md'; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="card">
      <div style={{ display: 'flex', alignItems: 'center', marginBottom: 16 }}>
        <div className="card-title" style={{ marginBottom: 0, flex: 1 }}>
          Design Philosophy — {sections.length} principles · click any card to read
        </div>
        <button
          onClick={downloadPhilosophy}
          style={{
            display: 'inline-flex', alignItems: 'center', gap: 5,
            fontSize: 11, fontWeight: 600, color: 'var(--primary)',
            background: 'transparent', padding: '4px 10px',
            border: '1px solid var(--primary)', borderRadius: 12,
            transition: 'background 0.15s', cursor: 'pointer',
            flexShrink: 0,
          }}
          onMouseOver={e => e.currentTarget.style.background = '#eef0fb'}
          onMouseOut={e => e.currentTarget.style.background = 'transparent'}
        >
          ⬇ Download .md
        </button>
      </div>

      {groupOrder.map((group, gi) => {
        const color = PHIL_GROUP_COLORS[group] || '#6b7194';
        const cards = grouped[group];
        return (
          <div key={group} style={{ marginBottom: gi < groupOrder.length - 1 ? 28 : 4 }}>

            {/* Group header bar */}
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14,
            }}>
              <div style={{
                width: 4, height: 18, borderRadius: 2,
                background: color, flexShrink: 0,
              }} />
              <div style={{
                fontSize: 11, fontWeight: 700, letterSpacing: '0.9px',
                textTransform: 'uppercase', color,
              }}>
                {group}
              </div>
              <div style={{ flex: 1, height: 1, background: `${color}30` }} />
              <div style={{ fontSize: 11, color: 'var(--muted)' }}>
                {cards.length} principle{cards.length !== 1 ? 's' : ''}
              </div>
            </div>

            {/* Cards grid */}
            <div className="phil-grid">
              {cards.map(s => (
                <PhilosophyCard key={s.number} section={s} groupColor={color} />
              ))}
            </div>

          </div>
        );
      })}
    </div>
  );
}

function DimensionCard({ dim }) {

// ──────────────────────────────────────────────────────────
// Evaluation Wizard
// ──────────────────────────────────────────────────────────

const LEVELS = ['L1','L2','L3','L4','L5','L6'];

const PRONOUN_MAP = {
  'she/her':   { they: 'she',  their: 'her',   them: 'her'  },
  'he/him':    { they: 'he',   their: 'his',   them: 'him'  },
  'they/them': { they: 'they', their: 'their', them: 'them' },
  'other':     { they: 'they', their: 'their', them: 'them' },
};

function getLevelWindow(level) {
  const idx = LEVELS.indexOf(level);
  return LEVELS.slice(Math.max(0, idx - 1), Math.min(LEVELS.length, idx + 2));
}

function substituteTokens(text, name, pronouns) {
  const p = PRONOUN_MAP[pronouns] || PRONOUN_MAP['they/them'];
  const displayName = (name || '').trim() ||
    (p.they.charAt(0).toUpperCase() + p.they.slice(1));
  // Use /gi so {{Name}}, {{They}}, etc. (any capitalisation) are all caught
  let s = text
    .replace(/\{\{name\}\}/gi,  displayName)
    .replace(/\{\{they\}\}/gi,  p.they)
    .replace(/\{\{their\}\}/gi, p.their)
    .replace(/\{\{them\}\}/gi,  p.them);
  // Capitalise letters that follow sentence-ending punctuation
  s = s.replace(/([.!?]\s+)([a-z])/g, (_, punc, ch) => punc + ch.toUpperCase());
  // Capitalise first character
  if (s.length) s = s.charAt(0).toUpperCase() + s.slice(1);
  return s;
}

// Split card text into individual sentences for visual breathing room
function splitSentences(text) {
  const parts = [];
  let remaining = text;
  while (remaining.length > 0) {
    const m = remaining.match(/^(.*?[.!?])(\s+|$)/);
    if (m) {
      parts.push(m[1]);
      remaining = remaining.slice(m[0].length);
    } else {
      parts.push(remaining);
      break;
    }
  }
  return parts.filter(Boolean);
}

function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getCompKey(card) {
  return card.competency_id + '|' + (card.track || '');
}

// Returns true when a competency's cards have a clear signal, OR all are rated/skipped
// Signal rule: ≥60% answered (non-skip) AND ≥85% of answered in the same bucket
function isCompDone(compCards, ratings) {
  const rated = compCards.filter(c => ratings[c.id]);           // any rating incl. skip
  const answered = rated.filter(c => ratings[c.id] !== 'skip'); // excludes skip
  // All cards touched → done regardless of signal clarity
  if (rated.length === compCards.length) return true;
  if (answered.length === 0) return false;
  if (answered.length / compCards.length < 0.60) return false;
  const counts = { easy: 0, comfortable: 0, stretch: 0 };
  answered.forEach(c => { if (counts[ratings[c.id]] !== undefined) counts[ratings[c.id]]++; });
  const maxCount = Math.max(...Object.values(counts));
  return maxCount / answered.length >= 0.85;
}

// Infer level for a competency from ratings
// Priority: level with most "comfortable" ratings; tiebreak = higher level
// Fallback if no comfortable: majority bucket nudges up/down from declared level
function inferCompLevel(compCards, ratings, window, declaredLevel) {
  const comfortable = {};
  window.forEach(l => comfortable[l] = 0);
  compCards.forEach(c => {
    if (ratings[c.id] === 'comfortable' && comfortable[c.level] !== undefined)
      comfortable[c.level]++;
  });
  const totalComfort = Object.values(comfortable).reduce((a,b) => a+b, 0);
  if (totalComfort > 0) {
    let best = window[0], bestN = 0;
    window.forEach(l => {
      if (comfortable[l] > bestN ||
          (comfortable[l] === bestN && LEVELS.indexOf(l) > LEVELS.indexOf(best))) {
        best = l; bestN = comfortable[l];
      }
    });
    return best;
  }
  // No comfortable ratings — use majority bucket
  const answered = compCards.filter(c => ratings[c.id] && ratings[c.id] !== 'skip');
  if (answered.length === 0) return declaredLevel;
  const counts = { easy: 0, stretch: 0 };
  answered.forEach(c => { if (c in counts) counts[ratings[c.id]]++; });
  if ((counts.easy || 0) > (counts.stretch || 0)) {
    // Mostly easy → infer higher than middle
    const midIdx = Math.floor(window.length / 2);
    return window[Math.min(midIdx + 1, window.length - 1)];
  }
  // Mostly stretch → infer lower than middle
  const midIdx = Math.floor(window.length / 2);
  return window[Math.max(midIdx - 1, 0)];
}

// Abridged card text for the results columns (~80 chars)
function abridgeText(text, max = 90) {
  const stripped = text.replace(/\*\*/g, '');
  if (stripped.length <= max) return stripped;
  return stripped.slice(0, max).replace(/\s\S*$/, '') + '…';
}

// Renders **bold** markers in card scenario text as <strong> spans.
// Cards without markers render as plain text — safe fallback for unprocessed cards.
function renderBold(text) {
  const parts = text.split(/\*\*(.+?)\*\*/);
  return parts.map((part, i) =>
    i % 2 === 1
      ? <strong key={i} style={{ fontWeight: 700, color: 'inherit' }}>{part}</strong>
      : part
  );
}
