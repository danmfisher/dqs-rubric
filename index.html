<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[DRAFT] Danielle's Technology Rubric - Editing Proof of Concept</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8fc;
      --sidebar-bg: #1e2235;
      --sidebar-hover: #2c3150;
      --sidebar-active: #3a4172;
      --sidebar-text: #c8ccde;
      --sidebar-muted: #6b7194;
      --primary: #4f6af5;
      --primary-hover: #3d58e0;
      --success: #28a745;
      --warning: #e8a020;
      --danger: #dc3545;
      --border: #e2e6f0;
      --text: #1a1d2e;
      --muted: #6b7194;
      --card-bg: #ffffff;
      --tag-dim: #eef0fb;
      --tag-comp: #fef4e8;
      --tag-cap: #edfaf2;
    }

    html {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* React mounts into #root, which sits between body (the flex container)
       and the actual content. Without this, #root has height: auto and
       overflows the viewport silently — overflow-y: auto on .main never
       gets a constrained box to scroll within. */
    #root {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Top bar ───────────────────────────── */
    .topbar {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar-logo { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; color: var(--text); }
    .topbar-spacer { flex: 1; }

    /* ── Track selector dropdown ───────────── */
    .track-selector { position: relative; }
    .track-selector-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--text);
      padding: 5px 10px 5px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .track-selector-btn:hover { border-color: var(--primary); background: #fff; }
    .track-selector-btn.open { border-color: var(--primary); background: #fff; }
    .track-chevron {
      font-size: 10px; color: var(--muted);
      transition: transform 0.15s;
    }
    .track-selector-btn.open .track-chevron { transform: rotate(180deg); }
    .track-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0;
      min-width: 240px; z-index: 200;
      background: #fff; border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      overflow: hidden;
    }
    .track-dropdown-header {
      padding: 8px 14px 6px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .track-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; font-size: 13px; gap: 8px;
      transition: background 0.12s;
    }
    .track-option.active {
      color: var(--primary); font-weight: 600;
      background: #f4f6ff; cursor: default;
    }
    .track-option.available:not(.active) {
      cursor: pointer; color: var(--text);
    }
    .track-option.available:not(.active):hover { background: var(--bg); }
    .track-option.unavailable {
      color: #bbb; cursor: not-allowed;
    }
    .track-check { font-size: 11px; color: var(--primary); flex-shrink: 0; }
    .track-soon {
      font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
      padding: 2px 7px; border-radius: 10px;
      background: #f0f0f0; color: #aaa; flex-shrink: 0;
    }
    .save-status { font-size: 12px; color: var(--muted); }
    .save-status.saved { color: var(--success); }
    .save-status.unsaved { color: var(--warning); }
    .save-status.saving { color: var(--primary); }
    .save-status.error { color: var(--danger); }

    /* ── Nav tabs ──────────────────────────── */
    .navtabs {
      display: flex; gap: 2px; background: var(--bg);
      padding: 0 24px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .navtab {
      padding: 10px 18px; font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .navtab:hover { color: var(--text); }
    .navtab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .navtab.locked { opacity: 0.65; }
    .tab-lock {
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: 6px;
      width: 18px; height: 18px; border-radius: 4px;
      cursor: pointer; transition: background 0.15s, color 0.15s;
      color: var(--muted); flex-shrink: 0;
    }
    .tab-lock:hover { background: var(--border); color: var(--text); }
    .navtab.active .tab-lock { color: var(--primary); }
    .navtab.active .tab-lock:hover { background: #eef0fb; }
    .readonly-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
      color: var(--muted); background: var(--bg);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 3px 10px; margin-bottom: 18px;
    }

    /* ── Main layout ───────────────────────── */
    .layout {
      display: flex; flex: 1; overflow: hidden;
      min-height: 0; /* prevents flex children from overflowing their container */
    }

    /* ── Sidebar ───────────────────────────── */
    .sidebar {
      width: 280px; flex-shrink: 0;
      background: var(--sidebar-bg);
      overflow-y: auto; padding: 12px 0;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #3a4172; border-radius: 2px; }

    .sidebar-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      color: var(--sidebar-muted); text-transform: uppercase;
      padding: 16px 16px 6px;
    }

    .tree-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; cursor: pointer;
      color: var(--sidebar-text); font-size: 13px;
      transition: background 0.12s;
      border-left: 3px solid transparent;
    }
    .tree-item:hover { background: var(--sidebar-hover); }
    .tree-item.active {
      background: var(--sidebar-active);
      border-left-color: var(--primary);
      color: #fff;
    }
    .tree-item .indent { flex-shrink: 0; }
    .tree-item .label { flex: 1; line-height: 1.3; }
    .tree-item .chevron {
      font-size: 10px; color: var(--sidebar-muted);
      transition: transform 0.15s;
    }
    .tree-item.open .chevron { transform: rotate(90deg); }
    .tree-badge {
      font-size: 10px; font-weight: 600;
      padding: 1px 5px; border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: var(--sidebar-text);
    }

    /* ── Main content ──────────────────────── */
    .main {
      flex: 1; min-height: 0; /* must be 0 to allow overflow-y to engage */
      overflow-y: auto; overflow-x: hidden;
      padding: 28px 32px;
    }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Philosophy flip cards ─────────────── */
    .phil-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 14px;
      margin-top: 8px;
    }
    .phil-scene {
      perspective: 900px;
      cursor: pointer;
      height: 186px;
      user-select: none;
    }
    .phil-flipper {
      position: relative;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.52s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .phil-flipper.is-flipped { transform: rotateY(180deg); }
    .phil-face {
      position: absolute; inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .phil-back {
      transform: rotateY(180deg);
      overflow-y: auto;
    }
    .phil-front-header {
      padding: 12px 16px 10px;
      border-radius: 10px 10px 0 0;
      flex-shrink: 0;
    }
    .phil-front-num {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      color: rgba(255,255,255,0.65); text-transform: uppercase;
    }
    .phil-front-title {
      font-size: 14px; font-weight: 700; color: #fff;
      margin-top: 2px; line-height: 1.3;
    }
    .phil-front-body {
      padding: 12px 16px; flex: 1;
      display: flex; flex-direction: column; justify-content: space-between;
      background: var(--card-bg);
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 10px 10px;
    }
    .phil-front-punchy {
      font-size: 12.5px; color: var(--text); line-height: 1.55;
    }
    .phil-front-hint {
      font-size: 10px; color: var(--muted); margin-top: 8px;
      display: flex; align-items: center; gap: 4px;
    }
    .phil-back-header {
      padding: 10px 14px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .phil-back-title {
      font-size: 12px; font-weight: 700;
    }
    .phil-back-content {
      padding: 10px 14px;
      font-size: 11.5px; line-height: 1.6; color: var(--text);
    }
    .phil-back-content p { margin: 0 0 8px; }
    .phil-back-content p:last-child { margin-bottom: 0; }
    .phil-back-content ul { padding-left: 16px; margin: 4px 0 8px; }
    .phil-back-content li { margin-bottom: 3px; }

    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); margin-bottom: 20px;
    }
    .breadcrumb-sep { color: var(--border); }
    .breadcrumb-current { color: var(--text); font-weight: 600; }

    .node-type-badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      padding: 3px 9px; border-radius: 12px; margin-bottom: 10px;
    }
    .badge-dimension { background: var(--tag-dim); color: #3a4172; }
    .badge-competency { background: var(--tag-comp); color: #7a4f00; }
    .badge-capability { background: var(--tag-cap); color: #0a5e2a; }

    .node-title {
      font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px;
    }
    .node-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.7px;
      margin-bottom: 16px;
    }

    /* ── Level grid ────────────────────────── */
    .level-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 1100px) {
      .level-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .level-cell { display: flex; flex-direction: column; gap: 6px; }
    .level-cell label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 6px;
    }
    .level-cell label .level-name {
      font-weight: 400; text-transform: none; letter-spacing: 0;
      color: var(--muted); font-size: 11px;
    }
    .level-cell textarea {
      width: 100%; min-height: 110px;
      font-size: 13px; line-height: 1.55;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      resize: vertical;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
    }
    .level-cell textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }
    .level-cell textarea.placeholder-text {
      color: #aaa; font-style: italic;
    }

    /* ── Child summary cards ───────────────── */
    .child-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .child-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
      cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .child-card:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(79,106,245,0.12);
    }
    .child-card-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
    }
    .child-card-name { font-size: 14px; font-weight: 600; }
    .child-card-count { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Dimension flip cards ──────────────── */
    .dim-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .dim-card-scene {
      perspective: 900px;
      height: 190px;
      cursor: pointer;
    }
    .dim-flipper {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    }
    .dim-flipper.is-flipped { transform: rotateY(180deg); }
    .dim-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 16px;
      display: flex; flex-direction: column;
    }
    .dim-front { background: var(--card-bg); }
    .dim-front:hover { border-color: var(--primary); box-shadow: 0 2px 10px rgba(79,106,245,0.10); }
    .dim-back { background: var(--bg); transform: rotateY(180deg); overflow-y: auto; }
    .dim-front-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .dim-front-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .dim-front-count { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .dim-front-intent {
      font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; flex: 1;
    }
    .dim-front-hint { font-size: 10px; color: var(--muted); margin-top: 8px; opacity: 0.5; text-align: right; }
    .dim-back-title { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 10px; letter-spacing: 0.3px; }
    .dim-back-comp { margin-bottom: 9px; }
    .dim-back-comp-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .dim-back-comp-intent { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

    /* ── Level flip cards ───────────────────── */
    .lvl-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
    }
    .lvl-card-scene { perspective: 800px; height: 160px; cursor: pointer; }
    .lvl-flipper {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    }
    .lvl-flipper.is-flipped { transform: rotateY(180deg); }
    .lvl-face {
      position: absolute; inset: 0;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 10px; border: 1px solid var(--border);
      padding: 14px 16px; display: flex; flex-direction: column; justify-content: center;
    }
    .lvl-front { background: var(--card-bg); align-items: flex-start; }
    .lvl-front:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(79,106,245,0.10); }
    .lvl-back { background: var(--bg); transform: rotateY(180deg); justify-content: flex-start; align-items: flex-start; overflow-y: auto; }
    .lvl-code { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--primary); margin-bottom: 4px; }
    .lvl-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .lvl-hint { font-size: 10px; color: var(--muted); margin-top: 8px; opacity: 0.5; }
    .lvl-back-content { font-size: 11.5px; color: var(--muted); line-height: 1.55; }

    /* ── Notes banner ───────────────────────── */
    .notes-banner {
      background: #fffbeb; border: 1px solid #fde68a;
      border-left: 4px solid #f59e0b; border-radius: 10px;
      padding: 16px 20px; margin-bottom: 20px;
      font-size: 13px; color: #78350f; line-height: 1.65;
    }
    .notes-banner-title {
      font-weight: 700; font-size: 11px; letter-spacing: 0.8px;
      text-transform: uppercase; color: #b45309; margin-bottom: 6px;
    }

    /* ── Action bar ────────────────────────── */
    .action-bar {
      display: flex; align-items: center; gap: 12px; margin-top: 8px;
    }
    .btn {
      padding: 9px 20px; border-radius: 7px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
      transition: background 0.15s, transform 0.05s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #228a3b; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Level View ────────────────────────── */
    .level-view-toolbar {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .level-select-group {
      display: flex; gap: 6px;
    }
    .level-pill {
      padding: 7px 16px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--card-bg); color: var(--muted);
      transition: all 0.12s;
    }
    .level-pill:hover { border-color: var(--primary); color: var(--primary); }
    .level-pill.active {
      background: var(--primary); border-color: var(--primary); color: #fff;
    }

    .rubric-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .rubric-table th {
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.7px;
      padding: 12px 16px;
      text-align: left;
    }
    .rubric-table td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.5;
    }
    .rubric-table tr:last-child td { border-bottom: none; }
    .rubric-table tr:hover td { background: #f9faff; }
    .td-dim { font-weight: 700; color: var(--text); white-space: nowrap; }
    .td-comp { color: var(--text); white-space: nowrap; }
    .td-cap { color: var(--muted); font-style: italic; }
    .td-desc { color: var(--text); max-width: 480px; }

    .dim-separator td {
      background: var(--tag-dim) !important;
      padding: 5px 16px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: #3a4172;
    }

    /* ── Empty / loading states ────────────── */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; text-align: center;
      color: var(--muted);
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; max-width: 340px; }

    .spinner {
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      width: 32px; height: 32px;
      animation: spin 0.7s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Inline edit (name) ────────────────── */
    .name-display {
      display: flex; align-items: center; gap: 8px;
    }
    .name-input {
      font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
      border: none; border-bottom: 2px solid var(--primary);
      background: transparent; color: var(--text);
      outline: none; width: 100%; padding-bottom: 2px;
      font-family: inherit;
    }

    /* ── Toast ─────────────────────────────── */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 1000;
    }
    .toast {
      padding: 12px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      animation: slideIn 0.2s ease;
    }
    .toast-success { background: #1a3d25; color: #6dd98a; }
    .toast-error { background: #3d1a1a; color: #f08080; }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── Meta panel ────────────────────────── */
    .meta-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .meta-field { display: flex; flex-direction: column; gap: 4px; }
    .meta-field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .meta-field .meta-value { font-size: 14px; color: var(--text); }
    .meta-field .meta-status {
      display: inline-flex; align-items: center;
      font-size: 12px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      background: var(--tag-comp); color: var(--warning);
    }

    /* ── Evaluation Wizard ───────────────────── */
    .wizard-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Setup */
    .wizard-setup { max-width: 460px; margin: 56px auto; padding: 0 24px; }
    .wizard-setup h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .wizard-setup .wiz-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .setup-fields { display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px; }
    .setup-field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .setup-field input, .setup-field select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fff; color: var(--text); outline: none; font-family: inherit; }
    .setup-field input:focus, .setup-field select:focus { border-color: var(--primary); }
    .wiz-start-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .wiz-start-btn:hover { background: var(--primary-hover); }

    /* Card exercise */
    .card-exercise { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 32px 24px; gap: 20px; overflow-y: auto; }
    .card-scene { display: flex; align-items: center; gap: 16px; width: 100%; max-width: 680px; }
    .card-nav-btn { flex-shrink: 0; width: 38px; height: 38px; border: 1px solid var(--border); border-radius: 50%; background: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: border-color 0.15s, color 0.15s; }
    .card-nav-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .card-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .eval-card { flex: 1; background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 36px 40px; min-height: 120px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: relative; }
    .eval-card-text { font-size: 16px; line-height: 1.7; text-align: center; color: var(--text); }
    .eval-card-badge { position: absolute; top: 12px; right: 14px; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.4px; }
    .badge-easy { background: #dcfce7; color: #166534; }
    .badge-comfortable { background: #dbeafe; color: #1e40af; }
    .badge-stretch { background: #fef3c7; color: #92400e; }
    .badge-skip { background: #f1f5f9; color: var(--muted); }
    .rating-buttons { display: flex; gap: 10px; width: 100%; max-width: 680px; }
    .rating-btn { flex: 1; padding: 13px 8px; border-radius: 10px; border: 2px solid transparent; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.12s; }
    .rating-btn.easy { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .rating-btn.easy:hover, .rating-btn.easy.active { background: #dcfce7; border-color: #4ade80; }
    .rating-btn.comfortable { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
    .rating-btn.comfortable:hover, .rating-btn.comfortable.active { background: #dbeafe; border-color: #60a5fa; }
    .rating-btn.stretch { background: #fffbeb; color: #92400e; border-color: #fde68a; }
    .rating-btn.stretch:hover, .rating-btn.stretch.active { background: #fef3c7; border-color: #fbbf24; }
    .rating-btn.skip-btn { flex: none; padding: 13px 16px; background: #f8fafc; color: var(--muted); border-color: var(--border); font-weight: 400; font-size: 13px; }
    .rating-btn.skip-btn:hover { background: #f1f5f9; }
    .exercise-done-banner { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 14px; padding: 20px 28px; text-align: center; max-width: 500px; }
    .exercise-done-banner h3 { font-size: 17px; font-weight: 700; color: #166534; margin-bottom: 6px; }
    .exercise-done-banner p { font-size: 13px; color: #166534; margin-bottom: 16px; }
    .wiz-results-btn { padding: 12px 28px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .wiz-results-btn:hover { background: var(--primary-hover); }

    /* Results */
    .results-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .dim-nav-strip { display: flex; gap: 10px; padding: 14px 28px; background: #fff; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .dim-nav-chip { flex: 1; padding: 12px 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); cursor: pointer; text-align: center; transition: background 0.12s; border-bottom: 3px solid transparent; }
    .dim-nav-chip.active { background: #fff; border-color: var(--border); border-bottom-color: var(--primary); }
    .dim-nav-chip:hover:not(.active) { background: #f4f5fb; }
    .dim-chip-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); line-height: 1.3; }
    .dim-chip-level { font-size: 20px; font-weight: 800; color: var(--primary); margin: 3px 0; }
    .dim-chip-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
    .dim-chip-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s; }
    .results-body { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .results-dim-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .results-dim-title { font-size: 18px; font-weight: 700; }
    .results-dim-arrows { display: flex; gap: 8px; }
    .dim-arrow-btn { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 50%; background: #fff; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: border-color 0.12s, color 0.12s; }
    .dim-arrow-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .dim-arrow-btn:disabled { opacity: 0.3; cursor: default; }
    .results-intro { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; margin-bottom: 24px; font-size: 13px; color: var(--muted); line-height: 1.6; }
    .results-intro strong { color: var(--text); }
    .comp-result-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .comp-result-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; cursor: pointer; user-select: none; }
    .comp-result-header:hover { background: var(--bg); }
    .comp-collapse-arrow { font-size: 11px; color: var(--muted); flex-shrink: 0; transition: transform 0.15s; }
    .comp-collapse-arrow.open { transform: rotate(90deg); }
    .comp-result-body { padding: 0 20px 20px; }
    .comp-result-top { display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .comp-result-name { font-size: 15px; font-weight: 700; }
    .comp-inferred-level { font-size: 30px; font-weight: 800; color: var(--primary); line-height: 1; }
    .comp-inferred-name { font-size: 12px; color: var(--muted); margin-left: -8px; }
    .comp-level-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .comp-level-row label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); }
    .comp-level-select { padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: #fff; color: var(--text); }
    .comp-confirm-btn { padding: 5px 12px; border: 1px solid var(--primary); border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--primary); background: #fff; cursor: pointer; transition: all 0.12s; }
    .comp-confirm-btn:hover { background: var(--primary); color: #fff; }
    .comp-confirmed-badge { font-size: 12px; font-weight: 600; color: #166534; }
    .comp-caps-section { margin-bottom: 18px; }
    .comp-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 8px; }
    .comp-cap-item { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--bg); }
    .comp-cap-item:last-child { border-bottom: none; }
    .comp-cap-dot { color: var(--muted); flex-shrink: 0; margin-top: 1px; }
    .comp-cap-name { font-size: 13px; font-weight: 600; }
    .comp-cap-intent { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .card-columns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    .card-col { display: flex; flex-direction: column; }
    .card-col-hdr { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; padding: 5px 10px; border-radius: 6px; text-align: center; margin-bottom: 8px; }
    .card-col-hdr.easy { background: #dcfce7; color: #166534; }
    .card-col-hdr.comfortable { background: #dbeafe; color: #1e40af; }
    .card-col-hdr.stretch { background: #fef3c7; color: #92400e; }
    .card-col-hdr.skipped { background: #f1f5f9; color: var(--muted); }
    .card-chip { font-size: 12px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; margin-bottom: 6px; line-height: 1.45; }
    .card-col-empty { font-size: 12px; color: var(--muted); font-style: italic; padding: 6px 10px; }
    .card-col-count { display: block; font-size: 10px; font-weight: 500; opacity: 0.75; margin-top: 1px; text-transform: none; letter-spacing: 0; }
    .cards-section-toggle { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); cursor: pointer; user-select: none; margin-bottom: 10px; }
    .cards-section-toggle:hover { color: var(--text); }
    .cards-section-arrow { font-size: 9px; transition: transform 0.15s; display: inline-block; }
    .cards-section-arrow.open { transform: rotate(90deg); }
    .setup-summary-bar { display: flex; align-items: center; gap: 10px; background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; margin-bottom: 16px; flex-wrap: wrap; }
    .setup-summary-bar .ss-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .setup-summary-bar .ss-val { font-size: 13px; font-weight: 600; color: var(--text); }
    .setup-summary-bar .ss-sep { color: var(--border); font-size: 14px; }
    .setup-summary-bar .ss-declared { display: inline-flex; align-items: center; gap: 4px; background: var(--primary); color: #fff; border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 700; }
    .comp-evidence label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); display: block; margin-bottom: 6px; }
    .comp-evidence textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; resize: vertical; min-height: 70px; font-family: inherit; color: var(--text); background: #fff; }
    .comp-evidence textarea:focus { outline: none; border-color: var(--primary); }
    .results-footer { padding: 14px 32px; border-top: 1px solid var(--border); background: #fff; display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0; }
    .export-csv-btn { padding: 9px 18px; background: var(--text); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .export-csv-btn:hover { opacity: 0.85; }
    .wiz-restart-btn { padding: 9px 18px; background: #fff; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; cursor: pointer; }
    .wiz-restart-btn:hover { border-color: var(--muted); color: var(--text); }
  </style>

<script type="text/babel">
window.BAKED = {"tracks": {"swe-ic": {"meta": {"version": "0.1", "status": "first-draft", "last_updated": "2026-04-07", "levels": ["L1", "L2", "L3", "L4", "L5", "L6"], "level_names": {"L1": "Associate Engineer", "L2": "Engineer", "L3": "Senior Engineer", "L4": "Staff Engineer", "L5": "Principal Engineer", "L6": "Distinguished Engineer"}, "notes": "This rubric is a representation of my mental model of what great engineering performance looks like across levels \u2014 not a formal HR policy, a complete picture of any individual, or a substitute for nuanced conversation. If you're using it for self-reflection or a discussion with your manager, treat it as a starting point rather than a verdict. It's a work in progress, as most worthwhile things are. If something doesn't ring true for your context, trust that instinct. Feedback is always welcome.", "default_track": "data-ml", "tracks": [{"id": "swe-ic", "name": "Software Engineering (IC)", "available": true}, {"id": "em", "name": "Engineering Management", "available": false}, {"id": "data-ml", "name": "Data Science/Machine Learning", "available": true}], "level_descriptions": {"L1": "Beginning to develop the habits and skills of the role. Executes well-scoped tasks with guidance, absorbing how the team works and building foundational technical and behavioral patterns.", "L2": "Regularly delivers on day-to-day work with minimal guidance. Growing in craft and depth; owns feature-level work but still benefits from direction on genuinely ambiguous or large-scope problems.", "L3": "Consistently delivers complex work end-to-end, independently. The go-to for their area. Shapes how the team works \u2014 not just what it ships \u2014 and actively invests in developing teammates.", "L4": "Proactively identifies and removes systemic blockers, often without being asked. Operates across teams, defines technical direction for their domain, and makes those around them measurably more effective.", "L5": "Systematically improves how engineering works at the org level \u2014 setting standards, driving cross-team alignment, and shaping culture without direction to do so.", "L6": "Defines the standard for technical leadership. Work sets the philosophy at the company level and shapes the discipline beyond the organization itself."}, "current_track": "swe-ic"}, "dimensions": [{"id": "impact-scope", "name": "Impact & Scope", "descriptions": {"L1": "Delivers small, well-defined tasks reliably with guidance. Beginning to understand how their work connects to team goals. Demonstrates the organization's values through their conduct and approach to learning.", "L2": "Independently delivers features and improvements with moderate scope. Understands team priorities and how their work contributes to outcomes. Applies values consistently and proactively seeks growth.", "L3": "Owns and delivers complete features and medium-scale projects end-to-end. Makes meaningful contributions to team-level goals and business outcomes. Models values and brings a growth mindset to their work and team.", "L4": "Drives delivery of large, cross-team initiatives with significant organizational impact. Sets direction for their domain and contributes to strategic planning. Champions values and elevates the performance of those around them.", "L5": "Owns org-level programs and platforms. Defines technical direction for an entire product area. Shapes the organization's strategic roadmap and is a visible cultural force.", "L6": "Responsible for the engineering output of entire product lines or platforms. Drives company-level technology strategy. Defines organizational standards and is an industry-recognized leader."}, "competencies": [{"id": "ownership-autonomy", "name": "Ownership & Autonomy", "descriptions": {"L1": "Works on clearly scoped tasks within a day-to-day horizon, with regular guidance from senior team members.", "L2": "Independently manages their own workload within a 1\u20132 week horizon; escalates appropriately when scope or direction is unclear.", "L3": "Owns complete features and workstreams end-to-end over a monthly horizon with minimal direction.", "L4": "Drives delivery of large, cross-functional work over a quarterly horizon. Creates clarity for others and operates with high autonomy.", "L5": "Operates over a half-year horizon across organizational boundaries. Defines the context within which others self-direct.", "L6": "Sets direction over a multi-year horizon. Shapes the organizational operating model for ownership and accountability."}, "capabilities": [{"id": "scope-of-work", "name": "Scope of Work", "descriptions": {"L1": "Works on well-scoped tasks and small components defined by senior team members. Scope is limited to individual tasks.", "L2": "Independently owns small-to-medium features with clear requirements. Recognizes and flags scope creep before it impacts delivery.", "L3": "Owns and delivers complete features and medium-sized projects within their team's domain with minimal guidance.", "L4": "Drives delivery of large features and cross-team projects. Leads work that spans team boundaries and requires coordination across stakeholders.", "L5": "Leads complex, multi-team initiatives and platform-level work. Provides direction and technical input on all significant projects with organizational impact.", "L6": "Shapes and owns the technical scope of org-wide platforms, programs, and strategic initiatives. Defines what the organization builds at the highest level."}, "intent": "The size and boundary of what you're accountable for delivering"}, {"id": "time-horizon", "name": "Time Horizon", "descriptions": {"L1": "Works effectively within a day-to-day horizon. Needs guidance and regular check-ins to stay on track within the sprint.", "L2": "Self-directs within a 1\u20132 week horizon. Checks in with their manager when direction or clarity is needed beyond their current sprint tasks.", "L3": "Operates effectively over a monthly horizon. Owns their workstream end-to-end within a sprint cycle without needing intervention.", "L4": "Manages delivery and team commitments over a multi-month / quarterly horizon. Holds the team's direction without leadership intervention.", "L5": "Operates over a half-year horizon. Ensures teams are aligned and progressing without ongoing direction from leadership.", "L6": "Works at a multi-year horizon. Defines long-term direction and ensures the organization is continuously building toward it."}, "intent": "How far ahead you can operate effectively without direction"}, {"id": "self-direction", "name": "Self-Direction", "descriptions": {"L1": "Requires regular guidance to stay oriented. Asks for help appropriately and escalates blockers promptly.", "L2": "Works independently on well-defined work. Communicates blockers proactively and applies escalation criteria correctly. Begins to consult external resources \u2014 documentation, technical writing, peers outside the team \u2014 to fill gaps rather than waiting for direction.", "L3": "Self-directs on complex, ambiguous problems within their domain. Knows when to seek input versus when to decide and move forward. Actively draws on external sources \u2014 industry writing, open-source patterns, cross-company networks \u2014 to bring new approaches back to the team.", "L4": "Operates with high autonomy in areas of expertise. Pulls in the right people at the right time without prompting. Deliberately cultivates external networks and industry awareness; brings new thinking into the organization and challenges the team's assumptions with outside perspective.", "L5": "Operates independently across organizational boundaries. Navigates maximum ambiguity and creates clarity for others. Stays ahead of industry shifts by synthesizing external signals into organizational direction.", "L6": "Defines direction in the highest-ambiguity areas. Sets the context within which the rest of the organization self-directs. Shapes the industry's understanding of the problem space \u2014 not just following external discourse but contributing to it."}, "intent": "How independently you navigate ambiguity and chart your own path forward"}], "intent": "How much you own, and how independently you drive it"}, {"id": "delivery-execution", "name": "Delivery & Execution", "descriptions": {"L1": "Delivers assigned tasks reliably with guidance. Communicates blockers promptly and participates in team planning rituals.", "L2": "Consistently delivers on commitments. Breaks down work into manageable tasks and communicates progress proactively.", "L3": "Owns end-to-end delivery of features and projects. Anticipates and surfaces blockers before they require escalation. Manages dependencies effectively.", "L4": "Drives delivery across teams and quarters. Sets milestones, manages risk, and holds teams accountable. Applies economic thinking to prioritization decisions.", "L5": "Owns org-level delivery programs. Anticipates systemic risks and builds contingency plans. Aligns engineering, product, and business stakeholders.", "L6": "Responsible for the engineering delivery output of the organization. Drives delivery strategy and regularly influences company-level roadmap decisions."}, "capabilities": [{"id": "planning-prioritization", "name": "Planning & Prioritization", "descriptions": {"L1": "Relies on more senior team members to review and size their tasks. Executes on well-defined work with clear priorities.", "L2": "Sizes and prioritizes their own work effectively. Understands dependencies within their tasks and communicates them proactively.", "L3": "Breaks down features and projects into well-sized, sequenced tasks. Ensures work is appropriately prioritized in alignment with team goals.", "L4": "Owns planning for large cross-team deliverables. Ensures tasks are correctly sized and prioritized across the team. Actively manages dependencies across teams and escalates proactively.", "L5": "Reviews organization-wide work critically. Ensures efforts are appropriately sequenced and prioritized across teams. Surfaces cross-organizational planning risks early enough to enable mitigation rather than recovery.", "L6": "Defines organizational planning rhythms and standards. Ensures strategy and execution are tightly linked across the engineering organization."}, "intent": "The analytical work \u2014 how you break down, sequence, and estimate work before it starts"}, {"id": "reliability-accountability", "name": "Reliability & Accountability", "descriptions": {"L1": "Delivers on assigned work and communicates delays as soon as they become apparent. Beginning to develop a sense of what a realistic commitment looks like.", "L2": "Makes and keeps realistic commitments. Proactively communicates blockers and scope changes before they affect delivery. Demonstrates ownership of outcomes, not just task completion.", "L3": "Ensures their commitments are realistic and self-generated. Anticipates blockers and communicates them before they require escalation. Takes accountability for outcomes, not just outputs.", "L4": "Holds the team's commitments. Anticipates and communicates blockers across the team's projects. Ensures expectations are aligned across all stakeholders, including external partners.", "L5": "Manages organization-wide commitments and their progress. Ensures expectations across the organization and external stakeholders are clear and maintained.", "L6": "Sets the organizational standard for delivery accountability. Establishes practices that make reliability a cultural expectation, not an individual effort."}, "intent": "The relational work \u2014 how you stand behind commitments, communicate status, and own outcomes"}, {"id": "dealing-with-ambiguity", "name": "Dealing with Ambiguity", "descriptions": {"L1": "Handles task-level ambiguity with assistance from their manager. Defers decision-making when the full picture is unclear and surfaces blockers to their manager promptly.", "L2": "Handles project-level ambiguity with a clear sense of when to escalate vs. act. Beginning to make local decisions when the situation is sufficiently well-scoped to act.", "L3": "Handles ambiguity at the feature and project level independently. Makes responsible decisions without the full picture in lower-stakes situations. Knows when high-stakes ambiguity requires escalation.", "L4": "Handles risk, change, and uncertainty at the team and cross-team level. Makes sound decisions under ambiguity and helps the team do the same. Takes responsibility for addressing uncertainty that affects adjacent teams.", "L5": "Handles ambiguity at the program and organizational level. Decides and acts responsibly across the organization without the full picture. Builds practices that help others navigate uncertainty.", "L6": "Operates effectively in maximum organizational ambiguity. Defines the operating model for how the organization approaches and resolves uncertainty."}, "intent": "How you make progress and sound decisions when the picture is incomplete"}], "intent": "How reliably you turn plans into shipped outcomes"}, {"id": "business-value-outcomes", "name": "Business Value & Outcomes", "descriptions": {"L1": "Understands how their work connects to the team's goals. Focused on task-level delivery rather than broader business outcomes.", "L2": "Understands the business context of their work. Takes initiative to plan and prioritize toward higher-value outcomes.", "L3": "Connects their work to organizational goals and business strategy. Understands the customer and business value of what they're building. Participates in roadmap discussions.", "L4": "Drives work that delivers measurable business impact. Applies economic thinking to prioritization and solution design. Actively shapes team and cross-team roadmaps.", "L5": "Defines the technical roadmap for a product area in partnership with product leadership. Identifies strategic opportunities and connects technical investment to company-level outcomes.", "L6": "Shapes company-level strategy. Identifies opportunities that define the organization's long-term technology direction and business impact."}, "capabilities": [{"id": "business-strategic-awareness", "name": "Business & Strategic Awareness", "descriptions": {"L1": "Demonstrates a basic understanding of the team's domain and its impact. Understands the metrics and terminology relevant to their work.", "L2": "Has developed working fluency in the business context \u2014 terminology, key metrics, and relevant data. Knows who the subject matter experts are and consults them when needed.", "L3": "Has a thorough understanding of their team's domain and how it contributes to overall business strategy. Understands how the team's work connects to organizational priorities and the broader competitive landscape.", "L4": "Has a thorough understanding of their domain and adjacent teams' strategies. Connects their team's technical work to market trends and organizational priorities. Actively shapes their domain's technical direction through thought leadership: writing, presentations, and cross-team influence.", "L5": "Has a thorough understanding of the entire engineering organization's strategy and how it maps to overall business and market direction. Actively shapes the organization's technical direction through thought leadership: writing, presentations, and executive influence.", "L6": "Shapes the company's understanding of its technology landscape and competitive position. Drives thought leadership externally \u2014 published work, industry presence, and public discourse \u2014 that reflects on and elevates the organization."}, "intent": "How well you understand where the company is going and situate your work within that direction"}, {"id": "product-customer-orientation", "name": "Product & Customer Orientation", "descriptions": {"L1": "Understands the customer problem and use cases their work is solving. Focuses on building what's been defined rather than shaping what gets built.", "L2": "Understands the customer problem and the context behind product decisions. Participates in discovery or feedback sessions when given the opportunity. Begins to contribute to roadmap discussions.", "L3": "Understands the product area, how it fits into the business model, and makes improvement suggestions. Participates in roadmap feedback with product leads. Looks for opportunities to simplify product and technical design.", "L4": "Evaluates and contributes to new product features in collaboration with product leads. Regularly participates in team roadmap creation. Helps define and refine roadmaps based on technical strategy and constraints.", "L5": "Partners with product and business counterparts to define and evolve the roadmap. Actively seeks to create or redefine product direction based on technical insight and customer understanding.", "L6": "Drives the long-term product vision in partnership with executive leadership. Redefines what's possible for the organization's product through technology strategy."}, "intent": "How much you build with the end user's needs and experience in mind"}, {"id": "economic-thinking-impact", "name": "Economic Thinking & Impact", "descriptions": {"L1": "Aware that engineering decisions have costs and tradeoffs. Seeks guidance when evaluating the value of different approaches.", "L2": "Beginning to weigh cost and value when making technical decisions. Applies basic economic thinking to their own work with some help from more senior engineers.", "L3": "Weighs cost (time, complexity, third-party cost) and value (user benefit, business impact) when making decisions. Uses this thinking to make suggestions to teammates. Understands tradeoffs within their domain.", "L4": "Consistently applies economic thinking to team-level decisions. Understands and articulates the downstream impact of their team's work on adjacent teams and business outcomes. Actively builds a culture of economic thinking across the teams they work with.", "L5": "Uses economic thinking to make organization-wide prioritization decisions. Fosters a culture within the organization where people apply economic thinking to make timely decisions.", "L6": "Defines the economic framework within which the organization makes investment decisions. Connects engineering spend to business outcomes at the company level."}, "intent": "How well you reason about the cost and value tradeoffs of technical decisions"}], "intent": "How well your work connects to what the business actually needs"}, {"id": "values", "name": "Values", "descriptions": {"L1": "Learning what the organization's values mean in practice. Beginning to apply them to their own work.", "L2": "Consistently applies the organization's values to their own work. Demonstrates growth orientation and proactively seeks feedback.", "L3": "Consistently lives the organization's values and models them for others. Demonstrates a growth mindset in their approach to feedback, learning, and challenge.", "L4": "Models values and actively holds others accountable for upholding them. Coaches teammates on what applying values looks like in practice.", "L5": "Ensures organizational systems and practices are aligned with the organization's values. A visible cultural force across the engineering organization.", "L6": "Shapes the cultural and value framework for the entire organization. Embeds values into the organizational operating model."}, "capabilities": [{"id": "values-embodiment", "name": "Values Embodiment", "descriptions": {"L1": "Learning the meaning of the organization's values as they are applied to work. Beginning to demonstrate them in day-to-day interactions.", "L2": "Applies the organization's values to their own work with increasing regularity. Recognizes when situations call for values-guided judgment.", "L3": "Consistently applies all of the organization's values to their work. Demonstrates what living the values looks like for those around them.", "L4": "Models the values and actively recognizes and affirms teammates who uphold them \u2014 and holds them accountable when they don't. Coaches by example.", "L5": "Coaches others on values application and ensures the team is living them consistently. Calls out misalignment across teams when it arises.", "L6": "Ensures organizational systems, incentives, and practices are aligned with the organization's values. Defines what the values mean in the context of organizational decision-making."}, "intent": "How consistently you live the organization's values in your day-to-day work and decisions"}, {"id": "growth-mindset", "name": "Growth Mindset", "descriptions": {"L1": "Open to feedback and acts on it. Shows curiosity and a desire to learn. Treats mistakes as learning opportunities.", "L2": "Regularly seeks feedback from peers and manager. Applies feedback with a growth orientation. Explores new areas and techniques beyond their immediate work.", "L3": "Proactively seeks ongoing feedback and integrates it into their work. Shares learnings with teammates. Adapts their approach when evidence or feedback challenges their assumptions.", "L4": "Fosters a growth mindset on their team. Creates space for learning from failure. Challenges others to push their thinking. Models intellectual curiosity and openness to being wrong.", "L5": "Builds a culture of learning and continuous improvement across the organization. Ensures that systems exist for knowledge transfer, retrospection, and skill development.", "L6": "Defines the learning culture for the organization. Champions growth mindset as a foundational organizational value."}, "intent": "How actively you seek to learn, adapt, and improve \u2014 and enable others to do the same"}], "intent": "How you embody and model the organization's principles"}], "intent": "What you produce and how far it reaches."}, {"id": "reasoning-framing", "name": "Reasoning & Framing", "descriptions": {"L1": "Applies structured thinking to well-defined problems with guidance. Beginning to ask clarifying questions and identify root causes rather than accepting problems at face value.", "L2": "Independently structures and solves moderately complex problems. Generates solutions for defined problems and evaluates basic tradeoffs.", "L3": "Frames complex and ambiguous problems clearly before solutioning. Generates and evaluates multiple approaches. Defines success criteria upfront and monitors outcomes.", "L4": "Leads problem framing and solution design for large, cross-team challenges. Challenges the premise of problems presented and ensures the team is solving the right thing. Defines success at a product and organizational level.", "L5": "Frames the most complex, ambiguous organizational problems. Defines how the organization approaches problem-solving. Drives strategic reasoning across product, engineering, and business.", "L6": "Applies reasoning at the company strategy level. Frames the organization's most consequential decisions and ensures the right questions are being asked."}, "competencies": [{"id": "problem-structuring", "name": "Problem Structuring", "descriptions": {"L1": "Identifies and reports problems clearly. Beginning to look beyond surface symptoms with guidance.", "L2": "Structures problems within their scope independently. Identifies root causes for moderately complex issues.", "L3": "Consistently frames problems clearly before moving to solutions. Identifies root causes across system boundaries. Questions whether the stated problem is the right one to solve.", "L4": "Leads problem structuring for complex, cross-team challenges. Challenges problem framing presented by product and business partners. Ensures the team is solving the right problem at the right scope.", "L5": "Frames the most ambiguous organizational problems. Defines the framing process and standards for how the organization approaches complex problems.", "L6": "Applies problem structuring at the company strategy level. Ensures the organization is asking the right questions before committing to major investments."}, "capabilities": [{"id": "root-cause-analysis", "name": "Root Cause Analysis", "descriptions": {"L1": "Identifies surface-level symptoms of problems and reports them clearly. Beginning to look one level deeper with guidance from senior teammates.", "L2": "Independently identifies root causes for straightforward problems. Distinguishes between symptoms and underlying causes in their domain.", "L3": "Consistently identifies root causes for complex issues, including those that manifest in one system but originate in another. Challenges problem reports that are framed at the symptom level.", "L4": "Identifies systemic root causes across team and system boundaries. Applies root cause analysis to organizational and process problems, not just technical ones.", "L5": "Identifies root causes of organizational and strategic problems. Ensures the organization has the practices and skills to get to root cause consistently.", "L6": "Applies root cause thinking to the organization's most consequential challenges. Defines the standard for how the organization investigates and learns from failures."}, "intent": "How deeply you dig to find the real problem beneath the presenting symptoms"}, {"id": "scope-problem", "name": "Scope", "descriptions": {"L1": "Accepts problem scope as given. Beginning to ask clarifying questions about boundaries and expectations.", "L2": "Right-sizes their own work scope with some guidance. Recognizes when a problem is under- or over-scoped.", "L3": "Consistently right-sizes the scope of problems before solutioning. Challenges scope that is too broad or too narrow. Breaks large problems into appropriately scoped sub-problems.", "L4": "Scopes large cross-team problems effectively. Ensures the team isn't over-engineering or under-investing. Balances short-term delivery with long-term architectural coherence.", "L5": "Scopes organizational and strategic problems. Defines what's in and out of scope for major initiatives and ensures alignment across stakeholders.", "L6": "Sets scope at the company strategy level. Defines the boundaries of major technology investments and organizational initiatives."}, "intent": "How well you bound a problem to make it tractable \u2014 neither too narrow nor too broad"}, {"id": "constraints", "name": "Constraints", "descriptions": {"L1": "Aware of the basic constraints on their work (time, tech stack, team norms). Works within them with guidance.", "L2": "Works effectively within the constraints of their domain with minimal guidance. Communicates when constraints conflict with requirements.", "L3": "Identifies technical, resource, and organizational constraints proactively. Incorporates constraints into problem framing, not just solution design. Proposes constraint changes when they're limiting the right outcome.", "L4": "Maps constraints across teams and systems. Challenges constraints that are artificial or outdated. Creates space for the team to innovate within appropriate boundaries.", "L5": "Defines organizational constraints and the principles for when to work within vs. challenge them. Shapes the constraint landscape through platform and architecture decisions.", "L6": "Sets the strategic constraints within which the organization operates. Makes decisions about organizational boundaries, technology bets, and acceptable tradeoffs at the highest level."}, "intent": "How well you identify and reason about the constraints that shape the solution space"}], "intent": "How you frame and bound a problem before solving it"}, {"id": "solution-crafting", "name": "Solution Crafting", "descriptions": {"L1": "Implements solutions to well-defined problems. Beginning to consider alternatives when presented with options.", "L2": "Generates solutions independently for moderately complex problems. Considers basic tradeoffs and decompose work into steps.", "L3": "Generates multiple solution options before committing. Evaluates tradeoffs rigorously and communicates them clearly to stakeholders. Decomposes complex solutions into well-structured, sequenced steps.", "L4": "Designs solutions for complex cross-team problems. Drives tradeoff conversations at the team and organizational level. Solutions are flexible, maintainable, and easy to hand off.", "L5": "Defines the solution design process and standards for the organization. Recognizes good solutions to complex multi-system problems and clearly explains their merits to relevant stakeholders.", "L6": "Drives solution design at the organizational strategy level. Defines the architecture and technology patterns that the organization builds upon."}, "capabilities": [{"id": "solution-exploration", "name": "Solution Exploration", "descriptions": {"L1": "Implements the solution approach given to them. Beginning to propose alternative approaches when they see them.", "L2": "Generates one or two solution options for well-defined problems. Considers basic alternatives before committing to an approach.", "L3": "Consistently generates multiple solution options before committing. Explores the solution space deliberately, including unconventional approaches. Documents alternatives and the reasoning for choosing between them.", "L4": "Drives broad solution exploration for complex cross-team problems. Ensures the team doesn't converge prematurely. Brings diverse perspectives and prior art into solution design.", "L5": "Shapes how the organization approaches solution exploration. Ensures teams aren't defaulting to familiar approaches when better options exist. Champions architectural innovation.", "L6": "Defines the solution landscape for the organization's most strategic challenges. Drives exploration of new technology paradigms and their application to company problems."}, "intent": "How broadly you generate and consider options before committing to an approach"}, {"id": "tradeoff-analysis", "name": "Tradeoff Analysis", "descriptions": {"L1": "Aware that engineering decisions involve tradeoffs. Seeks guidance when evaluating options.", "L2": "Evaluates basic tradeoffs (time, complexity, risk) for decisions within their scope. Communicates tradeoffs to teammates and manager.", "L3": "Evaluates tradeoffs rigorously across multiple dimensions (cost, risk, scalability, maintainability, business impact). Communicates tradeoffs clearly to both technical and non-technical stakeholders.", "L4": "Leads tradeoff analysis for large cross-team decisions. Ensures the team considers second and third-order effects. Applies economic thinking to prioritize tradeoffs against business goals.", "L5": "Drives tradeoff analysis at the organizational level. Ensures the organization is making principled decisions at scale, with clear documentation of what was considered and why.", "L6": "Makes the organization's highest-stakes tradeoff decisions. Defines the principles and frameworks the organization uses to evaluate major technology and business tradeoffs."}, "intent": "How rigorously you evaluate the costs and benefits of competing options"}, {"id": "decomposition", "name": "Decomposition", "descriptions": {"L1": "Completes tasks as defined. Beginning to break their own work into smaller steps with guidance.", "L2": "Breaks their own work into well-sized steps appropriate for incremental delivery and effective peer review.", "L3": "Decomposes complex features and projects into clear, sequenced, appropriately-sized tasks. Ensures the decomposition enables incremental delivery and reduces risk.", "L4": "Decomposes large cross-team programs into workstreams and milestones. Ensures decomposition reflects dependencies accurately and enables parallel execution where possible.", "L5": "Decomposes organization-wide initiatives into coherent programs. Defines decomposition principles that teams use to plan and sequence their own work.", "L6": "Applies decomposition at the company strategy level. Structures major multi-year investments into legible phases with clear decision points."}, "intent": "How effectively you break complex solutions into manageable, sequenced pieces"}], "intent": "How you generate, evaluate, and choose among solutions"}, {"id": "realizing-success", "name": "Realizing Success", "descriptions": {"L1": "Understands what 'done' looks like for their tasks. Beginning to think about how to verify their work met the goal.", "L2": "Defines success criteria for their own work before starting. Validates their output against those criteria.", "L3": "Defines clear success criteria and measurable outcomes before solutioning. Makes sound decisions at the feature level. Monitors outcomes after delivery and iterates based on results.", "L4": "Defines success at the team and product level. Knows when to drive to a decision vs. when to build consensus. Tracks outcomes post-delivery and drives learning from them.", "L5": "Defines success at the organizational level. Ensures teams have meaningful metrics and are held accountable to outcomes, not just outputs. Builds a culture of outcome orientation.", "L6": "Defines what success looks like for the engineering organization at the company level. Ensures strategy and execution are connected to measurable business outcomes."}, "capabilities": [{"id": "defining-success-criteria", "name": "Defining Success Criteria", "descriptions": {"L1": "Understands what 'done' looks like for their assigned tasks. Checks their work against defined criteria before considering it complete.", "L2": "Defines success criteria for their own work before beginning. Validates output against those criteria and flags gaps.", "L3": "Defines measurable success criteria upfront for features and projects. Frames success in terms of user and business outcomes, not just technical completion. Ensures stakeholders are aligned on what success looks like before work begins.", "L4": "Defines success at the team and cross-team level. Frames success criteria in terms of business outcomes and measurable impact. Ensures success metrics are meaningful, not just trackable.", "L5": "Defines organizational success metrics. Ensures teams are measuring the right things and that metrics connect to business outcomes. Challenges vanity metrics.", "L6": "Defines what success means for the engineering organization at the company level. Sets the standard for how the organization measures and communicates the value of its work."}, "intent": "How clearly you articulate what 'done' and 'good' look like before work begins"}, {"id": "decision-making", "name": "Decision Making", "descriptions": {"L1": "Makes decisions about their own work with guidance. Escalates when decisions feel beyond their scope or authority.", "L2": "Makes objective, data-driven decisions within their scope. Challenges their own assumptions. Knows when to escalate vs. decide.", "L3": "Makes sound decisions with incomplete information during routine work. Holds themselves accountable for decisions and their outcomes. Distinguishes between decisions that need consensus and decisions that need a single owner who moves quickly.", "L4": "Takes ownership of decisions made within their team. Helps teammates make clear decisions aligned with organizational goals. Knows when building consensus is worth the time and when a judgment call and clear communication is the right move. Raises awareness of how bias impacts decisions.", "L5": "Takes ownership of decisions made in the engineering organization. Ensures decision-making accountability is practiced throughout. Defines the organizational framework for how decisions get made, documented, and revisited.", "L6": "Makes the organization's most consequential decisions. Defines the principles and governance for how the organization makes and owns major decisions."}, "intent": "How soundly you make choices \u2014 especially under uncertainty and incomplete information"}, {"id": "measuring-monitoring", "name": "Measuring & Monitoring", "descriptions": {"L1": "Validates that their work functions as expected. Participates in review and retrospective processes.", "L2": "Monitors their own deliverables post-launch. Identifies gaps between expected and actual outcomes and surfaces them.", "L3": "Defines monitoring and measurement approaches for their features at delivery time. Reviews post-launch outcomes and iterates based on results. Contributes to team knowledge bases based on what they learn.", "L4": "Defines team-level metrics and monitors them consistently. Tracks outcome metrics, not just output metrics. Leads retrospectives that produce meaningful changes in practice.", "L5": "Defines organization-wide success metrics and tracking practices. Ensures teams have the instrumentation and processes to learn from their work. Builds a culture of data-driven iteration.", "L6": "Defines the measurement and monitoring philosophy for the organization. Ensures engineering investments are connected to measurable business outcomes and that the organization learns systematically from what it builds."}, "intent": "How well you instrument your work to know whether it's actually succeeding"}], "intent": "How you define and measure whether you've actually succeeded"}], "intent": "How you think \u2014 structuring problems before you solve them."}, {"id": "communication-influence", "name": "Communication & Influence", "descriptions": {"L1": "Communicates clearly with their immediate team. Participates actively in team discussions. Receives feedback openly and acts on it.", "L2": "Communicates effectively across their team. Gives and receives feedback well. Builds positive working relationships within the team.", "L3": "Communicates complex technical ideas clearly to both engineers and non-engineers. Gives specific, behavioral feedback. Contributes to team alignment and helps develop junior teammates.", "L4": "Communicates and influences across teams. Drives alignment on cross-functional decisions. Recognized as a trusted partner. Elevates the communication and collaboration quality of those around them.", "L5": "Communicates and influences at the organizational level. Sets the tone for how the engineering organization communicates and builds alignment. Develops senior talent.", "L6": "Communicates the organization's technology vision internally and externally. Shapes the communication culture for the entire engineering organization. Builds and develops the next generation of technical leaders."}, "competencies": [{"id": "communication", "name": "Communication", "descriptions": {"L1": "Communicates clearly with their immediate team and manager. Actively listens and is developing the ability to tailor their message to their audience.", "L2": "Communicates effectively in written and verbal form with their direct team. Beginning to tailor messaging for different audiences.", "L3": "Communicates effectively, clearly, and concisely in both written and verbal form across technical and non-technical audiences. Actively listens and ensures they are understood.", "L4": "Communicates with clarity across teams and organizational levels. Fosters clear, audience-oriented communication within their team and cross-functional partners.", "L5": "Communicates effectively across the company. Fosters a culture of clear, concise, audience-oriented communication across the organization.", "L6": "Communicates the organization's technology vision to all levels internally and externally. Sets the communication standard for the engineering organization."}, "capabilities": [{"id": "written-communication", "name": "Written Communication", "descriptions": {"L1": "Writes clearly enough to keep teammates informed of progress and blockers. Updates work items consistently.", "L2": "Writes clearly for team-level audiences. Documents their work appropriately. Beginning to write for audiences outside their immediate team.", "L3": "Writes clearly and concisely for both technical and non-technical audiences. Produces well-structured design docs, post-mortems, and project updates. Connects documentation to stated goals.", "L4": "Writes for broad cross-functional audiences. Produces documentation that is clear, actionable, and durable. Sets the standard for written communication quality on their team.", "L5": "Produces written communication that shapes organizational direction. Writes clearly for executive and external audiences. Fosters a culture of strong written communication across the org.", "L6": "Writes at the company level \u2014 strategy documents, external publications, board-level communications. Defines the organization's external voice on technology."}, "intent": "How clearly and effectively you communicate in writing across formats and audiences"}, {"id": "verbal-communication", "name": "Verbal Communication", "descriptions": {"L1": "Participates actively in team discussions. Communicates blockers and progress in standups and 1:1s clearly.", "L2": "Communicates effectively in team discussions and cross-functional meetings. Beginning to present their work to audiences beyond their immediate team.", "L3": "Communicates technical and non-technical topics clearly in meetings, design reviews, and retrospectives. Actively listens and adjusts in real time. Presents work clearly to cross-functional partners.", "L4": "Communicates with authority across cross-functional meetings and leadership reviews. Facilitates productive discussions. Represents their team's work compellingly to senior stakeholders.", "L5": "Communicates at the organizational level. Presents strategy and technical direction clearly to executive leadership. Sets the standard for verbal communication in technical forums.", "L6": "Communicates the organization's technology vision at the highest levels \u2014 board, investors, industry conferences. Represents the company's engineering perspective externally."}, "intent": "How clearly and effectively you communicate in real-time conversations and presentations"}, {"id": "audience-awareness", "name": "Audience Awareness", "descriptions": {"L1": "Relies on guidance to tailor messages for specific audiences. Beginning to notice when their communication isn't landing and asks for help adjusting.", "L2": "Adjusts communication style based on audience when gaps are pointed out. Regularly recognizes when their message needs to be simplified or reframed for a non-technical stakeholder and makes the adjustment.", "L3": "Consistently adjusts communication style, level of detail, and framing based on audience. Translates between technical and business language fluently.", "L4": "Adapts communication fluidly for any audience. Coaches teammates on audience-oriented communication. Ensures their team's outputs are legible to cross-functional partners.", "L5": "Models audience awareness across the organization. Ensures the engineering organization communicates in ways that are accessible and impactful for all stakeholders.", "L6": "Defines how the engineering organization communicates with external stakeholders. Shapes the narrative around engineering's business impact at the company level."}, "intent": "How well you tailor your communication style and content to who you're talking to"}, {"id": "knowledge-sharing", "name": "Knowledge Sharing", "descriptions": {"L1": "Shares learnings at structured opportunities (standups, retros, reviews). Does not yet proactively seek out additional moments to share knowledge.", "L2": "Shares learnings at structured opportunities and begins to identify additional moments to share relevant knowledge with teammates.", "L3": "Proactively shares knowledge with teammates and contributes to team documentation. Looks for opportunities to share knowledge (design docs, engineering roundtables, etc.) and uses sound judgment about when to engage.", "L4": "Fosters a culture of documentation and knowledge sharing within their team and with stakeholders. Actively demonstrates these behaviors and encourages others to do the same.", "L5": "Fosters a culture of knowledge sharin
