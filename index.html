ntation on the team. Ensures the team continuously works toward shared goals and understands why that work is valuable to the business. Connects cross-team dependencies to organizational strategy.", "L5": "Fosters strategic orientation across the organization. Ensures the engineering organization understands and works toward the company's goals. Translates company strategy into engineering priorities.", "L6": "Defines the strategic orientation of the engineering organization. Ensures engineering strategy and company strategy are tightly coupled."}, "intent": "How well you connect day-to-day decisions and work to longer-term organizational strategy"}, {"id": "meeting-discussion-facilitation", "name": "Meeting & Discussion Facilitation", "descriptions": {"L1": "Participates constructively in team meetings and discussions.", "L2": "Contributes actively to team discussions. Beginning to facilitate small discussions or working sessions within their area of expertise.", "L3": "Facilitates discussions within their team effectively. Ensures outcomes connect to stated goals. Helps guide discussions to useful conclusions, managing time and energy appropriately.", "L4": "Facilitates within-team and cross-team discussions. Drives discussions toward decisions efficiently. Manages competing priorities and viewpoints effectively.", "L5": "Facilitates organization-wide discussions on complex, high-stakes topics. Builds the team's facilitation capability.", "L6": "Facilitates the organization's most consequential discussions. Defines the standard for how the engineering organization runs high-stakes decision forums."}, "intent": "How effectively you structure and guide group conversations to productive outcomes"}, {"id": "inclusive-discussion-practices", "name": "Inclusive Discussion Practices", "descriptions": {"L1": "Participates in discussions respectfully. Beginning to be aware of group dynamics.", "L2": "Creates space for others' contributions in discussions. Acknowledges and builds on teammates' ideas.", "L3": "Actively ensures all voices are heard in discussions they participate in or facilitate. Notices when quieter participants are being overlooked and creates openings for them. Ensures no one person dominates the conversation.", "L4": "Fosters inclusive discussion practices within and across their team. Actively calls out exclusionary dynamics and models better behavior. Ensures diverse perspectives are integrated into decisions.", "L5": "Builds inclusive discussion norms across the organization. Ensures the engineering organization makes decisions that reflect a diversity of perspectives.", "L6": "Defines the organizational standard for inclusive decision-making. Ensures the engineering organization's culture is one where every voice has a meaningful path to influence."}, "intent": "How actively you create conditions for all voices to contribute meaningfully"}], "intent": "How you build consensus and move groups toward decisions"}, {"id": "team-multiplier", "name": "Team Multiplier", "descriptions": {"L1": "Focuses primarily on their own growth and contribution. Beginning to share knowledge and support teammates.", "L2": "Actively helps teammates and shares knowledge. Starting to onboard new team members.", "L3": "Mentors junior teammates and acts as a go-to resource on their areas of expertise. Proactively invests in the growth of others.", "L4": "Elevates the entire team's performance. Acts as a force multiplier \u2014 their presence makes teammates measurably more effective. Develops senior individual contributors.", "L5": "Builds and elevates technical culture across multiple teams. Develops staff-level talent. Their investment in people and culture compounds across the organization.", "L6": "Sets the talent development philosophy for the engineering organization. Builds a pipeline of technical leaders. Acts as an industry thought leader."}, "capabilities": [{"id": "mentoring-coaching", "name": "Mentoring & Coaching", "descriptions": {"L1": "Receptive to mentorship and actively seeks it. Beginning to share knowledge informally with peers.", "L2": "Helps onboard new team members. Shares domain knowledge regularly. Beginning to provide informal mentorship to peers.", "L3": "Mentors junior teammates in an open, respectful, and empathetic manner. Seeks out mentoring opportunities proactively. Provides guidance that is developmental, not just instructional.", "L4": "Mentors senior engineers and provides coaching that accelerates career growth. Seeks out opportunities to create team redundancy and backfill ability. Invests in developing the next level of talent.", "L5": "Develops staff-level engineers. Provides coaching that shapes careers, not just skills. Builds mentoring as an organizational capability.", "L6": "Develops senior leaders and principal engineers at scale. Shapes the organization's talent development philosophy. Contributes to industry-level thinking on engineering career development through writing, speaking, or direct engagement with the broader community."}, "intent": "How effectively you grow the skills and capabilities of the individuals around you"}, {"id": "team-enablement", "name": "Team Enablement", "descriptions": {"L1": "Participates in team efforts and flags obstacles they encounter that may be blocking others.", "L2": "Helps teammates identify and overcome blockers. Takes on tasks that reduce friction for the team, even when outside their direct responsibilities.", "L3": "Consistently helps teammates unblock their work. Prioritizes work that enables the team to move faster. Looks for opportunities to remove friction and create leverage for others.", "L4": "Acts as a force multiplier across the team and beyond. Facilitates work across deliverables, balancing the needs of multiple efforts. Sets the example for how to design, document, and communicate solutions to maximize team leverage.", "L5": "Enables teams across the organization to support each other. Builds systems, processes, and culture that compound team effectiveness over time.", "L6": "Defines the organizational model for how teams enable each other. Ensures the engineering organization operates as a high-trust, high-leverage system."}, "intent": "How well you remove friction and create conditions for your team to do their best work"}], "intent": "How you grow the capability and effectiveness of those around you"}], "intent": "How you move information, decisions, and people \u2014 individually, within teams, and across the organization."}, {"id": "technical-competencies", "name": "Technical Competencies", "descriptions": {"L1": "Applies course-level and early-career technical knowledge to less well-defined problems. Follows team best practices with guidance. Focused on learning the craft.", "L2": "Has solid foundational technical knowledge and self-directs their technical work. Writes production-ready code and follows best practices independently.", "L3": "Has strong technical expertise and owns quality, reliability, and technical standards within their domain. Designs systems that are maintainable, scalable, and reusable.", "L4": "Sets technical standards and owns technical excellence across the team. Designs systems of significant scale and complexity. Reduces complexity and drives down technical debt.", "L5": "Defines technical direction for an entire product area or platform. Recognized internal expert across multiple technical domains. Drives adoption of new technologies and resolves the most complex technical challenges.", "L6": "Shapes the multi-year technology strategy for the organization. Internationally recognized technical expertise. Creates new approaches and methodologies adopted across the industry."}, "competencies": [{"id": "craft", "name": "Craft", "descriptions": {"L1": "Writes code that, with help, can be modified to be production-ready. Follows team conventions and leaves appropriate documentation.", "L2": "Writes production-ready code independently. Accounts for edge cases and errors. Participates actively in code review.", "L3": "Consistently writes production-ready, well-tested, easily-understood code. Maintains a high bar for quality in their own work and in code reviews.", "L4": "Owns technical excellence within the team. Defines and enforces the team's quality bar. Designs work that is easy to maintain, test, and hand off.", "L5": "Sets the technical craft standard for the organization. Ensures the highest quality bar is maintained across teams.", "L6": "Defines the craft philosophy for the engineering organization. Shapes what technical excellence means at the company level."}, "capabilities": [{"id": "code-work-quality", "name": "Code / Work Quality", "descriptions": {"L1": "Writes code that reaches production-ready quality with review and guidance from senior teammates. Code is readable by others. Participates in PR reviews to build awareness of team style.", "L2": "Writes production-ready code that accounts for edge cases and errors. Easily understood by other developers. Reviews PRs on their team with a focus on function and style.", "L3": "Consistently writes production-ready, easily-testable, well-understood code. Accounts for edge cases comprehensively. Reviews PRs with a focus on function, style, quality, scalability, and maintainability.", "L4": "Produces production-ready code across the team that is a model for maintainability and design. Reviews PRs across the team with focus on scalability and long-term quality.", "L5": "Sets the standard for code quality across the organization. Reviews and approves architectural decisions. Produces code that serves as a reference standard for how things should be built.", "L6": "Defines the code quality philosophy for the organization. Shapes the standards and tooling that enforce quality at scale."}, "intent": "The correctness, clarity, and maintainability of what you build"}, {"id": "documentation", "name": "Documentation", "descriptions": {"L1": "Leaves appropriate comments and basic documentation on their work.", "L2": "Leaves appropriate comments and documentation. Abides by self-documenting code best practices.", "L3": "Writes clear, accurate documentation. Produces design docs, ADRs, and post-mortems that are useful to others. Connects technical documentation to product and user context.", "L4": "Sets the documentation standard for the team. Ensures the team's work is legible and maintainable by others. Drives a culture of documentation as a first-class artifact.", "L5": "Drives documentation standards across the organization. Ensures knowledge is captured in a way that scales beyond individuals.", "L6": "Defines the documentation philosophy for the organization. Ensures organizational knowledge is durable, accessible, and maintained."}, "intent": "How well you make your work understandable and usable by others"}, {"id": "technical-standards", "name": "Technical Standards", "descriptions": {"L1": "Follows team technical standards with guidance. Learns best practices by reading existing code and asking senior teammates.", "L2": "Follows team technical standards independently. Looks for opportunities to clean up legacy work as they encounter it.", "L3": "Follows and contributes to team technical standards. Identifies opportunities to update standards when they're outdated or missing.", "L4": "Defines and evolves technical standards for the team. Ensures standards are practical, enforced, and understood. Drives adoption of new standards across the team.", "L5": "Sets technical standards for the organization. Ensures standards evolve with technology and business needs. Drives org-wide adoption and compliance.", "L6": "Defines the technical standards philosophy for the organization. Sets the standard for how standards are created, maintained, and enforced at scale."}, "intent": "How consistently you apply and evolve the team's technical standards"}], "intent": "The quality and rigor of your technical work product"}, {"id": "shared-technical", "name": "Shared Technical", "descriptions": {"L1": "Applies course-level technical knowledge to engineering tasks. May require guidance in design and architecture discussions.", "L2": "Independently designs and implements components of a system. Participates in design discussions and contributes effectively.", "L3": "Designs complex systems considering scalability and performance. Leads system design discussions within the team. Owns components from design through production.", "L4": "Leads design of major components or entire systems. Consistently applies best practices and influences overall architecture. Mentors team members in system design.", "L5": "Plays a key role in shaping the overall system architecture. Leads cross-functional teams in designing and implementing complex systems. Champions technological advancement.", "L6": "Defines and drives the organization's technical architecture. Provides strategic direction for complex system design. Recognized as an industry thought leader in system design."}, "capabilities": [{"id": "system-design", "name": "System Design", "descriptions": {"L1": "Requires guidance in applying design principles to their work. Contributes to design discussions and proposes simple solutions with support from senior engineers.", "L2": "Participates in collaborative design discussions effectively. Capable of independently designing and implementing components of a system.", "L3": "Designs complex systems considering scalability and performance. Leads system design discussions and mentors junior team members. Designs simple, flexible, reusable components that are testable and not easily misused.", "L4": "Leads and owns the design of major components or entire systems. Consistently applies best practices and influences overall architecture. Decomposes complex problems into coherent system designs with well-designed boundaries.", "L5": "Shapes the overall system architecture. Leads cross-functional teams in designing complex systems. Innovates in system design approaches and advocates for technological advancement.", "L6": "Defines and drives the organization's overall technical architecture. Provides strategic direction for complex system design. Shapes the field's understanding of system design through external contributions \u2014 publications, open source, or standards work."}, "intent": "How effectively you design systems that are correct, scalable, and maintainable"}, {"id": "scalability-performance", "name": "Scalability & Performance", "descriptions": {"L1": "Implements working solutions with guidance. Develops awareness of where performance and efficiency considerations apply in their work.", "L2": "Writes code organized into reusable, well-named functions. Begins to identify and address inefficiencies. Creates reusable components within their workstream.", "L3": "Builds with maintenance, tech debt, and compute cost in mind. Considers computational complexity when deploying to production. Creates reusable components and contributes to team libraries.", "L4": "Designs with maintenance, tech debt, and compute in mind across the team's systems. Creates libraries useful for others. Looks for opportunities to remove duplicate and overlapping efforts.", "L5": "Designs scalable systems with product and process implications in mind. Sets the organization's standards for performance and scalability.", "L6": "Designs scalable systems with the entire company's needs in mind. Defines the architectural patterns that ensure the organization can scale its technology."}, "intent": "How well you reason about and design for the performance characteristics of systems"}, {"id": "integration-operations", "name": "Integration & Operations", "descriptions": {"L1": "Develops locally. Beginning to understand deployment processes.", "L2": "Can deploy code to production following established patterns. Understands basic staging and production practices.", "L3": "Deploys to production confidently using established patterns. Leverages and actively contributes to the existing ecosystem. Manages cross-team dependencies with appropriate documentation.", "L4": "Deep fluency with the production ecosystem. Manages cross-team dependencies with documentation and SLO/SLAs. Identifies and drives improvements to the ecosystem beyond the needs of their immediate work.", "L5": "Improves the ecosystem significantly as they work. Defines requirements for other technical teams who own adjacent capabilities. Sets integration standards across the organization.", "L6": "Defines the integration and operations philosophy for the organization. Makes buy vs. build decisions for foundational infrastructure and tooling."}, "intent": "How well you think about how systems fit into and operate within the broader environment"}], "intent": "Technical skills that apply broadly across engineering disciplines"}, {"id": "domain-specific", "name": "Domain-Specific", "descriptions": {"swe-ic": {"L1": "Developing foundational knowledge of the team's programming languages, frameworks, and development tools. Applies domain knowledge to well-scoped tasks under guidance.", "L2": "Solid working knowledge of the team's tech stack. Independently applies domain knowledge to moderately complex features and debugging scenarios. Developing fluency with domain tooling and practices.", "L3": "Deep expertise in the team's core domain. Recognized as a knowledgeable resource. Applies best-in-class practices and tools. Guides others in domain knowledge and methodology.", "L4": "Recognized domain expert on the team. Shapes technical standards in the domain. Evaluates and adopts new techniques and tooling. Teaches, mentors, and drives knowledge sharing.", "L5": "Recognized organizational domain expert. Drives adoption of best practices. Shapes the org's approach to tooling, methodology, and engineering quality in the domain.", "L6": "Defines the organization's domain strategy. Internationally recognized expert. Contributes to the industry's evolution of the domain through publications, open source, or standards bodies."}, "data-ml": {"L1": "Developing foundational knowledge of statistical methods, ML algorithms, and data tooling. Applies domain knowledge to well-scoped, pre-defined analysis tasks under close guidance.", "L2": "Solid working knowledge of core ML methods, standard algorithm libraries, and data pipelines. Independently applies domain knowledge to moderately complex modeling and analysis tasks.", "L3": "Deep expertise across ML algorithms, statistical modeling, and data architecture. Frames ambiguous business problems to match appropriate models. Owns quality and reliability of their team's data products and pipelines.", "L4": "Advanced domain knowledge across ML, statistics, and data systems. Leads technical excellence within the team, advocates for best-practice approaches, and drives data product quality across a significant product area.", "L5": "Subject matter expert with deep, opinionated mastery of algorithms, tooling, and data architecture. Shapes the team's technical direction; brings industry best practices into the organization and defines standards for how the team builds and operates.", "L6": "Recognized expert across all domain areas. Defines the organization's data and ML technical strategy, platform architecture, and methodology standards. Sets the bar for technical excellence org-wide."}}, "capabilities": [{"id": "track-sme", "name": "Subject Matter Expertise", "descriptions": {"L1": "Can apply a handful of standard algorithms and model libraries to already-framed business problems. Has basic familiarity with descriptive statistics and time series analysis; uses them with guidance.", "L2": "Applies standard ML algorithms and libraries appropriately to simple, well-defined business problems. Understands and utilizes basic statistical modeling; beginning to balance computational complexity against accuracy and business value.", "L3": "Can frame business problems to align with appropriate models and algorithms. Has an applied understanding of algorithmic tradeoffs and model selection. Implements statistical modeling, forecasting, and feature engineering independently; comfortable researching and applying new algorithms from standard libraries.", "L4": "Deep appreciation for model and algorithm nuance, including tradeoffs between different implementations. Seeks out industry best practices and advocates for new approaches where relevant. Balances optimization, compute cost, and business impact. Implements hierarchical models and advanced forecasting pipelines.", "L5": "Opinionated, deep mastery of model and algorithm nuance \u2014 including preferring specific library implementations. Brings new industry best practices to the team and drives adoption. Champions parsimony and simplification in model design. Applies advanced statistical methods to large-scale systems.", "L6": "Operates at the frontier of data and ML. Defines org-wide expectations for ML methodology, model quality, and statistical rigor. Contributes to the field through external publications, conference presentations, or open-source work."}, "track_specific": true, "intent": "The depth of your subject matter expertise in your specific technical domain"}, {"id": "track-tooling", "name": "Domain Tooling & Platforms", "descriptions": {"L1": "Aware of the team's platform tooling. Development is primarily local; beginning to understand staging and production environments and when to use each.", "L2": "Developing comfort with platform tooling; can execute existing code on established platforms by following examples. Understands basic staging and production practices.", "L3": "Comfortable with platform tooling. Deploys new code to production using established templates and defined patterns. Leverages the existing ecosystem of capabilities and tools confidently.", "L4": "Proficient with platform tooling; leverages it to solve new, unscoped use cases. Manages cross-team tooling dependencies with appropriate documentation and SLO/SLAs. Contributes concrete requirements for platform improvements.", "L5": "Native-level mastery of the team's platform tooling. Contributes to platform tools and defines requirements for new capabilities. Opinionated in buy-vs-build decisions. Improves the ecosystem as they work; partners with platform owners to raise the bar.", "L6": "Defines requirements for and designs platform tools. Makes organizational buy-vs-build decisions for data and ML tooling. Sets the standard for how the org evaluates and evolves its data and ML platform ecosystem."}, "track_specific": true, "intent": "Your command of the tools, platforms, and infrastructure specific to your domain"}, {"id": "track-methodology", "name": "Domain Methodology", "descriptions": {"L1": "Basic understanding of dimensional data modeling and how it enables analytics queries. Can design a simple data model based on well-defined requirements with guidance from a manager or peer.", "L2": "Designs and implements basic dimensional data models from well-defined requirements. Understands schema design for query performance in BI tools; can make and implement recommendations for structural improvement.", "L3": "Designs complex dimensional data models from ambiguous requirements with minimal guidance. Builds data solutions with maintenance and technical debt in mind. Proactively identifies opportunities for self-service functionality and automation in recurring data processing patterns.", "L4": "Orchestrates and implements data curation processes across an entire business domain. Designs real-time data processing pipelines supporting live analytics and ML models. Has a strong eye for architectural enhancements that enable self-service and automation at scale.", "L5": "Makes informed, opinionated decisions on system-wide orchestration, data architecture, storage solutions, ingestion mechanisms, and data mapping strategies. Partners with platform and engineering teams to manage cross-cutting dependencies and improve the shared data ecosystem.", "L6": "Strategically evaluates and implements patterns to optimize data management across the organization. Defines org-wide data modeling standards and architecture principles. Leads the organization's data and ML engineering strategy."}, "track_specific": true, "intent": "Your fluency with the methods, processes, and practices specific to your domain"}], "track_specific": true, "intent": "The specialized knowledge, tools, and methods of your particular track"}], "intent": "The technical skills and knowledge that underpin your work \u2014 from craft and shared engineering foundations to the specialized tools of your domain."}]}}, "philosophy": [{"number": "1", "title": "Purpose", "content": "This rubric serves two complementary purposes that are often treated as separate \u2014 but are designed here to be two uses of the same instrument:\n\n**Developmental:** A shared language for ongoing career growth conversations between managers and their direct reports. It helps individuals understand where they are, where the archetype for their level sits, and what a path toward the next level looks like.\n\n**Evaluative:** A structured framework for producing fair, defensible performance ratings that can be used in calibration, compensation decisions, and formal reviews.\n\nThese two purposes are not in conflict. Think of the rubric as a map. The developmental conversation asks *\"where are you on this map, and where do you want to go?\"* The evaluative conversation asks *\"where are you on this map right now?\"* Same map. Different question.\n\n---", "group": "The Abstract Concept"}, {"number": "2", "title": "The Rubric as a Frame of Reference", "content": "The rubric defines an **N-dimensional space** \u2014 where each Capability is an axis. Every job level has an **Archetype Location** in this space: a description of what a well-rounded, solid performer at that level looks like across all dimensions.\n\nWhen a manager evaluates an individual, they are **triangulating that person's Evaluated Location** in the same space. The result is a picture of how the individual's current performance relates to the archetype for their level \u2014 and to the archetype for the next level above.\n\n**Development conversations** use the distance between the Evaluated Location and the next Archetype Location to identify specific, actionable investment areas.\n\n**Evaluation conversations** use the Evaluated Location relative to the current Archetype Location to produce a fair and evidence-based rating.\n\nThis framing has an important implication: the rubric is not a checklist of requirements. It is a set of axes for a shared conversation. Nobody sits perfectly at an archetype \u2014 and that's expected.\n\n---", "group": "The Abstract Concept"}, {"number": "3", "title": "The Range", "content": "Positions in this space are expressed on a **1\u20135 scale** \u2014 the unit of measure for every axis. Ratings are **relative to job level**: a 4 at L2 and a 4 at L5 describe the same relationship to the archetype for their respective levels, not the same absolute performance. Cross-level comparisons are rarely meaningful; calibration happens per level.\n\n| Rating | Meaning |\n|---|---|\n| **1** | Signals need for formal action. A 1 anywhere is disqualifying for an overall \"meets\" rating. |\n| **2** | A normal development area. Common on healthy, high-performing teams. Shows up in growth conversations. |\n| **3** | The archetype. Performing at the expected level for this role. A 3 is a strong, stable position \u2014 not a warning. |\n| **4** | Above the archetype. Consistently strong performance at this level. |\n| **5** | Demonstrating behaviors above the ceiling of this level. Approximately a 2 at the next level up. |\n\nA useful gut-check for overall calibration: *\"If this person were a candidate for this role, would I say 'I'd love to have them' (exceeds), 'they'd be a great fit' (meets), or 'I'd think twice' (below)?\"*\n\n---", "group": "The Abstract Concept"}, {"number": "4", "title": "The \"Center of Mass\" Principle", "content": "Performance profiles are rarely uniform. Someone may be a strong 4 on Technical Competencies and a 2 on Communication & Influence. The overall rating reflects the **center of mass** of the profile \u2014 not a strict average.\n\nGuidelines:\n- A person can receive an overall \"meets\" (3) rating while having a 2 in one Dimension, provided they have offsetting 4s or 5s elsewhere.\n- **No 1s anywhere** in a profile that receives an overall \"meets\" rating. A 1 in any Dimension signals that a formal conversation needs to happen, and it supersedes the center of mass.\n- The overall rating must be **explainable by the Dimension scores**. A manager who gives a 4 overall but has 2s and 3s at the Dimension level owes an explanation.\n\n---", "group": "The Abstract Concept"}, {"number": "5", "title": "The Hierarchy", "content": "The rubric is organized into four levels of detail, designed to be navigable at whatever depth is appropriate for the conversation at hand:\n\n| Level | Name | Purpose |\n|---|---|---|\n| 1 | **Dimension** | Top-level area of performance (4 total) |\n| 2 | **Competency** | Grouping of related behaviors within a Dimension |\n| 3 | **Capability** | Specific, observable behavioral area |\n| 4 | **Description** | Behavioral description at a given job level |\n\nEvery node in the hierarchy \u2014 at every intersection of Dimension, Competency, or Capability \u2014 has a **synthesized description for each job level**. These descriptions are human-authored summaries, not auto-generated rollups. The leaf-level (Capability) descriptions are the atomic source of truth; the summaries above them synthesize those descriptions into a navigable overview.\n\nThe four top-level Dimensions are:\n\n| Dimension | What it covers |\n|---|---|\n| **Impact & Scope** | Ownership, delivery, business value, and organizational values |\n| **Reasoning & Framing** | Problem structuring, solution crafting, and defining success |\n| **Communication & Influence** | Communication, feedback, collaboration, alignment, and team multiplication |\n| **Technical Competencies** | Craft, shared technical skills, and domain-specific expertise |\n\n---", "group": "Design Constraints & Requirements"}, {"number": "6", "title": "Promotion vs. Rating", "content": "These are **separate conversations** and must stay that way.\n\n**Rating** is a backward-looking assessment: how has this person performed at their current level over the review period?\n\n**Promotion** requires two conditions that are independent:\n1. **Rubric Readiness:** The individual is demonstrating sustained 4s and 5s at their current level \u2014 beginning to show behaviors above the ceiling. A 5 at level N approximates a 2 at level N+1.\n2. **Business Need:** An organizational need exists for the next-level role. This lives entirely outside the rubric and always will.\n\nBoth conditions are necessary. Neither alone is sufficient. In exceptional circumstances (e.g., a manager or tech lead departure), promotion ahead of rubric readiness may occur on a case-by-case basis \u2014 but this is a business decision, not a rubric decision.\n\nFormally, promotion conversations are initiated by managers. Culturally, individuals are encouraged to self-advocate using their self-assessment as a basis for the conversation.\n\n---", "group": "Design Constraints & Requirements"}, {"number": "7", "title": "Behavioral, Observable Language", "content": "Every description in this rubric is written in **behavioral, observable language** \u2014 describing what someone does, not who they are.\n\n| \u274c Trait-based | \u2705 Behavioral |\n|---|---|\n| \"Is a strong communicator\" | \"Adjusts communication style and level of detail based on audience\" |\n| \"Has good judgment\" | \"Makes sound decisions with incomplete information, and knows when to escalate vs. decide\" |\n| \"Is a team player\" | \"Proactively helps teammates remove blockers and shares credit for shared outcomes\" |\n\nThis principle serves three purposes:\n1. **Feedback becomes less personal** \u2014 it's easier to give and receive feedback about behaviors than traits\n2. **Examples are citable** \u2014 individuals can point to specific moments that demonstrate a behavior\n3. **Bias is reduced** \u2014 observable behaviors are harder to score based on subjective impression than trait descriptors\n\n---", "group": "Design Constraints & Requirements"}, {"number": "8", "title": "Fairness and Bias Prevention", "content": "The rubric is designed to be a fair, unbiased, and non-discriminatory instrument. Specific design choices that serve this goal:\n\n- **No degree or years-of-experience requirements.** The rubric describes demonstrated behaviors, not credentials or tenure.\n- **Behavioral language** reduces evaluator reliance on subjective impression.\n- **Calibration** surfaces inconsistencies across managers before they affect outcomes.\n- **Self-assessment** ensures individuals have a mechanism to surface their own contributions.\n- **Transparent rating structure** means individuals can understand and contest the basis of their ratings.\n\nManagers are expected to approach ratings with awareness of their own biases, and calibration is the organizational mechanism for catching and correcting for them.\n\n---", "group": "Design Constraints & Requirements"}, {"number": "9", "title": "Extensibility", "content": "The rubric is designed to be shared across job functions (Engineering, Product, Design, Data, etc.) with minimal reinvention. The shared Dimensions and Competencies travel across functions; the **Domain-Specific Competency** within Technical Competencies is the primary customization point for each track.\n\nThe first-pass content in this rubric reflects the Software Engineering (IC) track. Subsequent passes will adapt content for Engineering Management and Data/ML/AI, with additional tracks added over time.\n\nWhen adapting for a new job function:\n- Shared Dimensions and Competencies should be preserved\n- Capability descriptions should be reviewed for language that inadvertently assumes an engineering context\n- Domain-Specific content is written fresh for each track\n\n---", "group": "Design Constraints & Requirements"}, {"number": "10", "title": "Understanding the Levels", "content": "The rubric uses six levels \u2014 L1 through L6 \u2014 corresponding to Associate Engineer through Distinguished Engineer. Each level describes an *archetype*: a pattern of behaviors that characterizes someone operating solidly at that band. Levels are defined by scope, agency, and reach, not by years of experience or title tenure.\n\n**L1 \u2014 Associate Engineer**\nJust starting out. Learns by doing with significant support from teammates. Focused on executing well-scoped tasks, building foundational habits, and absorbing how the team works. The primary variable is what they can take on independently, which grows quickly with strong onboarding.\n\n**L2 \u2014 Engineer**\nExecuting independently on most day-to-day work. Growing in technical depth and craft. Still benefits from guidance on larger-scope problems or genuinely ambiguous situations, but needs less of it than they used to.\n\n**L3 \u2014 Senior Engineer**\nReliably delivering complex work end-to-end, often the go-to person for their area. Starting to shape *how* the team works \u2014 not just what it ships. Actively develops more junior teammates, though this isn't always their primary focus yet.\n\n**L4 \u2014 Staff Engineer**\nOperating across teams and systems. Defines technical direction for their domain, removes systemic blockers, and makes the people around them meaningfully more effective. The shift from L3 to L4 is less about technical depth and more about scope and organizational leverage.\n\n**L5 \u2014 Principal Engineer**\nOrg-wide technical leadership. Sets standards that others follow, drives alignment across multiple teams, and actively shapes engineering culture and practices. Work has consequences beyond their immediate team.\n\n**L6 \u2014 Distinguished Engineer**\nIndustry-level scope and impact. Work has company-defining consequences; helps shape the discipline beyond the organization itself. This level is intentionally rare and represents an exceptional, sustained body of technical leadership.\n\n---", "group": "The Building Blocks"}, {"number": "11", "title": "Understanding the Dimensions", "content": "The rubric organizes competencies into four dimensions \u2014 the broadest categories of what it means to perform well as an engineer. Dimensions represent the top-level framing before you get into the specific competencies and capabilities within each.\n\n**Impact & Scope**\nThe tangible results your work produces and the breadth of your reach. Asks: what are you actually delivering, and how far does it travel? This dimension covers ownership, execution, business alignment, and values \u2014 the \"what\" of performance.\n\n**Reasoning & Framing**\nHow you think. Distinguishes between someone who arrives at a solution and someone who first identifies whether they're solving the right problem. This dimension covers how you structure problems, generate options, and validate success \u2014 the \"how you think\" of performance.\n\n**Communication & Influence**\nHow you move information, decisions, and people. Technical skill alone doesn't create organizational leverage \u2014 the ability to convey clearly, align stakeholders, and grow others does. This dimension covers the full arc from clear writing to org-wide influence.\n\n**Technical Competencies**\nThe craft and domain knowledge that underpin everything else. Split into Shared Technical (what every engineer needs) and Domain-Specific (customized per track). This dimension is the foundation that the others sit on.\n\nDimensions don't have weights, and they aren't substitutable. A strong Impact score doesn't offset a weak Technical Competencies score \u2014 each dimension represents a necessary facet of well-rounded performance.\n\n---", "group": "The Building Blocks"}, {"number": "12", "title": "The Three-Tier Rating Structure", "content": "Formal performance ratings operate at three tiers of granularity:\n\n**Tier 1 \u2014 Overall Rating (1 number)**\nA single score used for HR, compensation, and to seed calibration conversations. Proposed by the manager and validated through calibration. Should be explainable by the Dimension scores \u2014 any divergence requires articulation.\n\n**Tier 2 \u2014 Dimension Scores (~4 numbers)**\nOne score per top-level Dimension. These are the primary unit of accountability in calibration. They force managers to think critically and be specific, and they give calibration participants a basis for challenge: *\"You gave a 2 in Impact & Scope \u2014 can you walk me through that?\"*\n\n**Tier 3 \u2014 Capability Descriptions (N rows)**\nThe behavioral scaffolding that informs Dimension scores. Managers may or may not formally score at this level \u2014 that is left to the manager/direct report pair. These rows exist to:\n- Help managers think through how to arrive at Dimension scores\n- Guide specific feedback conversations (*\"what's making me stand out in Communication?\"*)\n- Enable individual self-assessment\n- Support calibration challenges with concrete evidence\n\n---", "group": "How to Use It"}, {"number": "13", "title": "Calibration Philosophy", "content": "Calibration happens **per level** \u2014 the goal is consistent application of the rubric across individuals at the same level, not cross-level comparison.\n\nThe Dimension scores are the primary lever. Calibration participants should be prepared to:\n- Defend each Dimension score with specific behavioral examples\n- Respond to challenges from peers who have observed different behaviors\n- Explain how the overall rating follows from the Dimension scores\n\nForced distribution (bell-curving) is a policy decision made at the leadership level. The rubric is designed to be a clean, honest instrument. If there is a mismatch between what the rubric says and what a distribution policy requires, that tension is owned by leadership \u2014 not absorbed by managers through score inflation or deflation.\n\n---", "group": "How to Use It"}, {"number": "14", "title": "Self-Assessment", "content": "Individuals are encouraged \u2014 and should be given space \u2014 to self-assess against the rubric before formal review conversations. A strong self-assessment practice:\n- Surfaces work and impact that managers may have missed\n- Gives individuals a voice in their own evaluation\n- Creates a shared starting point for the review conversation\n- Builds psychological safety by making the conversation bidirectional\n\nSelf-assessments are most useful when grounded in **specific examples**. *\"I demonstrated X by doing Y in context Z\"* is far more valuable than a number alone.\n\nManagers may require or encourage self-ratings as a preparation step before review conversations. This is a healthy practice.\n\n---", "group": "How to Use It"}, {"number": "15", "title": "How Descriptions Signal Progression", "content": "Each description in this rubric is written using consistent **signal vocabulary** \u2014 words and phrases that carry meaning about frequency, agency, and scope. Reading descriptions vertically across levels, these signals make visible exactly what changes from one level to the next.\n\n| Signal | L1 | L2 | L3 | L4 | L5 | L6 |\n|---|---|---|---|---|---|---|\n| **Frequency** | *beginning to* | *regularly* | *consistently* | *proactively* | *systematically* | *defines the standard* |\n| **Agency** | *with guidance* | *with minimal guidance* | *independently* | *without prompting* | *without direction* | *sets the philosophy* |\n| **Scope** | task | own work | feature / project | team / cross-team | org-wide | company / industry |\n\nNot every capability uses all three signal types \u2014 some rely primarily on scope expansion, others on frequency, others on a shift in agency. But the vocabulary is consistent: \"proactively\" always describes L4 or above behavior; \"beginning to\" is always L1 or occasionally L2.\n\nThese signals serve two audiences. **Managers** calibrating ratings can quickly locate where an individual sits on each axis per capability. **Individuals** self-assessing can identify which signal dimension they've advanced in \u2014 and which they haven't yet.\n\n---", "group": "How to Use It"}, {"number": "16", "title": "The Rubric Is Not a Checklist", "content": "Perhaps most importantly: this rubric is a **growth tool and a conversation guide**, not a compliance checklist.\n\nNo individual will exhibit every behavior at every capability in a given review cycle. The rubric describes the shape of the archetype, not a set of boxes to check. Managers should use it to identify the most important development investments for each individual \u2014 not to score every row exhaustively.\n\nThe behaviors described are illustrative of a level, not exhaustive. A manager should be able to say *\"this person is a solid L3\"* and point to evidence in the rubric \u2014 not *\"this person checked all 33 capability rows at a 3 or above.\"*\n\n---", "group": "Gotchas & Caveats"}, {"number": "17", "title": "AI Tools and Emerging Technology", "content": "There is no dedicated dimension or capability for AI tool adoption. This is intentional.\n\nTechnology choices change rapidly. A rubric row that references specific tools becomes outdated; a rubric that references the *outcomes of effective tool use* remains durable.\n\nObservable improvements in output quality, delivery velocity, and solution quality \u2014 which should result from effective adoption of productivity tools including AI \u2014 are traceable through existing capabilities:\n- **Technical Competencies \u2192 Craft:** Evaluates quality and reliability of work product\n- **Impact & Scope \u2192 Delivery & Execution:** Evaluates velocity and reliability of delivery\n- **Reasoning & Framing \u2192 Solution Crafting:** Evaluates the quality of solutions generated\n- **Impact & Scope \u2192 Values \u2192 Growth Mindset:** Evaluates adaptability and proactive adoption of new approaches\n\nThis design ensures that tool adoption is rewarded through its observable outcomes \u2014 without creating a separate dimension that over-indexes on a specific technology moment.", "group": "Gotchas & Caveats"}]};

const { useState, useEffect, useCallback, useRef } = React;

// ──────────────────────────────────────────────────────────
// Utility helpers
// ──────────────────────────────────────────────────────────
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function findNode(rubric, dimId, compId, capId) {
  const dim = rubric.dimensions.find(d => d.id === dimId);
  if (!dim) return null;
  if (!compId) return { type: 'dimension', node: dim, dim };
  const comp = dim.competencies.find(c => c.id === compId);
  if (!comp) return null;
  if (!capId) return { type: 'competency', node: comp, dim, comp };
  const cap = comp.capabilities.find(c => c.id === capId);
  if (!cap) return null;
  return { type: 'capability', node: cap, dim, comp, cap };
}

// ──────────────────────────────────────────────────────────
// Toast
// ──────────────────────────────────────────────────────────
function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`}>{t.message}</div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((message, type = 'success') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  return { toasts, show };
}

// ──────────────────────────────────────────────────────────
// Sidebar Tree
// ──────────────────────────────────────────────────────────
function SidebarTree({ rubric, selection, onSelect }) {
  const [openDims, setOpenDims] = useState(() => {
    const s = {};
    (rubric?.dimensions || []).forEach(d => { s[d.id] = true; });
    return s;
  });
  const [openComps, setOpenComps] = useState({});

  const toggleDim = (id) => setOpenDims(p => ({ ...p, [id]: !p[id] }));
  const toggleComp = (dimId, compId) =>
    setOpenComps(p => ({ ...p, [`${dimId}:${compId}`]: !p[`${dimId}:${compId}`] }));

  if (!rubric) return null;

  return (
    <div className="sidebar">
      <div className="sidebar-section-label">Rubric Structure</div>
      {rubric.dimensions.map(dim => (
        <React.Fragment key={dim.id}>
          <div
            className={`tree-item ${openDims[dim.id] ? 'open' : ''} ${
              selection.dimId === dim.id && !selection.compId ? 'active' : ''
            }`}
            onClick={() => { onSelect({ dimId: dim.id }); toggleDim(dim.id); }}
          >
            <span className="indent" style={{ width: 0 }} />
            <span className="chevron">▶</span>
            <span className="label">{dim.name}</span>
            <span className="tree-badge">{dim.competencies.length}</span>
          </div>

          {openDims[dim.id] && dim.competencies.map(comp => (
            <React.Fragment key={comp.id}>
              <div
                className={`tree-item ${openComps[`${dim.id}:${comp.id}`] ? 'open' : ''} ${
                  selection.dimId === dim.id && selection.compId === comp.id && !selection.capId ? 'active' : ''
                }`}
                onClick={() => { onSelect({ dimId: dim.id, compId: comp.id }); toggleComp(dim.id, comp.id); }}
              >
                <span className="indent" style={{ width: 14 }} />
                <span className="chevron">▶</span>
                <span className="label">{comp.name}</span>
                <span className="tree-badge">{comp.capabilities.length}</span>
              </div>

              {openComps[`${dim.id}:${comp.id}`] && comp.capabilities.map(cap => (
                <div
                  key={cap.id}
                  className={`tree-item ${
                    selection.dimId === dim.id && selection.compId === comp.id && selection.capId === cap.id ? 'active' : ''
                  }`}
                  onClick={() => onSelect({ dimId: dim.id, compId: comp.id, capId: cap.id })}
                >
                  <span className="indent" style={{ width: 28 }} />
                  <span className="label">{cap.name}</span>
                </div>
              ))}
            </React.Fragment>
          ))}
        </React.Fragment>
      ))}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Level descriptions editor
// ──────────────────────────────────────────────────────────
function DescriptionsEditor({ levels, levelNames, descriptions, onChange, readOnly }) {
  return (
    <div className="level-grid">
      {levels.map(level => {
        const val = descriptions[level] || '';
        const isPlaceholder = val.startsWith('[') && val.endsWith(']');
        return (
          <div className="level-cell" key={level}>
            <label>
              {level}
              <span className="level-name">— {levelNames[level]}</span>
            </label>
            <textarea
              className={isPlaceholder ? 'placeholder-text' : ''}
              value={val}
              onChange={readOnly ? undefined : e => onChange(level, e.target.value)}
              readOnly={readOnly}
              placeholder={`Describe ${level} behavior here…`}
              style={readOnly ? { cursor: 'default', background: 'var(--bg)' } : undefined}
            />
          </div>
        );
      })}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Node Editor (Dimension / Competency / Capability)
// ──────────────────────────────────────────────────────────
function NodeEditor({ rubric, selection, onSave, readOnly }) {
  const found = selection.dimId ? findNode(rubric, selection.dimId, selection.compId, selection.capId) : null;
  const [localNode, setLocalNode] = useState(null);
  const [dirty, setDirty] = useState(false);

  useEffect(() => {
    if (found) {
      setLocalNode(deepClone(found.node));
      setDirty(false);
    }
  }, [selection, found?.node]);

  if (!selection.dimId) {
    return (
      <div className="main">
        <div className="empty-state">
          <div className="empty-state-icon">🗂</div>
          <h3>{readOnly ? 'Select a node to view' : 'Select a node to edit'}</h3>
          <p>Choose a Dimension, Competency, or Capability from the sidebar to {readOnly ? 'view' : 'view and edit'} its level descriptions.</p>
        </div>
      </div>
    );
  }

  if (!found || !localNode) return <div className="main"><div className="spinner" /></div>;

  const { type, dim, comp } = found;
  const typeLabel = { dimension: 'Dimension', competency: 'Competency', capability: 'Capability' }[type];
  const typeBadge = `badge-${type}`;

  const handleDescChange = (level, val) => {
    setLocalNode(prev => ({ ...prev, descriptions: { ...prev.descriptions, [level]: val } }));
    setDirty(true);
  };

  const handleNameChange = (val) => {
    setLocalNode(prev => ({ ...prev, name: val }));
    setDirty(true);
  };

  const handleSave = () => {
    onSave(type, { dimId: dim.id, compId: comp?.id, capId: found.cap?.id }, localNode);
    setDirty(false);
  };

  const children = type === 'dimension'
    ? dim.competencies.map(c => ({ id: c.id, name: c.name, count: c.capabilities.length, label: 'Competency', countLabel: 'capabilities' }))
    : type === 'competency'
    ? comp.capabilities.map(c => ({ id: c.id, name: c.name, count: null, label: 'Capability' }))
    : [];

  return (
    <div className="main">
      {/* Breadcrumb */}
      <div className="breadcrumb">
        <span>{dim.name}</span>
        {comp && <><span className="breadcrumb-sep">›</span><span>{comp.name}</span></>}
        {found.cap && <><span className="breadcrumb-sep">›</span><span className="breadcrumb-current">{localNode.name}</span></>}
        {!found.cap && <><span className="breadcrumb-sep">›</span><span className="breadcrumb-current">{localNode.name}</span></>}
      </div>

      {/* Lock state banner — swaps based on editing mode */}
      {readOnly ? (
        <div className="readonly-badge">
          <LockedIcon /> View only — click the lock icon in the tab to enable editing
        </div>
      ) : (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          fontSize: 12, fontWeight: 500,
          color: '#92400e',
          background: '#fffbeb',
          border: '1px solid #fcd34d',
          borderRadius: 8, padding: '8px 14px',
          marginBottom: 18,
        }}>
          <UnlockedIcon />
          <span>Editing enabled — changes are saved directly to the rubric. Click the lock icon in the tab to lock.</span>
        </div>
      )}

      {/* Node header */}
      <span className={`node-type-badge ${typeBadge}`}>{typeLabel}</span>
      <div className="name-display">
        <input
          className="name-input"
          value={localNode.name}
          onChange={readOnly ? undefined : e => handleNameChange(e.target.value)}
          readOnly={readOnly}
          style={readOnly ? { cursor: 'default', background: 'var(--bg)' } : undefined}
        />
      </div>
      {localNode.intent && (
        <div style={{ fontStyle: 'italic', color: 'var(--muted)', fontSize: 13, marginTop: 8, marginBottom: 2 }}>
          {localNode.intent}
        </div>
      )}
      <div className="node-subtitle" style={{ marginTop: 6 }}>
        {type === 'dimension' && `${dim.competencies.length} competencies · ${dim.competencies.reduce((a,c) => a + c.capabilities.length, 0)} capabilities`}
        {type === 'competency' && `${comp.capabilities.length} capabilities · within ${dim.name}`}
        {type === 'capability' && `Leaf node · ${dim.name} › ${comp.name}`}
      </div>

      {/* Level descriptions */}
      <div className="card">
        <div className="card-title">Level Descriptions</div>
        <DescriptionsEditor
          levels={rubric.meta.levels}
          levelNames={rubric.meta.level_names}
          descriptions={localNode.descriptions}
          onChange={handleDescChange}
          readOnly={readOnly}
        />
      </div>

      {/* Save — hidden in read-only mode */}
      {!readOnly && (
        <div className="action-bar">
          <button
            className="btn btn-primary"
            disabled={!dirty}
            onClick={handleSave}
          >
            {dirty ? 'Save Changes' : 'Saved'}
          </button>
          {dirty && (
            <button
              className="btn btn-ghost"
              onClick={() => { setLocalNode(deepClone(found.node)); setDirty(false); }}
            >
              Discard
            </button>
          )}
          {dirty && <span style={{ fontSize: 12, color: 'var(--warning)' }}>Unsaved changes</span>}
        </div>
      )}

      {/* Children */}
      {children.length > 0 && (
        <div className="card" style={{ marginTop: 24 }}>
          <div className="card-title">{type === 'dimension' ? 'Competencies' : 'Capabilities'}</div>
          <div className="child-grid">
            {children.map(child => (
              <div key={child.id} className="child-card"
                onClick={() => {/* no-op; navigate via sidebar */}}
              >
                <div className="child-card-label">{child.label}</div>
                <div className="child-card-name">{child.name}</div>
                {child.count != null && (
                  <div className="child-card-count">{child.count} {child.countLabel}</div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Level View
// ──────────────────────────────────────────────────────────
function LevelView({ rubric, selectedTrack }) {
  const [selectedLevel, setSelectedLevel] = useState(rubric?.meta.levels[2] || 'L3');
  const [compareDown, setCompareDown] = useState(false);
  const [compareUp,   setCompareUp]   = useState(false);

  const [expandedDims, setExpandedDims] = useState(() => new Set());
  const [expandedComps, setExpandedComps] = useState(() => new Set());

  if (!rubric) return <div className="main"><div className="spinner" /></div>;

  // Adjacent levels
  const levels    = rubric.meta.levels;
  const levelIdx  = levels.indexOf(selectedLevel);
  const prevLevel = levelIdx > 0               ? levels[levelIdx - 1] : null;
  const nextLevel = levelIdx < levels.length-1 ? levels[levelIdx + 1] : null;

  const ln = (l) => rubric.meta.level_names[l] || l;
  const totalCaps = rubric.dimensions.reduce((a, d) =>
    a + d.competencies.reduce((b, c) => b + c.capabilities.length, 0), 0);

  const toggleDim = (id) =>
    setExpandedDims(prev => { const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s; });
  const toggleComp = (dId, cId) => {
    const k = `${dId}:${cId}`;
    setExpandedComps(prev => { const s = new Set(prev); s.has(k) ? s.delete(k) : s.add(k); return s; });
  };
  const expandAll = () => {
    setExpandedDims(new Set(rubric.dimensions.map(d => d.id)));
    setExpandedComps(new Set(rubric.dimensions.flatMap(d => d.competencies.map(c => `${d.id}:${c.id}`))));
  };
  const collapseAll = () => { setExpandedDims(new Set()); setExpandedComps(new Set()); };

  // When the baseline level changes, keep compare toggles but clamp to valid edges
  const handleLevelChange = (l) => {
    setSelectedLevel(l);
    const idx = levels.indexOf(l);
    if (idx === 0)            setCompareDown(false);
    if (idx === levels.length-1) setCompareUp(false);
  };

  // ── Visual theme for each column role ────────────────────
  const COL = {
    prev: {
      headerBg:    '#4a5080',
      headerColor: '#c8cce8',
      cellBg:      '#f1f3fb',
      textColor:   '#7880aa',
      borderLeft:  '1px solid #d0d4ec',
      label:       `◀ ${prevLevel} — ${ln(prevLevel)}`,
      italic:      true,
    },
    base: {
      headerBg:    'var(--sidebar-bg)',
      headerColor: '#ffffff',
      cellBg:      '#ffffff',
      textColor:   'var(--text)',
      borderLeft:  '3px solid var(--primary)',
      label:       `${selectedLevel} — ${ln(selectedLevel)}`,
      italic:      false,
    },
    next: {
      headerBg:    '#5a4a30',
      headerColor: '#d4c4a0',
      cellBg:      '#fdf9f2',
      textColor:   '#9a8050',
      borderLeft:  '1px solid #e8dfc4',
      label:       `${nextLevel} — ${ln(nextLevel)} ▶`,
      italic:      true,
    },
  };

  // Which description columns are active, in order
  const activeCols = [
    ...(compareDown && prevLevel ? ['prev'] : []),
    'base',
    ...(compareUp && nextLevel   ? ['next'] : []),
  ];
  const numDescCols = activeCols.length;

  // Helper: get description for a node's descriptions object
  const getDesc = (descriptions, level) => descriptions?.[level] || '';
  const isPlaceholder = (s) => s.startsWith('[') && s.endsWith(']');

  // Render the description cell(s) for a given node at each active column
  const descCells = (descriptions, rowBgOverride) => activeCols.map(role => {
    const col   = COL[role];
    const level = role === 'prev' ? prevLevel : role === 'next' ? nextLevel : selectedLevel;
    const desc  = getDesc(descriptions, level);
    const ph    = isPlaceholder(desc);
    return (
      <td key={role} style={{
        verticalAlign: 'top',
        background:    rowBgOverride || col.cellBg,
        borderLeft:    col.borderLeft,
        color:         ph ? '#bbb' : col.textColor,
        fontStyle:     (ph || col.italic) ? 'italic' : 'normal',
        fontSize:      role === 'base' ? 13 : 12,
        padding:       '11px 14px',
        lineHeight:    1.55,
      }}>
        {desc || <span style={{ color: '#ccc' }}>—</span>}
      </td>
    );
  });

  // Chevron for tree toggle
  const chevron = (open) => (
    <span style={{
      display: 'inline-block', fontSize: 9, color: 'var(--muted)',
      transition: 'transform 0.15s', flexShrink: 0,
      transform: open ? 'rotate(90deg)' : 'none',
    }}>▶</span>
  );

  const rowToggleStyle = {

// Lightweight markdown → JSX (handles bold, bullets, tables)
function renderMd(text) {
  const inline = (str) => {
    const parts = str.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g);
    return parts.map((p, i) => {
      if (p.startsWith('**') && p.endsWith('**')) return <strong key={i}>{p.slice(2,-2)}</strong>;
      if (p.startsWith('*')  && p.endsWith('*'))  return <em key={i}>{p.slice(1,-1)}</em>;
      return p;
    });
  };
  const parseTableLine = (line) =>
    line.split('|').slice(1, -1).map(cell => cell.trim());

  const blocks = text.split(/\n\n+/);
  return blocks.map((block, bi) => {
    const lines = block.trim().split('\n');
    // markdown table
    if (lines.some(l => l.startsWith('|'))) {
      const tableLines = lines.filter(l => l.startsWith('|'));
      const isSeparator = (l) => /^\|[-| :]+\|$/.test(l.trim());
      const headerLine = tableLines[0];
      const bodyLines = tableLines.slice(2).filter(l => !isSeparator(l));
      const headers = parseTableLine(headerLine);
      return (
        <table key={bi} style={{
          borderCollapse: 'collapse', width: '100%',
          fontSize: 12, margin: '8px 0', lineHeight: 1.4,
        }}>
          <thead>
            <tr>
              {headers.map((h, i) => (
                <th key={i} style={{
                  textAlign: 'left', padding: '5px 8px',
                  borderBottom: '2px solid #d1d5db',
                  fontWeight: 600, color: '#374151',
                  whiteSpace: i === 0 ? 'nowrap' : 'normal',
                }}>
                  {inline(h)}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {bodyLines.map((row, ri) => (
              <tr key={ri} style={{ borderBottom: '1px solid #e5e7eb' }}>
                {parseTableLine(row).map((cell, ci) => (
                  <td key={ci} style={{
                    padding: '5px 8px', verticalAlign: 'top',
                    fontStyle: ci > 0 ? 'italic' : 'normal',
                    color: ci === 0 ? '#374151' : '#6b7280',
                  }}>
                    {inline(cell)}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      );
    }
    // bullet list
    if (lines.every(l => l.trimStart().startsWith('- '))) {
      return (
        <ul key={bi}>
          {lines.map((l,i) => <li key={i}>{inline(l.replace(/^\s*-\s+/,''))}</li>)}
        </ul>
      );
    }
    // numbered list
    if (lines.every(l => /^\d+\./.test(l.trim()))) {
      return (
        <ol key={bi} style={{ paddingLeft: 16, margin: '4px 0 8px' }}>
          {lines.map((l,i) => <li key={i}>{inline(l.replace(/^\d+\.\s+/,''))}</li>)}
        </ol>
      );
    }
    return <p key={bi}>{inline(block.trim())}</p>;
  }).filter(Boolean);
}

function PhilosophyCards({ sections }) {
  if (!sections || sections.length === 0) return null;

  // Build ordered group list, preserving first-seen order from the .md file
  const groupOrder = [];
  const grouped = {};
  sections.forEach(s => {
    if (!grouped[s.group]) {
      grouped[s.group] = [];
      groupOrder.push(s.group);
    }
    grouped[s.group].push(s);
  });

  return (
    <div className="card">
      <div style={{ display: 'flex', alignItems: 'center', marginBottom: 16 }}>
        <div className="card-title" style={{ marginBottom: 0, flex: 1 }}>
          Design Philosophy — {sections.length} principles · click any card to read

        <a
          href="/api/philosophy/download"

            fontSize: 11, fontWeight: 600, color: 'var(--primary)',
            textDecoration: 'none', padding: '4px 10px',

            transition: 'background 0.15s',

          }}
          onMouseOver={e => e.currentTarget.style.background = '#eef0fb'}
          onMouseOut={e => e.currentTarget.style.background = 'transparent'}
        >
          ⬇ Download .md
        </a>
      </div>

      {groupOrder.map((group, gi) => {
        const color = PHIL_GROUP_COLORS[group] || '#6b7194';
        const cards = grouped[group];
        return (
          <div key={group} style={{ marginBottom: gi < groupOrder.length - 1 ? 28 : 4 }}>

            {/* Group header bar */}
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14,
            }}>
              <div style={{
                width: 4, height: 18, borderRadius: 2,
                background: color, flexShrink: 0,
              }} />
              <div style={{
                fontSize: 11, fontWeight: 700, letterSpacing: '0.9px',
                textTransform: 'uppercase', color,
              }}>
                {group}

              <div style={{ flex: 1, height: 1, background: `${color}30` }} />
              <div style={{ fontSize: 11, color: 'var(--muted)' }}>

                <PhilosophyCard key={s.number} section={s} groupColor={color} />
              ))}
            </div>

        );
      })}
    </div>
  );
}

    return () => document.removeEventListener('mousedown', handler);

  const displayName = currentObj?.name || currentTrack || '…';

  return (
    <div className="track-selector" ref={ref}>
      <button className={`track-selector-btn ${open ? 'open' : ''}`}
        onClick={() => setOpen(v => !v)}>
        {displayName}
        <span className="track-chevron">▾</span>
      </button>

      {open && (
        <div className="track-dropdown">
          <div className="track-dropdown-header">Track</div>
          {ALL_TRACKS.map(t => {
            const isActive = t.id === currentTrack;
            const cls = `track-option ${isActive ? 'active' : t.available ? 'available' : 'unavailable'}`;
            return (
              <div key={t.id} className={cls}
                onClick={() => {
                  if (t.available && !isActive) {
                    onTrackChange(t.id);
                    setOpen(false);
                  }
                }}>
                <span>{t.name}</span>
                {isActive
                  ? <span className="track-check">✓</span>
                  : !t.available && <span className="track-soon">Coming soon</span>
                }
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Main App
// ──────────────────────────────────────────────────────────
function App() {
  const [rubric, setRubric] = useState(null);
  const [selectedTrack, setSelectedTrack] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saveStatus, setSaveStatus] = useState('saved'); // saved | unsaved | saving | error
  const [activeTab, setActiveTab] = useState('overview'); // overview | level-view | editor
  const editingEnabled = false;
  const [selection, setSelection] = useState({});
  const { toasts, show: showToast } = useToast();
  const saveTimer = useRef(null);

  // Load rubric on mount (no track param → server picks default)
  useEffect(() => {
    Promise.resolve(window.BAKED.tracks['swe-ic'])
      .then(data => {
        setRubric(data);
        setSelectedTrack(data.meta.current_track || data.meta.default_track || 'swe-ic');
        setLoading(false);
      })
      .catch(err => { setLoading(false); });
  }, []);

  // Re-fetch rubric when user switches track
  const handleTrackChange = useCallback((trackId) => {
    setSelectedTrack(trackId);
    setLoading(true);
    Promise.resolve(window.BAKED.tracks[trackId] || window.BAKED.tracks['swe-ic'])
      .then(data => { setRubric(data); setLoading(false); })
      .catch(() => { setLoading(false); });
  }, [showToast]);

  // Save rubric
  const saveRubric = useCallback((updatedRubric) => {
    setSaveStatus('saving');
    Promise.resolve().then(() => { setSaveStatus('saved'); });
  }, [showToast]);

  // Handle node save
  const handleNodeSave = useCallback((type, ids, updatedNode) => {
    setRubric(prev => {
      const next = deepClone(prev);
      if (type === 'dimension') {
        const dim = next.dimensions.find(d => d.id === ids.dimId);
        if (dim) { dim.name = updatedNode.name; dim.descriptions = updatedNode.descriptions; }
      } else if (type === 'competency') {
        const dim = next.dimensions.find(d => d.id === ids.dimId);
        const comp = dim?.competencies.find(c => c.id === ids.compId);
        if (comp) { comp.name = updatedNode.name; comp.descriptions = updatedNode.descriptions; }
      } else if (type === 'capability') {
        const dim = next.dimensions.find(d => d.id === ids.dimId);
        const comp = dim?.competencies.find(c => c.id === ids.compId);
        const cap = comp?.capabilities.find(c => c.id === ids.capId);
        if (cap) { cap.name = updatedNode.name; cap.descriptions = updatedNode.descriptions; }
      }
      saveRubric(next);
      return next;
    });
  }, [saveRubric]);

  const statusText = { saved: '✓ Saved', unsaved: '● Unsaved', saving: '↑ Saving…', error: '✕ Save failed' };

  if (loading) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', flexDirection: 'column', gap: 16 }}>
        <div className="spinner" style={{ margin: 0 }} />
        <div style={{ fontSize: 14, color: 'var(--muted)' }}>Loading rubric…</div>
      </div>
    );
  }

  return (
    <>
      {/* Top bar */}
      <div className="topbar">
        <div className="topbar-logo">[DRAFT] Danielle's Technology Rubric</div>
        {selectedTrack && <TrackSelector currentTrack={selectedTrack} onTrackChange={handleTrackChange} />}
        <div className="topbar-spacer" />
        <div className={`save-status ${saveStatus}`}>{statusText[saveStatus]}</div>
      </div>

      {/* Nav tabs */}
      <div className="navtabs">
        <div className={`navtab ${activeTab === 'overview'    ? 'active' : ''}`} onClick={() => setActiveTab('overview')}>Overview</div>
        <div className={`navtab ${activeTab === 'level-view'  ? 'active' : ''}`} onClick={() => setActiveTab('level-view')}>Level View</div>
        <div
          className={`navtab ${activeTab === 'editor' ? 'active' : ''} ${!editingEnabled ? 'locked' : ''}`}
          onClick={() => setActiveTab('editor')}
        >
          Edit Descriptions
          <span style={{ marginLeft: 6, opacity: 0.4 }} title="Editing disabled in preview">
            <LockedIcon />
          </span>
        </div>
      </div>

      {/* Body */}
      <div className="layout">
        {activeTab === 'editor' && (
          <SidebarTree rubric={rubric} selection={selection} onSelect={setSelection} />
        )}

        {activeTab === 'overview'   && <MetaPanel rubric={rubric} />}
        {activeTab === 'editor'     && (
          <NodeEditor rubric={rubric} selection={selection} onSave={handleNodeSave} readOnly={!editingEnabled} />
        )}
        {activeTab === 'level-view' && <LevelView rubric={rubric} selectedTrack={selectedTrack} />}
      </div>

      <ToastContainer toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
