ceives feedback openly and acts on it. Beginning to give basic feedback to peers.", "L2": "Gives and receives feedback well within their team. Proactively seeks feedback after deliverables.", "L3": "Gives specific, behavioral, and actionable feedback \u2014 both affirming and redirecting \u2014 to teammates and cross-functional partners. Proactively seeks ongoing feedback and incorporates it into their work.", "L4": "Fosters a culture of high-quality feedback within their team and adjacent teams. Models feedback behaviors and holds the team to a high standard.", "L5": "Builds a feedback culture across the organization. Ensures feedback is a growth tool, not a performance weapon.", "L6": "Defines the feedback philosophy for the organization. Ensures feedback systems are fair, consistent, and development-oriented at scale."}, "capabilities": [{"id": "delivering-feedback", "name": "Delivering Feedback", "descriptions": {"L1": "Delivers basic affirming feedback to teammates. Beginning to give redirecting feedback in structured settings (e.g., code review).", "L2": "Delivers affirming and redirecting feedback to teammates and manager in a kind, timely, and actionable manner.", "L3": "Delivers high-quality affirming and redirecting feedback to teammates, manager, and cross-functional partners. Feedback is specific, behavioral, and timely. References observable behaviors, not personal attributes.", "L4": "Delivers feedback across teams and levels. Coaches teammates on how to give better feedback. Fosters a culture where both affirming and redirecting feedback are given consistently.", "L5": "Builds the organization's feedback culture by modeling high-quality feedback publicly, creating structures for feedback exchange, and developing the feedback skills of leaders across the org.", "L6": "Ensures the organization has the skills and systems to deliver meaningful feedback at scale. Defines what good feedback looks like for the organization."}, "intent": "How effectively you give feedback that is clear, specific, and useful to the recipient"}, {"id": "seeking-receiving-feedback", "name": "Seeking & Receiving Feedback", "descriptions": {"L1": "Relies on structured systems (performance reviews, 1:1s) to receive feedback. Receives it openly and acts on it.", "L2": "Regularly asks for feedback from peers and manager after deliverables or milestones.", "L3": "Proactively seeks ongoing feedback from peers, manager, and cross-functional partners. Does not wait for structured events. Treats feedback as a continuous input to growth.", "L4": "Models proactive feedback-seeking for the team. Fosters a culture where seeking feedback is normalized and valued.", "L5": "Works across the organization to build a culture of seeking feedback as a growth tool. Ensures feedback loops exist at every level.", "L6": "Defines the organizational philosophy for feedback as a growth mechanism. Ensures feedback is embedded in the organization's operating rhythm."}, "intent": "How actively you seek input on your own work and how openly you receive it"}, {"id": "iterating-based-on-feedback", "name": "Iterating Based on Feedback", "descriptions": {"L1": "Acts on feedback when given. Beginning to incorporate feedback into subsequent work.", "L2": "Consistently incorporates feedback into their work. Demonstrates changed behavior after receiving redirecting feedback.", "L3": "Uses feedback as a primary input to growth. Adapts their approach based on feedback from multiple sources. Revisits prior decisions when new evidence or perspective challenges them.", "L4": "Models adaptive behavior in response to feedback. Helps teammates build the capacity to incorporate feedback into their work and decision-making.", "L5": "Builds organizational systems that support continuous iteration based on feedback. Ensures teams have the psychological safety to change course when feedback warrants it.", "L6": "Defines the organizational standard for responsiveness to feedback at the strategy level."}, "intent": "How consistently you act on feedback to improve your work and approach"}], "intent": "How you give, seek, and act on feedback"}, {"id": "collaboration", "name": "Collaboration", "descriptions": {"L1": "Participates actively in team collaboration. Builds positive relationships with immediate teammates.", "L2": "Collaborates effectively within the team. Helps teammates overcome blockers and gives credit generously.", "L3": "Collaborates effectively within and across teams. Builds strong relationships with cross-functional partners. Navigates disagreement constructively.", "L4": "Drives effective collaboration across teams and functions. Builds the team's capacity for healthy disagreement and productive conflict. Known as a trusted partner across the organization.", "L5": "Shapes the collaboration culture across the engineering organization. Builds bridges across organizational boundaries.", "L6": "Defines the collaboration philosophy for the organization. Ensures the engineering organization is a trusted, effective partner across the company."}, "capabilities": [{"id": "teamwork", "name": "Teamwork", "descriptions": {"L1": "Participates actively in team work. Completes assigned work and asks for help when needed.", "L2": "Regularly helps teammates overcome obstacles and resolve blockers. Gives and shares credit where due.", "L3": "Consistently helps teammates overcome obstacles, resolve blockers, and complete work. Gives credit generously and creates space for others' contributions.", "L4": "Proactively partners with teammates within and across teams to remove obstacles before they become blockers. Creates team environments where everyone is set up to do their best work.", "L5": "Works across the organization to enable teams to support each other. Ensures credit is shared and given where due at the organizational level.", "L6": "Defines the teamwork norms and culture for the engineering organization. Sets the standard for how teams collaborate across the company."}, "intent": "How effectively you contribute to shared work and shared outcomes"}, {"id": "relationship-building", "name": "Relationship Building", "descriptions": {"L1": "Invests in relationships with their immediate teammates and manager. Shows up reliably and follows through on commitments to build trust.", "L2": "Actively cultivates relationships within their team. Begins to build working relationships with cross-functional partners encountered in day-to-day work.", "L3": "Builds strong relationships with teammates, manager, product manager, and design partners. Actively extends to adjacent team partners and cross-functional collaborators.", "L4": "Builds and maintains strong relationships with teammates, cross-functional partners, and relevant business stakeholders. Leverages relationships to better position team delivery and outcomes.", "L5": "Builds and maintains strong relationships across the organization and with senior stakeholders. Uses relationships to align the organization and position engineering as a strategic partner.", "L6": "Builds relationships at the highest organizational levels \u2014 board, investors, industry partners. Positions engineering as a company-level strategic asset."}, "intent": "How intentionally you build trust and working relationships across the organization"}, {"id": "handling-disagreement", "name": "Handling Disagreement", "descriptions": {"L1": "Participates in team discussions respectfully. Beginning to share their perspective in disagreements.", "L2": "Shares opinions in discussions respectfully. Open to other perspectives. Commits to decisions even when they disagree, maintaining alignment without full agreement.", "L3": "Approaches disagreement non-defensively and with curiosity. Uses contradictory opinions as a basis for constructive conversation. Commits fully to decisions once they are made, even without full alignment.", "L4": "Encourages teammates to disagree openly and productively. Surfaces the root concern behind surface-level disagreements. Models the behavior of committing to decisions after healthy debate.", "L5": "Fosters a culture across the organization where productive disagreement is normalized. Ensures disagreement leads to better decisions, not gridlock.", "L6": "Defines the organizational standard for healthy disagreement. Ensures the engineering organization can hold strong opinions and commit with discipline."}, "intent": "How constructively you navigate conflict and differences of opinion"}], "intent": "How you work with others toward shared goals"}, {"id": "driving-alignment", "name": "Driving Alignment", "descriptions": {"L1": "Understands team goals and how their work connects to them. Participates in alignment conversations.", "L2": "Understands team strategy and goals. Actively contributes to alignment within their team.", "L3": "Drives alignment within their team and with immediate cross-functional partners. Facilitates productive discussions and ensures outcomes connect to goals.", "L4": "Drives alignment across teams and functions. Facilitates high-stakes discussions effectively. Knows when to invest in building consensus vs. when to make a call and move forward.", "L5": "Drives alignment at the organizational level. Ensures the engineering organization is oriented toward shared goals across teams and functions.", "L6": "Aligns the engineering organization with company strategy. Ensures the highest-stakes decisions produce shared commitment, not just surface agreement."}, "capabilities": [{"id": "building-consensus", "name": "Building Consensus", "descriptions": {"L1": "Participates in team consensus-building conversations. Beginning to understand when alignment is needed before moving forward.", "L2": "Contributes to team alignment conversations. Understands when to seek consensus vs. when to escalate a decision.", "L3": "Drives consensus within their team and with immediate cross-functional partners. Critically: knows when investing in building consensus is worth the time \u2014 and when it is not. Makes judgment calls and moves forward when alignment would be overhead rather than value.", "L4": "Drives consensus across teams and organizational boundaries. Surfaces and resolves the root causes of misalignment. Navigates organizational politics productively. Distinguishes between decisions that require deep alignment and those that require a single clear owner.", "L5": "Drives consensus at the organizational level on the most complex, high-stakes decisions. Builds frameworks for when alignment is required vs. when a decision should be owned and executed.", "L6": "Drives alignment across the entire engineering organization and with company leadership. Defines the governance model for how the highest-stakes decisions get made and committed to."}, "intent": "How effectively you bring groups to a shared understanding and decision"}, {"id": "strategic-orientation", "name": "Strategic Orientation", "descriptions": {"L1": "Understands how their work connects to the team's goals. Asks questions to understand the 'why' behind their assignments and uses that context to make better decisions.", "L2": "Understands team strategy and principles. Oriented toward the team's shared goals in their day-to-day work.", "L3": "Ensures their work and their team's work are oriented toward organizational strategy. Actively participates in discussions about strategic implications of team decisions.", "L4": "Fosters strategic orientation on the team. Ensures the team continuously works toward shared goals and understands why that work is valuable to the business. Connects cross-team dependencies to organizational strategy.", "L5": "Fosters strategic orientation across the organization. Ensures the engineering organization understands and works toward the company's goals. Translates company strategy into engineering priorities.", "L6": "Defines the strategic orientation of the engineering organization. Ensures engineering strategy and company strategy are tightly coupled."}, "intent": "How well you connect day-to-day decisions and work to longer-term organizational strategy"}, {"id": "meeting-discussion-facilitation", "name": "Meeting & Discussion Facilitation", "descriptions": {"L1": "Participates constructively in team meetings and discussions.", "L2": "Contributes actively to team discussions. Beginning to facilitate small discussions or working sessions within their area of expertise.", "L3": "Facilitates discussions within their team effectively. Ensures outcomes connect to stated goals. Helps guide discussions to useful conclusions, managing time and energy appropriately.", "L4": "Facilitates within-team and cross-team discussions. Drives discussions toward decisions efficiently. Manages competing priorities and viewpoints effectively.", "L5": "Facilitates organization-wide discussions on complex, high-stakes topics. Builds the team's facilitation capability.", "L6": "Facilitates the organization's most consequential discussions. Defines the standard for how the engineering organization runs high-stakes decision forums."}, "intent": "How effectively you structure and guide group conversations to productive outcomes"}, {"id": "inclusive-discussion-practices", "name": "Inclusive Discussion Practices", "descriptions": {"L1": "Participates in discussions respectfully. Beginning to be aware of group dynamics.", "L2": "Creates space for others' contributions in discussions. Acknowledges and builds on teammates' ideas.", "L3": "Actively ensures all voices are heard in discussions they participate in or facilitate. Notices when quieter participants are being overlooked and creates openings for them. Ensures no one person dominates the conversation.", "L4": "Fosters inclusive discussion practices within and across their team. Actively calls out exclusionary dynamics and models better behavior. Ensures diverse perspectives are integrated into decisions.", "L5": "Builds inclusive discussion norms across the organization. Ensures the engineering organization makes decisions that reflect a diversity of perspectives.", "L6": "Defines the organizational standard for inclusive decision-making. Ensures the engineering organization's culture is one where every voice has a meaningful path to influence."}, "intent": "How actively you create conditions for all voices to contribute meaningfully"}], "intent": "How you build consensus and move groups toward decisions"}, {"id": "team-multiplier", "name": "Team Multiplier", "descriptions": {"L1": "Focuses primarily on their own growth and contribution. Beginning to share knowledge and support teammates.", "L2": "Actively helps teammates and shares knowledge. Starting to onboard new team members.", "L3": "Mentors junior teammates and acts as a go-to resource on their areas of expertise. Proactively invests in the growth of others.", "L4": "Elevates the entire team's performance. Acts as a force multiplier \u2014 their presence makes teammates measurably more effective. Develops senior individual contributors.", "L5": "Builds and elevates technical culture across multiple teams. Develops staff-level talent. Their investment in people and culture compounds across the organization.", "L6": "Sets the talent development philosophy for the engineering organization. Builds a pipeline of technical leaders. Acts as an industry thought leader."}, "capabilities": [{"id": "mentoring-coaching", "name": "Mentoring & Coaching", "descriptions": {"L1": "Receptive to mentorship and actively seeks it. Beginning to share knowledge informally with peers.", "L2": "Helps onboard new team members. Shares domain knowledge regularly. Beginning to provide informal mentorship to peers.", "L3": "Mentors junior teammates in an open, respectful, and empathetic manner. Seeks out mentoring opportunities proactively. Provides guidance that is developmental, not just instructional.", "L4": "Mentors senior engineers and provides coaching that accelerates career growth. Seeks out opportunities to create team redundancy and backfill ability. Invests in developing the next level of talent.", "L5": "Develops staff-level engineers. Provides coaching that shapes careers, not just skills. Builds mentoring as an organizational capability.", "L6": "Develops senior leaders and principal engineers at scale. Shapes the organization's talent development philosophy. Contributes to industry-level thinking on engineering career development through writing, speaking, or direct engagement with the broader community."}, "intent": "How effectively you grow the skills and capabilities of the individuals around you"}, {"id": "team-enablement", "name": "Team Enablement", "descriptions": {"L1": "Participates in team efforts and flags obstacles they encounter that may be blocking others.", "L2": "Helps teammates identify and overcome blockers. Takes on tasks that reduce friction for the team, even when outside their direct responsibilities.", "L3": "Consistently helps teammates unblock their work. Prioritizes work that enables the team to move faster. Looks for opportunities to remove friction and create leverage for others.", "L4": "Acts as a force multiplier across the team and beyond. Facilitates work across deliverables, balancing the needs of multiple efforts. Sets the example for how to design, document, and communicate solutions to maximize team leverage.", "L5": "Enables teams across the organization to support each other. Builds systems, processes, and culture that compound team effectiveness over time.", "L6": "Defines the organizational model for how teams enable each other. Ensures the engineering organization operates as a high-trust, high-leverage system."}, "intent": "How well you remove friction and create conditions for your team to do their best work"}], "intent": "How you grow the capability and effectiveness of those around you"}], "intent": "How you move information, decisions, and people."}, {"id": "technical-competencies", "name": "Technical Competencies", "descriptions": {"L1": "Applies course-level and early-career technical knowledge to less well-defined problems. Follows team best practices with guidance. Focused on learning the craft.", "L2": "Has solid foundational technical knowledge and self-directs their technical work. Writes production-ready code and follows best practices independently.", "L3": "Has strong technical expertise and owns quality, reliability, and technical standards within their domain. Designs systems that are maintainable, scalable, and reusable.", "L4": "Sets technical standards and owns technical excellence across the team. Designs systems of significant scale and complexity. Reduces complexity and drives down technical debt.", "L5": "Defines technical direction for an entire product area or platform. Recognized internal expert across multiple technical domains. Drives adoption of new technologies and resolves the most complex technical challenges.", "L6": "Shapes the multi-year technology strategy for the organization. Internationally recognized technical expertise. Creates new approaches and methodologies adopted across the industry."}, "competencies": [{"id": "craft", "name": "Craft", "descriptions": {"L1": "Writes code that, with help, can be modified to be production-ready. Follows team conventions and leaves appropriate documentation.", "L2": "Writes production-ready code independently. Accounts for edge cases and errors. Participates actively in code review.", "L3": "Consistently writes production-ready, well-tested, easily-understood code. Maintains a high bar for quality in their own work and in code reviews.", "L4": "Owns technical excellence within the team. Defines and enforces the team's quality bar. Designs work that is easy to maintain, test, and hand off.", "L5": "Sets the technical craft standard for the organization. Ensures the highest quality bar is maintained across teams.", "L6": "Defines the craft philosophy for the engineering organization. Shapes what technical excellence means at the company level."}, "capabilities": [{"id": "code-work-quality", "name": "Code / Work Quality", "descriptions": {"L1": "Writes code that reaches production-ready quality with review and guidance from senior teammates. Code is readable by others. Participates in PR reviews to build awareness of team style.", "L2": "Writes production-ready code that accounts for edge cases and errors. Easily understood by other developers. Reviews PRs on their team with a focus on function and style.", "L3": "Consistently writes production-ready, easily-testable, well-understood code. Accounts for edge cases comprehensively. Reviews PRs with a focus on function, style, quality, scalability, and maintainability.", "L4": "Produces production-ready code across the team that is a model for maintainability and design. Reviews PRs across the team with focus on scalability and long-term quality.", "L5": "Sets the standard for code quality across the organization. Reviews and approves architectural decisions. Produces code that serves as a reference standard for how things should be built.", "L6": "Defines the code quality philosophy for the organization. Shapes the standards and tooling that enforce quality at scale."}, "intent": "The correctness, clarity, and maintainability of what you build"}, {"id": "documentation", "name": "Documentation", "descriptions": {"L1": "Leaves appropriate comments and basic documentation on their work.", "L2": "Leaves appropriate comments and documentation. Abides by self-documenting code best practices.", "L3": "Writes clear, accurate documentation. Produces design docs, ADRs, and post-mortems that are useful to others. Connects technical documentation to product and user context.", "L4": "Sets the documentation standard for the team. Ensures the team's work is legible and maintainable by others. Drives a culture of documentation as a first-class artifact.", "L5": "Drives documentation standards across the organization. Ensures knowledge is captured in a way that scales beyond individuals.", "L6": "Defines the documentation philosophy for the organization. Ensures organizational knowledge is durable, accessible, and maintained."}, "intent": "How well you make your work understandable and usable by others"}, {"id": "technical-standards", "name": "Technical Standards", "descriptions": {"L1": "Follows team technical standards with guidance. Learns best practices by reading existing code and asking senior teammates.", "L2": "Follows team technical standards independently. Looks for opportunities to clean up legacy work as they encounter it.", "L3": "Follows and contributes to team technical standards. Identifies opportunities to update standards when they're outdated or missing.", "L4": "Defines and evolves technical standards for the team. Ensures standards are practical, enforced, and understood. Drives adoption of new standards across the team.", "L5": "Sets technical standards for the organization. Ensures standards evolve with technology and business needs. Drives org-wide adoption and compliance.", "L6": "Defines the technical standards philosophy for the organization. Sets the standard for how standards are created, maintained, and enforced at scale."}, "intent": "How consistently you apply and evolve the team's technical standards"}], "intent": "The quality and rigor of your technical work product"}, {"id": "shared-technical", "name": "Shared Technical", "descriptions": {"L1": "Applies course-level technical knowledge to engineering tasks. May require guidance in design and architecture discussions.", "L2": "Independently designs and implements components of a system. Participates in design discussions and contributes effectively.", "L3": "Designs complex systems considering scalability and performance. Leads system design discussions within the team. Owns components from design through production.", "L4": "Leads design of major components or entire systems. Consistently applies best practices and influences overall architecture. Mentors team members in system design.", "L5": "Plays a key role in shaping the overall system architecture. Leads cross-functional teams in designing and implementing complex systems. Champions technological advancement.", "L6": "Defines and drives the organization's technical architecture. Provides strategic direction for complex system design. Recognized as an industry thought leader in system design."}, "capabilities": [{"id": "system-design", "name": "System Design", "descriptions": {"L1": "Requires guidance in applying design principles to their work. Contributes to design discussions and proposes simple solutions with support from senior engineers.", "L2": "Participates in collaborative design discussions effectively. Capable of independently designing and implementing components of a system.", "L3": "Designs complex systems considering scalability and performance. Leads system design discussions and mentors junior team members. Designs simple, flexible, reusable components that are testable and not easily misused.", "L4": "Leads and owns the design of major components or entire systems. Consistently applies best practices and influences overall architecture. Decomposes complex problems into coherent system designs with well-designed boundaries.", "L5": "Shapes the overall system architecture. Leads cross-functional teams in designing complex systems. Innovates in system design approaches and advocates for technological advancement.", "L6": "Defines and drives the organization's overall technical architecture. Provides strategic direction for complex system design. Shapes the field's understanding of system design through external contributions \u2014 publications, open source, or standards work."}, "intent": "How effectively you design systems that are correct, scalable, and maintainable"}, {"id": "scalability-performance", "name": "Scalability & Performance", "descriptions": {"L1": "Implements working solutions with guidance. Develops awareness of where performance and efficiency considerations apply in their work.", "L2": "Writes code organized into reusable, well-named functions. Begins to identify and address inefficiencies. Creates reusable components within their workstream.", "L3": "Builds with maintenance, tech debt, and compute cost in mind. Considers computational complexity when deploying to production. Creates reusable components and contributes to team libraries.", "L4": "Designs with maintenance, tech debt, and compute in mind across the team's systems. Creates libraries useful for others. Looks for opportunities to remove duplicate and overlapping efforts.", "L5": "Designs scalable systems with product and process implications in mind. Sets the organization's standards for performance and scalability.", "L6": "Designs scalable systems with the entire company's needs in mind. Defines the architectural patterns that ensure the organization can scale its technology."}, "intent": "How well you reason about and design for the performance characteristics of systems"}, {"id": "integration-operations", "name": "Integration & Operations", "descriptions": {"L1": "Develops locally. Beginning to understand deployment processes.", "L2": "Can deploy code to production following established patterns. Understands basic staging and production practices.", "L3": "Deploys to production confidently using established patterns. Leverages and actively contributes to the existing ecosystem. Manages cross-team dependencies with appropriate documentation.", "L4": "Deep fluency with the production ecosystem. Manages cross-team dependencies with documentation and SLO/SLAs. Identifies and drives improvements to the ecosystem beyond the needs of their immediate work.", "L5": "Improves the ecosystem significantly as they work. Defines requirements for other technical teams who own adjacent capabilities. Sets integration standards across the organization.", "L6": "Defines the integration and operations philosophy for the organization. Makes buy vs. build decisions for foundational infrastructure and tooling."}, "intent": "How well you think about how systems fit into and operate within the broader environment"}], "intent": "Technical skills that apply broadly across engineering disciplines"}, {"id": "domain-specific", "name": "Domain-Specific", "descriptions": {"swe-ic": {"L1": "Developing foundational knowledge of the team's programming languages, frameworks, and development tools. Applies domain knowledge to well-scoped tasks under guidance.", "L2": "Solid working knowledge of the team's tech stack. Independently applies domain knowledge to moderately complex features and debugging scenarios. Developing fluency with domain tooling and practices.", "L3": "Deep expertise in the team's core domain. Recognized as a knowledgeable resource. Applies best-in-class practices and tools. Guides others in domain knowledge and methodology.", "L4": "Recognized domain expert on the team. Shapes technical standards in the domain. Evaluates and adopts new techniques and tooling. Teaches, mentors, and drives knowledge sharing.", "L5": "Recognized organizational domain expert. Drives adoption of best practices. Shapes the org's approach to tooling, methodology, and engineering quality in the domain.", "L6": "Defines the organization's domain strategy. Internationally recognized expert. Contributes to the industry's evolution of the domain through publications, open source, or standards bodies."}, "data-ml": {"L1": "Developing foundational knowledge of statistical methods, ML algorithms, and data tooling. Applies domain knowledge to well-scoped, pre-defined analysis tasks under close guidance.", "L2": "Solid working knowledge of core ML methods, standard algorithm libraries, and data pipelines. Independently applies domain knowledge to moderately complex modeling and analysis tasks.", "L3": "Deep expertise across ML algorithms, statistical modeling, and data architecture. Frames ambiguous business problems to match appropriate models. Owns quality and reliability of their team's data products and pipelines.", "L4": "Advanced domain knowledge across ML, statistics, and data systems. Leads technical excellence within the team, advocates for best-practice approaches, and drives data product quality across a significant product area.", "L5": "Subject matter expert with deep, opinionated mastery of algorithms, tooling, and data architecture. Shapes the team's technical direction; brings industry best practices into the organization and defines standards for how the team builds and operates.", "L6": "Recognized expert across all domain areas. Defines the organization's data and ML technical strategy, platform architecture, and methodology standards. Sets the bar for technical excellence org-wide."}}, "capabilities": [{"id": "track-sme", "name": "Subject Matter Expertise", "descriptions": {"L1": "Can apply a handful of standard algorithms and model libraries to already-framed business problems. Has basic familiarity with descriptive statistics and time series analysis; uses them with guidance.", "L2": "Applies standard ML algorithms and libraries appropriately to simple, well-defined business problems. Understands and utilizes basic statistical modeling; beginning to balance computational complexity against accuracy and business value.", "L3": "Can frame business problems to align with appropriate models and algorithms. Has an applied understanding of algorithmic tradeoffs and model selection. Implements statistical modeling, forecasting, and feature engineering independently; comfortable researching and applying new algorithms from standard libraries.", "L4": "Deep appreciation for model and algorithm nuance, including tradeoffs between different implementations. Seeks out industry best practices and advocates for new approaches where relevant. Balances optimization, compute cost, and business impact. Implements hierarchical models and advanced forecasting pipelines.", "L5": "Opinionated, deep mastery of model and algorithm nuance \u2014 including preferring specific library implementations. Brings new industry best practices to the team and drives adoption. Champions parsimony and simplification in model design. Applies advanced statistical methods to large-scale systems.", "L6": "Operates at the frontier of data and ML. Defines org-wide expectations for ML methodology, model quality, and statistical rigor. Contributes to the field through external publications, conference presentations, or open-source work."}, "track_specific": true, "intent": "The depth of your subject matter expertise in your specific technical domain"}, {"id": "track-tooling", "name": "Domain Tooling & Platforms", "descriptions": {"L1": "Aware of the team's platform tooling. Development is primarily local; beginning to understand staging and production environments and when to use each.", "L2": "Developing comfort with platform tooling; can execute existing code on established platforms by following examples. Understands basic staging and production practices.", "L3": "Comfortable with platform tooling. Deploys new code to production using established templates and defined patterns. Leverages the existing ecosystem of capabilities and tools confidently.", "L4": "Proficient with platform tooling; leverages it to solve new, unscoped use cases. Manages cross-team tooling dependencies with appropriate documentation and SLO/SLAs. Contributes concrete requirements for platform improvements.", "L5": "Native-level mastery of the team's platform tooling. Contributes to platform tools and defines requirements for new capabilities. Opinionated in buy-vs-build decisions. Improves the ecosystem as they work; partners with platform owners to raise the bar.", "L6": "Defines requirements for and designs platform tools. Makes organizational buy-vs-build decisions for data and ML tooling. Sets the standard for how the org evaluates and evolves its data and ML platform ecosystem."}, "track_specific": true, "intent": "Your command of the tools, platforms, and infrastructure specific to your domain"}, {"id": "track-methodology", "name": "Domain Methodology", "descriptions": {"L1": "Basic understanding of dimensional data modeling and how it enables analytics queries. Can design a simple data model based on well-defined requirements with guidance from a manager or peer.", "L2": "Designs and implements basic dimensional data models from well-defined requirements. Understands schema design for query performance in BI tools; can make and implement recommendations for structural improvement.", "L3": "Designs complex dimensional data models from ambiguous requirements with minimal guidance. Builds data solutions with maintenance and technical debt in mind. Proactively identifies opportunities for self-service functionality and automation in recurring data processing patterns.", "L4": "Orchestrates and implements data curation processes across an entire business domain. Designs real-time data processing pipelines supporting live analytics and ML models. Has a strong eye for architectural enhancements that enable self-service and automation at scale.", "L5": "Makes informed, opinionated decisions on system-wide orchestration, data architecture, storage solutions, ingestion mechanisms, and data mapping strategies. Partners with platform and engineering teams to manage cross-cutting dependencies and improve the shared data ecosystem.", "L6": "Strategically evaluates and implements patterns to optimize data management across the organization. Defines org-wide data modeling standards and architecture principles. Leads the organization's data and ML engineering strategy."}, "track_specific": true, "intent": "Your fluency with the methods, processes, and practices specific to your domain"}], "track_specific": true, "intent": "The specialized knowledge, tools, and methods of your particular track"}], "intent": "The craft and domain knowledge that underpin everything else."}]}}, "philosophy": [{"number": "1", "title": "Purpose", "content": "This rubric serves two complementary purposes that are often treated as separate \u2014 but are designed here to be two uses of the same instrument:\n\n**Developmental:** A shared language for ongoing career growth conversations between managers and their direct reports. It helps individuals understand where they are, where the archetype for their level sits, and what a path toward the next level looks like.\n\n**Evaluative:** A structured framework for producing fair, defensible performance ratings that can be used in calibration, compensation decisions, and formal reviews.\n\nThese two purposes are not in conflict. Think of the rubric as a map. The developmental conversation asks *\"where are you on this map, and where do you want to go?\"* The evaluative conversation asks *\"where are you on this map right now?\"* Same map. Different question.\n\n---", "group": "The Abstract Concept"}, {"number": "2", "title": "The Rubric as a Frame of Reference", "content": "The rubric defines an **N-dimensional space** \u2014 where each Capability is an axis. Every job level has an **Archetype Location** in this space: a description of what a well-rounded, solid performer at that level looks like across all dimensions.\n\nWhen a manager evaluates an individual, they are **triangulating that person's Evaluated Location** in the same space. The result is a picture of how the individual's current performance relates to the archetype for their level \u2014 and to the archetype for the next level above.\n\n**Development conversations** use the distance between the Evaluated Location and the next Archetype Location to identify specific, actionable investment areas.\n\n**Evaluation conversations** use the Evaluated Location relative to the current Archetype Location to produce a fair and evidence-based rating.\n\nThis framing has an important implication: the rubric is not a checklist of requirements. It is a set of axes for a shared conversation. Nobody sits perfectly at an archetype \u2014 and that's expected.\n\n---", "group": "The Abstract Concept"}, {"number": "3", "title": "The Range", "content": "Positions in this space are expressed on a **1\u20135 scale** \u2014 the unit of measure for every axis. Ratings are **relative to job level**: a 4 at L2 and a 4 at L5 describe the same relationship to the archetype for their respective levels, not the same absolute performance. Cross-level comparisons are rarely meaningful; calibration happens per level.\n\n| Rating | Meaning |\n|---|---|\n| **1** | Signals need for formal action. A 1 anywhere is disqualifying for an overall \"meets\" rating. |\n| **2** | A normal development area. Common on healthy, high-performing teams. Shows up in growth conversations. |\n| **3** | The archetype. Performing at the expected level for this role. A 3 is a strong, stable position \u2014 not a warning. |\n| **4** | Above the archetype. Consistently strong performance at this level. |\n| **5** | Demonstrating behaviors above the ceiling of this level. Approximately a 2 at the next level up. |\n\nA useful gut-check for overall calibration: *\"If this person were a candidate for this role, would I say 'I'd love to have them' (exceeds), 'they'd be a great fit' (meets), or 'I'd think twice' (below)?\"*\n\n---", "group": "The Abstract Concept"}, {"number": "4", "title": "The \"Center of Mass\" Principle", "content": "Performance profiles are rarely uniform. Someone may be a strong 4 on Technical Competencies and a 2 on Communication & Influence. The overall rating reflects the **center of mass** of the profile \u2014 not a strict average.\n\nGuidelines:\n- A person can receive an overall \"meets\" (3) rating while having a 2 in one Dimension, provided they have offsetting 4s or 5s elsewhere.\n- **No 1s anywhere** in a profile that receives an overall \"meets\" rating. A 1 in any Dimension signals that a formal conversation needs to happen, and it supersedes the center of mass.\n- The overall rating must be **explainable by the Dimension scores**. A manager who gives a 4 overall but has 2s and 3s at the Dimension level owes an explanation.\n\n---", "group": "The Abstract Concept"}, {"number": "5", "title": "The Hierarchy", "content": "The rubric is organized into four levels of detail, designed to be navigable at whatever depth is appropriate for the conversation at hand:\n\n| Level | Name | Purpose |\n|---|---|---|\n| 1 | **Dimension** | Top-level area of performance (4 total) |\n| 2 | **Competency** | Grouping of related behaviors within a Dimension |\n| 3 | **Capability** | Specific, observable behavioral area |\n| 4 | **Description** | Behavioral description at a given job level |\n\nEvery node in the hierarchy \u2014 at every intersection of Dimension, Competency, or Capability \u2014 has a **synthesized description for each job level**. These descriptions are human-authored summaries, not auto-generated rollups. The leaf-level (Capability) descriptions are the atomic source of truth; the summaries above them synthesize those descriptions into a navigable overview.\n\nThe four top-level Dimensions are:\n\n| Dimension | What it covers |\n|---|---|\n| **Impact & Scope** | Ownership, delivery, business value, and organizational values |\n| **Reasoning & Framing** | Problem structuring, solution crafting, and defining success |\n| **Communication & Influence** | Communication, feedback, collaboration, alignment, and team multiplication |\n| **Technical Competencies** | Craft, shared technical skills, and domain-specific expertise |\n\n---", "group": "Design Constraints & Requirements"}, {"number": "6", "title": "Promotion vs. Rating", "content": "These are **separate conversations** and must stay that way.\n\n**Rating** is a backward-looking assessment: how has this person performed at their current level over the review period?\n\n**Promotion** requires two conditions that are independent:\n1. **Rubric Readiness:** The individual is demonstrating sustained 4s and 5s at their current level \u2014 beginning to show behaviors above the ceiling. A 5 at level N approximates a 2 at level N+1.\n2. **Business Need:** An organizational need exists for the next-level role. This lives entirely outside the rubric and always will.\n\nBoth conditions are necessary. Neither alone is sufficient. In exceptional circumstances (e.g., a manager or tech lead departure), promotion ahead of rubric readiness may occur on a case-by-case basis \u2014 but this is a business decision, not a rubric decision.\n\nFormally, promotion conversations are initiated by managers. Culturally, individuals are encouraged to self-advocate using their self-assessment as a basis for the conversation.\n\n---", "group": "Design Constraints & Requirements"}, {"number": "7", "title": "Behavioral, Observable Language", "content": "Every description in this rubric is written in **behavioral, observable language** \u2014 describing what someone does, not who they are.\n\n| \u274c Trait-based | \u2705 Behavioral |\n|---|---|\n| \"Is a strong communicator\" | \"Adjusts communication style and level of detail based on audience\" |\n| \"Has good judgment\" | \"Makes sound decisions with incomplete information, and knows when to escalate vs. decide\" |\n| \"Is a team player\" | \"Proactively helps teammates remove blockers and shares credit for shared outcomes\" |\n\nThis principle serves three purposes:\n1. **Feedback becomes less personal** \u2014 it's easier to give and receive feedback about behaviors than traits\n2. **Examples are citable** \u2014 individuals can point to specific moments that demonstrate a behavior\n3. **Bias is reduced** \u2014 observable behaviors are harder to score based on subjective impression than trait descriptors\n\n---", "group": "Design Constraints & Requirements"}, {"number": "8", "title": "Fairness and Bias Prevention", "content": "The rubric is designed to be a fair, unbiased, and non-discriminatory instrument. Specific design choices that serve this goal:\n\n- **No degree or years-of-experience requirements.** The rubric describes demonstrated behaviors, not credentials or tenure.\n- **Behavioral language** reduces evaluator reliance on subjective impression.\n- **Calibration** surfaces inconsistencies across managers before they affect outcomes.\n- **Self-assessment** ensures individuals have a mechanism to surface their own contributions.\n- **Transparent rating structure** means individuals can understand and contest the basis of their ratings.\n\nManagers are expected to approach ratings with awareness of their own biases, and calibration is the organizational mechanism for catching and correcting for them.\n\n---", "group": "Design Constraints & Requirements"}, {"number": "9", "title": "Extensibility", "content": "The rubric is designed to be shared across job functions (Engineering, Product, Design, Data, etc.) with minimal reinvention. The shared Dimensions and Competencies travel across functions; the **Domain-Specific Competency** within Technical Competencies is the primary customization point for each track.\n\nThe first-pass content in this rubric reflects the Software Engineering (IC) track. Subsequent passes will adapt content for Engineering Management and Data/ML/AI, with additional tracks added over time.\n\nWhen adapting for a new job function:\n- Shared Dimensions and Competencies should be preserved\n- Capability descriptions should be reviewed for language that inadvertently assumes an engineering context\n- Domain-Specific content is written fresh for each track\n\n---", "group": "Design Constraints & Requirements"}, {"number": "10", "title": "Understanding the Levels", "content": "The rubric uses six levels \u2014 L1 through L6 \u2014 corresponding to Associate Engineer through Distinguished Engineer. Each level describes an *archetype*: a pattern of behaviors that characterizes someone operating solidly at that band. Levels are defined by scope, agency, and reach, not by years of experience or title tenure.\n\nEach level description below opens with its arc signal word (see \u00a715) \u2014 the vocabulary that appears in the rubric's capability descriptions to mark where a behavior sits on the progression.\n\n**L1 \u2014 Associate Engineer**\n*Beginning to* develop the habits and skills of the role. Executes well-scoped tasks with guidance, absorbing how the team works and building foundational technical and behavioral patterns. The primary variable is what they can take on independently, which grows quickly with strong onboarding.\n\n**L2 \u2014 Engineer**\n*Regularly* delivers on day-to-day work with minimal guidance. Growing in craft and depth; owns feature-level work but still benefits from direction on genuinely ambiguous or larger-scope problems.\n\n**L3 \u2014 Senior Engineer**\n*Consistently* delivers complex work end-to-end, independently. The go-to person for their area. Starting to shape *how* the team works \u2014 not just what it ships \u2014 and actively investing in developing teammates.\n\n**L4 \u2014 Staff Engineer**\n*Proactively* identifies and removes systemic blockers, often without being asked. Operates across teams, defines technical direction for their domain, and makes the people around them measurably more effective. The shift from L3 to L4 is less about technical depth and more about scope and organizational leverage.\n\n**L5 \u2014 Principal Engineer**\n*Systematically* improves how engineering works at the org level \u2014 setting standards, driving cross-team alignment, and shaping culture without direction to do so. Work has consequences beyond their immediate team.\n\n**L6 \u2014 Distinguished Engineer**\n*Defines the standard* for technical leadership. Work sets the philosophy at the company level and shapes the discipline beyond the organization itself. This level is intentionally rare and represents an exceptional, sustained body of technical leadership.\n\n---", "group": "The Building Blocks"}, {"number": "11", "title": "Understanding the Dimensions", "content": "The rubric organizes competencies into four dimensions \u2014 the broadest categories of what it means to perform well as an engineer. Dimensions represent the top-level framing before you get into the specific competencies and capabilities within each.\n\n**Impact & Scope**\nThe tangible results your work produces and the breadth of your reach. Asks: what are you actually delivering, and how far does it travel? This dimension covers ownership, execution, business alignment, and values \u2014 the \"what\" of performance.\n\n**Reasoning & Framing**\nHow you think. Distinguishes between someone who arrives at a solution and someone who first identifies whether they're solving the right problem. This dimension covers how you structure problems, generate options, and validate success \u2014 the \"how you think\" of performance.\n\n**Communication & Influence**\nHow you move information, decisions, and people. Technical skill alone doesn't create organizational leverage \u2014 the ability to convey clearly, align stakeholders, and grow others does. This dimension covers the full arc from clear writing to org-wide influence.\n\n**Technical Competencies**\nThe craft and domain knowledge that underpin everything else. Split into three competencies: Craft (the quality and rigor of your technical work product), Shared Technical (what every engineer needs regardless of track), and Domain-Specific (customized per track). This dimension is the foundation that the others sit on.\n\nDimensions don't have weights, and they aren't substitutable. A strong Impact score doesn't offset a weak Technical Competencies score \u2014 each dimension represents a necessary facet of well-rounded performance.\n\n---", "group": "The Building Blocks"}, {"number": "12", "title": "The Three-Tier Rating Structure", "content": "Formal performance ratings operate at three tiers of granularity:\n\n**Tier 1 \u2014 Overall Rating (1 number)**\nA single score used for HR, compensation, and to seed calibration conversations. Proposed by the manager and validated through calibration. Should be explainable by the Dimension scores \u2014 any divergence requires articulation.\n\n**Tier 2 \u2014 Dimension Scores (~4 numbers)**\nOne score per top-level Dimension. These are the primary unit of accountability in calibration. They force managers to think critically and be specific, and they give calibration participants a basis for challenge: *\"You gave a 2 in Impact & Scope \u2014 can you walk me through that?\"*\n\n**Tier 3 \u2014 Capability Descriptions (N rows)**\nThe behavioral scaffolding that informs Dimension scores. Managers may or may not formally score at this level \u2014 that is left to the manager/direct report pair. These rows exist to:\n- Help managers think through how to arrive at Dimension scores\n- Guide specific feedback conversations (*\"what's making me stand out in Communication?\"*)\n- Enable individual self-assessment\n- Support calibration challenges with concrete evidence\n\n---", "group": "How to Use It"}, {"number": "13", "title": "Calibration Philosophy", "content": "Calibration happens **per level** \u2014 the goal is consistent application of the rubric across individuals at the same level, not cross-level comparison.\n\nThe Dimension scores are the primary lever. Calibration participants should be prepared to:\n- Defend each Dimension score with specific behavioral examples\n- Respond to challenges from peers who have observed different behaviors\n- Explain how the overall rating follows from the Dimension scores\n\nForced distribution (bell-curving) is a policy decision made at the leadership level. The rubric is designed to be a clean, honest instrument. If there is a mismatch between what the rubric says and what a distribution policy requires, that tension is owned by leadership \u2014 not absorbed by managers through score inflation or deflation.\n\n---", "group": "How to Use It"}, {"number": "14", "title": "Self-Assessment", "content": "Individuals are encouraged \u2014 and should be given space \u2014 to self-assess against the rubric before formal review conversations. A strong self-assessment practice:\n- Surfaces work and impact that managers may have missed\n- Gives individuals a voice in their own evaluation\n- Creates a shared starting point for the review conversation\n- Builds psychological safety by making the conversation bidirectional\n\nSelf-assessments are most useful when grounded in **specific examples**. *\"I demonstrated X by doing Y in context Z\"* is far more valuable than a number alone.\n\nManagers may require or encourage self-ratings as a preparation step before review conversations. This is a healthy practice.\n\n---", "group": "How to Use It"}, {"number": "15", "title": "How Descriptions Signal Progression", "content": "Each description in this rubric is written using consistent **signal vocabulary** \u2014 words and phrases that carry meaning about frequency, agency, and scope. Reading descriptions vertically across levels, these signals make visible exactly what changes from one level to the next.\n\n| Signal | L1 | L2 | L3 | L4 | L5 | L6 |\n|---|---|---|---|---|---|---|\n| **Frequency** | *beginning to* | *regularly* | *consistently* | *proactively* | *systematically* | *defines the standard* |\n| **Agency** | *with guidance* | *with minimal guidance* | *independently* | *without prompting* | *without direction* | *sets the philosophy* |\n| **Scope** | task | own work | feature / project | team / cross-team | org-wide | company / industry |\n\nNot every capability uses all three signal types \u2014 some rely primarily on scope expansion, others on frequency, others on a shift in agency. But the vocabulary is consistent: \"proactively\" always describes L4 or above behavior; \"beginning to\" is always L1 or occasionally L2.\n\nThese signals serve two audiences. **Managers** calibrating ratings can quickly locate where an individual sits on each axis per capability. **Individuals** self-assessing can identify which signal dimension they've advanced in \u2014 and which they haven't yet.\n\n---", "group": "How to Use It"}, {"number": "16", "title": "The Rubric Is Not a Checklist", "content": "Perhaps most importantly: this rubric is a **growth tool and a conversation guide**, not a compliance checklist.\n\nNo individual will exhibit every behavior at every capability in a given review cycle. The rubric describes the shape of the archetype, not a set of boxes to check. Managers should use it to identify the most important development investments for each individual \u2014 not to score every row exhaustively.\n\nThe behaviors described are illustrative of a level, not exhaustive. A manager should be able to say *\"this person is a solid L3\"* and point to evidence in the rubric \u2014 not *\"this person checked all 33 capability rows at a 3 or above.\"*\n\n---", "group": "Gotchas & Caveats"}, {"number": "17", "title": "AI Tools and Emerging Technology", "content": "There is no dedicated dimension or capability for AI tool adoption. This is intentional.\n\nTechnology choices change rapidly. A rubric row that references specific tools becomes outdated; a rubric that references the *outcomes of effective tool use* remains durable.\n\nObservable improvements in output quality, delivery velocity, and solution quality \u2014 which should result from effective adoption of productivity tools including AI \u2014 are traceable through existing capabilities:\n- **Technical Competencies \u2192 Craft:** Evaluates quality and reliability of work product\n- **Impact & Scope \u2192 Delivery & Execution:** Evaluates velocity and reliability of delivery\n- **Reasoning & Framing \u2192 Solution Crafting:** Evaluates the quality of solutions generated\n- **Impact & Scope \u2192 Values \u2192 Growth Mindset:** Evaluates adaptability and proactive adoption of new approaches\n\nThis design ensures that tool adoption is rewarded through its observable outcomes \u2014 without creating a separate dimension that over-indexes on a specific technology moment.", "group": "Gotchas & Caveats"}], "examples": [{"id": "e83ec929-172c-429d-b777-f38a5c6a9f3a", "competency_id": "ownership-autonomy", "level": "L1", "track": null, "placeholder": false, "scenario": "{{name}} **with guidance**, took charge of documenting the API endpoints. {{they}} spent the day collecting input from team members to understand the required details. {{their}} notes were reviewed by a senior engineer before being finalized."}, {"id": "2f60b99b-5c67-4a20-a52a-a0df5b0c2b3b", "competency_id": "ownership-autonomy", "level": "L1", "track": null, "placeholder": false, "scenario": "During a sprint, {{name}} **with help from their manager**, tackled updating the error logging configuration. {{they}} asked clarifying questions to ensure {{they}} understood the logging framework accurately. This task subsequently improved the team's debugging speed."}, {"id": "3944de5b-259b-4711-99cc-629a61aafb43", "competency_id": "ownership-autonomy", "level": "L1", "track": null, "placeholder": false, "scenario": "When assigned a ticket to fix a UI bug, {{name}} **with guidance** from a mentor, explored the codebase to locate the error. {{they}} proposed an initial fix, which was iteratively refined after pairing sessions with another developer."}, {"id": "a273bd4e-3abc-4793-ac38-2d04634b92b8", "competency_id": "ownership-autonomy", "level": "L2", "track": null, "placeholder": false, "scenario": "During the quarterly sprint planning, {{name}} **regularly prepared concise status updates** for {{their}} features **with minimal guidance**. This enabled {{their}} manager to quickly assess project progress and allocate resources more effectively. By maintaining a clear overview of {{their}} own work, {{name}} ensured a smooth handoff between development stages."}, {"id": "f3051e8d-1c60-4143-a81b-d076ce8af954", "competency_id": "ownership-autonomy", "level": "L2", "track": null, "placeholder": false, "scenario": "When faced with a bottleneck in the data pipeline, **with minimal guidance**, {{name}} **regularly resolved** the issues affecting {{their}} tasks by collaborating with the database team. {{their}} proactive approach in addressing these problems kept the project on track and prevented further delays in the system's deployment."}, {"id": "8c5835c6-91b9-4c03-9edf-29397a5491d8", "competency_id": "ownership-autonomy", "level": "L2", "track": null, "placeholder": false, "scenario": "During an unexpected outage affecting a key module, **with minimal guidance**, {{name}} **regularly monitored** the problem within {{their}} scope and provided timely updates to the operations team. {{their}} ability to manage the situation helped minimize downtime and keep stakeholders informed until a complete resolution was achieved."}, {"id": "96ae6db8-2875-46fe-90ba-66018cdb34ec", "competency_id": "ownership-autonomy", "level": "L3", "track": null, "placeholder": false, "scenario": "{{name}} **consistently identified opportunities** to optimize the performance of the search feature by examining logs and user feedback. **Independently**, {{they}} proposed a solution and implemented the changes, which improved the response time noticeably. The refinement was thoroughly tested before it was **rolled out as part of the feature update**."}, {"id": "511a3aef-9fac-4d13-9bb0-8820d741372c", "competency_id": "ownership-autonomy", "level": "L3", "track": null, "placeholder": false, "scenario": "During a major project to revamp the notification system, {{name}} **consistently drove** the integration of a new API. **Independently managing the implementation**, {{they}} addressed potential risks identified during planning and ensured the feature was aligned with the project the organization."}, {"id": "678898a3-b583-4ed9-b790-b611d1af23f4", "competency_id": "ownership-autonomy", "level": "L6", "track": null, "placeholder": false, "scenario": "{{name}} **set the philosophy for company-wide incident management** by initiating a new framework that anticipates service disruptions and mitigates impact at scale. **Defining the standard**, {{they}} created guidelines that were adopted as best practices across multiple subsidiaries. The implementation not only improved response times but also set new benchmarks for resilience in the industry."}, {"id": "aa7e94fc-294e-4106-98a6-237ad715cdfd", "competency_id": "ownership-autonomy", "level": "L6", "track": null, "placeholder": false, "scenario": "During a pivotal board meeting, {{name}} **defined the standard for sustainable product design** that not only aligned with the company's values but also **influenced industry-wide practices**. By advocating for these principles, {{they}} drove a shift toward products that were both environmentally and economically viable, earning recognition and imitation from competitors."}, {"id": "20c94855-41d5-4393-8211-0031aaf864b3", "competency_id": "ownership-autonomy", "level": "L6", "track": null, "placeholder": false, "scenario": "Recognizing the need for innovation in security protocols, {{name}} **set the philosophy for privacy-first architecture** across the company, fundamentally changing how data protection is approached. {{they}} partnered with leading tech councils to **define the standard for the industry**, resulting in heightened privacy measures that are now referenced in global tech policy discussions."}, {"id": "9227430b-c72e-48bf-a91f-3ef5111d6844", "competency_id": "delivery-execution", "level": "L1", "track": null, "placeholder": false, "scenario": "{{name}} **with guidance from their manager**, tackled a bug fix task that involved updating the documentation. Although initially unsure where to find all the necessary details, {{they}} **followed the suggested steps** from the team lead to complete it successfully by the end of the day."}, {"id": "72255b6c-a9f9-431d-8885-6df5a9f9d239", "competency_id": "delivery-execution", "level": "L1", "track": null, "placeholder": false, "scenario": "During a sprint planning meeting, {{name}} **began to actively participate** by offering input on a specific feature task **with help from their more experienced teammates**. {{they}} noted down the team's prioritizations to ensure that {{their}} assigned task was aligned with the collective goals."}, {"id": "cd3f4c10-1795-4151-902a-76492fe454ed", "competency_id": "delivery-execution", "level": "L1", "track": null, "placeholder": false, "scenario": "When tasked with writing a small piece of code for a new module, {{name}} **worked closely with a senior developer** to understand the requirements thoroughly. **Following the mentor's directions**, {{they}} successfully completed the task within the expected timeframe."}, {"id": "30fc3f8e-5e2f-4bd0-a03e-88e60496188c", "competency_id": "delivery-execution", "level": "L2", "track": null, "placeholder": false, "scenario": "{{name}} **regularly took charge of organizing** {{their}} own tasks during sprint planning, ensuring that {{they}} allocated the appropriate amount of time for each feature based on past experiences. **With minimal guidance** from the product manager, {{they}} successfully balanced multiple priorities and delivered all assigned user stories on time."}, {"id": "c4aa9f1f-144e-40f4-895c-31e7ad0ee0d7", "competency_id": "delivery-execution", "level": "L2", "track": null, "placeholder": false, "scenario": "During a new feature rollout, {{name}} **encountered vague requirements** that could have delayed the release. Rather than waiting for the product team\u2019s clarification, {{name}} **regularly sought feedback** from stakeholders to refine the task details. **With minimal guidance**, {{they}} adjusted the implementation to align with the evolving needs, avoiding delays in delivery."}, {"id": "e6367252-fb0e-4e29-b75c-2b0c36ccd8f0", "competency_id": "delivery-execution", "level": "L2", "track": null, "placeholder": false, "scenario": "Facing an unexpected increase in server load, {{name}} **regularly monitored system performance metrics** and adjusted parameters within {{their}} existing scope of responsibility. **With minimal guidance**, {{they}} communicated these changes effectively to the operations team, ensuring system stability without requiring escalations."}, {"id": "77870116-d335-461e-8c25-d8ad4d008998", "competency_id": "delivery-execution", "level": "L3", "track": null, "placeholder": false, "scenario": "{{name}} **consistently delivered feature updates** by independently managing the timeline and closely coordinating with QA. Even when the requirements changed mid-cycle, {{they}} adapted {{their}} approach to ensure that the team stayed on schedule."}, {"id": "8b91f85c-4f92-4149-909d-3d6259957db5", "competency_id": "delivery-execution", "level": "L3", "track": null, "placeholder": false, "scenario": "Faced with ambiguous design specs, {{name}} **independently clarified requirements** by consulting with stakeholders before any code was written. **For the project**, {{they}} also set up regular check-ins to identify potential blockers early, ensuring smooth progression from development to launch."}, {"id": "182c2a79-f205-4fc4-83c5-da1b33b0aff6", "competency_id": "delivery-execution", "level": "L3", "track": null, "placeholder": false, "scenario": "During a critical sprint, {{name}} **consistently met delivery deadlines** by proactively identifying and mitigating risks **across the feature**. {{they}} independently juggled shifting priorities but maintained open communication channels with other team members to keep everyone aligned."}, {"id": "e5ba528d-0afb-46c0-bbf5-3435fb135b15", "competency_id": "delivery-execution", "level": "L4", "track": null, "placeholder": false, "scenario": "During a critical project delay, {{name}} **proactively led a cross-team analysis** to pinpoint bottlenecks and presented actionable solutions. **Without being asked**, {{they}} organized additional working sessions to keep all teams aligned and on track."}, {"id": "876fd14d-58dc-4c24-af3c-9d78eec21cf4", "competency_id": "delivery-execution", "level": "L4", "track": null, "placeholder": false, "scenario": "Realizing the onboarding process for new engineers was inconsistently effective, {{name}} **took it upon herself to coordinate a team-wide review** of existing materials. **Without prompting**, {{they}} collaborated with experienced team members to revamp the content, seamlessly integrating it into the current workflow."}, {"id": "483758d4-a2a7-4c5b-ab31-67d8364b4606", "competency_id": "delivery-execution", "level": "L4", "track": null, "placeholder": false, "scenario": "When a high-priority feature encountered unforeseen challenges, {{name}} **proactively organized meetings with key project stakeholders**, ensuring that potential risks were addressed **without being asked**. This initiative kept the feature's timeline intact while maintaining team morale."}, {"id": "da391ad1-bf9c-4da5-8da3-cc92155e2147", "competency_id": "delivery-execution", "level": "L5", "track": null, "placeholder": false, "scenario": "When the company needed a more effective release process, {{name}} **systematically redesigned it** by collaborating with engineering leads **across the org**. **Setting the standard for reliability**, {{they}} introduced new checkpoints and automated tests, significantly reducing QA bottlenecks."}, {"id": "d4817767-6c71-41b0-9ead-fae60cbbd923", "competency_id": "delivery-execution", "level": "L5", "track": null, "placeholder": false, "scenario": "During a period of rapid scaling, {{name}} **set the direction for the engineering organization** by implementing a new prioritization framework. **Without direction**, {{they}} ensured that the most impactful projects took precedence, aligning teams with company objectives and improving delivery timelines **org-wide**."}, {"id": "adb24429-9a42-448f-b258-988951eca511", "competency_id": "delivery-execution", "level": "L5", "track": null, "placeholder": false, "scenario": "{{name}} **systematically improved project estimation accuracy** by developing a comprehensive training program **that spanned the entire org**. **Setting the philosophy**, {{they}} incorporated lessons learned from previous releases, enabling teams to better manage time and resources and increasing delivery precision company-wide."}, {"id": "7225acbe-1208-41e0-a231-ad3e2840d97b", "competency_id": "delivery-execution", "level": "L6", "track": null, "placeholder": false, "scenario": "{{name}} **set the philosophy for delivery processes company-wide** by introducing a new framework that emphasized iterative development over monolithic releases. This approach not only increased the adaptability of the engineering teams but also created a more resilient project management culture across {{their}} products. The framework has since been adopted by several high-profile projects across the industry, illustrating its broad impact."}, {"id": "7f74e47e-8e68-4732-a45d-9649bc01f817", "competency_id": "delivery-execution", "level": "L6", "track": null, "placeholder": false, "scenario": "Faced with the challenge of variable project outputs, {{name}} **defined the standard for how the company manages ambiguities** in its release pipelines. {{they}} developed a dynamic prioritization model that integrates real-time metrics and stakeholder feedback, allowing teams to effectively pivot and focus their efforts where they would have the most impact. This model has become a cornerstone of the company's project management toolkit and has inspired analogous methods in industry-leading organizations."}, {"id": "afee5257-6d13-43f6-9db3-4c4d9fbefc93", "competency_id": "delivery-execution", "level": "L6", "track": null, "placeholder": false, "scenario": "{{name}} **pioneered a company-wide initiative to enhance engineering reliability** by launching a strategic program that shifted the focus from meeting arbitrary deadlines to delivering qualitative outcomes. This paradigm shift promoted a healthier work environment and significantly improved product quality. The program's success has been shared in engineering conferences, sparking discussions across the industry about redefining success metrics."}, {"id": "fee95bc0-242f-4058-b05c-be89c7e7f36b", "competency_id": "business-value-outcomes", "level": "L1", "track": null, "placeholder": false, "scenario": "During a feature planning meeting, {{name}} **asked questions** about the customer use cases the feature would address **with guidance from their manager**. {{they}} focused on understanding how the feature would fit into existing workflows."}, {"id": "f01cae4b-d39c-48ad-bc31-562558ff3525", "competency_id": "business-value-outcomes", "level": "L1", "track": null, "placeholder": false, "scenario": "{{name}} **worked closely with their mentor** to update a dashboard, ensuring that the metrics displayed were relevant to current business objectives. This task helped {{them}} grasp how data visualization contributes to business insights."}, {"id": "bd32669a-3880-4835-9755-d4239f39b587", "competency_id": "business-value-outcomes", "level": "L1", "track": null, "placeholder": false, "scenario": "While fixing a bug in the checkout process, {{name}} **checked in with their team lead** to better align the solution with user experience goals. This approach **led {{them}} to recognize** the importance of seamless transaction flows for customer satisfaction."}, {"id": "37dd8f4c-d050-4716-bffd-b3ed9b84ce7b", "competency_id": "business-value-outcomes", "level": "L2", "track": null, "placeholder": false, "scenario": "During a feature development session, {{name}} **regularly checked with product managers** to ensure {{their}} code aligned with customer expectations. **With minimal guidance**, {{they}} adjusted the UI to prioritize usability based on real user feedback from recent surveys."}, {"id": "19abe924-aabc-4bbd-a0d2-ee61ec7e2b5c", "competency_id": "business-value-outcomes", "level": "L2", "track": null, "placeholder": false, "scenario": "During a sprint planning meeting, {{name}} **regularly evaluated the economic impact** of the proposed features. **With minimal input**, {{they}} suggested prioritizing ones that aligned more closely with revenue goals, effectively enhancing the project\u2019s business value."}, {"id": "fdeabab6-0c1d-4909-84aa-2d0e06b4831d", "competency_id": "business-value-outcomes", "level": "L2", "track": null, "placeholder": false, "scenario": "When integrating a third-party API, {{name}} **regularly considered the cost-benefit balance** of different implementation options. **Starting with minimal input**, {{they}} chose a tier that offered essential functionality while staying within budget, amplifying the project's impact within {{their}} scope."}, {"id": "fdbe91a4-b2ed-42ff-bd3f-be9c30de9eb8", "competency_id": "business-value-outcomes", "level": "L3", "track": null, "placeholder": false, "scenario": "{{name}} **consistently ensures that their project** aligns with customer needs by gathering feedback through user interviews and incorporating this data into the design process. This approach has enhanced the user interface to better meet client expectations and **increased satisfaction across the feature**."}, {"id": "be8ca0c6-5d98-4020-832c-5aef26351b5f", "competency_id": "business-value-outcomes", "level": "L3", "track": null, "placeholder": false, "scenario": "During a planning meeting, {{name}} **independently evaluated the trade-offs** of implementing a new feature that required significant resources. By comparing potential market impact against development costs, {{they}} convinced the team to prioritize a solution that balanced user value and resource allocation **for the project**."}, {"id": "129dcbd6-7a5e-4c95-bae5-e597f2
