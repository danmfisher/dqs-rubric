Fosters a culture where both affirming and redirecting feedback are given consistently.", "L5": "Builds the organization's feedback culture by modeling high-quality feedback publicly, creating structures for feedback exchange, and developing the feedback skills of leaders across the org.", "L6": "Ensures the organization has the skills and systems to deliver meaningful feedback at scale. Defines what good feedback looks like for the organization."}, "intent": "How effectively you give feedback that is clear, specific, and useful to the recipient"}, {"id": "seeking-receiving-feedback", "name": "Seeking & Receiving Feedback", "descriptions": {"L1": "Relies on structured systems (performance reviews, 1:1s) to receive feedback. Receives it openly and acts on it.", "L2": "Regularly asks for feedback from peers and manager after deliverables or milestones.", "L3": "Proactively seeks ongoing feedback from peers, manager, and cross-functional partners. Does not wait for structured events. Treats feedback as a continuous input to growth.", "L4": "Models proactive feedback-seeking for the team. Fosters a culture where seeking feedback is normalized and valued.", "L5": "Works across the organization to build a culture of seeking feedback as a growth tool. Ensures feedback loops exist at every level.", "L6": "Defines the organizational philosophy for feedback as a growth mechanism. Ensures feedback is embedded in the organization's operating rhythm."}, "intent": "How actively you seek input on your own work and how openly you receive it"}, {"id": "iterating-based-on-feedback", "name": "Iterating Based on Feedback", "descriptions": {"L1": "Acts on feedback when given. Beginning to incorporate feedback into subsequent work.", "L2": "Consistently incorporates feedback into their work. Demonstrates changed behavior after receiving redirecting feedback.", "L3": "Uses feedback as a primary input to growth. Adapts their approach based on feedback from multiple sources. Revisits prior decisions when new evidence or perspective challenges them.", "L4": "Models adaptive behavior in response to feedback. Helps teammates build the capacity to incorporate feedback into their work and decision-making.", "L5": "Builds organizational systems that support continuous iteration based on feedback. Ensures teams have the psychological safety to change course when feedback warrants it.", "L6": "Defines the organizational standard for responsiveness to feedback at the strategy level."}, "intent": "How consistently you act on feedback to improve your work and approach"}], "intent": "How you give, seek, and act on feedback"}, {"id": "collaboration", "name": "Collaboration", "descriptions": {"L1": "Participates actively in team collaboration. Builds positive relationships with immediate teammates.", "L2": "Collaborates effectively within the team. Helps teammates overcome blockers and gives credit generously.", "L3": "Collaborates effectively within and across teams. Builds strong relationships with cross-functional partners. Navigates disagreement constructively.", "L4": "Drives effective collaboration across teams and functions. Builds the team's capacity for healthy disagreement and productive conflict. Known as a trusted partner across the organization.", "L5": "Shapes the collaboration culture across the engineering organization. Builds bridges across organizational boundaries.", "L6": "Defines the collaboration philosophy for the organization. Ensures the engineering organization is a trusted, effective partner across the company."}, "capabilities": [{"id": "teamwork", "name": "Teamwork", "descriptions": {"L1": "Participates actively in team work. Completes assigned work and asks for help when needed.", "L2": "Regularly helps teammates overcome obstacles and resolve blockers. Gives and shares credit where due.", "L3": "Consistently helps teammates overcome obstacles, resolve blockers, and complete work. Gives credit generously and creates space for others' contributions.", "L4": "Proactively partners with teammates within and across teams to remove obstacles before they become blockers. Creates team environments where everyone is set up to do their best work.", "L5": "Works across the organization to enable teams to support each other. Ensures credit is shared and given where due at the organizational level.", "L6": "Defines the teamwork norms and culture for the engineering organization. Sets the standard for how teams collaborate across the company."}, "intent": "How effectively you contribute to shared work and shared outcomes"}, {"id": "relationship-building", "name": "Relationship Building", "descriptions": {"L1": "Invests in relationships with their immediate teammates and manager. Shows up reliably and follows through on commitments to build trust.", "L2": "Actively cultivates relationships within their team. Begins to build working relationships with cross-functional partners encountered in day-to-day work.", "L3": "Builds strong relationships with teammates, manager, product manager, and design partners. Actively extends to adjacent team partners and cross-functional collaborators.", "L4": "Builds and maintains strong relationships with teammates, cross-functional partners, and relevant business stakeholders. Leverages relationships to better position team delivery and outcomes.", "L5": "Builds and maintains strong relationships across the organization and with senior stakeholders. Uses relationships to align the organization and position engineering as a strategic partner.", "L6": "Builds relationships at the highest organizational levels \u2014 board, investors, industry partners. Positions engineering as a company-level strategic asset."}, "intent": "How intentionally you build trust and working relationships across the organization"}, {"id": "handling-disagreement", "name": "Handling Disagreement", "descriptions": {"L1": "Participates in team discussions respectfully. Beginning to share their perspective in disagreements.", "L2": "Shares opinions in discussions respectfully. Open to other perspectives. Commits to decisions even when they disagree, maintaining alignment without full agreement.", "L3": "Approaches disagreement non-defensively and with curiosity. Uses contradictory opinions as a basis for constructive conversation. Commits fully to decisions once they are made, even without full alignment.", "L4": "Encourages teammates to disagree openly and productively. Surfaces the root concern behind surface-level disagreements. Models the behavior of committing to decisions after healthy debate.", "L5": "Fosters a culture across the organization where productive disagreement is normalized. Ensures disagreement leads to better decisions, not gridlock.", "L6": "Defines the organizational standard for healthy disagreement. Ensures the engineering organization can hold strong opinions and commit with discipline."}, "intent": "How constructively you navigate conflict and differences of opinion"}], "intent": "How you work with others toward shared goals"}, {"id": "driving-alignment", "name": "Driving Alignment", "descriptions": {"L1": "Understands team goals and how their work connects to them. Participates in alignment conversations.", "L2": "Understands team strategy and goals. Actively contributes to alignment within their team.", "L3": "Drives alignment within their team and with immediate cross-functional partners. Facilitates productive discussions and ensures outcomes connect to goals.", "L4": "Drives alignment across teams and functions. Facilitates high-stakes discussions effectively. Knows when to invest in building consensus vs. when to make a call and move forward.", "L5": "Drives alignment at the organizational level. Ensures the engineering organization is oriented toward shared goals across teams and functions.", "L6": "Aligns the engineering organization with company strategy. Ensures the highest-stakes decisions produce shared commitment, not just surface agreement."}, "capabilities": [{"id": "building-consensus", "name": "Building Consensus", "descriptions": {"L1": "Participates in team consensus-building conversations. Beginning to understand when alignment is needed before moving forward.", "L2": "Contributes to team alignment conversations. Understands when to seek consensus vs. when to escalate a decision.", "L3": "Drives consensus within their team and with immediate cross-functional partners. Critically: knows when investing in building consensus is worth the time \u2014 and when it is not. Makes judgment calls and moves forward when alignment would be overhead rather than value.", "L4": "Drives consensus across teams and organizational boundaries. Surfaces and resolves the root causes of misalignment. Navigates organizational politics productively. Distinguishes between decisions that require deep alignment and those that require a single clear owner.", "L5": "Drives consensus at the organizational level on the most complex, high-stakes decisions. Builds frameworks for when alignment is required vs. when a decision should be owned and executed.", "L6": "Drives alignment across the entire engineering organization and with company leadership. Defines the governance model for how the highest-stakes decisions get made and committed to."}, "intent": "How effectively you bring groups to a shared understanding and decision"}, {"id": "strategic-orientation", "name": "Strategic Orientation", "descriptions": {"L1": "Understands how their work connects to the team's goals. Asks questions to understand the 'why' behind their assignments and uses that context to make better decisions.", "L2": "Understands team strategy and principles. Oriented toward the team's shared goals in their day-to-day work.", "L3": "Ensures their work and their team's work are oriented toward organizational strategy. Actively participates in discussions about strategic implications of team decisions.", "L4": "Fosters strategic orientation on the team. Ensures the team continuously works toward shared goals and understands why that work is valuable to the business. Connects cross-team dependencies to organizational strategy.", "L5": "Fosters strategic orientation across the organization. Ensures the engineering organization understands and works toward the company's goals. Translates company strategy into engineering priorities.", "L6": "Defines the strategic orientation of the engineering organization. Ensures engineering strategy and company strategy are tightly coupled."}, "intent": "How well you connect day-to-day decisions and work to longer-term organizational strategy"}, {"id": "meeting-discussion-facilitation", "name": "Meeting & Discussion Facilitation", "descriptions": {"L1": "Participates constructively in team meetings and discussions.", "L2": "Contributes actively to team discussions. Beginning to facilitate small discussions or working sessions within their area of expertise.", "L3": "Facilitates discussions within their team effectively. Ensures outcomes connect to stated goals. Helps guide discussions to useful conclusions, managing time and energy appropriately.", "L4": "Facilitates within-team and cross-team discussions. Drives discussions toward decisions efficiently. Manages competing priorities and viewpoints effectively.", "L5": "Facilitates organization-wide discussions on complex, high-stakes topics. Builds the team's facilitation capability.", "L6": "Facilitates the organization's most consequential discussions. Defines the standard for how the engineering organization runs high-stakes decision forums."}, "intent": "How effectively you structure and guide group conversations to productive outcomes"}, {"id": "inclusive-discussion-practices", "name": "Inclusive Discussion Practices", "descriptions": {"L1": "Participates in discussions respectfully. Beginning to be aware of group dynamics.", "L2": "Creates space for others' contributions in discussions. Acknowledges and builds on teammates' ideas.", "L3": "Actively ensures all voices are heard in discussions they participate in or facilitate. Notices when quieter participants are being overlooked and creates openings for them. Ensures no one person dominates the conversation.", "L4": "Fosters inclusive discussion practices within and across their team. Actively calls out exclusionary dynamics and models better behavior. Ensures diverse perspectives are integrated into decisions.", "L5": "Builds inclusive discussion norms across the organization. Ensures the engineering organization makes decisions that reflect a diversity of perspectives.", "L6": "Defines the organizational standard for inclusive decision-making. Ensures the engineering organization's culture is one where every voice has a meaningful path to influence."}, "intent": "How actively you create conditions for all voices to contribute meaningfully"}], "intent": "How you build consensus and move groups toward decisions"}, {"id": "team-multiplier", "name": "Team Multiplier", "descriptions": {"L1": "Focuses primarily on their own growth and contribution. Beginning to share knowledge and support teammates.", "L2": "Actively helps teammates and shares knowledge. Starting to onboard new team members.", "L3": "Mentors junior teammates and acts as a go-to resource on their areas of expertise. Proactively invests in the growth of others.", "L4": "Elevates the entire team's performance. Acts as a force multiplier \u2014 their presence makes teammates measurably more effective. Develops senior individual contributors.", "L5": "Builds and elevates technical culture across multiple teams. Develops staff-level talent. Their investment in people and culture compounds across the organization.", "L6": "Sets the talent development philosophy for the engineering organization. Builds a pipeline of technical leaders. Acts as an industry thought leader."}, "capabilities": [{"id": "mentoring-coaching", "name": "Mentoring & Coaching", "descriptions": {"L1": "Receptive to mentorship and actively seeks it. Beginning to share knowledge informally with peers.", "L2": "Helps onboard new team members. Shares domain knowledge regularly. Beginning to provide informal mentorship to peers.", "L3": "Mentors junior teammates in an open, respectful, and empathetic manner. Seeks out mentoring opportunities proactively. Provides guidance that is developmental, not just instructional.", "L4": "Mentors senior engineers and provides coaching that accelerates career growth. Seeks out opportunities to create team redundancy and backfill ability. Invests in developing the next level of talent.", "L5": "Develops staff-level engineers. Provides coaching that shapes careers, not just skills. Builds mentoring as an organizational capability.", "L6": "Develops senior leaders and principal engineers at scale. Shapes the organization's talent development philosophy. Contributes to industry-level thinking on engineering career development through writing, speaking, or direct engagement with the broader community."}, "intent": "How effectively you grow the skills and capabilities of the individuals around you"}, {"id": "team-enablement", "name": "Team Enablement", "descriptions": {"L1": "Participates in team efforts and flags obstacles they encounter that may be blocking others.", "L2": "Helps teammates identify and overcome blockers. Takes on tasks that reduce friction for the team, even when outside their direct responsibilities.", "L3": "Consistently helps teammates unblock their work. Prioritizes work that enables the team to move faster. Looks for opportunities to remove friction and create leverage for others.", "L4": "Acts as a force multiplier across the team and beyond. Facilitates work across deliverables, balancing the needs of multiple efforts. Sets the example for how to design, document, and communicate solutions to maximize team leverage.", "L5": "Enables teams across the organization to support each other. Builds systems, processes, and culture that compound team effectiveness over time.", "L6": "Defines the organizational model for how teams enable each other. Ensures the engineering organization operates as a high-trust, high-leverage system."}, "intent": "How well you remove friction and create conditions for your team to do their best work"}], "intent": "How you grow the capability and effectiveness of those around you"}], "intent": "How you move information, decisions, and people."}, {"id": "technical-competencies", "name": "Technical Competencies", "descriptions": {"L1": "Applies course-level and early-career technical knowledge to less well-defined problems. Follows team best practices with guidance. Focused on learning the craft.", "L2": "Has solid foundational technical knowledge and self-directs their technical work. Writes production-ready code and follows best practices independently.", "L3": "Has strong technical expertise and owns quality, reliability, and technical standards within their domain. Designs systems that are maintainable, scalable, and reusable.", "L4": "Sets technical standards and owns technical excellence across the team. Designs systems of significant scale and complexity. Reduces complexity and drives down technical debt.", "L5": "Defines technical direction for an entire product area or platform. Recognized internal expert across multiple technical domains. Drives adoption of new technologies and resolves the most complex technical challenges.", "L6": "Shapes the multi-year technology strategy for the organization. Internationally recognized technical expertise. Creates new approaches and methodologies adopted across the industry."}, "competencies": [{"id": "craft", "name": "Craft", "descriptions": {"L1": "Writes code that, with help, can be modified to be production-ready. Follows team conventions and leaves appropriate documentation.", "L2": "Writes production-ready code independently. Accounts for edge cases and errors. Participates actively in code review.", "L3": "Consistently writes production-ready, well-tested, easily-understood code. Maintains a high bar for quality in their own work and in code reviews.", "L4": "Owns technical excellence within the team. Defines and enforces the team's quality bar. Designs work that is easy to maintain, test, and hand off.", "L5": "Sets the technical craft standard for the organization. Ensures the highest quality bar is maintained across teams.", "L6": "Defines the craft philosophy for the engineering organization. Shapes what technical excellence means at the company level."}, "capabilities": [{"id": "code-work-quality", "name": "Code / Work Quality", "descriptions": {"L1": "Writes code that reaches production-ready quality with review and guidance from senior teammates. Code is readable by others. Participates in PR reviews to build awareness of team style.", "L2": "Writes production-ready code that accounts for edge cases and errors. Easily understood by other developers. Reviews PRs on their team with a focus on function and style.", "L3": "Consistently writes production-ready, easily-testable, well-understood code. Accounts for edge cases comprehensively. Reviews PRs with a focus on function, style, quality, scalability, and maintainability.", "L4": "Produces production-ready code across the team that is a model for maintainability and design. Reviews PRs across the team with focus on scalability and long-term quality.", "L5": "Sets the standard for code quality across the organization. Reviews and approves architectural decisions. Produces code that serves as a reference standard for how things should be built.", "L6": "Defines the code quality philosophy for the organization. Shapes the standards and tooling that enforce quality at scale."}, "intent": "The correctness, clarity, and maintainability of what you build"}, {"id": "documentation", "name": "Documentation", "descriptions": {"L1": "Leaves appropriate comments and basic documentation on their work.", "L2": "Leaves appropriate comments and documentation. Abides by self-documenting code best practices.", "L3": "Writes clear, accurate documentation. Produces design docs, ADRs, and post-mortems that are useful to others. Connects technical documentation to product and user context.", "L4": "Sets the documentation standard for the team. Ensures the team's work is legible and maintainable by others. Drives a culture of documentation as a first-class artifact.", "L5": "Drives documentation standards across the organization. Ensures knowledge is captured in a way that scales beyond individuals.", "L6": "Defines the documentation philosophy for the organization. Ensures organizational knowledge is durable, accessible, and maintained."}, "intent": "How well you make your work understandable and usable by others"}, {"id": "technical-standards", "name": "Technical Standards", "descriptions": {"L1": "Follows team technical standards with guidance. Learns best practices by reading existing code and asking senior teammates.", "L2": "Follows team technical standards independently. Looks for opportunities to clean up legacy work as they encounter it.", "L3": "Follows and contributes to team technical standards. Identifies opportunities to update standards when they're outdated or missing.", "L4": "Defines and evolves technical standards for the team. Ensures standards are practical, enforced, and understood. Drives adoption of new standards across the team.", "L5": "Sets technical standards for the organization. Ensures standards evolve with technology and business needs. Drives org-wide adoption and compliance.", "L6": "Defines the technical standards philosophy for the organization. Sets the standard for how standards are created, maintained, and enforced at scale."}, "intent": "How consistently you apply and evolve the team's technical standards"}], "intent": "The quality and rigor of your technical work product"}, {"id": "shared-technical", "name": "Shared Technical", "descriptions": {"L1": "Applies course-level technical knowledge to engineering tasks. May require guidance in design and architecture discussions.", "L2": "Independently designs and implements components of a system. Participates in design discussions and contributes effectively.", "L3": "Designs complex systems considering scalability and performance. Leads system design discussions within the team. Owns components from design through production.", "L4": "Leads design of major components or entire systems. Consistently applies best practices and influences overall architecture. Mentors team members in system design.", "L5": "Plays a key role in shaping the overall system architecture. Leads cross-functional teams in designing and implementing complex systems. Champions technological advancement.", "L6": "Defines and drives the organization's technical architecture. Provides strategic direction for complex system design. Recognized as an industry thought leader in system design."}, "capabilities": [{"id": "system-design", "name": "System Design", "descriptions": {"L1": "Requires guidance in applying design principles to their work. Contributes to design discussions and proposes simple solutions with support from senior engineers.", "L2": "Participates in collaborative design discussions effectively. Capable of independently designing and implementing components of a system.", "L3": "Designs complex systems considering scalability and performance. Leads system design discussions and mentors junior team members. Designs simple, flexible, reusable components that are testable and not easily misused.", "L4": "Leads and owns the design of major components or entire systems. Consistently applies best practices and influences overall architecture. Decomposes complex problems into coherent system designs with well-designed boundaries.", "L5": "Shapes the overall system architecture. Leads cross-functional teams in designing complex systems. Innovates in system design approaches and advocates for technological advancement.", "L6": "Defines and drives the organization's overall technical architecture. Provides strategic direction for complex system design. Shapes the field's understanding of system design through external contributions \u2014 publications, open source, or standards work."}, "intent": "How effectively you design systems that are correct, scalable, and maintainable"}, {"id": "scalability-performance", "name": "Scalability & Performance", "descriptions": {"L1": "Implements working solutions with guidance. Develops awareness of where performance and efficiency considerations apply in their work.", "L2": "Writes code organized into reusable, well-named functions. Begins to identify and address inefficiencies. Creates reusable components within their workstream.", "L3": "Builds with maintenance, tech debt, and compute cost in mind. Considers computational complexity when deploying to production. Creates reusable components and contributes to team libraries.", "L4": "Designs with maintenance, tech debt, and compute in mind across the team's systems. Creates libraries useful for others. Looks for opportunities to remove duplicate and overlapping efforts.", "L5": "Designs scalable systems with product and process implications in mind. Sets the organization's standards for performance and scalability.", "L6": "Designs scalable systems with the entire company's needs in mind. Defines the architectural patterns that ensure the organization can scale its technology."}, "intent": "How well you reason about and design for the performance characteristics of systems"}, {"id": "integration-operations", "name": "Integration & Operations", "descriptions": {"L1": "Develops locally. Beginning to understand deployment processes.", "L2": "Can deploy code to production following established patterns. Understands basic staging and production practices.", "L3": "Deploys to production confidently using established patterns. Leverages and actively contributes to the existing ecosystem. Manages cross-team dependencies with appropriate documentation.", "L4": "Deep fluency with the production ecosystem. Manages cross-team dependencies with documentation and SLO/SLAs. Identifies and drives improvements to the ecosystem beyond the needs of their immediate work.", "L5": "Improves the ecosystem significantly as they work. Defines requirements for other technical teams who own adjacent capabilities. Sets integration standards across the organization.", "L6": "Defines the integration and operations philosophy for the organization. Makes buy vs. build decisions for foundational infrastructure and tooling."}, "intent": "How well you think about how systems fit into and operate within the broader environment"}], "intent": "Technical skills that apply broadly across engineering disciplines"}, {"id": "domain-specific", "name": "Domain-Specific", "descriptions": {"swe-ic": {"L1": "Developing foundational knowledge of the team's programming languages, frameworks, and development tools. Applies domain knowledge to well-scoped tasks under guidance.", "L2": "Solid working knowledge of the team's tech stack. Independently applies domain knowledge to moderately complex features and debugging scenarios. Developing fluency with domain tooling and practices.", "L3": "Deep expertise in the team's core domain. Recognized as a knowledgeable resource. Applies best-in-class practices and tools. Guides others in domain knowledge and methodology.", "L4": "Recognized domain expert on the team. Shapes technical standards in the domain. Evaluates and adopts new techniques and tooling. Teaches, mentors, and drives knowledge sharing.", "L5": "Recognized organizational domain expert. Drives adoption of best practices. Shapes the org's approach to tooling, methodology, and engineering quality in the domain.", "L6": "Defines the organization's domain strategy. Internationally recognized expert. Contributes to the industry's evolution of the domain through publications, open source, or standards bodies."}, "data-ml": {"L1": "Developing foundational knowledge of statistical methods, ML algorithms, and data tooling. Applies domain knowledge to well-scoped, pre-defined analysis tasks under close guidance.", "L2": "Solid working knowledge of core ML methods, standard algorithm libraries, and data pipelines. Independently applies domain knowledge to moderately complex modeling and analysis tasks.", "L3": "Deep expertise across ML algorithms, statistical modeling, and data architecture. Frames ambiguous business problems to match appropriate models. Owns quality and reliability of their team's data products and pipelines.", "L4": "Advanced domain knowledge across ML, statistics, and data systems. Leads technical excellence within the team, advocates for best-practice approaches, and drives data product quality across a significant product area.", "L5": "Subject matter expert with deep, opinionated mastery of algorithms, tooling, and data architecture. Shapes the team's technical direction; brings industry best practices into the organization and defines standards for how the team builds and operates.", "L6": "Recognized expert across all domain areas. Defines the organization's data and ML technical strategy, platform architecture, and methodology standards. Sets the bar for technical excellence org-wide."}}, "capabilities": [{"id": "track-sme", "name": "Subject Matter Expertise", "descriptions": {"L1": "Demonstrates foundational knowledge of the team's programming languages, core libraries, and system components. Applies this knowledge to well-scoped tasks under regular guidance.", "L2": "Solid working knowledge of the team's tech stack. Independently applies domain knowledge to moderately complex features and debugging scenarios without needing external reference.", "L3": "Deep expertise in the team's primary languages and systems. Serves as a go-to resource for technical questions within the team's domain by proactively sharing knowledge and guiding others.", "L4": "Domain expert on the team \u2014 teaches, mentors, and delegates based on deep domain knowledge. Holds a clear point of view on emerging techniques and shapes the team's technical choices.", "L5": "Organizational expert in the domain. Drives adoption of best practices across teams. Sought out by peers and leadership for high-stakes technical decisions.", "L6": "Operates at the frontier of the domain. Contributes to the field through publications, open source, or standards bodies. Shapes the organization's long-term technical strategy in the domain."}, "track_specific": true, "intent": "The depth of your subject matter expertise in your specific technical domain"}, {"id": "track-tooling", "name": "Domain Tooling & Platforms", "descriptions": {"L1": "Developing familiarity with the team's tools: IDEs, version control, CI/CD pipelines, and deployment systems. Can execute guided tasks using established tooling.", "L2": "Comfortable with the team's standard toolchain. Executes work on existing systems without significant guidance. Begins to identify tooling gaps and inefficiencies.", "L3": "Proficient with the team's full toolchain. Uses tooling to solve complex problems. Introduces teammates to better usage patterns. Evaluates and proposes tooling improvements.", "L4": "Deep fluency with domain tools. Contributes to toolchain selection and evolution. Champions best practices in tool usage. Reduces friction and unlocks team productivity through tooling choices.", "L5": "Defines tooling requirements and strategy for the organization. Drives adoption of tools that improve team velocity or quality across multiple teams.", "L6": "Shapes the organization's tooling philosophy. Drives industry-level thinking about tooling for the domain. Influences vendor roadmaps or builds widely adopted tooling."}, "track_specific": true, "intent": "Your command of the tools, platforms, and infrastructure specific to your domain"}, {"id": "track-methodology", "name": "Domain Methodology", "descriptions": {"L1": "Learning the team's development practices: branching strategies, code review norms, testing conventions, and deployment procedures. Follows established processes with guidance.", "L2": "Applies development methodologies to well-defined problems. Understands the team's engineering practices and why they exist. Participates constructively in code reviews and retrospectives.", "L3": "Applies agile, design, and engineering practices to complex, ambiguous problems. Proactively improves team processes. Can lead a sprint, own a planning cycle, or drive a post-mortem effectively.", "L4": "Defines and enforces methodology standards for the team. Drives process improvement initiatives. Coaches teammates on effective engineering practices and quality standards.", "L5": "Sets methodology standards for the organization. Drives adoption of engineering excellence practices at scale. Defines the organization's approach to delivery, quality, and engineering culture.", "L6": "Shapes the methodology philosophy for the engineering organization. Contributes to industry thinking on software engineering practices, DevOps, and delivery culture."}, "track_specific": true, "intent": "Your fluency with the methods, processes, and practices specific to your domain"}], "track_specific": true, "intent": "The specialized knowledge, tools, and methods of your particular track"}], "intent": "The craft and domain knowledge that underpin everything else."}]}, "data-ml": {"meta": {"version": "0.1", "status": "first-draft", "last_updated": "2026-04-07", "levels": ["L1", "L2", "L3", "L4", "L5", "L6"], "level_names": {"L1": "Associate Engineer", "L2": "Engineer", "L3": "Senior Engineer", "L4": "Staff Engineer", "L5": "Principal Engineer", "L6": "Distinguished Engineer"}, "notes": "This rubric is a representation of my mental model of what great engineering performance looks like across levels \u2014 not a formal HR policy, a complete picture of any individual, or a substitute for nuanced conversation. If you're using it for self-reflection or a discussion with your manager, treat it as a starting point rather than a verdict. It's a work in progress, as most worthwhile things are. If something doesn't ring true for your context, trust that instinct. Feedback is always welcome.", "default_track": "swe-ic", "tracks": [{"id": "swe-ic", "name": "Software Engineering (IC)", "available": true}, {"id": "em", "name": "Engineering Management", "available": false}, {"id": "data-ml", "name": "Data / ML / AI", "available": true}], "level_descriptions": {"L1": "Beginning to develop the habits and skills of the role. Executes well-scoped tasks with guidance, absorbing how the team works and building foundational technical and behavioral patterns.", "L2": "Regularly delivers on day-to-day work with minimal guidance. Growing in craft and depth; owns feature-level work but still benefits from direction on genuinely ambiguous or large-scope problems.", "L3": "Consistently delivers complex work end-to-end, independently. The go-to for their area. Shapes how the team works \u2014 not just what it ships \u2014 and actively invests in developing teammates.", "L4": "Proactively identifies and removes systemic blockers, often without being asked. Operates across teams, defines technical direction for their domain, and makes those around them measurably more effective.", "L5": "Systematically improves how engineering works at the org level \u2014 setting standards, driving cross-team alignment, and shaping culture without direction to do so.", "L6": "Defines the standard for technical leadership. Work sets the philosophy at the company level and shapes the discipline beyond the organization itself."}, "current_track": "data-ml"}, "dimensions": [{"id": "impact-scope", "name": "Impact & Scope", "descriptions": {"L1": "Delivers small, well-defined tasks reliably with guidance. Beginning to understand how their work connects to team goals. Demonstrates the organization's values through their conduct and approach to learning.", "L2": "Independently delivers features and improvements with moderate scope. Understands team priorities and how their work contributes to outcomes. Applies values consistently and proactively seeks growth.", "L3": "Owns and delivers complete features and medium-scale projects end-to-end. Makes meaningful contributions to team-level goals and business outcomes. Models values and brings a growth mindset to their work and team.", "L4": "Drives delivery of large, cross-team initiatives with significant organizational impact. Sets direction for their domain and contributes to strategic planning. Champions values and elevates the performance of those around them.", "L5": "Owns org-level programs and platforms. Defines technical direction for an entire product area. Shapes the organization's strategic roadmap and is a visible cultural force.", "L6": "Responsible for the engineering output of entire product lines or platforms. Drives company-level technology strategy. Defines organizational standards and is an industry-recognized leader."}, "competencies": [{"id": "ownership-autonomy", "name": "Ownership & Autonomy", "descriptions": {"L1": "Works on clearly scoped tasks within a day-to-day horizon, with regular guidance from senior team members.", "L2": "Independently manages their own workload within a 1\u20132 week horizon; escalates appropriately when scope or direction is unclear.", "L3": "Owns complete features and workstreams end-to-end over a monthly horizon with minimal direction.", "L4": "Drives delivery of large, cross-functional work over a quarterly horizon. Creates clarity for others and operates with high autonomy.", "L5": "Operates over a half-year horizon across organizational boundaries. Defines the context within which others self-direct.", "L6": "Sets direction over a multi-year horizon. Shapes the organizational operating model for ownership and accountability."}, "capabilities": [{"id": "scope-of-work", "name": "Scope of Work", "descriptions": {"L1": "Works on well-scoped tasks and small components defined by senior team members. Scope is limited to individual tasks.", "L2": "Independently owns small-to-medium features with clear requirements. Recognizes and flags scope creep before it impacts delivery.", "L3": "Owns and delivers complete features and medium-sized projects within their team's domain with minimal guidance.", "L4": "Drives delivery of large features and cross-team projects. Leads work that spans team boundaries and requires coordination across stakeholders.", "L5": "Leads complex, multi-team initiatives and platform-level work. Provides direction and technical input on all significant projects with organizational impact.", "L6": "Shapes and owns the technical scope of org-wide platforms, programs, and strategic initiatives. Defines what the organization builds at the highest level."}, "intent": "The size and boundary of what you're accountable for delivering"}, {"id": "time-horizon", "name": "Time Horizon", "descriptions": {"L1": "Works effectively within a day-to-day horizon. Needs guidance and regular check-ins to stay on track within the sprint.", "L2": "Self-directs within a 1\u20132 week horizon. Checks in with their manager when direction or clarity is needed beyond their current sprint tasks.", "L3": "Operates effectively over a monthly horizon. Owns their workstream end-to-end within a sprint cycle without needing intervention.", "L4": "Manages delivery and team commitments over a multi-month / quarterly horizon. Holds the team's direction without leadership intervention.", "L5": "Operates over a half-year horizon. Ensures teams are aligned and progressing without ongoing direction from leadership.", "L6": "Works at a multi-year horizon. Defines long-term direction and ensures the organization is continuously building toward it."}, "intent": "How far ahead you can operate effectively without direction"}, {"id": "self-direction", "name": "Self-Direction", "descriptions": {"L1": "Requires regular guidance to stay oriented. Asks for help appropriately and escalates blockers promptly.", "L2": "Works independently on well-defined work. Communicates blockers proactively and applies escalation criteria correctly. Begins to consult external resources \u2014 documentation, technical writing, peers outside the team \u2014 to fill gaps rather than waiting for direction.", "L3": "Self-directs on complex, ambiguous problems within their domain. Knows when to seek input versus when to decide and move forward. Actively draws on external sources \u2014 industry writing, open-source patterns, cross-company networks \u2014 to bring new approaches back to the team.", "L4": "Operates with high autonomy in areas of expertise. Pulls in the right people at the right time without prompting. Deliberately cultivates external networks and industry awareness; brings new thinking into the organization and challenges the team's assumptions with outside perspective.", "L5": "Operates independently across organizational boundaries. Navigates maximum ambiguity and creates clarity for others. Stays ahead of industry shifts by synthesizing external signals into organizational direction.", "L6": "Defines direction in the highest-ambiguity areas. Sets the context within which the rest of the organization self-directs. Shapes the industry's understanding of the problem space \u2014 not just following external discourse but contributing to it."}, "intent": "How independently you navigate ambiguity and chart your own path forward"}], "intent": "How much you own, and how independently you drive it"}, {"id": "delivery-execution", "name": "Delivery & Execution", "descriptions": {"L1": "Delivers assigned tasks reliably with guidance. Communicates blockers promptly and participates in team planning rituals.", "L2": "Consistently delivers on commitments. Breaks down work into manageable tasks and communicates progress proactively.", "L3": "Owns end-to-end delivery of features and projects. Anticipates and surfaces blockers before they require escalation. Manages dependencies effectively.", "L4": "Drives delivery across teams and quarters. Sets milestones, manages risk, and holds teams accountable. Applies economic thinking to prioritization decisions.", "L5": "Owns org-level delivery programs. Anticipates systemic risks and builds contingency plans. Aligns engineering, product, and business stakeholders.", "L6": "Responsible for the engineering delivery output of the organization. Drives delivery strategy and regularly influences company-level roadmap decisions."}, "capabilities": [{"id": "planning-prioritization", "name": "Planning & Prioritization", "descriptions": {"L1": "Relies on more senior team members to review and size their tasks. Executes on well-defined work with clear priorities.", "L2": "Sizes and prioritizes their own work effectively. Understands dependencies within their tasks and communicates them proactively.", "L3": "Breaks down features and projects into well-sized, sequenced tasks. Ensures work is appropriately prioritized in alignment with team goals.", "L4": "Owns planning for large cross-team deliverables. Ensures tasks are correctly sized and prioritized across the team. Actively manages dependencies across teams and escalates proactively.", "L5": "Reviews organization-wide work critically. Ensures efforts are appropriately sequenced and prioritized across teams. Surfaces cross-organizational planning risks early enough to enable mitigation rather than recovery.", "L6": "Defines organizational planning rhythms and standards. Ensures strategy and execution are tightly linked across the engineering organization."}, "intent": "The analytical work \u2014 how you break down, sequence, and estimate work before it starts"}, {"id": "reliability-accountability", "name": "Reliability & Accountability", "descriptions": {"L1": "Delivers on assigned work and communicates delays as soon as they become apparent. Beginning to develop a sense of what a realistic commitment looks like.", "L2": "Makes and keeps realistic commitments. Proactively communicates blockers and scope changes before they affect delivery. Demonstrates ownership of outcomes, not just task completion.", "L3": "Ensures their commitments are realistic and self-generated. Anticipates blockers and communicates them before they require escalation. Takes accountability for outcomes, not just outputs.", "L4": "Holds the team's commitments. Anticipates and communicates blockers across the team's projects. Ensures expectations are aligned across all stakeholders, including external partners.", "L5": "Manages organization-wide commitments and their progress. Ensures expectations across the organization and external stakeholders are clear and maintained.", "L6": "Sets the organizational standard for delivery accountability. Establishes practices that make reliability a cultural expectation, not an individual effort."}, "intent": "The relational work \u2014 how you stand behind commitments, communicate status, and own outcomes"}, {"id": "dealing-with-ambiguity", "name": "Dealing with Ambiguity", "descriptions": {"L1": "Handles task-level ambiguity with assistance from their manager. Defers decision-making when the full picture is unclear and surfaces blockers to their manager promptly.", "L2": "Handles project-level ambiguity with a clear sense of when to escalate vs. act. Beginning to make local decisions when the situation is sufficiently well-scoped to act.", "L3": "Handles ambiguity at the feature and project level independently. Makes responsible decisions without the full picture in lower-stakes situations. Knows when high-stakes ambiguity requires escalation.", "L4": "Handles risk, change, and uncertainty at the team and cross-team level. Makes sound decisions under ambiguity and helps the team do the same. Takes responsibility for addressing uncertainty that affects adjacent teams.", "L5": "Handles ambiguity at the program and organizational level. Decides and acts responsibly across the organization without the full picture. Builds practices that help others navigate uncertainty.", "L6": "Operates effectively in maximum organizational ambiguity. Defines the operating model for how the organization approaches and resolves uncertainty."}, "intent": "How you make progress and sound decisions when the picture is incomplete"}], "intent": "How reliably you turn plans into shipped outcomes"}, {"id": "business-value-outcomes", "name": "Business Value & Outcomes", "descriptions": {"L1": "Understands how their work connects to the team's goals. Focused on task-level delivery rather than broader business outcomes.", "L2": "Understands the business context of their work. Takes initiative to plan and prioritize toward higher-value outcomes.", "L3": "Connects their work to organizational goals and business strategy. Understands the customer and business value of what they're building. Participates in roadmap discussions.", "L4": "Drives work that delivers measurable business impact. Applies economic thinking to prioritization and solution design. Actively shapes team and cross-team roadmaps.", "L5": "Defines the technical roadmap for a product area in partnership with product leadership. Identifies strategic opportunities and connects technical investment to company-level outcomes.", "L6": "Shapes company-level strategy. Identifies opportunities that define the organization's long-term technology direction and business impact."}, "capabilities": [{"id": "business-strategic-awareness", "name": "Business & Strategic Awareness", "descriptions": {"L1": "Demonstrates a basic understanding of the team's domain and its impact. Understands the metrics and terminology relevant to their work.", "L2": "Has developed working fluency in the business context \u2014 terminology, key metrics, and relevant data. Knows who the subject matter experts are and consults them when needed.", "L3": "Has a thorough understanding of their team's domain and how it contributes to overall business strategy. Understands how the team's work connects to organizational priorities and the broader competitive landscape.", "L4": "Has a thorough understanding of their domain and adjacent teams' strategies. Connects their team's technical work to market trends and organizational priorities. Actively shapes their domain's technical direction through thought leadership: writing, presentations, and cross-team influence.", "L5": "Has a thorough understanding of the entire engineering organization's strategy and how it maps to overall business and market direction. Actively shapes the organization's technical direction through thought leadership: writing, presentations, and executive influence.", "L6": "Shapes the company's understanding of its technology landscape and competitive position. Drives thought leadership externally \u2014 published work, industry presence, and public discourse \u2014 that reflects on and elevates the organization."}, "intent": "How well you understand where the company is going and situate your work within that direction"}, {"id": "product-customer-orientation", "name": "Product & Customer Orientation", "descriptions": {"L1": "Understands the customer problem and use cases their work is solving. Focuses on building what's been defined rather than shaping what gets built.", "L2": "Understands the customer problem and the context behind product decisions. Participates in discovery or feedback sessions when given the opportunity. Begins to contribute to roadmap discussions.", "L3": "Understands the product area, how it fits into the business model, and makes improvement suggestions. Participates in roadmap feedback with product leads. Looks for opportunities to simplify product and technical design.", "L4": "Evaluates and contributes to new product features in collaboration with product leads. Regularly participates in team roadmap creation. Helps define and refine roadmaps based on technical strategy and constraints.", "L5": "Partners with product and business counterparts to define and evolve the roadmap. Actively seeks to create or redefine product direction based on technical insight and customer understanding.", "L6": "Drives the long-term product vision in partnership with executive leadership. Redefines what's possible for the organization's product through technology strategy."}, "intent": "How much you build with the end user's needs and experience in mind"}, {"id": "economic-thinking-impact", "name": "Economic Thinking & Impact", "descriptions": {"L1": "Aware that engineering decisions have costs and tradeoffs. Seeks guidance when evaluating the value of different approaches.", "L2": "Beginning to weigh cost and value when making technical decisions. Applies basic economic thinking to their own work with some help from more senior engineers.", "L3": "Weighs cost (time, complexity, third-party cost) and value (user benefit, business impact) when making decisions. Uses this thinking to make suggestions to teammates. Understands tradeoffs within their domain.", "L4": "Consistently applies economic thinking to team-level decisions. Understands and articulates the downstream impact of their team's work on adjacent teams and business outcomes. Actively builds a culture of economic thinking across the teams they work with.", "L5": "Uses economic thinking to make organization-wide prioritization decisions. Fosters a culture within the organization where people apply economic thinking to make timely decisions.", "L6": "Defines the economic framework within which the organization makes investment decisions. Connects engineering spend to business outcomes at the company level."}, "intent": "How well you reason about the cost and value tradeoffs of technical decisions"}], "intent": "How well your work connects to what the business actually needs"}, {"id": "values", "name": "Values", "descriptions": {"L1": "Learning what the organization's values mean in practice. Beginning to apply them to their own work.", "L2": "Consistently applies the organization's values to their own work. Demonstrates growth orientation and proactively seeks feedback.", "L3": "Consistently lives the organization's values and models them for others. Demonstrates a growth mindset in their approach to feedback, learning, and challenge.", "L4": "Models values and actively holds others accountable for upholding them. Coaches teammates on what applying values looks like in practice.", "L5": "Ensures organizational systems and practices are aligned with the organization's values. A visible cultural force across the engineering organization.", "L6": "Shapes the cultural and value framework for the entire organization. Embeds values into the organizational operating model."}, "capabilities": [{"id": "values-embodiment", "name": "Values Embodiment", "descriptions": {"L1": "Learning the meaning of the organization's values as they are applied to work. Beginning to demonstrate them in day-to-day interactions.", "L2": "Applies the organization's values to their own work with increasing regularity. Recognizes when situations call for values-guided judgment.", "L3": "Consistently applies all of the organization's values to their work. Demonstrates what living the values looks like for those around them.", "L4": "Models the values and actively recognizes and affirms teammates who uphold them \u2014 and holds them accountable when they don't. Coaches by example.", "L5": "Coaches others on values application and ensures the team is living them consistently. Calls out misalignment across teams when it arises.", "L6": "Ensures organizational systems, incentives, and practices are aligned with the organization's values. Defines what the values mean in the context of organizational decision-making."}, "intent": "How consistently you live the organization's values in your day-to-day work and decisions"}, {"id": "growth-mindset", "name": "Growth Mindset", "descriptions": {"L1": "Open to feedback and acts on it. Shows curiosity and a desire to learn. Treats mistakes as learning opportunities.", "L2": "Regularly seeks feedback from peers and manager. Applies feedback with a growth orientation. Explores new areas and techniques beyond their immediate work.", "L3": "Proactively seeks ongoing feedback and integrates it into their work. Shares learnings with teammates. Adapts their approach when evidence or feedback challenges their assumptions.", "L4": "Fosters a growth mindset on their team. Creates space for learning from failure. Challenges others to push their thinking. Models intellectual curiosity and openness to being wrong.", "L5": "Builds a culture of learning and continuous improvement across the organization. Ensures that systems exist for knowledge transfer, retrospection, and skill development.", "L6": "Defines the learning culture for the organization. Champions growth mindset as a foundational organizational value."}, "intent": "How actively you seek to learn, adapt, and improve \u2014 and enable others to do the same"}], "intent": "How you embody and model the organization's principles"}], "intent": "What you produce and how far it reaches."}, {"id": "reasoning-framing", "name": "Reasoning & Framing", "descriptions": {"L1": "Applies structured thinking to well-defined problems with guidance. Beginning to ask clarifying questions and identify root causes rather than accepting problems at face value.", "L2": "Independently structures and solves moderately complex problems. Generates solutions for defined problems and evaluates basic tradeoffs.", "L3": "Frames complex and ambiguous problems clearly before solutioning. Generates and evaluates multiple approaches. Defines success criteria upfront and monitors outcomes.", "L4": "Leads problem framing and solution design for large, cross-team challenges. Challenges the premise of problems presented and ensures the team is solving the right thing. Defines success at a product and organizational level.", "L5": "Frames the most complex, ambiguous organizational problems. Defines how the organization approaches problem-solving. Drives strategic reasoning across product, engineering, and business.", "L6": "Applies reasoning at the company strategy level. Frames the organization's most consequential decisions and ensures the right questions are being asked."}, "competencies": [{"id": "problem-structuring", "name": "Problem Structuring", "descriptions": {"L1": "Identifies and reports problems clearly. Beginning to look beyond surface symptoms with guidance.", "L2": "Structures problems within their scope independently. Identifies root causes for moderately complex issues.", "L3": "Consistently frames problems clearly before moving to solutions. Identifies root causes across system boundaries. Questions whether the stated problem is the right one to solve.", "L4": "Leads problem structuring for complex, cross-team challenges. Challenges problem framing presented by product and business partners. Ensures the team is solving the right problem at the right scope.", "L5": "Frames the most ambiguous organizational problems. Defines the framing process and standards for how the organization approaches complex problems.", "L6": "Applies problem structuring at the company strategy level. Ensures the organization is asking the right questions before committing to major investments."}, "capabilities": [{"id": "root-cause-analysis", "name": "Root Cause Analysis", "descriptions": {"L1": "Identifies surface-level symptoms of problems and reports them clearly. Beginning to look one level deeper with guidance from senior teammates.", "L2": "Independently identifies root causes for straightforward problems. Distinguishes between symptoms and underlying causes in their domain.", "L3": "Consistently identifies root causes for complex issues, including those that manifest in one system but originate in another. Challenges problem reports that are framed at the symptom level.", "L4": "Identifies systemic root causes across team and system boundaries. Applies root cause analysis to organizational and process problems, not just technical ones.", "L5": "Identifies root causes of organizational and strategic problems. Ensures the organization has the practices and skills to get to root cause consistently.", "L6": "Applies root cause thinking to the organization's most consequential challenges. Defines the standard for how the organization investigates and learns from failures."}, "intent": "How deeply you dig to find the real problem beneath the presenting symptoms"}, {"id": "scope-problem", "name": "Scope", "descriptions": {"L1": "Accepts problem scope as given. Beginning to ask clarifying questions about boundaries and expectations.", "L2": "Right-sizes their own work scope with some guidance. Recognizes when a problem is under- or over-scoped.", "L3": "Consistently right-sizes the scope of problems before solutioning. Challenges scope that is too broad or too narrow. Breaks large problems into appropriately scoped sub-problems.", "L4": "Scopes large cross-team problems effectively. Ensures the team isn't over-engineering or under-investing. Balances short-term delivery with long-term architectural coherence.", "L5": "Scopes organizational and strategic problems. Defines what's in and out of scope for major initiatives and ensures alignment across stakeholders.", "L6": "Sets scope at the company strategy level. Defines the boundaries of major technology investments and organizational initiatives."}, "intent": "How well you bound a problem to make it tractable \u2014 neither too narrow nor too broad"}, {"id": "constraints", "name": "Constraints", "descriptions": {"L1": "Aware of the basic constraints on their work (time, tech stack, team norms). Works within them with guidance.", "L2": "Works effectively within the constraints of their domain with minimal guidance. Communicates when constraints conflict with requirements.", "L3": "Identifies technical, resource, and organizational constraints proactively. Incorporates constraints into problem framing, not just solution design. Proposes constraint changes when they're limiting the right outcome.", "L4": "Maps constraints across teams and systems. Challenges constraints that are artificial or outdated. Creates space for the team to innovate within appropriate boundaries.", "L5": "Defines organizational constraints and the principles for when to work within vs. challenge them. Shapes the constraint landscape through platform and architecture decisions.", "L6": "Sets the strategic constraints within which the organization operates. Makes decisions about organizational boundaries, technology bets, and acceptable tradeoffs at the highest level."}, "intent": "How well you identify and reason about the constraints that shape the solution space"}], "intent": "How you frame and bound a problem before solving it"}, {"id": "solution-crafting", "name": "Solution Crafting", "descriptions": {"L1": "Implements solutions to well-defined problems. Beginning to consider alternatives when presented with options.", "L2": "Generates solutions independently for moderately complex problems. Considers basic tradeoffs and decompose work into steps.", "L3": "Generates multiple solution options before committing. Evaluates tradeoffs rigorously and communicates them clearly to stakeholders. Decomposes complex solutions into well-structured, sequenced steps.", "L4": "Designs solutions for complex cross-team problems. Drives tradeoff conversations at the team and organizational level. Solutions are flexible, maintainable, and easy to hand off.", "L5": "Defines the solution design process and standards for the organization. Recognizes good solutions to complex multi-system problems and clearly explains their merits to relevant stakeholders.", "L6": "Drives solution design at the organizational strategy level. Defines the architecture and technology patterns that the organization builds upon."}, "capabilities": [{"id": "solution-exploration", "name": "Solution Exploration", "descriptions": {"L1": "Implements the solution approach given to them. Beginning to propose alternative approaches when they see them.", "L2": "Generates one or two solution options for well-defined problems. Considers basic alternatives before committing to an approach.", "L3": "Consistently generates multiple solution options before committing. Explores the solution space deliberately, including unconventional approaches. Documents alternatives and the reasoning for choosing between them.", "L4": "Drives broad solution exploration for complex cross-team problems. Ensures the team doesn't converge prematurely. Brings diverse perspectives and prior art into solution design.", "L5": "Shapes how the organization approaches solution exploration. Ensures teams aren't defaulting to familiar approaches when better options exist. Champions architectural innovation.", "L6": "Defines the solution landscape for the organization's most strategic challenges. Drives exploration of new technology paradigms and their application to company problems."}, "intent": "How broadly you generate and consider options before committing to an approach"}, {"id": "tradeoff-analysis", "name": "Tradeoff Analysis", "descriptions": {"L1": "Aware that engineering decisions involve tradeoffs. Seeks guidance when evaluating options.", "L2": "Evaluates basic tradeoffs (time, complexity, risk) for decisions within their scope. Communicates tradeoffs to teammates and manager.", "L3": "Evaluates tradeoffs rigorously across multiple dimensions (cost, risk, scalability, maintainability, business impact). Communicates tradeoffs clearly to both technical and non-technical stakeholders.", "L4": "Leads tradeoff analysis for large cross-team decisions. Ensures the team considers second and third-order effects. Applies economic thinking to prioritize tradeoffs against business goals.", "L5": "Drives tradeoff analysis at the organizational level. Ensures the organization is making principled decisions at scale, with clear documentation of what was considered and why.", "L6": "Makes the organization's highest-stakes tradeoff decisions. Defines the principles and frameworks the organization uses to evaluate major technology and business tradeoffs."}, "intent": "How rigorously you evaluate the costs and benefits of competing options"}, {"id": "decomposition", "name": "Decomposition", "descriptions": {"L1": "Completes tasks as defined. Beginning to break their own work into smaller steps with guidance.", "L2": "Breaks their own work into well-sized steps appropriate for incremental delivery and effective peer review.", "L3": "Decomposes complex features and projects into clear, sequenced, appropriately-sized tasks. Ensures the decomposition enables incremental delivery and reduces risk.", "L4": "Decomposes large cross-team programs into workstreams and milestones. Ensures decomposition reflects dependencies accurately and enables parallel execution where possible.", "L5": "Decomposes organization-wide initiatives into coherent programs. Defines decomposition principles that teams use to plan and sequence their own work.", "L6": "Applies decomposition at the company strategy level. Structures major multi-year investments into legible phases with clear decision points."}, "intent": "How effectively you break complex solutions into manageable, sequenced pieces"}], "intent": "How you generate, evaluate, and choose among solutions"}, {"id": "realizing-success", "name": "Realizing Success", "descriptions": {"L1": "Understands what 'done' looks like for their tasks. Beginning to think about how to verify their work met the goal.", "L2": "Defines success criteria for their own work before starting. Validates their output against those criteria.", "L3": "Defines clear success criteria and measurable outcomes before solutioning. Makes sound decisions at the feature level. Monitors outcomes after delivery and iterates based on results.", "L4": "Defines success at the team and product level. Knows when to drive to a decision vs. when to build consensus. Tracks outcomes post-delivery and drives learning from them.", "L5": "Defines success at the organizational level. Ensures teams have meaningful metrics and are held accountable to outcomes, not just outputs. Builds a culture of outcome orientation.", "L6": "Defines what success looks like for the engineering organization at the company level. Ensures strategy and execution are connected to measurable business outcomes."}, "capabilities": [{"id": "defining-success-criteria", "name": "Defining Success Criteria", "descriptions": {"L1": "Understands what 'done' looks like for their assigned tasks. Checks their work against defined criteria before considering it complete.", "L2": "Defines success criteria for their own work before beginning. Validates output against those criteria and flags gaps.", "L3": "Defines measurable success criteria upfront for features and projects. Frames success in terms of user and business outcomes, not just technical completion. Ensures stakeholders are aligned on what success looks like before work begins.", "L4": "Defines success at the team and cross-team level. Frames success criteria in terms of business outcomes and measurable impact. Ensures success metrics are meaningful, not just trackable.", "L5": "Defines organizational success metrics. Ensures teams are measuring the right things and that metrics connect to business outcomes. Challenges vanity metrics.", "L6": "Defines what success means for the engineering organization at the company level. Sets the standard for how the organization measures and communicates the value of its work."}, "intent": "How clearly you articulate what 'done' and 'good' look like before work begins"}, {"id": "decision-making", "name": "Decision Making", "descriptions": {"L1": "Makes decisions about their own work with guidance. Escalates when decisions feel beyond their scope or authority.", "L2": "Makes objective, data-driven decisions within their scope. Challenges their own assumptions. Knows when to escalate vs. decide.", "L3": "Makes sound decisions with incomplete information during routine work. Holds themselves accountable for decisions and their outcomes. Distinguishes between decisions that need consensus and decisions that need a single owner who moves quickly.", "L4": "Takes ownership of decisions made within their team. Helps teammates make clear decisions aligned with organizational goals. Knows when building consensus is worth the time and when a judgment call and clear communication is the right move. Raises awareness of how bias impacts decisions.", "L5": "Takes ownership of decisions made in the engineering organization. Ensures decision-making accountability is practiced throughout. Defines the organizational framework for how decisions get made, documented, and revisited.", "L6": "Makes the organization's most consequential decisions. Defines the principles and governance for how the organization makes and owns major decisions."}, "intent": "How soundly you make choices \u2014 especially under uncertainty and incomplete information"}, {"id": "measuring-monitoring", "name": "Measuring & Monitoring", "descriptions": {"L1": "Validates that their work functions as expected. Participates in review and retrospective processes.", "L2": "Monitors their own deliverables post-launch. Identifies gaps between expected and actual outcomes and surfaces them.", "L3": "Defines monitoring and measurement approaches for their features at delivery time. Reviews post-launch outcomes and iterates based on results. Contributes to team knowledge bases based on what they learn.", "L4": "Defines team-level metrics and monitors them consistently. Tracks outcome metrics, not just output metrics. Leads retrospectives that produce meaningful changes in practice.", "L5": "Defines organization-wide success metrics and tracking practices. Ensures teams have the instrumentation and processes to learn from their work. Builds a culture of data-driven iteration.", "L6": "Defines the measurement and monitoring philosophy for the organization. Ensures engineering investments are connected to measurable business outcomes and that the organization learns systematically from what it builds."}, "intent": "How well you instrument your work to know whether it's actually succeeding"}], "intent": "How you define and measure whether you've actually succeeded"}], "intent": "How you think \u2014 structuring problems before you solve them."}, {"id": "communication-influence", "name": "Communication & Influence", "descriptions": {"L1": "Communicates clearly with their immediate team. Participates actively in team discussions. Receives feedback openly and acts on it.", "L2": "Communicates effectively across their team. Gives and receives feedback well. Builds positive working relationships within the team.", "L3": "Communicates complex technical ideas clearly to both engineers and non-engineers. Gives specific, behavioral feedback. Contributes to team alignment and helps develop junior teammates.", "L4": "Communicates and influences across teams. Drives alignment on cross-functional decisions. Recognized as a trusted partner. Elevates the communication and collaboration quality of those around them.", "L5": "Communicates and influences at the organizational level. Sets the tone for how the engineering organization communicates and builds alignment. Develops senior talent.", "L6": "Communicates the organization's technology vision internally and externally. Shapes the communication culture for the entire engineering organization. Builds and develops the next generation of technical leaders."}, "competencies": [{"id": "communication", "name": "Communication", "descriptions": {"L1": "Communicates clearly with their immediate team and manager. Actively listens and is developing the ability to tailor their message to their audience.", "L2": "Communicates effectively in written and verbal form with their direct team. Beginning to tailor messaging for different audiences.", "L3": "Communicates effectively, clearly, and concisely in both written and verbal form across technical and non-technical audiences. Actively listens and ensures they are understood.", "L4": "Communicates with clarity across teams and organizational levels. Fosters clear, audience-oriented communication within their team and cross-functional partners.", "L5": "Communicates effectively across the company. Fosters a culture of clear, concise, audience-oriented communication across the organization.", "L6": "Communicates the organization's technology vision to all levels internally and externally. Sets the communication standard for the engineering organization."}, "capabilities": [{"id": "written-communication", "name": "Written Communication", "descriptions": {"L1": "Writes clearly enough to keep teammates informed of progress and blockers. Updates work items consistently.", "L2": "Writes clearly for team-level audiences. Documents their work appropriately. Beginning to write for audiences outside their immediate team.", "L3": "Writes clearly and concisely for both technical and non-technical audiences. Produces well-structured design docs, post-mortems, and project updates. Connects documentation to stated goals.", "L4": "Writes for broad cross-functional audiences. Produces documentation that is clear, actionable, and durable. Sets the standard for written communication quality on their team.", "L5": "Produces written communication that shapes organizational direction. Writes clearly for executive and external audiences. Fosters a culture of strong written communication across the org.", "L6": "Writes at the company level \u2014 strategy documents, external publications, board-level communications. Defines the organization's external voice on technology."}, "intent": "How clearly and effectively you communicate in writing across formats and audiences"}, {"id": "verbal-communication", "name": "Verbal Communication", "descriptions": {"L1": "Participates actively in team discussions. Communicates blockers and progress in standups and 1:1s clearly.", "L2": "Communicates effectively in team discussions and cross-functional meetings. Beginning to present their work to audiences beyond their immediate team.", "L3": "Communicates technical and non-technical topics clearly in meetings, design reviews, and retrospectives. Actively listens and adjusts in real time. Presents work clearly to cross-functional partners.", "L4": "Communicates with authority across cross-functional meetings and leadership reviews. Facilitates productive discussions. Represents their team's work compellingly to senior stakeholders.", "L5": "Communicates at the organizational level. Presents strategy and technical direction clearly to executive leadership. Sets the standard for verbal communication in technical forums.", "L6": "Communicates the organization's technology vision at the highest levels \u2014 board, investors, industry conferences. Represents the company's engineering perspective externally."}, "intent": "How clearly and effectively you communicate in real-time conversations and presentations"}, {"id": "audience-awareness", "name": "Audience Awareness", "descriptions": {"L1": "Relies on guidance to tailor messages for specific audiences. Beginning to notice when their communication isn't landing and asks for help adjusting.", "L2": "Adjusts communication style based on audience when gaps are pointed out. Regularly recognizes when their message needs to be simplified or reframed for a non-technical stakeholder and makes the adjustment.", "L3": "Consistently adjusts communication style, level of detail, and framing based on audience. Translates between technical and business language fluently.", "L4": "Adapts communication fluidly for any audience. Coaches teammates on audience-oriented communication. Ensures their team's outputs are legible to cross-functional partners.", "L5": "Models audience awareness across the organization. Ensures the engineering organization communicates in ways that are accessible and impactful for all stakeholders.", "L6": "Defines how the engineering organization communicates with external stakeholders. Shapes the narrative around engineering's business impact at the company level."}, "intent": "How well you tailor your communication style and content to who you're talking to"}, {"id": "knowledge-sharing", "name": "Knowledge Sharing", "descriptions": {"L1": "Shares learnings at structured opportunities (standups, retros, reviews). Does not yet proactively seek out additional moments to share knowledge.", "L2": "Shares learnings at structured opportunities and begins to identify additional moments to share relevant knowledge with teammates.", "L3": "Proactively shares knowledge with teammates and contributes to team documentation. Looks for opportunities to share knowledge (design docs, engineering roundtables, etc.) and uses sound judgment about when to engage.", "L4": "Fosters a culture of documentation and knowledge sharing within their team and with stakeholders. Actively demonstrates these behaviors and encourages others to do the same.", "L5": "Fosters a culture of knowledge sharing across the organization. Supports junior team members in developing their own knowledge-sharing skills.", "L6": "Defines the knowledge management and sharing philosophy for the organization. Ensures organizational knowledge is captured, maintained, and accessible."}, "intent": "How actively you make your knowledge accessible and useful to others"}], "intent": "How clearly and effectively you convey information across audiences"}, {"id": "feedback", "name": "Feedback", "descriptions": {"L1": "Receives feedback openly and acts on it. Beginning to give basic feedback to peers.", "L2": "Gives and receives feedback well within their team. Proactively seeks feedback after deliverables.", "L3": "Gives specific, behavioral, and actionable feedback \u2014 both affirming and redirecting \u2014 to teammates and cross-functional partners. Proactively seeks ongoing feedback and incorporates it into their work.", "L4": "Fosters a culture of high-quality feedback within their team and adjacent teams. Models feedback behaviors and holds the team to a high standard.", "L5": "Builds a feedback culture across the organization. Ensures feedback is a growth tool, not a performance weapon.", "L6": "Defines the feedback philosophy for the organization. Ensures feedback systems are fair, consistent, and development-oriented at scale."}, "capabilities": [{"id": "delivering-feedback", "name": "Delivering Feedback", "descriptions": {"L1": "Delivers basic affirming feedback to teammates. Beginning to give redirecting feedback in structured settings (e.g., code review).", "L2": "Delivers affirming and redirecting feedback to teammates and manager in a kind, timely, and actionable manner.", "L3": "Delivers high-quality affirming and redirecting feedback to teammates, manager, and cross-functional partners. Feedback is specific, behavioral, and timely. References observable behaviors, not personal attributes.", "L4": "Delivers feedback across teams and levels. Coaches teammates on how to give better feedback. Fosters a culture where both affirming and redirecting feedback are given consistently.", "L5": "Builds the organization's feedback culture by modeling high-quality feedback publicly, creating structures for feedback exchange, and developing the feedback skills of leaders across the org.", "L6": "Ensures the organization has the skills and systems to deliver meaningful feedback at scale. Defines what good feedback looks like for the organization."}, "intent": "How effectively you give feedback that is clear, spe
