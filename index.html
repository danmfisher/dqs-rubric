cific, and useful to the recipient"}, {"id": "seeking-receiving-feedback", "name": "Seeking & Receiving Feedback", "descriptions": {"L1": "Relies on structured systems (performance reviews, 1:1s) to receive feedback. Receives it openly and acts on it.", "L2": "Regularly asks for feedback from peers and manager after deliverables or milestones.", "L3": "Proactively seeks ongoing feedback from peers, manager, and cross-functional partners. Does not wait for structured events. Treats feedback as a continuous input to growth.", "L4": "Models proactive feedback-seeking for the team. Fosters a culture where seeking feedback is normalized and valued.", "L5": "Works across the organization to build a culture of seeking feedback as a growth tool. Ensures feedback loops exist at every level.", "L6": "Defines the organizational philosophy for feedback as a growth mechanism. Ensures feedback is embedded in the organization's operating rhythm."}, "intent": "How actively you seek input on your own work and how openly you receive it"}, {"id": "iterating-based-on-feedback", "name": "Iterating Based on Feedback", "descriptions": {"L1": "Acts on feedback when given. Beginning to incorporate feedback into subsequent work.", "L2": "Consistently incorporates feedback into their work. Demonstrates changed behavior after receiving redirecting feedback.", "L3": "Uses feedback as a primary input to growth. Adapts their approach based on feedback from multiple sources. Revisits prior decisions when new evidence or perspective challenges them.", "L4": "Models adaptive behavior in response to feedback. Helps teammates build the capacity to incorporate feedback into their work and decision-making.", "L5": "Builds organizational systems that support continuous iteration based on feedback. Ensures teams have the psychological safety to change course when feedback warrants it.", "L6": "Defines the organizational standard for responsiveness to feedback at the strategy level."}, "intent": "How consistently you act on feedback to improve your work and approach"}], "intent": "How you give, seek, and act on feedback"}, {"id": "collaboration", "name": "Collaboration", "descriptions": {"L1": "Participates actively in team collaboration. Builds positive relationships with immediate teammates.", "L2": "Collaborates effectively within the team. Helps teammates overcome blockers and gives credit generously.", "L3": "Collaborates effectively within and across teams. Builds strong relationships with cross-functional partners. Navigates disagreement constructively.", "L4": "Drives effective collaboration across teams and functions. Builds the team's capacity for healthy disagreement and productive conflict. Known as a trusted partner across the organization.", "L5": "Shapes the collaboration culture across the engineering organization. Builds bridges across organizational boundaries.", "L6": "Defines the collaboration philosophy for the organization. Ensures the engineering organization is a trusted, effective partner across the company."}, "capabilities": [{"id": "teamwork", "name": "Teamwork", "descriptions": {"L1": "Participates actively in team work. Completes assigned work and asks for help when needed.", "L2": "Regularly helps teammates overcome obstacles and resolve blockers. Gives and shares credit where due.", "L3": "Consistently helps teammates overcome obstacles, resolve blockers, and complete work. Gives credit generously and creates space for others' contributions.", "L4": "Proactively partners with teammates within and across teams to remove obstacles before they become blockers. Creates team environments where everyone is set up to do their best work.", "L5": "Works across the organization to enable teams to support each other. Ensures credit is shared and given where due at the organizational level.", "L6": "Defines the teamwork norms and culture for the engineering organization. Sets the standard for how teams collaborate across the company."}, "intent": "How effectively you contribute to shared work and shared outcomes"}, {"id": "relationship-building", "name": "Relationship Building", "descriptions": {"L1": "Invests in relationships with their immediate teammates and manager. Shows up reliably and follows through on commitments to build trust.", "L2": "Actively cultivates relationships within their team. Begins to build working relationships with cross-functional partners encountered in day-to-day work.", "L3": "Builds strong relationships with teammates, manager, product manager, and design partners. Actively extends to adjacent team partners and cross-functional collaborators.", "L4": "Builds and maintains strong relationships with teammates, cross-functional partners, and relevant business stakeholders. Leverages relationships to better position team delivery and outcomes.", "L5": "Builds and maintains strong relationships across the organization and with senior stakeholders. Uses relationships to align the organization and position engineering as a strategic partner.", "L6": "Builds relationships at the highest organizational levels \u2014 board, investors, industry partners. Positions engineering as a company-level strategic asset."}, "intent": "How intentionally you build trust and working relationships across the organization"}, {"id": "handling-disagreement", "name": "Handling Disagreement", "descriptions": {"L1": "Participates in team discussions respectfully. Beginning to share their perspective in disagreements.", "L2": "Shares opinions in discussions respectfully. Open to other perspectives. Commits to decisions even when they disagree, maintaining alignment without full agreement.", "L3": "Approaches disagreement non-defensively and with curiosity. Uses contradictory opinions as a basis for constructive conversation. Commits fully to decisions once they are made, even without full alignment.", "L4": "Encourages teammates to disagree openly and productively. Surfaces the root concern behind surface-level disagreements. Models the behavior of committing to decisions after healthy debate.", "L5": "Fosters a culture across the organization where productive disagreement is normalized. Ensures disagreement leads to better decisions, not gridlock.", "L6": "Defines the organizational standard for healthy disagreement. Ensures the engineering organization can hold strong opinions and commit with discipline."}, "intent": "How constructively you navigate conflict and differences of opinion"}], "intent": "How you work with others toward shared goals"}, {"id": "driving-alignment", "name": "Driving Alignment", "descriptions": {"L1": "Understands team goals and how their work connects to them. Participates in alignment conversations.", "L2": "Understands team strategy and goals. Actively contributes to alignment within their team.", "L3": "Drives alignment within their team and with immediate cross-functional partners. Facilitates productive discussions and ensures outcomes connect to goals.", "L4": "Drives alignment across teams and functions. Facilitates high-stakes discussions effectively. Knows when to invest in building consensus vs. when to make a call and move forward.", "L5": "Drives alignment at the organizational level. Ensures the engineering organization is oriented toward shared goals across teams and functions.", "L6": "Aligns the engineering organization with company strategy. Ensures the highest-stakes decisions produce shared commitment, not just surface agreement."}, "capabilities": [{"id": "building-consensus", "name": "Building Consensus", "descriptions": {"L1": "Participates in team consensus-building conversations. Beginning to understand when alignment is needed before moving forward.", "L2": "Contributes to team alignment conversations. Understands when to seek consensus vs. when to escalate a decision.", "L3": "Drives consensus within their team and with immediate cross-functional partners. Critically: knows when investing in building consensus is worth the time \u2014 and when it is not. Makes judgment calls and moves forward when alignment would be overhead rather than value.", "L4": "Drives consensus across teams and organizational boundaries. Surfaces and resolves the root causes of misalignment. Navigates organizational politics productively. Distinguishes between decisions that require deep alignment and those that require a single clear owner.", "L5": "Drives consensus at the organizational level on the most complex, high-stakes decisions. Builds frameworks for when alignment is required vs. when a decision should be owned and executed.", "L6": "Drives alignment across the entire engineering organization and with company leadership. Defines the governance model for how the highest-stakes decisions get made and committed to."}, "intent": "How effectively you bring groups to a shared understanding and decision"}, {"id": "strategic-orientation", "name": "Strategic Orientation", "descriptions": {"L1": "Understands how their work connects to the team's goals. Asks questions to understand the 'why' behind their assignments and uses that context to make better decisions.", "L2": "Understands team strategy and principles. Oriented toward the team's shared goals in their day-to-day work.", "L3": "Ensures their work and their team's work are oriented toward organizational strategy. Actively participates in discussions about strategic implications of team decisions.", "L4": "Fosters strategic orientation on the team. Ensures the team continuously works toward shared goals and understands why that work is valuable to the business. Connects cross-team dependencies to organizational strategy.", "L5": "Fosters strategic orientation across the organization. Ensures the engineering organization understands and works toward the company's goals. Translates company strategy into engineering priorities.", "L6": "Defines the strategic orientation of the engineering organization. Ensures engineering strategy and company strategy are tightly coupled."}, "intent": "How well you connect day-to-day decisions and work to longer-term organizational strategy"}, {"id": "meeting-discussion-facilitation", "name": "Meeting & Discussion Facilitation", "descriptions": {"L1": "Participates constructively in team meetings and discussions.", "L2": "Contributes actively to team discussions. Beginning to facilitate small discussions or working sessions within their area of expertise.", "L3": "Facilitates discussions within their team effectively. Ensures outcomes connect to stated goals. Helps guide discussions to useful conclusions, managing time and energy appropriately.", "L4": "Facilitates within-team and cross-team discussions. Drives discussions toward decisions efficiently. Manages competing priorities and viewpoints effectively.", "L5": "Facilitates organization-wide discussions on complex, high-stakes topics. Builds the team's facilitation capability.", "L6": "Facilitates the organization's most consequential discussions. Defines the standard for how the engineering organization runs high-stakes decision forums."}, "intent": "How effectively you structure and guide group conversations to productive outcomes"}, {"id": "inclusive-discussion-practices", "name": "Inclusive Discussion Practices", "descriptions": {"L1": "Participates in discussions respectfully. Beginning to be aware of group dynamics.", "L2": "Creates space for others' contributions in discussions. Acknowledges and builds on teammates' ideas.", "L3": "Actively ensures all voices are heard in discussions they participate in or facilitate. Notices when quieter participants are being overlooked and creates openings for them. Ensures no one person dominates the conversation.", "L4": "Fosters inclusive discussion practices within and across their team. Actively calls out exclusionary dynamics and models better behavior. Ensures diverse perspectives are integrated into decisions.", "L5": "Builds inclusive discussion norms across the organization. Ensures the engineering organization makes decisions that reflect a diversity of perspectives.", "L6": "Defines the organizational standard for inclusive decision-making. Ensures the engineering organization's culture is one where every voice has a meaningful path to influence."}, "intent": "How actively you create conditions for all voices to contribute meaningfully"}], "intent": "How you build consensus and move groups toward decisions"}, {"id": "team-multiplier", "name": "Team Multiplier", "descriptions": {"L1": "Focuses primarily on their own growth and contribution. Beginning to share knowledge and support teammates.", "L2": "Actively helps teammates and shares knowledge. Starting to onboard new team members.", "L3": "Mentors junior teammates and acts as a go-to resource on their areas of expertise. Proactively invests in the growth of others.", "L4": "Elevates the entire team's performance. Acts as a force multiplier \u2014 their presence makes teammates measurably more effective. Develops senior individual contributors.", "L5": "Builds and elevates technical culture across multiple teams. Develops staff-level talent. Their investment in people and culture compounds across the organization.", "L6": "Sets the talent development philosophy for the engineering organization. Builds a pipeline of technical leaders. Acts as an industry thought leader."}, "capabilities": [{"id": "mentoring-coaching", "name": "Mentoring & Coaching", "descriptions": {"L1": "Receptive to mentorship and actively seeks it. Beginning to share knowledge informally with peers.", "L2": "Helps onboard new team members. Shares domain knowledge regularly. Beginning to provide informal mentorship to peers.", "L3": "Mentors junior teammates in an open, respectful, and empathetic manner. Seeks out mentoring opportunities proactively. Provides guidance that is developmental, not just instructional.", "L4": "Mentors senior engineers and provides coaching that accelerates career growth. Seeks out opportunities to create team redundancy and backfill ability. Invests in developing the next level of talent.", "L5": "Develops staff-level engineers. Provides coaching that shapes careers, not just skills. Builds mentoring as an organizational capability.", "L6": "Develops senior leaders and principal engineers at scale. Shapes the organization's talent development philosophy. Contributes to industry-level thinking on engineering career development through writing, speaking, or direct engagement with the broader community."}, "intent": "How effectively you grow the skills and capabilities of the individuals around you"}, {"id": "team-enablement", "name": "Team Enablement", "descriptions": {"L1": "Participates in team efforts and flags obstacles they encounter that may be blocking others.", "L2": "Helps teammates identify and overcome blockers. Takes on tasks that reduce friction for the team, even when outside their direct responsibilities.", "L3": "Consistently helps teammates unblock their work. Prioritizes work that enables the team to move faster. Looks for opportunities to remove friction and create leverage for others.", "L4": "Acts as a force multiplier across the team and beyond. Facilitates work across deliverables, balancing the needs of multiple efforts. Sets the example for how to design, document, and communicate solutions to maximize team leverage.", "L5": "Enables teams across the organization to support each other. Builds systems, processes, and culture that compound team effectiveness over time.", "L6": "Defines the organizational model for how teams enable each other. Ensures the engineering organization operates as a high-trust, high-leverage system."}, "intent": "How well you remove friction and create conditions for your team to do their best work"}], "intent": "How you grow the capability and effectiveness of those around you"}], "intent": "How you move information, decisions, and people."}, {"id": "technical-competencies", "name": "Technical Competencies", "descriptions": {"L1": "Applies course-level and early-career technical knowledge to less well-defined problems. Follows team best practices with guidance. Focused on learning the craft.", "L2": "Has solid foundational technical knowledge and self-directs their technical work. Writes production-ready code and follows best practices independently.", "L3": "Has strong technical expertise and owns quality, reliability, and technical standards within their domain. Designs systems that are maintainable, scalable, and reusable.", "L4": "Sets technical standards and owns technical excellence across the team. Designs systems of significant scale and complexity. Reduces complexity and drives down technical debt.", "L5": "Defines technical direction for an entire product area or platform. Recognized internal expert across multiple technical domains. Drives adoption of new technologies and resolves the most complex technical challenges.", "L6": "Shapes the multi-year technology strategy for the organization. Internationally recognized technical expertise. Creates new approaches and methodologies adopted across the industry."}, "competencies": [{"id": "craft", "name": "Craft", "descriptions": {"L1": "Writes code that, with help, can be modified to be production-ready. Follows team conventions and leaves appropriate documentation.", "L2": "Writes production-ready code independently. Accounts for edge cases and errors. Participates actively in code review.", "L3": "Consistently writes production-ready, well-tested, easily-understood code. Maintains a high bar for quality in their own work and in code reviews.", "L4": "Owns technical excellence within the team. Defines and enforces the team's quality bar. Designs work that is easy to maintain, test, and hand off.", "L5": "Sets the technical craft standard for the organization. Ensures the highest quality bar is maintained across teams.", "L6": "Defines the craft philosophy for the engineering organization. Shapes what technical excellence means at the company level."}, "capabilities": [{"id": "code-work-quality", "name": "Code / Work Quality", "descriptions": {"L1": "Writes code that reaches production-ready quality with review and guidance from senior teammates. Code is readable by others. Participates in PR reviews to build awareness of team style.", "L2": "Writes production-ready code that accounts for edge cases and errors. Easily understood by other developers. Reviews PRs on their team with a focus on function and style.", "L3": "Consistently writes production-ready, easily-testable, well-understood code. Accounts for edge cases comprehensively. Reviews PRs with a focus on function, style, quality, scalability, and maintainability.", "L4": "Produces production-ready code across the team that is a model for maintainability and design. Reviews PRs across the team with focus on scalability and long-term quality.", "L5": "Sets the standard for code quality across the organization. Reviews and approves architectural decisions. Produces code that serves as a reference standard for how things should be built.", "L6": "Defines the code quality philosophy for the organization. Shapes the standards and tooling that enforce quality at scale."}, "intent": "The correctness, clarity, and maintainability of what you build"}, {"id": "documentation", "name": "Documentation", "descriptions": {"L1": "Leaves appropriate comments and basic documentation on their work.", "L2": "Leaves appropriate comments and documentation. Abides by self-documenting code best practices.", "L3": "Writes clear, accurate documentation. Produces design docs, ADRs, and post-mortems that are useful to others. Connects technical documentation to product and user context.", "L4": "Sets the documentation standard for the team. Ensures the team's work is legible and maintainable by others. Drives a culture of documentation as a first-class artifact.", "L5": "Drives documentation standards across the organization. Ensures knowledge is captured in a way that scales beyond individuals.", "L6": "Defines the documentation philosophy for the organization. Ensures organizational knowledge is durable, accessible, and maintained."}, "intent": "How well you make your work understandable and usable by others"}, {"id": "technical-standards", "name": "Technical Standards", "descriptions": {"L1": "Follows team technical standards with guidance. Learns best practices by reading existing code and asking senior teammates.", "L2": "Follows team technical standards independently. Looks for opportunities to clean up legacy work as they encounter it.", "L3": "Follows and contributes to team technical standards. Identifies opportunities to update standards when they're outdated or missing.", "L4": "Defines and evolves technical standards for the team. Ensures standards are practical, enforced, and understood. Drives adoption of new standards across the team.", "L5": "Sets technical standards for the organization. Ensures standards evolve with technology and business needs. Drives org-wide adoption and compliance.", "L6": "Defines the technical standards philosophy for the organization. Sets the standard for how standards are created, maintained, and enforced at scale."}, "intent": "How consistently you apply and evolve the team's technical standards"}], "intent": "The quality and rigor of your technical work product"}, {"id": "shared-technical", "name": "Shared Technical", "descriptions": {"L1": "Applies course-level technical knowledge to engineering tasks. May require guidance in design and architecture discussions.", "L2": "Independently designs and implements components of a system. Participates in design discussions and contributes effectively.", "L3": "Designs complex systems considering scalability and performance. Leads system design discussions within the team. Owns components from design through production.", "L4": "Leads design of major components or entire systems. Consistently applies best practices and influences overall architecture. Mentors team members in system design.", "L5": "Plays a key role in shaping the overall system architecture. Leads cross-functional teams in designing and implementing complex systems. Champions technological advancement.", "L6": "Defines and drives the organization's technical architecture. Provides strategic direction for complex system design. Recognized as an industry thought leader in system design."}, "capabilities": [{"id": "system-design", "name": "System Design", "descriptions": {"L1": "Requires guidance in applying design principles to their work. Contributes to design discussions and proposes simple solutions with support from senior engineers.", "L2": "Participates in collaborative design discussions effectively. Capable of independently designing and implementing components of a system.", "L3": "Designs complex systems considering scalability and performance. Leads system design discussions and mentors junior team members. Designs simple, flexible, reusable components that are testable and not easily misused.", "L4": "Leads and owns the design of major components or entire systems. Consistently applies best practices and influences overall architecture. Decomposes complex problems into coherent system designs with well-designed boundaries.", "L5": "Shapes the overall system architecture. Leads cross-functional teams in designing complex systems. Innovates in system design approaches and advocates for technological advancement.", "L6": "Defines and drives the organization's overall technical architecture. Provides strategic direction for complex system design. Shapes the field's understanding of system design through external contributions \u2014 publications, open source, or standards work."}, "intent": "How effectively you design systems that are correct, scalable, and maintainable"}, {"id": "scalability-performance", "name": "Scalability & Performance", "descriptions": {"L1": "Implements working solutions with guidance. Develops awareness of where performance and efficiency considerations apply in their work.", "L2": "Writes code organized into reusable, well-named functions. Begins to identify and address inefficiencies. Creates reusable components within their workstream.", "L3": "Builds with maintenance, tech debt, and compute cost in mind. Considers computational complexity when deploying to production. Creates reusable components and contributes to team libraries.", "L4": "Designs with maintenance, tech debt, and compute in mind across the team's systems. Creates libraries useful for others. Looks for opportunities to remove duplicate and overlapping efforts.", "L5": "Designs scalable systems with product and process implications in mind. Sets the organization's standards for performance and scalability.", "L6": "Designs scalable systems with the entire company's needs in mind. Defines the architectural patterns that ensure the organization can scale its technology."}, "intent": "How well you reason about and design for the performance characteristics of systems"}, {"id": "integration-operations", "name": "Integration & Operations", "descriptions": {"L1": "Develops locally. Beginning to understand deployment processes.", "L2": "Can deploy code to production following established patterns. Understands basic staging and production practices.", "L3": "Deploys to production confidently using established patterns. Leverages and actively contributes to the existing ecosystem. Manages cross-team dependencies with appropriate documentation.", "L4": "Deep fluency with the production ecosystem. Manages cross-team dependencies with documentation and SLO/SLAs. Identifies and drives improvements to the ecosystem beyond the needs of their immediate work.", "L5": "Improves the ecosystem significantly as they work. Defines requirements for other technical teams who own adjacent capabilities. Sets integration standards across the organization.", "L6": "Defines the integration and operations philosophy for the organization. Makes buy vs. build decisions for foundational infrastructure and tooling."}, "intent": "How well you think about how systems fit into and operate within the broader environment"}], "intent": "Technical skills that apply broadly across engineering disciplines"}, {"id": "domain-specific", "name": "Domain-Specific", "descriptions": {"swe-ic": {"L1": "Developing foundational knowledge of the team's programming languages, frameworks, and development tools. Applies domain knowledge to well-scoped tasks under guidance.", "L2": "Solid working knowledge of the team's tech stack. Independently applies domain knowledge to moderately complex features and debugging scenarios. Developing fluency with domain tooling and practices.", "L3": "Deep expertise in the team's core domain. Recognized as a knowledgeable resource. Applies best-in-class practices and tools. Guides others in domain knowledge and methodology.", "L4": "Recognized domain expert on the team. Shapes technical standards in the domain. Evaluates and adopts new techniques and tooling. Teaches, mentors, and drives knowledge sharing.", "L5": "Recognized organizational domain expert. Drives adoption of best practices. Shapes the org's approach to tooling, methodology, and engineering quality in the domain.", "L6": "Defines the organization's domain strategy. Internationally recognized expert. Contributes to the industry's evolution of the domain through publications, open source, or standards bodies."}, "data-ml": {"L1": "Developing foundational knowledge of statistical methods, ML algorithms, and data tooling. Applies domain knowledge to well-scoped, pre-defined analysis tasks under close guidance.", "L2": "Solid working knowledge of core ML methods, standard algorithm libraries, and data pipelines. Independently applies domain knowledge to moderately complex modeling and analysis tasks.", "L3": "Deep expertise across ML algorithms, statistical modeling, and data architecture. Frames ambiguous business problems to match appropriate models. Owns quality and reliability of their team's data products and pipelines.", "L4": "Advanced domain knowledge across ML, statistics, and data systems. Leads technical excellence within the team, advocates for best-practice approaches, and drives data product quality across a significant product area.", "L5": "Subject matter expert with deep, opinionated mastery of algorithms, tooling, and data architecture. Shapes the team's technical direction; brings industry best practices into the organization and defines standards for how the team builds and operates.", "L6": "Recognized expert across all domain areas. Defines the organization's data and ML technical strategy, platform architecture, and methodology standards. Sets the bar for technical excellence org-wide."}}, "capabilities": [{"id": "track-sme", "name": "Subject Matter Expertise", "descriptions": {"L1": "Can apply a handful of standard algorithms and model libraries to already-framed business problems. Has basic familiarity with descriptive statistics and time series analysis; uses them with guidance.", "L2": "Applies standard ML algorithms and libraries appropriately to simple, well-defined business problems. Understands and utilizes basic statistical modeling; beginning to balance computational complexity against accuracy and business value.", "L3": "Can frame business problems to align with appropriate models and algorithms. Has an applied understanding of algorithmic tradeoffs and model selection. Implements statistical modeling, forecasting, and feature engineering independently; comfortable researching and applying new algorithms from standard libraries.", "L4": "Deep appreciation for model and algorithm nuance, including tradeoffs between different implementations. Seeks out industry best practices and advocates for new approaches where relevant. Balances optimization, compute cost, and business impact. Implements hierarchical models and advanced forecasting pipelines.", "L5": "Opinionated, deep mastery of model and algorithm nuance \u2014 including preferring specific library implementations. Brings new industry best practices to the team and drives adoption. Champions parsimony and simplification in model design. Applies advanced statistical methods to large-scale systems.", "L6": "Operates at the frontier of data and ML. Defines org-wide expectations for ML methodology, model quality, and statistical rigor. Contributes to the field through external publications, conference presentations, or open-source work."}, "track_specific": true, "intent": "The depth of your subject matter expertise in your specific technical domain"}, {"id": "track-tooling", "name": "Domain Tooling & Platforms", "descriptions": {"L1": "Aware of the team's platform tooling. Development is primarily local; beginning to understand staging and production environments and when to use each.", "L2": "Developing comfort with platform tooling; can execute existing code on established platforms by following examples. Understands basic staging and production practices.", "L3": "Comfortable with platform tooling. Deploys new code to production using established templates and defined patterns. Leverages the existing ecosystem of capabilities and tools confidently.", "L4": "Proficient with platform tooling; leverages it to solve new, unscoped use cases. Manages cross-team tooling dependencies with appropriate documentation and SLO/SLAs. Contributes concrete requirements for platform improvements.", "L5": "Native-level mastery of the team's platform tooling. Contributes to platform tools and defines requirements for new capabilities. Opinionated in buy-vs-build decisions. Improves the ecosystem as they work; partners with platform owners to raise the bar.", "L6": "Defines requirements for and designs platform tools. Makes organizational buy-vs-build decisions for data and ML tooling. Sets the standard for how the org evaluates and evolves its data and ML platform ecosystem."}, "track_specific": true, "intent": "Your command of the tools, platforms, and infrastructure specific to your domain"}, {"id": "track-methodology", "name": "Domain Methodology", "descriptions": {"L1": "Basic understanding of dimensional data modeling and how it enables analytics queries. Can design a simple data model based on well-defined requirements with guidance from a manager or peer.", "L2": "Designs and implements basic dimensional data models from well-defined requirements. Understands schema design for query performance in BI tools; can make and implement recommendations for structural improvement.", "L3": "Designs complex dimensional data models from ambiguous requirements with minimal guidance. Builds data solutions with maintenance and technical debt in mind. Proactively identifies opportunities for self-service functionality and automation in recurring data processing patterns.", "L4": "Orchestrates and implements data curation processes across an entire business domain. Designs real-time data processing pipelines supporting live analytics and ML models. Has a strong eye for architectural enhancements that enable self-service and automation at scale.", "L5": "Makes informed, opinionated decisions on system-wide orchestration, data architecture, storage solutions, ingestion mechanisms, and data mapping strategies. Partners with platform and engineering teams to manage cross-cutting dependencies and improve the shared data ecosystem.", "L6": "Strategically evaluates and implements patterns to optimize data management across the organization. Defines org-wide data modeling standards and architecture principles. Leads the organization's data and ML engineering strategy."}, "track_specific": true, "intent": "Your fluency with the methods, processes, and practices specific to your domain"}], "track_specific": true, "intent": "The specialized knowledge, tools, and methods of your particular track"}], "intent": "The craft and domain knowledge that underpin everything else."}]}}, "philosophy": [{"number": "1", "title": "Purpose", "content": "This rubric serves two complementary purposes that are often treated as separate \u2014 but are designed here to be two uses of the same instrument:\n\n**Developmental:** A shared language for ongoing career growth conversations between managers and their direct reports. It helps individuals understand where they are, where the archetype for their level sits, and what a path toward the next level looks like.\n\n**Evaluative:** A structured framework for producing fair, defensible performance ratings that can be used in calibration, compensation decisions, and formal reviews.\n\nThese two purposes are not in conflict. Think of the rubric as a map. The developmental conversation asks *\"where are you on this map, and where do you want to go?\"* The evaluative conversation asks *\"where are you on this map right now?\"* Same map. Different question.\n\n---", "group": "The Abstract Concept"}, {"number": "2", "title": "The Rubric as a Frame of Reference", "content": "The rubric defines an **N-dimensional space** \u2014 where each Capability is an axis. Every job level has an **Archetype Location** in this space: a description of what a well-rounded, solid performer at that level looks like across all dimensions.\n\nWhen a manager evaluates an individual, they are **triangulating that person's Evaluated Location** in the same space. The result is a picture of how the individual's current performance relates to the archetype for their level \u2014 and to the archetype for the next level above.\n\n**Development conversations** use the distance between the Evaluated Location and the next Archetype Location to identify specific, actionable investment areas.\n\n**Evaluation conversations** use the Evaluated Location relative to the current Archetype Location to produce a fair and evidence-based rating.\n\nThis framing has an important implication: the rubric is not a checklist of requirements. It is a set of axes for a shared conversation. Nobody sits perfectly at an archetype \u2014 and that's expected.\n\n---", "group": "The Abstract Concept"}, {"number": "3", "title": "The Range", "content": "Positions in this space are expressed on a **1\u20135 scale** \u2014 the unit of measure for every axis. Ratings are **relative to job level**: a 4 at L2 and a 4 at L5 describe the same relationship to the archetype for their respective levels, not the same absolute performance. Cross-level comparisons are rarely meaningful; calibration happens per level.\n\n| Rating | Meaning |\n|---|---|\n| **1** | Signals need for formal action. A 1 anywhere is disqualifying for an overall \"meets\" rating. |\n| **2** | A normal development area. Common on healthy, high-performing teams. Shows up in growth conversations. |\n| **3** | The archetype. Performing at the expected level for this role. A 3 is a strong, stable position \u2014 not a warning. |\n| **4** | Above the archetype. Consistently strong performance at this level. |\n| **5** | Demonstrating behaviors above the ceiling of this level. Approximately a 2 at the next level up. |\n\nA useful gut-check for overall calibration: *\"If this person were a candidate for this role, would I say 'I'd love to have them' (exceeds), 'they'd be a great fit' (meets), or 'I'd think twice' (below)?\"*\n\n---", "group": "The Abstract Concept"}, {"number": "4", "title": "The \"Center of Mass\" Principle", "content": "Performance profiles are rarely uniform. Someone may be a strong 4 on Technical Competencies and a 2 on Communication & Influence. The overall rating reflects the **center of mass** of the profile \u2014 not a strict average.\n\nGuidelines:\n- A person can receive an overall \"meets\" (3) rating while having a 2 in one Dimension, provided they have offsetting 4s or 5s elsewhere.\n- **No 1s anywhere** in a profile that receives an overall \"meets\" rating. A 1 in any Dimension signals that a formal conversation needs to happen, and it supersedes the center of mass.\n- The overall rating must be **explainable by the Dimension scores**. A manager who gives a 4 overall but has 2s and 3s at the Dimension level owes an explanation.\n\n---", "group": "The Abstract Concept"}, {"number": "5", "title": "The Hierarchy", "content": "The rubric is organized into four levels of detail, designed to be navigable at whatever depth is appropriate for the conversation at hand:\n\n| Level | Name | Purpose |\n|---|---|---|\n| 1 | **Dimension** | Top-level area of performance (4 total) |\n| 2 | **Competency** | Grouping of related behaviors within a Dimension |\n| 3 | **Capability** | Specific, observable behavioral area |\n| 4 | **Description** | Behavioral description at a given job level |\n\nEvery node in the hierarchy \u2014 at every intersection of Dimension, Competency, or Capability \u2014 has a **synthesized description for each job level**. These descriptions are human-authored summaries, not auto-generated rollups. The leaf-level (Capability) descriptions are the atomic source of truth; the summaries above them synthesize those descriptions into a navigable overview.\n\nThe four top-level Dimensions are:\n\n| Dimension | What it covers |\n|---|---|\n| **Impact & Scope** | Ownership, delivery, business value, and organizational values |\n| **Reasoning & Framing** | Problem structuring, solution crafting, and defining success |\n| **Communication & Influence** | Communication, feedback, collaboration, alignment, and team multiplication |\n| **Technical Competencies** | Craft, shared technical skills, and domain-specific expertise |\n\n---", "group": "Design Constraints & Requirements"}, {"number": "6", "title": "Promotion vs. Rating", "content": "These are **separate conversations** and must stay that way.\n\n**Rating** is a backward-looking assessment: how has this person performed at their current level over the review period?\n\n**Promotion** requires two conditions that are independent:\n1. **Rubric Readiness:** The individual is demonstrating sustained 4s and 5s at their current level \u2014 beginning to show behaviors above the ceiling. A 5 at level N approximates a 2 at level N+1.\n2. **Business Need:** An organizational need exists for the next-level role. This lives entirely outside the rubric and always will.\n\nBoth conditions are necessary. Neither alone is sufficient. In exceptional circumstances (e.g., a manager or tech lead departure), promotion ahead of rubric readiness may occur on a case-by-case basis \u2014 but this is a business decision, not a rubric decision.\n\nFormally, promotion conversations are initiated by managers. Culturally, individuals are encouraged to self-advocate using their self-assessment as a basis for the conversation.\n\n---", "group": "Design Constraints & Requirements"}, {"number": "7", "title": "Behavioral, Observable Language", "content": "Every description in this rubric is written in **behavioral, observable language** \u2014 describing what someone does, not who they are.\n\n| \u274c Trait-based | \u2705 Behavioral |\n|---|---|\n| \"Is a strong communicator\" | \"Adjusts communication style and level of detail based on audience\" |\n| \"Has good judgment\" | \"Makes sound decisions with incomplete information, and knows when to escalate vs. decide\" |\n| \"Is a team player\" | \"Proactively helps teammates remove blockers and shares credit for shared outcomes\" |\n\nThis principle serves three purposes:\n1. **Feedback becomes less personal** \u2014 it's easier to give and receive feedback about behaviors than traits\n2. **Examples are citable** \u2014 individuals can point to specific moments that demonstrate a behavior\n3. **Bias is reduced** \u2014 observable behaviors are harder to score based on subjective impression than trait descriptors\n\n---", "group": "Design Constraints & Requirements"}, {"number": "8", "title": "Fairness and Bias Prevention", "content": "The rubric is designed to be a fair, unbiased, and non-discriminatory instrument. Specific design choices that serve this goal:\n\n- **No degree or years-of-experience requirements.** The rubric describes demonstrated behaviors, not credentials or tenure.\n- **Behavioral language** reduces evaluator reliance on subjective impression.\n- **Calibration** surfaces inconsistencies across managers before they affect outcomes.\n- **Self-assessment** ensures individuals have a mechanism to surface their own contributions.\n- **Transparent rating structure** means individuals can understand and contest the basis of their ratings.\n\nManagers are expected to approach ratings with awareness of their own biases, and calibration is the organizational mechanism for catching and correcting for them.\n\n---", "group": "Design Constraints & Requirements"}, {"number": "9", "title": "Extensibility", "content": "The rubric is designed to be shared across job functions (Engineering, Product, Design, Data, etc.) with minimal reinvention. The shared Dimensions and Competencies travel across functions; the **Domain-Specific Competency** within Technical Competencies is the primary customization point for each track.\n\nThe first-pass content in this rubric reflects the Software Engineering (IC) track. Subsequent passes will adapt content for Engineering Management and Data/ML/AI, with additional tracks added over time.\n\nWhen adapting for a new job function:\n- Shared Dimensions and Competencies should be preserved\n- Capability descriptions should be reviewed for language that inadvertently assumes an engineering context\n- Domain-Specific content is written fresh for each track\n\n---", "group": "Design Constraints & Requirements"}, {"number": "10", "title": "Understanding the Levels", "content": "The rubric uses six levels \u2014 L1 through L6 \u2014 corresponding to Associate Engineer through Distinguished Engineer. Each level describes an *archetype*: a pattern of behaviors that characterizes someone operating solidly at that band. Levels are defined by scope, agency, and reach, not by years of experience or title tenure.\n\nEach level description below opens with its arc signal word (see \u00a715) \u2014 the vocabulary that appears in the rubric's capability descriptions to mark where a behavior sits on the progression.\n\n**L1 \u2014 Associate Engineer**\n*Beginning to* develop the habits and skills of the role. Executes well-scoped tasks with guidance, absorbing how the team works and building foundational technical and behavioral patterns. The primary variable is what they can take on independently, which grows quickly with strong onboarding.\n\n**L2 \u2014 Engineer**\n*Regularly* delivers on day-to-day work with minimal guidance. Growing in craft and depth; owns feature-level work but still benefits from direction on genuinely ambiguous or larger-scope problems.\n\n**L3 \u2014 Senior Engineer**\n*Consistently* delivers complex work end-to-end, independently. The go-to person for their area. Starting to shape *how* the team works \u2014 not just what it ships \u2014 and actively investing in developing teammates.\n\n**L4 \u2014 Staff Engineer**\n*Proactively* identifies and removes systemic blockers, often without being asked. Operates across teams, defines technical direction for their domain, and makes the people around them measurably more effective. The shift from L3 to L4 is less about technical depth and more about scope and organizational leverage.\n\n**L5 \u2014 Principal Engineer**\n*Systematically* improves how engineering works at the org level \u2014 setting standards, driving cross-team alignment, and shaping culture without direction to do so. Work has consequences beyond their immediate team.\n\n**L6 \u2014 Distinguished Engineer**\n*Defines the standard* for technical leadership. Work sets the philosophy at the company level and shapes the discipline beyond the organization itself. This level is intentionally rare and represents an exceptional, sustained body of technical leadership.\n\n---", "group": "The Building Blocks"}, {"number": "11", "title": "Understanding the Dimensions", "content": "The rubric organizes competencies into four dimensions \u2014 the broadest categories of what it means to perform well as an engineer. Dimensions represent the top-level framing before you get into the specific competencies and capabilities within each.\n\n**Impact & Scope**\nThe tangible results your work produces and the breadth of your reach. Asks: what are you actually delivering, and how far does it travel? This dimension covers ownership, execution, business alignment, and values \u2014 the \"what\" of performance.\n\n**Reasoning & Framing**\nHow you think. Distinguishes between someone who arrives at a solution and someone who first identifies whether they're solving the right problem. This dimension covers how you structure problems, generate options, and validate success \u2014 the \"how you think\" of performance.\n\n**Communication & Influence**\nHow you move information, decisions, and people. Technical skill alone doesn't create organizational leverage \u2014 the ability to convey clearly, align stakeholders, and grow others does. This dimension covers the full arc from clear writing to org-wide influence.\n\n**Technical Competencies**\nThe craft and domain knowledge that underpin everything else. Split into three competencies: Craft (the quality and rigor of your technical work product), Shared Technical (what every engineer needs regardless of track), and Domain-Specific (customized per track). This dimension is the foundation that the others sit on.\n\nDimensions don't have weights, and they aren't substitutable. A strong Impact score doesn't offset a weak Technical Competencies score \u2014 each dimension represents a necessary facet of well-rounded performance.\n\n---", "group": "The Building Blocks"}, {"number": "12", "title": "The Three-Tier Rating Structure", "content": "Formal performance ratings operate at three tiers of granularity:\n\n**Tier 1 \u2014 Overall Rating (1 number)**\nA single score used for HR, compensation, and to seed calibration conversations. Proposed by the manager and validated through calibration. Should be explainable by the Dimension scores \u2014 any divergence requires articulation.\n\n**Tier 2 \u2014 Dimension Scores (~4 numbers)**\nOne score per top-level Dimension. These are the primary unit of accountability in calibration. They force managers to think critically and be specific, and they give calibration participants a basis for challenge: *\"You gave a 2 in Impact & Scope \u2014 can you walk me through that?\"*\n\n**Tier 3 \u2014 Capability Descriptions (N rows)**\nThe behavioral scaffolding that informs Dimension scores. Managers may or may not formally score at this level \u2014 that is left to the manager/direct report pair. These rows exist to:\n- Help managers think through how to arrive at Dimension scores\n- Guide specific feedback conversations (*\"what's making me stand out in Communication?\"*)\n- Enable individual self-assessment\n- Support calibration challenges with concrete evidence\n\n---", "group": "How to Use It"}, {"number": "13", "title": "Calibration Philosophy", "content": "Calibration happens **per level** \u2014 the goal is consistent application of the rubric across individuals at the same level, not cross-level comparison.\n\nThe Dimension scores are the primary lever. Calibration participants should be prepared to:\n- Defend each Dimension score with specific behavioral examples\n- Respond to challenges from peers who have observed different behaviors\n- Explain how the overall rating follows from the Dimension scores\n\nForced distribution (bell-curving) is a policy decision made at the leadership level. The rubric is designed to be a clean, honest instrument. If there is a mismatch between what the rubric says and what a distribution policy requires, that tension is owned by leadership \u2014 not absorbed by managers through score inflation or deflation.\n\n---", "group": "How to Use It"}, {"number": "14", "title": "Self-Assessment", "content": "Individuals are encouraged \u2014 and should be given space \u2014 to self-assess against the rubric before formal review conversations. A strong self-assessment practice:\n- Surfaces work and impact that managers may have missed\n- Gives individuals a voice in their own evaluation\n- Creates a shared starting point for the review conversation\n- Builds psychological safety by making the conversation bidirectional\n\nSelf-assessments are most useful when grounded in **specific examples**. *\"I demonstrated X by doing Y in context Z\"* is far more valuable than a number alone.\n\nManagers may require or encourage self-ratings as a preparation step before review conversations. This is a healthy practice.\n\n---", "group": "How to Use It"}, {"number": "15", "title": "How Descriptions Signal Progression", "content": "Each description in this rubric is written using consistent **signal vocabulary** \u2014 words and phrases that carry meaning about frequency, agency, and scope. Reading descriptions vertically across levels, these signals make visible exactly what changes from one level to the next.\n\n| Signal | L1 | L2 | L3 | L4 | L5 | L6 |\n|---|---|---|---|---|---|---|\n| **Frequency** | *beginning to* | *regularly* | *consistently* | *proactively* | *systematically* | *defines the standard* |\n| **Agency** | *with guidance* | *with minimal guidance* | *independently* | *without prompting* | *without direction* | *sets the philosophy* |\n| **Scope** | task | own work | feature / project | team / cross-team | org-wide | company / industry |\n\nNot every capability uses all three signal types \u2014 some rely primarily on scope expansion, others on frequency, others on a shift in agency. But the vocabulary is consistent: \"proactively\" always describes L4 or above behavior; \"beginning to\" is always L1 or occasionally L2.\n\nThese signals serve two audiences. **Managers** calibrating ratings can quickly locate where an individual sits on each axis per capability. **Individuals** self-assessing can identify which signal dimension they've advanced in \u2014 and which they haven't yet.\n\n---", "group": "How to Use It"}, {"number": "16", "title": "The Rubric Is Not a Checklist", "content": "Perhaps most importantly: this rubric is a **growth tool and a conversation guide**, not a compliance checklist.\n\nNo individual will exhibit every behavior at every capability in a given review cycle. The rubric describes the shape of the archetype, not a set of boxes to check. Managers should use it to identify the most important development investments for each individual \u2014 not to score every row exhaustively.\n\nThe behaviors described are illustrative of a level, not exhaustive. A manager should be able to say *\"this person is a solid L3\"* and point to evidence in the rubric \u2014 not *\"this person checked all 33 capability rows at a 3 or above.\"*\n\n---", "group": "Gotchas & Caveats"}, {"number": "17", "title": "AI Tools and Emerging Technology", "content": "There is no dedicated dimension or capability for AI tool adoption. This is intentional.\n\nTechnology choices change rapidly. A rubric row that references specific tools becomes outdated; a rubric that references the *outcomes of effective tool use* remains durable.\n\nObservable improvements in output quality, delivery velocity, and solution quality \u2014 which should result from effective adoption of productivity tools including AI \u2014 are traceable through existing capabilities:\n- **Technical Competencies \u2192 Craft:** Evaluates quality and reliability of work product\n- **Impact & Scope \u2192 Delivery & Execution:** Evaluates velocity and reliability of delivery\n- **Reasoning & Framing \u2192 Solution Crafting:** Evaluates the quality of solutions generated\n- **Impact & Scope \u2192 Values \u2192 Growth Mindset:** Evaluates adaptability and proactive adoption of new approaches\n\nThis design ensures that tool adoption is rewarded through its observable outcomes \u2014 without creating a separate dimension that over-indexes on a specific technology moment.", "group": "Gotchas & Caveats"}], "examples": [{"id": "56bce4a8-a120-4baa-bb80-d0377ecffb07", "competency_id": "ownership-autonomy", "level": "L1", "track": null, "placeholder": false, "scenario": "With guidance from {{their}} manager, {{name}} worked through debugging a small feature that was breaking intermittently. {{They}} followed the instructions provided and asked for clarification when {{they}} encountered unfamiliar parts of the codebase. By the end of the day, {{they}} solved the issue, and it was incorporated into the next deployment."}, {"id": "ef9a383a-2b5d-4edf-b6a0-187223a4f692", "competency_id": "ownership-autonomy", "level": "L1", "track": null, "placeholder": false, "scenario": "During {{their}} first week on the project, {{name}} was tasked with updating the documentation for a utility script. {{They}} checked {{their}} understanding with a senior colleague to ensure accuracy. Once {{they}} felt confident, {{they}} pushed the changes with a few iterated edits from the feedback given."}, {"id": "320ea056-6126-410e-be86-dca66bae9792", "competency_id": "ownership-autonomy", "level": "L1", "track": null, "placeholder": false, "scenario": "Under the direction of {{their}} onboarding buddy, {{name}} set up {{their}} development environment, following a checklist provided by the team. {{They}} asked questions about the purpose of each tool during the setup process, which helped {{them}} get comfortable with {{their}} initial tasks."}, {"id": "97821be7-e864-447b-a8fe-dc402b127d39", "competency_id": "ownership-autonomy", "level": "L2", "track": null, "placeholder": false, "scenario": "{{name}} regularly revisits and updates {{their}} own documentation as {{they}} learns new information, ensuring it always serves the team well, with only minimal input from {{their}} lead."}, {"id": "66164f01-8a2b-405a-946a-4e4fdafb2a76", "competency_id": "ownership-autonomy", "level": "L2", "track": null, "placeholder": false, "scenario": "During the quarterly roadmap planning meeting, {{name}} presented {{their}} feature ideas that {{they}} had been refining over several weeks. {{They}} worked out the details with minimal guidance, keeping {{their}} scope aligned with the team's objectives."}, {"id": "0451a569-945a-4f8f-b355-76ac1d9fd710", "competency_id": "ownership-autonomy", "level": "L2", "track": null, "placeholder": false, "scenario": "{{name}} handled a backlog of support tickets related to a feature {{they}} maintained. Without needing detailed instructions, {{they}} regularly prioritized and resolved the issues, improving user satisfaction and efficiency in {{their}} own workflows."}, {"id": "325d2477-acee-451d-887c-99f263ca0387", "competency_id": "ownership-autonomy", "level": "L3", "track": null, "placeholder": false, "scenario": "{{name}} took charge of the quarterly roadmap for a key product feature, independently coordinating with design and backend teams. {{They}} identified potential roadblocks early in the planning phase and ensured that everyone was aligned on the timeline. As a result, the team delivered the feature ahead of schedule with fewer issues than in previous releases."}, {"id": "7458f74c-f916-4752-a339-bed4315eadd2", "competency_id": "ownership-autonomy", "level": "L3", "track": null, "placeholder": false, "scenario": "When the project team encountered a sudden blocker involving third-party integrations, {{name}} independently researched potential solutions and proposed a workaround that allowed the team to keep moving forward without missing deadlines. {{Their}} quick thinking enabled the team to maintain momentum and stay on track."}, {"id": "d2dea4ef-6785-43c1-8479-f0501a429297", "competency_id": "ownership-autonomy", "level": "L3", "track": null, "placeholder": false, "scenario": "During a sprint planning meeting, {{name}} consistently brought up concerns about potential technical debt that could arise from the current project scope. {{They}} independently drafted a proposal to address these concerns while ensuring feature delivery remained on schedule. This proactive approach was well-received by both developers and product managers, leading to a more sustainable project plan."}, {"id": "efd58ae4-a9eb-4128-b4cf-0e6995bf3bb3", "competency_id": "ownership-autonomy", "level": "L4", "track": null, "placeholder": false, "scenario": "During a cross-team planning meeting, {{name}} identified a potential bottleneck in the deployment pipeline that could affect multiple teams. Without prompting, {{they}} organized a working group to address the issue, facilitating meetings and coordinating efforts across the teams involved until a solution was implemented."}, {"id": "9c8ac39d-d016-4d02-885f-293ccbac8c3e", "competency_id": "ownership-autonomy", "level": "L4", "track": null, "placeholder": false, "scenario": "When a recent project faced unforeseen challenges that threatened its timeline, {{name}} took the initiative to assess the impact on their team and neighboring teams. {{They}} proactively adjusted the project plan, communicated the updates to all stakeholders, and ensured the project continued smoothly without external request."}, {"id": "5df78a81-6e38-429f-8c79-3136fccd1d36", "competency_id": "ownership-autonomy", "level": "L4", "track": null, "placeholder": false, "scenario": "Noticing a repeated pattern of delays in team deliverables, {{name}} independently conducted an analysis of processes and proposed cross-team improvements. {{They}} spearheaded the adoption of these changes, securing stakeholder buy-in and visibly enhancing the productivity across the teams involved."}, {"id": "4c53da8a-978d-45ec-9044-2a4470f09bf3", "competency_id": "ownership-autonomy", "level": "L5", "track": null, "placeholder": false, "scenario": "During a major infrastructure upgrade, {{name}} worked closely with teams across the organization to identify potential roadblocks and ensured alignment on deployment timelines. {{They}} developed a comprehensive plan, which included clear guidelines for each team, systematically improving how updates are coordinated across the company."}, {"id": "4056e81b-391b-47d8-bb8d-e42548e22810", "competency_id": "ownership-autonomy", "level": "L5", "track": null, "placeholder": false, "scenario": "{{name}} spearheaded the initiative to overhaul the internal documentation system, recognizing the inefficiencies it was causing. {{They}} coordinated with department leads to understand specific needs and systematically designed a new system that was universally adopted, setting the standard for future internal communication practices."}, {"id": "df829dd6-58c0-4abd-954e-e14d2f1a0b97", "competency_id": "ownership-autonomy", "level": "L5", "track": null, "placeholder": false, "scenario": "Noticing delays in the product release cycle, {{name}} initiated a cross-department review process to identify bottlenecks. {{They}} then developed and implemented a streamlined workflow that systematically reduced turnaround times and became the benchmark for subsequent projects company-wide."}, {"id": "6e90010f-e7e5-4f05-9328-80b9441899ed", "competency_id": "ownership-autonomy", "level": "L6", "track": null, "placeholder": false, "scenario": "When the company was expanding into a new international market with unknown regulatory challenges, {{name}} took charge of defining the strategic roadmap for the engineering team. {{They}} spent months engaging with industry leaders, legal experts, and local partners, shaping the company's approach to compliance with a vision that set new industry benchmarks."}, {"id": "6b5a1fb3-c679-446a-bf9d-6ba404df3b45", "competency_id": "ownership-autonomy", "level": "L6", "track": null, "placeholder": false, "scenario": "Faced with escalating customer concerns about data privacy, {{name}} initiated the creation of a comprehensive privacy framework that not only addressed current issues but also anticipated future industry trends. {{They}} led cross-functional teams, ensuring the company became a thought leader in data protection practices globally."}, {"id": "2f8ca932-0945-4239-b25a-e7924009a169", "competency_id": "ownership-autonomy", "level": "L6", "track": null, "placeholder": false, "scenario": "Amidst the transition to a new technological platform, {{name}} set the standard by establishing a guiding philosophy that emphasized sustainability and scalability. {{They}} worked closely with various departments to align on design principles that would influence company decisions and inspire other industry players to adopt similar sustainable practices."}, {"id": "3f587ed9-898f-4bdd-9ff7-6ed921b08a76", "competency_id": "delivery-execution", "level": "L1", "track": null, "placeholder": false, "scenario": "{{name}} was assigned a straightforward bug fix in the login module. With guidance from a more experienced engineer, {{they}} broke down the steps needed to identify the issue, implement a solution, and test the fix to ensure it worked properly."}, {"id": "e83573b0-a88e-4d63-bdb1-80cdd6c5f512", "competency_id": "delivery-execution", "level": "L1", "track": null, "placeholder": false, "scenario": "During the sprint planning meeting, {{name}} was beginning to learn how to estimate the time needed for simple tasks. With guidance from {{their}} manager, {{they}} contributed estimates for a small feature update, learning how to sequence the work effectively."}, {"id": "53ededde-fbd6-43ef-9be6-efbcb15c57ef", "competency_id": "delivery-execution", "level": "L1", "track": null, "placeholder": false, "scenario": "Upon encountering an unclear requirement for a UI component, {{name}} sought guidance from a senior teammate. Together, they identified the key elements that needed clarification and documented next steps for {{them}} to proceed with the development task."}, {"id": "bd957fa3-78ba-4366-a78a-609a4747a063", "competency_id": "delivery-execution", "level": "L2", "track": null, "placeholder": false, "scenario": "{{name}} regularly delivers high-quality code by the sprint end. {{They}} make minor adjustments to the schedule as needed and coordinate with {{their}} team, ensuring that dependencies are handled with minimal guidance."}, {"id": "8bfc5847-2c16-4440-8e06-a8a57c83a02d", "competency_id": "delivery-execution", "level": "L2", "track": null, "placeholder": false, "scenario": "In the planning meeting, {{name}} proposed a practical breakdown of tasks for {{their}} feature, prioritizing the critical steps and regularly updating the timeline based on progress. {{They}} sought feedback only when necessary, showing {{they}} could manage their work efficiently."}, {"id": "213d59d6-6257-4fb9-a866-3185415cc1a7", "competency_id": "delivery-execution", "level": "L2", "track": null, "placeholder": false, "scenario": "When the project requirements changed unexpectedly, {{name}} re-evaluated the tasks at hand with minimal guidance and re-prioritized {{their}} work to meet the new goals. {{They}} communicated {{their}} progress regularly during standups to keep everyone in sync."}, {"id": "4342295d-96f9-4d3c-9433-a10140aad8ea", "competency_id": "delivery-execution", "level": "L3", "track": null, "placeholder": false, "scenario": "After receiving the project requirements, {{name}} took the initiative to break down the tasks and set up a timeline without needing additional input. {{They}} consistently delivered updates during the bi-weekly sprint meetings, ensuring the team stayed informed about any potential roadblocks."}, {"id": "fcafc5eb-444c-40bf-9fb1-e28e392d8d51", "competency_id": "delivery-execution", "level": "L3", "track": null, "placeholder": false, "scenario": "Faced with an under-defined project segment, {{name}} independently assessed the risks and devised a plan to address potential issues. {{Their}} ability to consistently navigate the ambiguity allowed the feature to be completed on schedule, matching the project's broader goals."}, {"id": "8d9b9661-b2c0-4fbe-bed2-a3ccef568e1b", "competency_id": "delivery-execution", "level": "L3", "track": null, "placeholder": false, "scenario": "When a critical bug threatened the scheduled release, {{name}} independently formulated a mitigation plan that addressed the issue effectively. By coordinating with relevant stakeholders and keeping the communication lines open, {{name}} ensured the feature was shipped on time."}, {"id": "ea23c910-6560-4671-b016-10886d7d3459", "competency_id": "delivery-execution", "level": "L4", "track": null, "placeholder": false, "scenario": "During a critical project deadline, {{name}} noticed a related API from another team was consistently failing. Without prompting, {{they}} reached out to the owning team, coordinated a quick debugging session, and facilitated a temporary fix that allowed {{their}} team to continue development without delays."}, {"id": "197bb35c-1241-4cd0-bff9-3fc196d5c492", "competency_id": "delivery-execution", "level": "L4", "track": null, "placeholder": false, "scenario": "{{name}} proactively organized a mid-sprint checkpoint meeting with stakeholders from multiple teams to address potential bottlenecks in the release schedule. By surfacing and discussing these issues early, {{they}} ensured that necessary resources were allocated, keeping the project on track for delivery."}, {"id": "a025acdb-a642-4a3d-9d00-2664052e3ee0", "competency_id": "delivery-execution", "level": "L4", "track": null, "placeholder": false, "scenario": "When a sudden priority shift required reorganizing the planned backlog, {{name}} adjusted the sprint tasks and dependencies across teams, ensuring all were aligned to the new objectives. {{They}} communicated the impact of these changes to all affected parties, keeping the overall project momentum intact."}, {"id": "98cbf180-c81d-4373-ac98-67d0d9a4810e", "competency_id": "delivery-execution", "level": "L5", "track": null, "placeholder": false, "scenario": "In a meeting with several teams, {{name}} noticed recurring delays in project delivery and suggested implementing a unified tracking system. Over the following weeks, {{they}} worked without direction to design and roll out this system across the organization, addressing bottlenecks and streamlining communication. This change led to more predictable timelines and increased transparency across all project teams."}, {"id": "2b216075-beb5-4654-899d-d49d90778080", "competency_id": "delivery-execution", "level": "L5", "track": null, "placeholder": false, "scenario": "When multiple teams struggled with resource allocation, {{name}} spearheaded an initiative to create an organization-wide priority matrix. Collaborating with different department heads, {{they}} systematically built a framework that helped in aligning project priorities with business goals, leading to more efficient use of resources and achieving better focus on key projects."}, {"id": "d54721c6-c843-4f66-9a4e-0881d80dd459", "competency_id": "delivery-execution", "level": "L5", "track": null, "placeholder": false, "scenario": "{{name}} noticed that the lack of standardized documentation was causing confusion across various engineering teams. Systematically, {{they}} set up new documentation standards and organized workshops to ensure all teams across the organization were aligned. This initiative significantly reduced onboarding time for new engineers and improved inter-team collaboration."}, {"id": "462a29c6-45fc-455c-b0a6-49ff5a5b6484", "competency_id": "delivery-execution", "level": "L6", "track": null, "placeholder": false, "scenario": "During the company's tech summit, {{name}} introduced a groundbreaking approach to agile delivery, which emphasized reducing bottlenecks across all teams. This philosophy was so effective that it was adopted as a company-wide standard, revolutionizing how projects were scoped and executed. {{Their}} insights provided a lasting framework that addressed common execution roadblocks industry-wide, inspiring other companies to follow suit."}, {"id": "8c1b5ee9-2d47-4b65-9e7c-e2c5629a02f5", "competency_id": "delivery-execution", "level": "L6", "track": null, "placeholder": false, "scenario": "When the company faced chronic delays in deploying critical updates, {{name}} spearheaded a comprehensive overhaul of the release management process. {{They}} devised a new strategic delivery framework that became a benchmark not only for the organization but also influenced industry practices. {{Their}} sustained effort ensured that projects were consistently delivered on time, reshaping how timelines were structured across the company."}, {"id": "6f58f179-c58d-48af-a0ca-a4aa9b5ed8b3", "competency_id": "delivery-execution", "level": "L6", "track": null, "placeholder": false, "scenario": "Recognizing the industry's shift towards sustainable technology, {{name}} crafted a delivery execution strategy that balanced speed with environmental responsibility. {{They}} set a new industry standard for project execution that aligned with green objectives, defining a philosophy that not only enhanced the company's reputation but also sparked broader industry action towards sustainable delivery models."}, {"id": "e3369c57-ed27-4a36-a7f3-526d93d427d1", "competency_id": "business-value-outcomes", "level": "L1", "track": null, "placeholder": false, "scenario": "During a team meeting, {{name}} listened as the product manager explained a new feature. Afterwards, {{they}} asked clarifying questions to understand how {{their}} task in refactoring the codebase would align with the business goals outlined. With guidance from {{their}} mentor, {{they}} began making small code changes while keeping the feature's objectives in mind."}, {"id": "5eedcc9d-de27-429a-b0f0-0028d5c5cd89", "competency_id": "business-value-outcomes", "level": "L1", "track": null, "placeholder": false, "scenario": "While working on a bug fix, {{name}} noticed that the issue also exposed an outdated component. {{They}} brought it up with {{their}} team lead, seeking guidance on how to update the component without disrupting the user experience. Together, they determined the best course of action to address both the bug and enhance the product's overall stability."}, {"id": "69f34b92-d18c-4225-9e30-2f21da957f3a", "competency_id": "business-value-outcomes", "level": "L1", "track": null, "placeholder": false, "scenario": "{{name}} was assigned a simple task of improving the loading speed of a specific page. {{They}} met with {{their}} supervisor to discuss the potential impact of various optimization techniques on user engagement. Under {{their}} supervisor's guidance, {{they}} implemented a solution that not only improved speed but also considered cost-effectiveness."}, {"id": "088e5334-f80e-438b-84d8-d6e19fb28f17", "competency_id": "business-value-outcomes", "level": "L2", "track": null, "placeholder": false, "scenario": "{{name}} regularly checked in with the product team to ensure {{their}} code changes aligned with the upcoming product features. Without needing detailed instructions, {{they}} adjusted {{their}} implementation to better meet user needs, improving the overall user experience."}, {"id": "282289cb-2d89-4ac8-9028-66724cbd4e20", "competency_id": "business-value-outcomes", "level": "L2", "track": null, "placeholder": false, "scenario": "During sprint planning, {{name}} identified an area of the code that was taking extra resources. With minimal guidance, {{they}} proposed a simpler solution that reduced load times, ensuring the product remained cost-effective and efficient."}, {"id": "48ede43a-41dc-4e6b-bf60-094e9f92e38c", "competency_id": "business-value-outcomes", "level": "L2", "track": null, "placeholder": false, "scenario": "While reviewing customer feedback, {{name}} noticed a recurring issue that affected usability. {{They}} took it upon {{themselves}}, with minimal guidance, to draft a plan for an update that addressed these points, leading to improved customer satisfaction and retention."}, {"id": "37f89ad1-8fb6-4fe9-bf72-6a8e4a2dff83", "competency_id": "business-value-outcomes", "level": "L3", "track": null, "placeholder": false, "scenario": "During a product planning session, {{name}} noticed that a proposed feature lacked a solid connection to customer pain points. {{They}} took the initiative to gather data from recent user feedback and presented a compelling case to pivot the project focus. This led to a redesigned feature that better addressed user needs and increased engagement."}, {"id": "606d87fc-919d-4064-8b5b-e03a0085a727", "competency_id": "business-value-outcomes", "level": "L3", "track": null, "placeholder": false, "scenario": "While reviewing a complex backend system, {{name}} independently identified an opportunity to optimize data processing in a way that reduced server costs. {{They}} implemented the change and shared the results with the team, emphasizing the balance between performance gains and business impact."}, {"id": "28286420-c99b-4dd2-b82c-b72c8b6e4bee", "competency_id": "business-value-outcomes", "level": "L3", "track": null, "placeholder": false, "scenario": "In a sprint demo, {{name}} highlighted how the recent enhancements to the search functionality aligned with strategic goals of improving user retention. {{They}} connected feature use cases to overarching company objectives, consistently reinforcing the project's business value in team discussions."}, {"id": "c52c4856-4e4d-49da-8885-142c10d9fa4b", "competency_id": "business-value-outcomes", "level": "L4", "track": null, "placeholder": false, "scenario": "When {{name}} noticed that the team's feature roadmap was misaligned with the company's new strategic direction, {{they}} proactively organized a session that brought together stakeholders from product, engineering, and marketing. {{Name}} facilitated a collaborative reprioritization that ensured all efforts were directed towards supporting the updated business goals."}, {"id": "03e10c57-6065-48c8-8931-0dad72672a22", "competency_id": "business-value-outcomes", "level": "L4", "track": null, "placeholder": false, "scenario": "During a design review, {{name}} realized the proposed user interface added unnecessary complexity for the end user. Without prompting, {{they}} drew insights from recent customer feedback and proposed a simpler, more intuitive design that better aligned with user needs and improved the overall product experience."}, {"id": "c516503e-f584-432f-8dbf-e3138baf7632", "competency_id": "business-value-outcomes", "level": "L4", "track": null, "placeholder": false, "scenario": "Observing a recurring pattern of excessive cloud costs across projects, {{name}} took the initiative to analyze the usage and shared a set of recommendations with the engineering teams. By proactively addressing this, {{they}} helped reduce costs which enabled the reallocation of resources towards revenue-generating features."}, {"id": "765179fd-4053-4916-9f33-b21ac5db80db", "competency_id": "business-value-outcomes", "level": "L5", "track": null, "placeholder": false, "scenario": "{{name}} recognized an opportunity for the engineering teams to better align their sprints with upcoming marketing campaigns. {{They}} initiated a quarterly planning process where engineers collaborate with marketing to ensure feature releases align with customer engagement peaks, significantly improving the company's go-to-market efficiency."}, {"id": "2622b3cd-7ee0-42ef-9e9c-1695b11e0079", "competency_id": "business-value-outcomes", "level": "L5", "track": null, "placeholder": false, "scenario": "After noticing recurring issues with feature adoption, {{name}} revamped the product feedback loop. {{They}} implemented a systematic approach that included metrics-based evaluations and bi-weekly sessions with the customer support team to su
