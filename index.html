const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ──────────────────────────────────────────────────────────
// Utility helpers
// ──────────────────────────────────────────────────────────
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function findNode(rubric, dimId, compId, capId) {
  const dim = rubric.dimensions.find(d => d.id === dimId);
  if (!dim) return null;
  if (!compId) return { type: 'dimension', node: dim, dim };
  const comp = dim.competencies.find(c => c.id === compId);
  if (!comp) return null;
  if (!capId) return { type: 'competency', node: comp, dim, comp };
  const cap = comp.capabilities.find(c => c.id === capId);
  if (!cap) return null;
  return { type: 'capability', node: cap, dim, comp, cap };
}

// ──────────────────────────────────────────────────────────
// Toast
// ──────────────────────────────────────────────────────────
function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`}>{t.message}</div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((message, type = 'success') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  return { toasts, show };
}

// ──────────────────────────────────────────────────────────
// Sidebar Tree
// ──────────────────────────────────────────────────────────
function SidebarTree({ rubric, selection, onSelect }) {
  const [openDims, setOpenDims] = useState(() => {
    const s = {};
    (rubric?.dimensions || []).forEach(d => { s[d.id] = true; });
    return s;
  });
  const [openComps, setOpenComps] = useState({});

  const toggleDim = (id) => setOpenDims(p => ({ ...p, [id]: !p[id] }));
  const toggleComp = (dimId, compId) =>
    setOpenComps(p => ({ ...p, [`${dimId}:${compId}`]: !p[`${dimId}:${compId}`] }));

  if (!rubric) return null;

  return (
    <div className="sidebar">
      <div className="sidebar-section-label">Rubric Structure</div>
      {rubric.dimensions.map(dim => (
        <React.Fragment key={dim.id}>
          <div
            className={`tree-item ${openDims[dim.id] ? 'open' : ''} ${
              selection.dimId === dim.id && !selection.compId ? 'active' : ''
            }`}
            onClick={() => { onSelect({ dimId: dim.id }); toggleDim(dim.id); }}
          >
            <span className="indent" style={{ width: 0 }} />
            <span className="chevron">▶</span>
            <span className="label">{dim.name}</span>
            <span className="tree-badge">{dim.competencies.length}</span>
          </div>

          {openDims[dim.id] && dim.competencies.map(comp => (
            <React.Fragment key={comp.id}>
              <div
                className={`tree-item ${openComps[`${dim.id}:${comp.id}`] ? 'open' : ''} ${
                  selection.dimId === dim.id && selection.compId === comp.id && !selection.capId ? 'active' : ''
                }`}
                onClick={() => { onSelect({ dimId: dim.id, compId: comp.id }); toggleComp(dim.id, comp.id); }}
              >
                <span className="indent" style={{ width: 14 }} />
                <span className="chevron">▶</span>
                <span className="label">{comp.name}</span>
                <span className="tree-badge">{comp.capabilities.length}</span>
              </div>

              {openComps[`${dim.id}:${comp.id}`] && comp.capabilities.map(cap => (
                <div
                  key={cap.id}
                  className={`tree-item ${
                    selection.dimId === dim.id && selection.compId === comp.id && selection.capId === cap.id ? 'active' : ''
                  }`}
                  onClick={() => onSelect({ dimId: dim.id, compId: comp.id, capId: cap.id })}
                >
                  <span className="indent" style={{ width: 28 }} />
                  <span className="label">{cap.name}</span>
                </div>
              ))}
            </React.Fragment>
          ))}
        </React.Fragment>
      ))}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Level descriptions editor
// ──────────────────────────────────────────────────────────
function DescriptionsEditor({ levels, levelNames, descriptions, onChange, readOnly }) {
  return (
    <div className="level-grid">
      {levels.map(level => {
        const val = descriptions[level] || '';
        const isPlaceholder = val.startsWith('[') && val.endsWith(']');
        return (
          <div className="level-cell" key={level}>
            <label>
              {level}
              <span className="level-name">— {levelNames[level]}</span>
            </label>
            <textarea
              className={isPlaceholder ? 'placeholder-text' : ''}
              value={val}
              onChange={readOnly ? undefined : e => onChange(level, e.target.value)}
              readOnly={readOnly}
              placeholder={`Describe ${level} behavior here…`}
              style={readOnly ? { cursor: 'default', background: 'var(--bg)' } : undefined}
            />
          </div>
        );
      })}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Node Editor (Dimension / Competency / Capability)
// ──────────────────────────────────────────────────────────
function NodeEditor({ rubric, selection, onSave, readOnly }) {
  const found = selection.dimId ? findNode(rubric, selection.dimId, selection.compId, selection.capId) : null;
  const [localNode, setLocalNode] = useState(null);
  const [dirty, setDirty] = useState(false);

  useEffect(() => {
    if (found) {
      setLocalNode(deepClone(found.node));
      setDirty(false);
    }
  }, [selection, found?.node]);

  if (!selection.dimId) {
    return (
      <div className="main">
        <div className="empty-state">
          <div className="empty-state-icon">🗂</div>
          <h3>{readOnly ? 'Select a node to view' : 'Select a node to edit'}</h3>
          <p>Choose a Dimension, Competency, or Capability from the sidebar to {readOnly ? 'view' : 'view and edit'} its level descriptions.</p>
        </div>
      </div>
    );
  }

  if (!found || !localNode) return <div className="main"><div className="spinner" /></div>;

  const { type, dim, comp } = found;
  const typeLabel = { dimension: 'Dimension', competency: 'Competency', capability: 'Capability' }[type];
  const typeBadge = `badge-${type}`;

  const handleDescChange = (level, val) => {
    setLocalNode(prev => ({ ...prev, descriptions: { ...prev.descriptions, [level]: val } }));
    setDirty(true);
  };

  const handleNameChange = (val) => {
    setLocalNode(prev => ({ ...prev, name: val }));
    setDirty(true);
  };

  const handleSave = () => {
    onSave(type, { dimId: dim.id, compId: comp?.id, capId: found.cap?.id }, localNode);
    setDirty(false);
  };

  const children = type === 'dimension'
    ? dim.competencies.map(c => ({ id: c.id, name: c.name, count: c.capabilities.length, label: 'Competency', countLabel: 'capabilities' }))
    : type === 'competency'
    ? comp.capabilities.map(c => ({ id: c.id, name: c.name, count: null, label: 'Capability' }))
    : [];

  return (
    <div className="main">
      {/* Breadcrumb */}
      <div className="breadcrumb">
        <span>{dim.name}</span>
        {comp && <><span className="breadcrumb-sep">›</span><span>{comp.name}</span></>}
        {found.cap && <><span className="breadcrumb-sep">›</span><span className="breadcrumb-current">{localNode.name}</span></>}
        {!found.cap && <><span className="breadcrumb-sep">›</span><span className="breadcrumb-current">{localNode.name}</span></>}
      </div>

      {/* Lock state banner — swaps based on editing mode */}
      {readOnly ? (
        <div className="readonly-badge">
          <LockedIcon /> View only — click the lock icon in the tab to enable editing
        </div>
      ) : (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          fontSize: 12, fontWeight: 500,
          color: '#92400e',
          background: '#fffbeb',
          border: '1px solid #fcd34d',
          borderRadius: 8, padding: '8px 14px',
          marginBottom: 18,
        }}>
          <UnlockedIcon />
          <span>Editing enabled — changes are saved directly to the rubric. Click the lock icon in the tab to lock.</span>
        </div>
      )}

      {/* Node header */}
      <span className={`node-type-badge ${typeBadge}`}>{typeLabel}</span>
      <div className="name-display">
        <input
          className="name-input"
          value={localNode.name}
          onChange={readOnly ? undefined : e => handleNameChange(e.target.value)}
          readOnly={readOnly}
          style={readOnly ? { cursor: 'default', background: 'var(--bg)' } : undefined}
        />
      </div>
      {localNode.intent && (
        <div style={{ fontStyle: 'italic', color: 'var(--muted)', fontSize: 13, marginTop: 8, marginBottom: 2 }}>
          {localNode.intent}
        </div>
      )}
      <div className="node-subtitle" style={{ marginTop: 6 }}>
        {type === 'dimension' && `${dim.competencies.length} competencies · ${dim.competencies.reduce((a,c) => a + c.capabilities.length, 0)} capabilities`}
        {type === 'competency' && `${comp.capabilities.length} capabilities · within ${dim.name}`}
        {type === 'capability' && `Leaf node · ${dim.name} › ${comp.name}`}
      </div>

      {/* Level descriptions */}
      <div className="card">
        <div className="card-title">Level Descriptions</div>
        <DescriptionsEditor
          levels={rubric.meta.levels}
          levelNames={rubric.meta.level_names}
          descriptions={localNode.descriptions}
          onChange={handleDescChange}
          readOnly={readOnly}
        />
      </div>

      {/* Save — hidden in read-only mode */}
      {!readOnly && (
        <div className="action-bar">
          <button
            className="btn btn-primary"
            disabled={!dirty}
            onClick={handleSave}
          >
            {dirty ? 'Save Changes' : 'Saved'}
          </button>
          {dirty && (
            <button
              className="btn btn-ghost"
              onClick={() => { setLocalNode(deepClone(found.node)); setDirty(false); }}
            >
              Discard
            </button>
          )}
          {dirty && <span style={{ fontSize: 12, color: 'var(--warning)' }}>Unsaved changes</span>}
        </div>
      )}

      {/* Children */}
      {children.length > 0 && (
        <div className="card" style={{ marginTop: 24 }}>
          <div className="card-title">{type === 'dimension' ? 'Competencies' : 'Capabilities'}</div>
          <div className="child-grid">
            {children.map(child => (
              <div key={child.id} className="child-card"
                onClick={() => {/* no-op; navigate via sidebar */}}
              >
                <div className="child-card-label">{child.label}</div>
                <div className="child-card-name">{child.name}</div>
                {child.count != null && (
                  <div className="child-card-count">{child.count} {child.countLabel}</div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Level View
// ──────────────────────────────────────────────────────────
function LevelView({ rubric, selectedTrack }) {
  const [selectedLevel, setSelectedLevel] = useState(rubric?.meta.levels[2] || 'L3');
  const [compareDown, setCompareDown] = useState(false);
  const [compareUp,   setCompareUp]   = useState(false);

  const [expandedDims, setExpandedDims] = useState(() => new Set());
  const [expandedComps, setExpandedComps] = useState(() => new Set());

  if (!rubric) return <div className="main"><div className="spinner" /></div>;

  // Adjacent levels
  const levels    = rubric.meta.levels;
  const levelIdx  = levels.indexOf(selectedLevel);
  const prevLevel = levelIdx > 0               ? levels[levelIdx - 1] : null;
  const nextLevel = levelIdx < levels.length-1 ? levels[levelIdx + 1] : null;

  const ln = (l) => rubric.meta.level_names[l] || l;
  const totalCaps = rubric.dimensions.reduce((a, d) =>
    a + d.competencies.reduce((b, c) => b + c.capabilities.length, 0), 0);

  const toggleDim = (id) =>
    setExpandedDims(prev => { const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s; });
  const toggleComp = (dId, cId) => {
    const k = `${dId}:${cId}`;
    setExpandedComps(prev => { const s = new Set(prev); s.has(k) ? s.delete(k) : s.add(k); return s; });
  };
  const expandAll = () => {
    setExpandedDims(new Set(rubric.dimensions.map(d => d.id)));
    setExpandedComps(new Set(rubric.dimensions.flatMap(d => d.competencies.map(c => `${d.id}:${c.id}`))));
  };
  const collapseAll = () => { setExpandedDims(new Set()); setExpandedComps(new Set()); };

  // When the baseline level changes, keep compare toggles but clamp to valid edges
  const handleLevelChange = (l) => {
    setSelectedLevel(l);
    const idx = levels.indexOf(l);
    if (idx === 0)            setCompareDown(false);
    if (idx === levels.length-1) setCompareUp(false);
  };

  // ── Visual theme for each column role ────────────────────
  const COL = {
    prev: {
      headerBg:    '#4a5080',
      headerColor: '#c8cce8',
      cellBg:      '#f1f3fb',
      textColor:   '#7880aa',
      borderLeft:  '1px solid #d0d4ec',
      label:       `◀ ${prevLevel} — ${ln(prevLevel)}`,
      italic:      true,
    },
    base: {
      headerBg:    'var(--sidebar-bg)',
      headerColor: '#ffffff',
      cellBg:      '#ffffff',
      textColor:   'var(--text)',
      borderLeft:  '3px solid var(--primary)',
      label:       `${selectedLevel} — ${ln(selectedLevel)}`,
      italic:      false,
    },
    next: {
      headerBg:    '#5a4a30',
      headerColor: '#d4c4a0',
      cellBg:      '#fdf9f2',
      textColor:   '#9a8050',
      borderLeft:  '1px solid #e8dfc4',
      label:       `${nextLevel} — ${ln(nextLevel)} ▶`,
      italic:      true,
    },
  };

  // Which description columns are active, in order
  const activeCols = [
    ...(compareDown && prevLevel ? ['prev'] : []),
    'base',
    ...(compareUp && nextLevel   ? ['next'] : []),
  ];
  const numDescCols = activeCols.length;

  // Helper: get description for a node's descriptions object
  const getDesc = (descriptions, level) => descriptions?.[level] || '';
  const isPlaceholder = (s) => s.startsWith('[') && s.endsWith(']');

  // Render the description cell(s) for a given node at each active column
  const descCells = (descriptions, rowBgOverride) => activeCols.map(role => {
    const col   = COL[role];
    const level = role === 'prev' ? prevLevel : role === 'next' ? nextLevel : selectedLevel;
    const desc  = getDesc(descriptions, level);
    const ph    = isPlaceholder(desc);
    return (
      <td key={role} style={{
        verticalAlign: 'top',
        background:    rowBgOverride || col.cellBg,
        borderLeft:    col.borderLeft,
        color:         ph ? '#bbb' : col.textColor,
        fontStyle:     (ph || col.italic) ? 'italic' : 'normal',
        fontSize:      role === 'base' ? 13 : 12,
        padding:       '11px 14px',
        lineHeight:    1.55,
      }}>
        {desc || <span style={{ color: '#ccc' }}>—</span>}
      </td>
    );
  });

  // Chevron for tree toggle
  const chevron = (open) => (
    <span style={{
      display: 'inline-block', fontSize: 9, color: 'var(--muted)',

// Lightweight markdown → JSX (handles bold, bullets, tables)
function renderMd(text) {
  const inline = (str) => {
    const parts = str.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g);
    return parts.map((p, i) => {
      if (p.startsWith('**') && p.endsWith('**')) return <strong key={i}>{p.slice(2,-2)}</strong>;
      if (p.startsWith('*')  && p.endsWith('*'))  return <em key={i}>{p.slice(1,-1)}</em>;
      return p;
    });
  };
  const parseTableLine = (line) =>
    line.split('|').slice(1, -1).map(cell => cell.trim());

  const blocks = text.split(/\n\n+/);
  return blocks.map((block, bi) => {
    const lines = block.trim().split('\n');
    // markdown table
    if (lines.some(l => l.startsWith('|'))) {
      const tableLines = lines.filter(l => l.startsWith('|'));
      const isSeparator = (l) => /^\|[-| :]+\|$/.test(l.trim());
      const headerLine = tableLines[0];
      const bodyLines = tableLines.slice(2).filter(l => !isSeparator(l));
      const headers = parseTableLine(headerLine);
      return (
        <table key={bi} style={{
          borderCollapse: 'collapse', width: '100%',
          fontSize: 12, margin: '8px 0', lineHeight: 1.4,
        }}>
          <thead>
            <tr>
              {headers.map((h, i) => (
                <th key={i} style={{
                  textAlign: 'left', padding: '5px 8px',
                  borderBottom: '2px solid #d1d5db',
                  fontWeight: 600, color: '#374151',
                  whiteSpace: i === 0 ? 'nowrap' : 'normal',
                }}>
                  {inline(h)}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {bodyLines.map((row, ri) => (
              <tr key={ri} style={{ borderBottom: '1px solid #e5e7eb' }}>
                {parseTableLine(row).map((cell, ci) => (
                  <td key={ci} style={{
                    padding: '5px 8px', verticalAlign: 'top',
                    fontStyle: ci > 0 ? 'italic' : 'normal',
                    color: ci === 0 ? '#374151' : '#6b7280',
                  }}>
                    {inline(cell)}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      );
    }
    // bullet list
    if (lines.every(l => l.trimStart().startsWith('- '))) {
      return (
        <ul key={bi}>
          {lines.map((l,i) => <li key={i}>{inline(l.replace(/^\s*-\s+/,''))}</li>)}
        </ul>
      );
    }
    // numbered list
    if (lines.every(l => /^\d+\./.test(l.trim()))) {
      return (
        <ol key={bi} style={{ paddingLeft: 16, margin: '4px 0 8px' }}>
          {lines.map((l,i) => <li key={i}>{inline(l.replace(/^\d+\.\s+/,''))}</li>)}
        </ol>
      );
    }
    return <p key={bi}>{inline(block.trim())}</p>;
  }).filter(Boolean);
}

function PhilosophyCards({ sections }) {
  if (!sections || sections.length === 0) return null;

  // Build ordered group list, preserving first-seen order from the .md file
  const groupOrder = [];
  const grouped = {};
  sections.forEach(s => {
    if (!grouped[s.group]) {
      grouped[s.group] = [];
      groupOrder.push(s.group);
    }
    grouped[s.group].push(s);
  });

  // Client-side .md download — reconstructs from parsed sections (no server needed)
  const downloadPhilosophy = () => {
    let md = '# FlexGen Rubric Design Philosophy\n\n';
    let currentGroup = '';
    sections.forEach(sec => {
      if (sec.group !== currentGroup) {
        currentGroup = sec.group;
        md += `<!-- group: ${currentGroup} -->\n\n`;
      }
      md += `## ${sec.number}. ${sec.title}\n\n${sec.content}\n\n`;
    });
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'FlexGen_Rubric_Philosophy.md'; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="card">
      <div style={{ display: 'flex', alignItems: 'center', marginBottom: 16 }}>
        <div className="card-title" style={{ marginBottom: 0, flex: 1 }}>
          Design Philosophy — {sections.length} principles · click any card to read
        </div>
        <button
          onClick={downloadPhilosophy}
          style={{
            display: 'inline-flex', alignItems: 'center', gap: 5,
            fontSize: 11, fontWeight: 600, color: 'var(--primary)',
            background: 'transparent', padding: '4px 10px',
            border: '1px solid var(--primary)', borderRadius: 12,
            transition: 'background 0.15s', cursor: 'pointer',
            flexShrink: 0,
          }}
          onMouseOver={e => e.currentTarget.style.background = '#eef0fb'}
          onMouseOut={e => e.currentTarget.style.background = 'transparent'}
        >
          ⬇ Download .md
        </button>
      </div>

      {groupOrder.map((group, gi) => {
        const color = PHIL_GROUP_COLORS[group] || '#6b7194';
        const cards = grouped[group];
        return (
          <div key={group} style={{ marginBottom: gi < groupOrder.length - 1 ? 28 : 4 }}>

            {/* Group header bar */}
            <div style={{
              display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14,
            }}>
              <div style={{
                width: 4, height: 18, borderRadius: 2,
                background: color, flexShrink: 0,
              }} />
              <div style={{
                fontSize: 11, fontWeight: 700, letterSpacing: '0.9px',
                textTransform: 'uppercase', color,
              }}>
                {group}
              </div>
              <div style={{ flex: 1, height: 1, background: `${color}30` }} />
              <div style={{ fontSize: 11, color: 'var(--muted)' }}>
                {cards.length} principle{cards.length !== 1 ? 's' : ''}
              </div>
            </div>

            {/* Cards grid */}
            <div className="phil-grid">
              {cards.map(s => (
                <PhilosophyCard key={s.number} section={s} groupColor={color} />
              ))}
            </div>

          </div>
        );
      })}
    </div>
  );
}

// Closed padlock — shackle is a symmetric U, both legs seated in the body.
function LockedIcon() {
  return (

// ──────────────────────────────────────────────────────────
// Evaluation Wizard
// ──────────────────────────────────────────────────────────

const LEVELS = ['L1','L2','L3','L4','L5','L6'];

const PRONOUN_MAP = {
  'she/her':   { they: 'she',  their: 'her',   them: 'her'  },
  'he/him':    { they: 'he',   their: 'his',   them: 'him'  },
  'they/them': { they: 'they', their: 'their', them: 'them' },
  'other':     { they: 'they', their: 'their', them: 'them' },
};

function getLevelWindow(level) {
  const idx = LEVELS.indexOf(level);
  return LEVELS.slice(Math.max(0, idx - 1), Math.min(LEVELS.length, idx + 2));
}

function substituteTokens(text, name, pronouns) {
  const p = PRONOUN_MAP[pronouns] || PRONOUN_MAP['they/them'];
  const displayName = (name || '').trim() ||
    (p.they.charAt(0).toUpperCase() + p.they.slice(1));
  // Use /gi so {{Name}}, {{They}}, etc. (any capitalisation) are all caught
  let s = text
    .replace(/\{\{name\}\}/gi,  displayName)
    .replace(/\{\{they\}\}/gi,  p.they)
    .replace(/\{\{their\}\}/gi, p.their)
    .replace(/\{\{them\}\}/gi,  p.them);
  // Capitalise letters that follow sentence-ending punctuation
  s = s.replace(/([.!?]\s+)([a-z])/g, (_, punc, ch) => punc + ch.toUpperCase());
  // Capitalise first character
  if (s.length) s = s.charAt(0).toUpperCase() + s.slice(1);
  return s;
}

// Split card text into individual sentences for visual breathing room
function splitSentences(text) {
  const parts = [];
  let remaining = text;
  while (remaining.length > 0) {
    const m = remaining.match(/^(.*?[.!?])(\s+|$)/);
    if (m) {
      parts.push(m[1]);
      remaining = remaining.slice(m[0].length);
    } else {
      parts.push(remaining);
      break;
    }
  }
  return parts.filter(Boolean);
}

function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getCompKey(card) {
  return card.competency_id + '|' + (card.track || '');
}

// Returns true when a competency's cards have a clear signal, OR all are rated/skipped
// Signal rule: ≥60% answered (non-skip) AND ≥85% of answered in the same bucket
function isCompDone(compCards, ratings) {
  const rated = compCards.filter(c => ratings[c.id]);           // any rating incl. skip
  const answered = rated.filter(c => ratings[c.id] !== 'skip'); // excludes skip
  // All cards touched → done regardless of signal clarity
  if (rated.length === compCards.length) return true;
  if (answered.length === 0) return false;
  if (answered.length / compCards.length < 0.60) return false;
  const counts = { easy: 0, comfortable: 0, stretch: 0 };
  answered.forEach(c => { if (counts[ratings[c.id]] !== undefined) counts[ratings[c.id]]++; });
  const maxCount = Math.max(...Object.values(counts));
  return maxCount / answered.length >= 0.85;
}

// Infer level for a competency from ratings
// Priority: level with most "comfortable" ratings; tiebreak = higher level
// Fallback if no comfortable: majority bucket nudges up/down from declared level
function inferCompLevel(compCards, ratings, window, declaredLevel) {
  const comfortable = {};
  window.forEach(l => comfortable[l] = 0);
  compCards.forEach(c => {
    if (ratings[c.id] === 'comfortable' && comfortable[c.level] !== undefined)
      comfortable[c.level]++;
  });
  const totalComfort = Object.values(comfortable).reduce((a,b) => a+b, 0);
  if (totalComfort > 0) {
    let best = window[0], bestN = 0;
    window.forEach(l => {
      if (comfortable[l] > bestN ||
          (comfortable[l] === bestN && LEVELS.indexOf(l) > LEVELS.indexOf(best))) {
        best = l; bestN = comfortable[l];
      }
    });
    return best;
  }
  // No comfortable ratings — use majority bucket
  const answered = compCards.filter(c => ratings[c.id] && ratings[c.id] !== 'skip');
  if (answered.length === 0) return declaredLevel;
  const counts = { easy: 0, stretch: 0 };
  answered.forEach(c => { if (c in counts) counts[ratings[c.id]]++; });
  if ((counts.easy || 0) > (counts.stretch || 0)) {
    // Mostly easy → infer higher than middle
    const midIdx = Math.floor(window.length / 2);
    return window[Math.min(midIdx + 1, window.length - 1)];
  }
  // Mostly stretch → infer lower than middle
  const midIdx = Math.floor(window.length / 2);
  return window[Math.max(midIdx - 1, 0)];
}

// Abridged card text for the results columns (~80 chars)
function abridgeText(text, max = 90) {
  const stripped = text.replace(/\*\*/g, '');
  if (stripped.length <= max) return stripped;
  return stripped.slice(0, max).replace(/\s\S*$/, '') + '…';
}

// Renders **bold** markers in card scenario text as <strong> spans.
// Cards without markers render as plain text — safe fallback for unprocessed cards.
function renderBold(text) {
  const parts = text.split(/\*\*(.+?)\*\*/);
  return parts.map((part, i) =>
    i % 2 === 1
      ? <strong key={i} style={{ fontWeight: 700, color: 'inherit' }}>{part}</strong>
      : part
  );
}

// ── Card Exercise Screen ──────────────────────────────────
function CardExerciseScreen({ setup, onComplete }) {
  const [cards, setCards] = useState(null);   // shuffled, filtered
  const [ratings, setRatings] = useState({}); // { cardId: 'easy'|'comfortable'|'stretch'|'skip' }
  const [idx, setIdx] = useState(0);
  const [showSkipConfirm, setShowSkipConfirm] = useState(false);

  const levelWindow = getLevelWindow(setup.level);

  useEffect(() => {
    Promise.resolve(window.BAKED.examples || [])
      .then(data => {
        const filtered = data.filter(c => {
          if (!levelWindow.includes(c.level)) return false;
          if (c.competency_id === 'domain-specific' && c.track !== setup.track) return false;
          return true;
        });
        setCards(shuffleArr(filtered));
      });
  }, []);

  // Group cards by competency key for stop-early checks
  const cardsByComp = useMemo(() => {
    if (!cards) return {};
    const map = {};
    cards.forEach(c => {
      const k = getCompKey(c);
      if (!map[k]) map[k] = [];
      map[k].push(c);
    });
    return map;
  }, [cards]);

  // Which competency keys are done?
  const doneCounts = useMemo(() => {
    const done = {};
    Object.entries(cardsByComp).forEach(([k, cs]) => { done[k] = isCompDone(cs, ratings); });
    return done;
  }, [cardsByComp, ratings]);

  const allDone = Object.keys(cardsByComp).length > 0 &&
    Object.values(doneCounts).every(Boolean);

  const rate = (rating) => {
    if (!cards) return;
    const card = cards[idx];
    setRatings(prev => ({ ...prev, [card.id]: rating }));
    // Auto-advance to next card; wrap around
    setIdx(prev => (prev + 1) % cards.length);
  };

  if (!cards) {
    return (
      <div className="card-exercise">
        <div className="spinner" />
        <div style={{ fontSize: 14, color: 'var(--muted)' }}>Loading cards…</div>
      </div>
    );
  }

  if (allDone) {
    return (
      <div className="card-exercise">
        <div className="exercise-done-banner">
          <h3>All competencies evaluated!</h3>
          <p>You've rated enough cards to get a clear picture across all dimensions.</p>
          <button className="wiz-results-btn" onClick={() => onComplete(cards, ratings)}>
            See Results →
          </button>
        </div>
      </div>
    );
  }

  const card = cards[idx];
  const currentRating = ratings[card.id];
  const cardText = substituteTokens(card.scenario, setup.name, setup.pronouns);
  const sentences = splitSentences(cardText);
  const badgeClass = currentRating ? `badge-${currentRating}` : null;
  const badgeLabel = currentRating
    ? ({ easy: 'Easy', comfortable: 'Comfortable', stretch: 'Stretch', skip: 'Skipped' })[currentRating]
    : null;

  return (
    <div className="card-exercise">
      {/* 1. Note on context */}
      <div style={{ maxWidth: 680, width: '100%' }}>
        <div style={{
          background: '#fffbeb', border: '1px solid #fde68a',
          borderLeft: '4px solid #f59e0b', borderRadius: 10,
          padding: '12px 16px',
          fontSize: 13, color: '#78350f', lineHeight: 1.6,
        }}>
          <div style={{ fontWeight: 700, fontSize: 11, letterSpacing: '0.8px', textTransform: 'uppercase', color: '#b45309', marginBottom: 4 }}>
            A note on context
          </div>
          Scenarios may reference tech outside your stack — rate the underlying behavior, not the technology. Translate the situation to your own context.
        </div>
      </div>

      {/* 2. How does this feel */}
      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)', marginBottom: 4 }}>
          How does this feel relative to your day-to-day work?
        </div>
        <div style={{ fontSize: 13, color: 'var(--muted)' }}>
          Easy = below your level · Comfortable = right at your level · Stretch = above your level
        </div>
      </div>

      {/* 3. Rating buttons */}
      <div className="rating-buttons">
        <button className={`rating-btn easy ${currentRating === 'easy' ? 'active' : ''}`}
          onClick={() => rate('easy')}>Easy</button>
        <button className={`rating-btn comfortable ${currentRating === 'comfortable' ? 'active' : ''}`}
          onClick={() => rate('comfortable')}>Comfortable</button>
        <button className={`rating-btn stretch ${currentRating === 'stretch' ? 'active' : ''}`}
          onClick={() => rate('stretch')}>Stretch</button>
        <button className="rating-btn skip-btn" onClick={() => rate('skip')}>Skip</button>
      </div>

      {/* 4. Card */}
      <div className="card-scene">
        <button className="card-nav-btn" onClick={() => setIdx(i => Math.max(0, i - 1))}
          disabled={idx === 0}>‹</button>

        <div className="eval-card">
          {badgeLabel && (
            <span className={`eval-card-badge ${badgeClass}`}>{badgeLabel}</span>
          )}
          <div className="eval-card-text">
            {sentences.map((s, i) => (
              <p key={i} style={{ marginBottom: i < sentences.length - 1 ? '0.65em' : 0 }}>{renderBold(s)}</p>
            ))}
          </div>
        </div>

        <button className="card-nav-btn" onClick={() => setIdx(i => Math.min(cards.length - 1, i + 1))}
          disabled={idx === cards.length - 1}>›</button>
      </div>

      {/* 5. Footer */}
      {showSkipConfirm ? (
        <div style={{ background: '#fffbeb', border: '1px solid #fde68a', borderRadius: 10, padding: '12px 20px', maxWidth: 520, textAlign: 'center' }}>
          <div style={{ fontSize: 13, color: 'var(--text)', marginBottom: 10 }}>
            Unrated cards will appear as <strong>Skipped</strong> on the results page. You can still review and override inferred levels there.
          </div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
            <button style={{ padding: '6px 16px', background: 'var(--primary)', color: '#fff', border: 'none', borderRadius: 6, fontSize: 13, fontWeight: 600, cursor: 'pointer' }}
              onClick={() => onComplete(cards, ratings)}>Go to results</button>
            <button style={{ padding: '6px 14px', background: '#fff', color: 'var(--muted)', border: '1px solid var(--border)', borderRadius: 6, fontSize: 13, cursor: 'pointer' }}
              onClick={() => setShowSkipConfirm(false)}>Keep going</button>
          </div>
        </div>
      ) : (
        <div style={{ fontSize: 12, color: 'var(--muted)', display: 'flex', gap: 16, alignItems: 'center' }}>
          <span>Card {idx + 1} of {cards.length}</span>
          <span>·</span>
          <span style={{ cursor: 'pointer', textDecoration: 'underline' }}
            onClick={() => setShowSkipConfirm(true)}>Skip straight to results</span>
        </div>
      )}
    </div>
  );
}

// ── Results Screen ────────────────────────────────────────
function ResultsScreen({ setup, rubric, cards, ratings, onRestart }) {
  const [dimIdx, setDimIdx] = useState(0);
  const [accepted, setAccepted] = useState({}); // { compId: level }
  const [evidence, setEvidence] = useState({}); // { compId: string }
  const [collapsed, setCollapsed] = useState({}); // { compId: bool } — collapses whole comp
  const toggleCollapsed = (compId) => setCollapsed(prev => ({ ...prev, [compId]: !prev[compId] }));
  const [cardsCollapsed, setCardsCollapsed] = useState({}); // { compId: bool } — true = open (default collapsed)
  const toggleCardsCollapsed = (compId) => setCardsCollapsed(prev => ({ ...prev, [compId]: !prev[compId] }));

  const levelWindow = getLevelWindow(setup.level);
  const levelNames = rubric.meta.level_names || {};
  const levelDescs = rubric.meta.level_descriptions || {};
  const levels = rubric.meta.levels || LEVELS;

  // Group cards by (competency_id, track)
  const cardsByComp = useMemo(() => {
    const map = {};
    (cards || []).forEach(c => {
      const k = getCompKey(c);
      if (!map[k]) map[k] = [];
      map[k].push(c);
    });
    return map;
  }, [cards]);

  // Inferred level per competency
  const inferredLevels = useMemo(() => {
    const res = {};
    rubric.dimensions.forEach(dim => {
      dim.competencies.forEach(comp => {
        const key = comp.id === 'domain-specific'
          ? getCompKey({ competency_id: comp.id, track: setup.track })
          : getCompKey({ competency_id: comp.id, track: null });
        const compCards = cardsByComp[key] || [];
        res[comp.id] = inferCompLevel(compCards, ratings, levelWindow, setup.level);
      });
    });
    return res;
  }, [cardsByComp, ratings, rubric]);

  // Effective level (accepted override or inferred)
  const effectiveLevel = (compId) => accepted[compId] || inferredLevels[compId] || setup.level;

  // % complete per dimension: 25% per comp = confirmed level, 75% = evidence text
  const dimComplete = (dim) => {
    const total = dim.competencies.length;
    if (total === 0) return 0;
    const score = dim.competencies.reduce((sum, comp) => {
      const hasLevel = !!accepted[comp.id];
      const hasEvidence = !!(evidence[comp.id] || '').trim();
      return sum + (hasLevel ? 0.25 : 0) + (hasEvidence ? 0.75 : 0);
    }, 0);
    return score / total;
  };

  // Dimension-level summary = most common effective level among its competencies
  const dimLevel = (dim) => {
    const lvls = dim.competencies.map(c => effectiveLevel(c.id));
    const counts = {};
    lvls.forEach(l => counts[l] = (counts[l] || 0) + 1);
    let best = lvls[0], bestN = 0;
    Object.entries(counts).forEach(([l, n]) => {
      if (n > bestN || (n === bestN && LEVELS.indexOf(l) > LEVELS.indexOf(best))) {
        best = l; bestN = n;
      }
    });
    return best;
  };

  const dims = rubric.dimensions;
  const currentDim = dims[dimIdx];
  const declaredIdx = LEVELS.indexOf(setup.level); // used for color-coding throughout

  // Export CSV
  const exportCSV = () => {
    const rows = [['Dimension','Competency','Inferred Level','Inferred Level Description',
      'Accepted Level','Accepted Level Description','Free-Text Evidence','Card Ratings']];
    dims.forEach(dim => {
      dim.competencies.forEach(comp => {
        const inf = inferredLevels[comp.id] || '';
        const acc = accepted[comp.id] || '';
        const compCards = (cards || []).filter(c => c.competency_id === comp.id &&
          (comp.id !== 'domain-specific' || c.track === setup.track));
        const ratingsSummary = compCards
          .filter(c => ratings[c.id])
          .map(c => `${abridgeText(substituteTokens(c.scenario, setup.name, setup.pronouns), 60)}:${ratings[c.id]}`)
          .join(' | ');
        rows.push([
          dim.name, comp.name,
          inf, levelDescs[inf] || '',
          acc, acc && acc !== inf ? (levelDescs[acc] || '') : '',
          (evidence[comp.id] || '').replace(/\n/g, ' '),
          ratingsSummary,
        ]);
      });
    });
    const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'evaluation.csv'; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="results-wrap">
      {/* Dimension navigation strip */}
      <div className="dim-nav-strip">
        {dims.map((dim, i) => {
          const pct = dimComplete(dim);
          const dl = dimLevel(dim);
          const dlIdx = LEVELS.indexOf(dl);
          const dimLevelColor = dlIdx > declaredIdx ? '#166534'
            : dlIdx < declaredIdx ? '#b91c1c'
            : 'var(--primary)';
          return (
            <div key={dim.id}
              className={`dim-nav-chip ${i === dimIdx ? 'active' : ''}`}
              onClick={() => setDimIdx(i)}>
              <div className="dim-chip-label">{dim.name}</div>
              <div className="dim-chip-level" style={{ color: dimLevelColor }}>{dl}</div>
              <div className="dim-chip-bar">
                <div className="dim-chip-fill" style={{ width: `${pct * 100}%` }} />
              </div>
            </div>
          );
        })}
      </div>

      {/* Dimension body */}
      <div className="results-body">
        {/* Setup summary */}
        <div className="setup-summary-bar">
          <span className="ss-label">Evaluation for</span>
          <span className="ss-val">{setup.name}</span>
          <span className="ss-sep">|</span>
          <span className="ss-label">Declared level</span>
          <span className="ss-declared">{setup.level}</span>
          <span className="ss-sep">|</span>
          <span className="ss-label">Pronouns</span>
          <span className="ss-val">{setup.pronouns}</span>
          <span className="ss-sep">|</span>
          <span className="ss-label">Track</span>
          <span className="ss-val">{setup.track}</span>
        </div>

        <div className="results-intro">
          <strong>Here are your inferred levels</strong> based on how you rated the scenarios.
          Navigate between dimensions using the tabs above. For each competency, review the inferred
          level, override it if needed, and add a specific example that supports your assessment.
          Progress bars fill 25% when you confirm a level and 75% when you add evidence.
          Export to CSV at any time.
        </div>

        <div className="results-dim-header">
          <div className="results-dim-title">{currentDim.name}</div>
          <div className="results-dim-arrows">
            <button className="dim-arrow-btn" onClick={() => setDimIdx(i => i - 1)}
              disabled={dimIdx === 0}>‹</button>
            <button className="dim-arrow-btn" onClick={() => setDimIdx(i => i + 1)}
              disabled={dimIdx === dims.length - 1}>›</button>
          </div>
        </div>

        {currentDim.competencies.map(comp => {
          const compKey = getCompKey({ competency_id: comp.id, track: comp.id === 'domain-specific' ? setup.track : null });
          const compCards = (cards || []).filter(c => c.competency_id === comp.id &&
            (comp.id !== 'domain-specific' || c.track === setup.track));
          const inf = inferredLevels[comp.id];
          const eff = effectiveLevel(comp.id);

          const byBucket = { easy: [], comfortable: [], stretch: [], skip: [] };
          compCards.forEach(c => {
            // Unrated cards (early exit via "Skip Straight to Results") count as skipped
            const r = ratings[c.id] || 'skip';
            if (byBucket[r] !== undefined) {
              byBucket[r].push(substituteTokens(c.scenario, setup.name, setup.pronouns));
            }
          });
          const totalCards = compCards.length;

          // Color-code level badge relative to declared level
          const effIdx = LEVELS.indexOf(eff);
          const levelColor = effIdx > declaredIdx ? '#166534'
            : effIdx < declaredIdx ? '#b91c1c'
            : 'var(--primary)';

          const isOpen = !collapsed[comp.id];
          const isCardsOpen = !!cardsCollapsed[comp.id]; // default collapsed; toggled open by click
          return (
            <div key={comp.id} className="comp-result-card">
              {/* Collapsible header */}
              <div className="comp-result-header" onClick={() => toggleCollapsed(comp.id)}>
                <span className={`comp-collapse-arrow ${isOpen ? 'open' : ''}`}>▶</span>
                <div className="comp-inferred-level" style={{ fontSize: 22, fontWeight: 800, color: levelColor, lineHeight: 1 }}>{eff}</div>
                <div>
                  <div className="comp-result-name">{comp.name}</div>
                  <div style={{ fontSize: 11, color: 'var(--muted)' }}>{levelNames[eff]}{accepted[comp.id] && accepted[comp.id] !== inf ? ` (overridden from ${inf})` : ''}</div>
                </div>
                {(evidence[comp.id] || '').trim() && (
                  <span style={{ fontSize: 11, background: '#dcfce7', color: '#166534', borderRadius: 20, padding: '2px 8px', fontWeight: 600 }}>✓ evidence</span>
                )}
              </div>

              {isOpen && (
                <div className="comp-result-body">
                  {/* Level override */}
                  <div className="comp-level-row">
                    <label>Level</label>
                    <select className="comp-level-select"
                      value={accepted[comp.id] || inf}
                      onChange={e => setAccepted(prev => ({ ...prev, [comp.id]: e.target.value }))}>
                      {levels.map(l => (
                        <option key={l} value={l}>{l} — {levelNames[l] || l}</option>
                      ))}
                    </select>
                    {!accepted[comp.id]
                      ? (
                        <button className="comp-confirm-btn"
                          onClick={() => setAccepted(prev => ({ ...prev, [comp.id]: inf }))}>
                          Confirm
                        </button>
                      ) : (
                        <span className="comp-confirmed-badge">✓ Confirmed
                          {accepted[comp.id] !== inf ? ` (inferred: ${inf})` : ''}
                        </span>
                      )
                    }
                  </div>

                  {/* Competency description(s) */}
                  {(() => {
                    const descs = comp.descriptions || {};
                    const effDesc  = descs[eff];
                    const infDesc  = inf && inf !== eff ? descs[inf] : null;
                    const declaredLevel = setup.level;
                    const declDesc = declaredLevel !== eff && declaredLevel !== inf ? descs[declaredLevel] : null;
                    if (!effDesc && !infDesc && !declDesc) return null;
                    return (
                      <div style={{ margin: '10px 0 4px', display: 'flex', flexDirection: 'row', gap: 8 }}>
                        {effDesc && (
                          <div style={{ flex: 1, background: '#f4f6ff', borderLeft: '3px solid var(--primary)', borderRadius: '0 6px 6px 0', padding: '8px 12px' }}>
                            <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--primary)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 3 }}>
                              {eff} — {levelNames[eff] || eff}{accepted[comp.id] ? ' (accepted)' : ' (inferred)'}
                            </div>
                            <div style={{ fontSize: 13, color: 'var(--text)', lineHeight: 1.5 }}>{effDesc}</div>
                          </div>
                        )}
                        {infDesc && (
                          <div style={{ flex: 1, background: '#fafafa', borderLeft: '3px solid var(--muted)', borderRadius: '0 6px 6px 0', padding: '8px 12px', opacity: 0.85 }}>
                            <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 3 }}>
                              {inf} — {levelNames[inf] || inf} (inferred)
                            </div>
                            <div style={{ fontSize: 13, color: 'var(--text)', lineHeight: 1.5 }}>{infDesc}</div>
                          </div>
                        )}
                        {declDesc && (
                          <div style={{ flex: 1, background: '#fffbeb', borderLeft: '3px solid #f59e0b', borderRadius: '0 6px 6px 0', padding: '8px 12px', opacity: 0.85 }}>
                            <div style={{ fontSize: 10, fontWeight: 700, color: '#92400e', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 3 }}>
                              {declaredLevel} — {levelNames[declaredLevel] || declaredLevel} (declared)
                            </div>
                            <div style={{ fontSize: 13, color: 'var(--text)', lineHeight: 1.5 }}>{declDesc}</div>
                          </div>
                        )}
                      </div>
                    );
                  })()}

                  {/* Capabilities */}
                  <div className="comp-caps-section">
                    <div className="comp-section-title">Capabilities</div>
                    {comp.capabilities.map(cap => (
                      <div key={cap.id} className="comp-cap-item">
                        <span className="comp-cap-dot">·</span>
                        <div>
                          <div className="comp-cap-name">{cap.name}</div>
                          {cap.intent && <div className="comp-cap-intent">{cap.intent}</div>}
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* Card columns — collapsible */}
                  {compCards.length > 0 && (
                    <>
                      <div className="cards-section-toggle" onClick={() => toggleCardsCollapsed(comp.id)}>
                        <span className={`cards-section-arrow ${isCardsOpen ? 'open' : ''}`}>▶</span>
                        Scenario Cards
                        <span style={{ fontWeight: 500, textTransform: 'none', letterSpacing: 0, fontSize: 10, color: 'var(--muted)', opacity: 0.8 }}>
                          ({totalCards} total)
                        </span>
                      </div>
                      <div className="card-columns">
                        {[
                          { key: 'easy',        label: 'Easy' },
                          { key: 'comfortable', label: 'Comfortable' },
                          { key: 'stretch',     label: 'Stretch' },
                          { key: 'skip',        label: 'Skipped' },
                        ].map(({ key, label }) => {
                          const n = byBucket[key].length;
                          const pct = totalCards > 0 ? Math.round(n / totalCards * 100) : 0;
                          return (
                            <div key={key} className="card-col">
                              <div className={`card-col-hdr ${key === 'skip' ? 'skipped' : key}`}>
                                {label}
                                <span className="card-col-count">{n > 0 ? `${n} · ${pct}%` : '—'}</span>
                              </div>
                              {isCardsOpen && (n === 0
                                ? <div className="card-col-empty">—</div>
                                : byBucket[key].map((text, i) => (
                                  <div key={i} className="card-chip">{abridgeText(text)}</div>
                                ))
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </>
                  )}

                  {/* Evidence */}
                  <div className="comp-evidence">
                    <label>Specific examples &amp; evidence</label>
                    <textarea
                      placeholder="Add a concrete example that illustrates your level in this competency…"
                      value={evidence[comp.id] || ''}
                      onChange={e => setEvidence(prev => ({ ...prev, [comp.id]: e.target.value }))}
                    />
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Footer */}
      <div className="results-footer">
        <button className="wiz-restart-btn" onClick={onRestart}>Clear results &amp; restart</button>
        <button className="export-csv-btn" onClick={exportCSV}>Export CSV</button>
      </div>
    </div>
  );
}

// ── Wizard Tab ────────────────────────────────────────────
function WizardTab({ rubric }) {
  const [screen, setScreen] = useState('setup'); // setup | exercise | results
  const [setup, setSetup] = useState(null);
  const [exerciseCards, setExerciseCards] = useState(null);
  const [exerciseRatings, setExerciseRatings] = useState(null);

  const handleStart = (setupConfig) => {
    setSetup(setupConfig);
    setScreen('exercise');
  };

  const handleComplete = (cards, ratings) => {
    setExerciseCards(cards);
    setExerciseRatings(ratings);
    setScreen('results');
  };

  const handleRestart = () => {
    setScreen('setup');
    setSetup(null);
    setExerciseCards(null);
    setExerciseRatings(null);
  };

  return (
    <div className="wizard-wrap">
      {screen === 'setup' && <SetupScreen onStart={handleStart} rubric={rubric} />}
      {screen === 'exercise' && <CardExerciseScreen setup={setup} onComplete={handleComplete} />}
      {screen === 'results' && (
        <ResultsScreen
          setup={setup}
          rubric={rubric}
          cards={exerciseCards}
          ratings={exerciseRatings}
          onRestart={handleRestart}
        />
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────
// Main App
// ──────────────────────────────────────────────────────────
function App() {
  const [rubric, setRubric] = useState(null);
  const [selectedTrack, setSelectedTrack] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saveStatus, setSaveStatus] = useState('saved'); // saved | unsaved | saving | error
  const [activeTab, setActiveTab] = useState('overview'); // overview | level-view | editor | wizard
  const editingEnabled = false;
  const [selection, setSelection] = useState({});
  const { toasts, show: showToast } = useToast();
  const saveTimer = useRef(null);

  // Load rubric on mount (no track param → server picks default)
  useEffect(() => {
    Promise.resolve(window.BAKED.tracks['data-ml'])
      .then(data => {
        setRubric(data);
        setSelectedTrack(data.meta.current_track || data.meta.default_track || 'swe-ic');
        setLoading(false);
      })
      .catch(err => { setLoading(false); });
  }, []);

  // Re-fetch rubric when user switches track
  const handleTrackChange = useCallback((trackId) => {
    setSelectedTrack(trackId);
    setLoading(true);
    Promise.resolve(window.BAKED.tracks[trackId] || window.BAKED.tracks['swe-ic'])
      .then(data => { setRubric(data); setLoading(false); })
      .catch(() => { setLoading(false); });
  }, [showToast]);

  // Save rubric
  const saveRubric = useCallback((updatedRubric) => {
    setSaveStatus('saving');
    Promise.resolve().then(() => { setSaveStatus('saved'); });
  }, [showToast]);

  // Handle node save
  const handleNodeSave = useCallback((type, ids, updatedNode) => {
    setRubric(prev => {
      const next = deepClone(prev);
      if (type === 'dimension') {
        const dim = next.dimensions.find(d => d.id === ids.dimId);
        if (dim) { dim.name = updatedNode.name; dim.descriptions = updatedNode.descriptions; }
      } else if (type === 'competency') {
        const dim = next.dimensions.find(d => d.id === ids.dimId);
        const comp = dim?.competencies.find(c => c.id === ids.compId);
        if (comp) { comp.name = updatedNode.name; comp.descriptions = updatedNode.descriptions; }
      } else if (type === 'capability') {
        const dim = next.dimensions.find(d => d.id === ids.dimId);
        const comp = dim?.competencies.find(c => c.id === ids.compId);
        const cap = comp?.capabilities.find(c => c.id === ids.capId);
        if (cap) { cap.name = updatedNode.name; cap.descriptions = updatedNode.descriptions; }
      }
      saveRubric(next);
      return next;
    });
  }, [saveRubric]);

  const statusText = { saved: '✓ Saved', unsaved: '● Unsaved', saving: '↑ Saving…', error: '✕ Save failed' };

  if (loading) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', flexDirection: 'column', gap: 16 }}>
        <div className="spinner" style={{ margin: 0 }} />
        <div style={{ fontSize: 14, color: 'var(--muted)' }}>Loading rubric…</div>
      </div>
    );
  }

  return (
    <>
      {/* Top bar */}
      <div className="topbar">
        <div className="topbar-logo">[DRAFT] Danielle's Technology Rubric</div>
        {selectedTrack && <TrackSelector currentTrack={selectedTrack} onTrackChange={handleTrackChange} />}
        <div className="topbar-spacer" />
        <div className={`save-status ${saveStatus}`}>{statusText[saveStatus]}</div>
      </div>

      {/* Nav tabs */}
      <div className="navtabs">
        <div className={`navtab ${activeTab === 'overview'    ? 'active' : ''}`} onClick={() => setActiveTab('overview')}>Overview</div>
        <div className={`navtab ${activeTab === 'level-view'  ? 'active' : ''}`} onClick={() => setActiveTab('level-view')}>Level View</div>
        <div className={`navtab ${activeTab === 'wizard' ? 'active' : ''}`} onClick={() => setActiveTab('wizard')}>Evaluation Wizard</div>
        <div
          className={`navtab ${activeTab === 'editor' ? 'active' : ''} ${!editingEnabled ? 'locked' : ''}`}
          onClick={() => setActiveTab('editor')}
        >
          Edit Descriptions
          <span style={{ marginLeft: 6, opacity: 0.4 }} title="Editing disabled in preview">
            <LockedIcon />
          </span>
        </div>
      </div>

      {/* Body */}
      <div className="layout" style={{ display: activeTab === 'wizard' ? 'none' : undefined }}>
        {activeTab === 'editor' && (
          <SidebarTree rubric={rubric} selection={selection} onSelect={setSelection} />
        )}

        {activeTab === 'overview'   && <MetaPanel rubric={rubric} />}
        {activeTab === 'editor'     && (
          <NodeEditor rubric={rubric} selection={selection} onSave={handleNodeSave} readOnly={!editingEnabled} />
        )}
        {activeTab === 'level-view' && <LevelView rubric={rubric} selectedTrack={selectedTrack} />}
      </div>

      {/* Wizard always mounted to preserve state across tab switches */}
      <div style={{ display: activeTab === 'wizard' ? 'flex' : 'none', flex: 1, flexDirection: 'column', overflow: 'hidden' }}>
        {rubric && <WizardTab rubric={rubric} />}
      </div>

      <ToastContainer toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
